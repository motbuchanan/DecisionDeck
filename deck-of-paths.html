// ═══════════════════════════════
// ENGINE
// ═══════════════════════════════
class DeckOfPaths {
  constructor() {
    this.profile = loadProfile();
    this.isNewUser = !this.profile;
    if (!this.profile) this.profile = freshProfile();

    this.state = 'start';
    this.scores = { renown:50, resolve:50, calling:50, voice:50, threshold:50 };
    this.usedIds = new Set();
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentVision = null;
    this.selectedPath = null;
    this.drawn = [];

    // Intake state
    this.intakeStep = 0;
    this.intakeAnswers = [];

    // Threshold axis — show only if unlocked (run 2+)
    this.showThreshold = this.profile.thresholdUnlocked || this.profile.runs >= 1;

    // Apply intake-derived axis offsets if returning user
    this._applyIntakeOffsets();

    this.render();
  }

  _applyIntakeOffsets() {
    if (this.profile.intake && this.profile.intake.length > 0) {
      // intake tags can nudge starting values — already stored from first run
      // voiceStart, resolveStart, callingStart offsets get stored on profile
      if (this.profile.axisOffsets) {
        const o = this.profile.axisOffsets;
        if (o.voice)   this.scores.voice   = Math.max(0,Math.min(100, 50 + o.voice));
        if (o.resolve) this.scores.resolve = Math.max(0,Math.min(100, 50 + o.resolve));
        if (o.calling) this.scores.calling = Math.max(0,Math.min(100, 50 + o.calling));
      }
    }
  }

  // ── INTAKE ──
  startIntake() {
    this.state = 'intake';
    this.intakeStep = 0;
    this.intakeAnswers = [];
    this.render();
  }

  selectIntakeAnswer(optionIndex) {
    const q = INTAKE_QUESTIONS[this.intakeStep];
    const opt = q.options[optionIndex];
    this.intakeAnswers.push({ step: this.intakeStep, optionIndex, tags: opt.tags, opt });

    const scroll = document.getElementById('parchmentScroll');
    if (!scroll) return;

    // Inject fire overlay element
    const overlay = document.createElement('div');
    overlay.className = 'parchment-fire-overlay';
    scroll.appendChild(overlay);

    scroll.classList.add('burning');
    this._triggerSmoke();

    // JS-driven burn: clip-path shrinks from bottom upward, overlay heats up
    const duration = 1400;
    const start = performance.now();

    const burnFrame = (now) => {
      const elapsed = now - start;
      const t = Math.min(elapsed / duration, 1);

      // Ease-in curve — slow start, accelerates
      const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

      // Clip from bottom upward: top boundary stays at 0%, bottom stays at 100%
      // The *visible* region is from topEdge→100%. topEdge rises from 0→105 as fire consumes upward.
      const topEdge = eased * 105; // 0→105 (overshoot ensures full consumption)
      const wave1 = Math.sin(eased * Math.PI * 4) * (1 - eased) * 5;
      const wave2 = Math.cos(eased * Math.PI * 3) * (1 - eased) * 4;

      const top = Math.min(topEdge, 100);
      scroll.style.clipPath = `polygon(
        0% 100%,
        100% 100%,
        100% ${Math.max(0, top + wave1)}%,
        75%  ${Math.max(0, top - wave2)}%,
        50%  ${Math.max(0, top + wave1 * 0.6)}%,
        25%  ${Math.max(0, top - wave1)}%,
        0%   ${Math.max(0, top + wave2)}%
      )`;

      // Opacity: stays full until 60% then fades
      const opacityT = Math.max(0, (t - 0.55) / 0.45);
      scroll.style.opacity = String(1 - opacityT);

      // Fire overlay intensifies
      const fireIntensity = Math.min(eased * 1.4, 1);
      overlay.style.background = `linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,140,20,${fireIntensity * 0.15}) 50%,
        rgba(255,60,10,${fireIntensity * 0.35}) 100%
      )`;

      if (t < 1) {
        requestAnimationFrame(burnFrame);
      } else {
        scroll.style.opacity = '0';
        scroll.style.clipPath = 'polygon(0% 100%,100% 100%,100% 100%,0% 100%)';
        setTimeout(() => {
          this.intakeStep++;
          if (this.intakeStep >= INTAKE_QUESTIONS.length) {
            this._finalizeIntake();
          } else {
            this.render();
          }
        }, 120);
      }
    };

    requestAnimationFrame(burnFrame);
  }

  _triggerSmoke() {
    const container = document.getElementById('smokeContainer');
    if (!container) return;

    const scroll = document.getElementById('parchmentScroll');
    if (scroll) {
      const rect = scroll.getBoundingClientRect();
      // Anchor smoke container to center-top of the parchment
      container.style.position = 'fixed';
      container.style.left = (rect.left + rect.width / 2 - 100) + 'px';
      container.style.top = (rect.top - 60) + 'px';
      container.style.transform = 'none';
    }

    container.innerHTML = '';
    container.classList.add('active');

    // Stagger smoke puffs across the burn duration
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'smoke-particle';
        const size = 18 + Math.random() * 28;
        const dx  = (Math.random() - 0.5) * 70;
        const dx2 = dx + (Math.random() - 0.5) * 40;
        const dx3 = dx2 + (Math.random() - 0.5) * 30;
        el.style.cssText = `
          width:${size}px;height:${size}px;
          background:radial-gradient(circle,rgba(190,150,80,0.28),transparent 70%);
          --dur:${1.6 + Math.random() * 0.9}s;
          --dx:${dx}px;--dx2:${dx2}px;--dx3:${dx3}px;
          left:${35 + Math.random() * 30}%;
          bottom:0;
        `;
        container.appendChild(el);
      }, i * 130);
    }

    // Ember sparks — fire upward quickly
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'ember-particle';
        const ex  = (Math.random() - 0.5) * 90;
        const ex2 = ex + (Math.random() - 0.5) * 50;
        el.style.cssText = `
          --dur:${0.8 + Math.random() * 0.6}s;
          --ex:${ex}px;--ex2:${ex2}px;
          left:${25 + Math.random() * 50}%;
          bottom:0;
        `;
        container.appendChild(el);
      }, i * 80 + 100);
    }

    setTimeout(() => {
      container.classList.remove('active');
      container.innerHTML = '';
    }, 3000);
  }

  _finalizeIntake() {
    // Collect all tags and axis offsets from answers
    const allTags = [];
    const offsets = { voice: 0, resolve: 0, calling: 0 };

    for (const ans of this.intakeAnswers) {
      for (const t of ans.tags) allTags.push(t);
      const opt = ans.opt;
      if (opt.voiceStart)   offsets.voice   += opt.voiceStart;
      if (opt.resolveStart) offsets.resolve += opt.resolveStart;
      if (opt.callingStart) offsets.calling += opt.callingStart;
    }

    this.profile.intake = allTags;
    this.profile.axisOffsets = offsets;
    saveProfile(this.profile);

    // Apply offsets to current scores
    this.scores.voice   = Math.max(0,Math.min(100, 50 + offsets.voice));
    this.scores.resolve = Math.max(0,Math.min(100, 50 + offsets.resolve));
    this.scores.calling = Math.max(0,Math.min(100, 50 + offsets.calling));

    // Brief pause then go to start
    this.state = 'start';
    this.render();
  }

  // ── DECK BUILD ──
  buildDeck() {
    // Threshold cards only available if threshold is shown
    let pool = VISIONS.filter(v => {
      if (!this.usedIds.has(v.id)) {
        if (v.type === 'threshold' && !this.showThreshold) return false;
        return true;
      }
      return false;
    });
    if (pool.length < this.totalRounds) {
      this.usedIds = new Set();
      pool = VISIONS.filter(v => {
        if (v.type === 'threshold' && !this.showThreshold) return false;
        return true;
      });
    }
    pool.sort(() => Math.random() - 0.5);

    const selected = [];
    const arcanaCount = {};
    const typeCount = { work:0, offpath:0, mirror:0, voice:0, threshold:0 };

    const guarantees = [
      pool.find(v => v.type === 'mirror'),
      pool.find(v => v.type === 'mirror' && !selected.some(s => s && s.id === v.id)),
      pool.find(v => v.type === 'offpath'),
      pool.find(v => v.type === 'voice'),
      pool.find(v => v.arcana === 'The Seat at the Council'),
      pool.find(v => v.arcana === 'The Long Road'),
    ];

    // Add threshold guarantee on run 2+
    if (this.showThreshold) {
      guarantees.push(pool.find(v => v.type === 'threshold'));
    }

    for (const v of guarantees.filter(Boolean)) {
      if (v && !selected.some(s => s && s.id === v.id)) {
        selected.push(v);
        arcanaCount[v.arcana] = (arcanaCount[v.arcana] || 0) + 1;
        typeCount[v.type] = (typeCount[v.type] || 0) + 1;
      }
    }

    for (const v of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.some(s => s && s.id === v.id)) continue;
      const ac = arcanaCount[v.arcana] || 0;
      if (ac >= 2) continue;
      if (v.type === 'mirror'    && typeCount.mirror    >= 3) continue;
      if (v.type === 'offpath'   && typeCount.offpath   >= 3) continue;
      if (v.type === 'voice'     && typeCount.voice     >= 3) continue;
      if (v.type === 'threshold' && typeCount.threshold >= 2) continue;
      selected.push(v);
      arcanaCount[v.arcana] = (arcanaCount[v.arcana] || 0) + 1;
      typeCount[v.type] = (typeCount[v.type] || 0) + 1;
    }

    for (const v of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.some(s => s && s.id === v.id)) selected.push(v);
    }

    selected.sort(() => Math.random() - 0.5);
    if (selected[0] && (selected[0].type === 'mirror' || selected[0].type === 'voice' || selected[0].type === 'threshold')) {
      const swap = selected.findIndex((v,i) => i > 2 && v.type === 'work');
      if (swap > 0) [selected[0], selected[swap]] = [selected[swap], selected[0]];
    }
    this.drawn = selected.filter(Boolean);
  }

  // ── OMEN / MEMORY ──
  findOmen(history) {
    if (history.length < 3) return null;
    const current = this.currentVision;
    if (!current) return null;
    const overlap = history.filter(h => {
      const past = VISIONS.find(v => v.id === h.id);
      return past && past.tags.some(t => current.tags.includes(t));
    });
    if (overlap.length > 0) {
      const ref = overlap[overlap.length - 1];
      const past = VISIONS.find(v => v.id === ref.id);
      return { text: `In an earlier vision of ${past.arcana}, you chose: "${ref.pathText}" — let that echo as you read this one.` };
    }
    return null;
  }

  // Cross-run memory omen — only on run 2+, only appears once per session, after round 4
  findMemoryOmen() {
    if (this.profile.runs < 1) return null;
    if (this.round < 4) return null;
    if (this._memoryOmenShown) return null;
    const current = this.currentVision;
    if (!current) return null;

    // Find a choice from a past run that shares a tag with this card
    const pastChoices = this.profile.choiceHistory || [];
    const match = pastChoices.find(c => {
      const past = VISIONS.find(v => v.id === c.id);
      return past && past.tags.some(t => current.tags.includes(t)) && c.runNumber < this.profile.runs + 1;
    });

    if (match) {
      const past = VISIONS.find(v => v.id === match.id);
      const choice = past && past.choices[match.pathIndex];
      if (past && choice) {
        this._memoryOmenShown = true;
        return { text: `The road remembers. In a past casting, facing ${past.arcana}, you chose: "${choice.text}" — the pattern runs deeper than one casting.` };
      }
    }
    return null;
  }

  // ── VARIANCE ──
  applyVariance(scores) {
    const m = { ...scores };
    const roll = Math.random();
    const keys = Object.keys(m);
    if (roll < 0.15 && m.renown > 3) {
      m.renown = Math.round(m.renown * 0.35);
    } else if (roll < 0.28 && m.renown < -2) {
      m.resolve = Math.abs(m.resolve) + 2;
    } else if (roll < 0.40) {
      const pick = keys[Math.floor(Math.random() * keys.length)];
      if (Math.abs(m[pick]) > 2) m[pick] = -Math.round(m[pick] * 0.4);
    } else if (roll < 0.48) {
      const pick = keys[Math.floor(Math.random() * keys.length)];
      m[pick] += (Math.random() > 0.5 ? 3 : -3);
    }
    return m;
  }

  // ── GAME LOOP ──
  start() {
    this.scores = { renown:50, resolve:50, calling:50, voice:50, threshold:50 };
    this._applyIntakeOffsets();
    this.usedIds = new Set();
    this.round = 0;
    this.history = [];
    this.selectedPath = null;
    this._memoryOmenShown = false;
    this.buildDeck();
    this.nextRound();
  }

  nextRound() {
    if (this.round >= this.totalRounds) {
      this._completeRun();
      this.state = 'fate';
      this.render();
      return;
    }
    this.currentVision = this.drawn[this.round];
    this.usedIds.add(this.currentVision.id);
    this.selectedPath = null;
    this.state = 'play';
    this.render();
  }

  _completeRun() {
    // Save run data to profile
    this.profile.runs += 1;

    // Save axes snapshot
    this.profile.axesHistory.push({
      renown: this.scores.renown,
      resolve: this.scores.resolve,
      calling: this.scores.calling,
      voice: this.scores.voice,
      threshold: this.scores.threshold
    });

    // Save choice history (for cross-run callbacks)
    for (const h of this.history) {
      this.profile.choiceHistory.push({
        id: h.id,
        pathIndex: h.pathIndex,
        runNumber: this.profile.runs
      });
    }
    // Keep choice history bounded
    if (this.profile.choiceHistory.length > 200) {
      this.profile.choiceHistory = this.profile.choiceHistory.slice(-200);
    }

    // Unlock threshold on second run
    if (this.profile.runs >= 2 && !this.profile.thresholdUnlocked) {
      this.profile.thresholdUnlocked = true;
      this.showThreshold = true;
    }

    saveProfile(this.profile);
  }

  choosePath(index) {
    if (this.selectedPath !== null) return;
    this.selectedPath = index;
    const path = this.currentVision.choices[index];
    const mod = this.applyVariance(path.scores);
    this.scores.renown    = Math.max(0,Math.min(100, this.scores.renown    + (mod.renown    || 0)));
    this.scores.resolve   = Math.max(0,Math.min(100, this.scores.resolve   + (mod.resolve   || 0)));
    this.scores.calling   = Math.max(0,Math.min(100, this.scores.calling   + (mod.calling   || 0)));
    this.scores.voice     = Math.max(0,Math.min(100, this.scores.voice     + (mod.voice     || 0)));
    this.scores.threshold = Math.max(0,Math.min(100, this.scores.threshold + (mod.threshold || 0)));
    this.history.push({ id:this.currentVision.id, pathIndex:index, pathText:path.text, scores:mod });
    this.round++;
    this.render();
  }

  // ── CARD HELPERS ──
  getCardClass() {
    if (!this.currentVision) return '';
    if (this.currentVision.type === 'mirror')    return 'mirror';
    if (this.currentVision.type === 'offpath')   return 'offpath';
    if (this.currentVision.type === 'voice')     return 'voice-card';
    if (this.currentVision.type === 'threshold') return 'threshold-card';
    return '';
  }

  // ── FATE READINGS ──
  getVoiceReading() {
    const v = this.scores.voice;
    const heldBack = this.history.filter(h => {
      const vis = VISIONS.find(vi => vi.id === h.id);
      return vis && (vis.choices[h.pathIndex].scores.voice || 0) <= 1;
    }).length;

    if (v >= 68) {
      return "The Voice axis ran high through these visions — a consistent pattern of choosing to speak when speaking mattered. The deck is reading someone who is not waiting to be called upon. The rooms ahead will respond to that in kind. The question now is not whether to speak — it is learning which words, and which moments, carry the most weight.";
    } else if (v <= 46) {
      if (heldBack >= 4) {
        return "The Voice axis ran quiet across these visions — a pattern of holding the knowledge back, finding the private channel, waiting for the right moment that did not quite arrive. The reading is not a verdict. It is a mirror. What you know is real. The question the deck is holding: who else needs to hear it, and what is the actual cost of saying it plainly?";
      }
      return "The Voice axis sits below the center in this reading. Not silent — but measured. There are rooms where that measured quality is exactly right. The deck is asking whether it is being applied as wisdom or as habit. The next natural opening where you could have spoken clearly — try speaking.";
    } else {
      return "The Voice axis held near the center — present, but neither leading nor lagging. There were moments where the voice was found, and moments where it waited. The reading the deck offers here is this: the gap between what you know and what you say is narrower than it has been. The next step is not a leap. It is a single honest sentence, spoken in the right room, at the right moment. You will recognize it when it comes.";
    }
  }

  getThresholdReading() {
    if (!this.showThreshold) return null;
    const t = this.scores.threshold;
    const crossedBoldly = this.history.filter(h => {
      const vis = VISIONS.find(vi => vi.id === h.id);
      return vis && (vis.choices[h.pathIndex].scores.threshold || 0) >= 6;
    }).length;
    const heldAtEdge = this.history.filter(h => {
      const vis = VISIONS.find(vi => vi.id === h.id);
      return vis && (vis.choices[h.pathIndex].scores.threshold || 0) <= 0;
    }).length;

    if (t >= 68) {
      if (crossedBoldly >= 4) {
        return "The Threshold axis speaks plainly: you are someone who crosses. Across these visions, when the gap between knowing and doing appeared, you moved. Not always without hesitation — but you moved. The life you are building is shaped by exactly this willingness. The crossings you have made are already behind you. The ones ahead will ask the same thing. You have answered this question before.";
      }
      return "The Threshold ran high through this casting — a picture of someone moving toward the things they know. The gap between knowing and doing is not always easy to cross, and across these visions you crossed it more often than not. That is not nothing. It is, in fact, the whole thing.";
    } else if (t <= 44) {
      if (heldAtEdge >= 4) {
        return "The Threshold axis is the quietest voice in this reading — and the one worth listening to most closely. Across these visions, there were moments to cross from knowing into doing, and those moments were often deferred. The deck is not asking why. It is asking: what has been waiting long enough that the cost of waiting has exceeded the cost of crossing? That question has an answer. You already know it.";
      }
      return "The Threshold sits low in this reading. Not absent — but the distance between what is known and what is done has not closed as much as it could. The gap tends to be smaller than it appears from the edge. The first step into it reveals that.";
    } else {
      return "The Threshold held in the middle of this casting — sometimes crossed, sometimes not. The pattern is not yet clear. What the deck is watching for, across future castings, is whether the crossing becomes more natural or whether the edge remains the comfortable place. The answer is already in motion.";
    }
  }

  getCrossRunReading() {
    if (this.profile.runs < 2) return null;
    const history = this.profile.axesHistory;
    if (history.length < 2) return null;

    const prev = history[history.length - 2];
    const curr = history[history.length - 1];

    const changes = [];
    const axes = ['renown','resolve','calling','voice'];
    const labels = { renown:'Renown', resolve:'Resolve', calling:'Calling', voice:'Voice' };

    for (const ax of axes) {
      const delta = (curr[ax] || 50) - (prev[ax] || 50);
      if (Math.abs(delta) >= 6) {
        changes.push({ ax, delta, label: labels[ax] });
      }
    }

    if (changes.length === 0) {
      return "The two castings hold close to one another — the same hands making similar choices across different draws. That kind of consistency is its own data. The deck is not moving you. You are moving consistently through the deck. Watch for the choice you keep making.";
    }

    const biggest = changes.sort((a,b) => Math.abs(b.delta) - Math.abs(a.delta))[0];
    const dir = biggest.delta > 0 ? 'grown' : 'pulled back';
    const desc = biggest.delta > 0
      ? `The ${biggest.label} in this casting ran higher than the last. Something is being built or named that was not in the previous casting. That movement is worth noticing — not as a verdict, but as evidence of a direction.`
      : `The ${biggest.label} in this casting ran lower than the last. Something that was present before did not find the same ground in these visions. That is not loss — it is information. The deck is showing you where the road varies.`;

    return desc;
  }

  getFateReading() {
    const axesToRead = ['renown','resolve','calling'];
    const sorted = axesToRead.map(name => ({ name, val: this.scores[name] }))
      .sort((a,b) => b.val - a.val);
    const high = sorted[0].name;
    const middle = sorted[1].name;
    const low = sorted[2].name;
    const highVal = sorted[0].val;
    const spread = highVal - sorted[2].val;

    const renownBuilt = this.history.filter(h => {
      const v = VISIONS.find(vi => vi.id === h.id);
      return v && v.choices[h.pathIndex].scores.renown > 3;
    }).length;
    const resolveSteady = this.history.filter(h => {
      const v = VISIONS.find(vi => vi.id === h.id);
      return v && v.choices[h.pathIndex].scores.resolve > 3;
    }).length;
    const callingClear = this.history.filter(h => {
      const v = VISIONS.find(vi => vi.id === h.id);
      return v && v.choices[h.pathIndex].scores.calling > 3;
    }).length;
    const holdingBack = this.history.filter(h => {
      const v = VISIONS.find(vi => vi.id === h.id);
      if (!v) return false;
      const sc = v.choices[h.pathIndex].scores;
      return sc.renown < 0 && sc.calling <= 1;
    }).length;

    let reading = '';

    if (high === 'renown') {
      if (renownBuilt >= 5) {
        reading += "Your renown grew consistently across these visions — not through announcement, but through the weight of choices that build a name before it is spoken. The paths you chose were ones that put your worth in the light of the people who matter. What is said of you in rooms you have not entered is already shifting.";
      } else if (highVal >= 65) {
        reading += "Your renown grows in the telling of your deeds before you have spoken a word of them. What is said of you in the rooms you have not entered is beginning to serve you. Tend it as carefully as you have shown in these pages.";
      } else {
        reading += "Renown led your visions by a narrow measure — enough to name a preference for paths that build a name and a standing rather than simply getting through. That preference, held consistently over time, is how a reputation forms.";
      }
    } else if (high === 'resolve') {
      if (resolveSteady >= 5) {
        reading += "Resolve ran through almost every vision you chose — a steadiness that did not depend on the circumstances being favorable or the outcome being certain. You are building across multiple fronts with no guarantee that any of them arrives on schedule, and the visions show someone who keeps moving anyway.";
      } else if (highVal >= 65) {
        reading += "The depth of commitment shown in these visions does not depend on perfect conditions. The house, the plan, the life, the work — you are holding all of it and continuing to move. That kind of resolve is rarer than it sounds.";
      } else {
        reading += "Resolve edged ahead — a slight preference for the paths that hold the line and keep moving rather than pause and recalibrate. In the season you are in, that forward motion has real value. Ensure that what moves forward is the thing you chose, not the thing that has simply been in motion longest.";
      }
    } else {
      if (callingClear >= 5) {
        reading += "The thread of calling ran clearly and consistently through these visions — path after path, you chose the direction of who you are becoming rather than the direction of what is convenient. The seat you seek, the life you are building, the road you are walking with your companion — they are pointed at the same thing.";
      } else if (highVal >= 65) {
        reading += "The calling runs clearly through your visions. You know where you are going, even when the specific steps are obscured. That directional clarity shapes small decisions without effort and keeps you oriented when the road becomes difficult to read.";
      } else {
        reading += "Calling led — just enough to name the pull toward who you are becoming as the strongest thread in these visions. A calling that leads by a small margin is not a weak calling. It is one that is being built, vision by vision, choice by choice.";
      }
    }

    if (spread >= 25) {
      if (low === 'renown' && holdingBack >= 3) {
        reading += "\n\nThe spread in the fate reading speaks plainly: the renown you seek has not yet found a bridge between your worth and the world's knowing of it. The paths you chose repeatedly held back from the move that would have made you visible. The seat at the council does not fill itself by waiting. It fills by those who have made themselves known in the right rooms, on the right questions, before they were formally invited.";
      } else if (low === 'resolve') {
        reading += "\n\nThe spread reveals a variance in commitment across these visions. Resolve ran unevenly — there were paths where the full measure was given, and paths where something was withheld. The road you have described requires a consistency that outlasts the days when the commitment feels natural.";
      } else if (low === 'calling') {
        reading += "\n\nThe calling appears in the fate reading as the axis that lagged most. It is present — you would not be walking this path if it were not — but across these visions it competed with other voices and did not always win. Something is making the signal harder to read. When you find what it is, the path will feel different.";
      } else {
        reading += "\n\nThe spread across your fate reading is significant — a clear stylistic preference running through the choices. The aspect that led is genuinely strong in you. The aspect that lagged is the one the people walking alongside you probably feel most acutely. Not as a verdict. As an invitation.";
      }
    } else if (spread <= 10) {
      reading += "\n\nThe three aspects of your fate reading landed close together — a rare balance. No single force dominated your choices. The road is being walked by a person who is neither purely driven by how they are seen, nor purely by how they hold the line, nor purely by where they are going. All three are present in roughly equal measure.";
    } else {
      reading += `\n\n${middle === 'renown' ? "The renown aspect held steady in the middle of these visions — present without driving, visible without leading. Being seen matters. It is not, and should not be, the whole thing." : middle === 'resolve' ? "Resolve occupied the middle ground of these visions — the steady backbone that kept the other aspects from flying too far in either direction. The ones who finish the road are often held together not by the clarity of the calling or the brightness of the renown, but by the quiet refusal to stop." : "The calling stayed in the middle — present, pulling, but not overriding the other aspects. The destination is real. So is the road."}`;
    }

    const mirrorHistory = this.history.filter(h => {
      const v = VISIONS.find(vi => vi.id === h.id);
      return v && v.type === 'mirror';
    });
    if (mirrorHistory.length >= 2) {
      const honest = mirrorHistory.filter(h => {
        const v = VISIONS.find(vi => vi.id === h.id);
        return v && v.choices[h.pathIndex].scores.calling >= 3;
      }).length;
      const guarded = mirrorHistory.filter(h => {
        const v = VISIONS.find(vi => vi.id === h.id);
        return v && v.choices[h.pathIndex].scores.calling < 2;
      }).length;
      if (honest >= 2) {
        reading += "\n\nThe Mirror did not flinch from you, and you did not flinch from the Mirror. That is a rarer thing than most of these visions encounter. What you found in those cards was real. Carry it. Cast the deck again when the road looks different — the change in your answers will tell you where you have been.";
      } else if (guarded >= 2) {
        reading += "\n\nThe Mirror was held at a slight distance in these visions. The questions it asked will still be there. They tend to wait. Cast the deck again when you are ready to hold the glass a little closer.";
      } else {
        reading += "\n\nThe Mirror showed you what it could. The picture will sharpen with time and with the road. Cast the deck again when the seasons turn.";
      }
    }

    return reading;
  }

      const q = INTAKE_QUESTIONS[this.intakeStep];
      const dots = INTAKE_QUESTIONS.map((_,i) => {
        const cls = i < this.intakeStep ? 'done' : i === this.intakeStep ? 'current' : '';
        return `<div class="intake-dot ${cls}"></div>`;
      }).join('');

      app.innerHTML = `
        <div class="header">
          <div class="header-lockup"><h1>The Deck of Paths</h1><span class="v4-badge">v4</span></div>
          <div class="divider"></div>
        </div>

            <div class="intake-preamble-sigil">🜂</div>

          </div>

          <div class="parchment-scroll" id="parchmentScroll">

        </div>`;

    }

    // ── START ──
    if (this.state === 'start') {

      let returningNote = '';
      if (isReturning) {
        if (runCount === 1) {
          returningNote = `<div class="returning-note">The deck remembers the first road. This casting may speak differently.</div>`;
        } else if (runCount >= 2) {
          returningNote = `<div class="returning-note">The road has been walked ${runCount} times. The deck reads deeper with each passing.</div>`;
        }
      }

      // Show threshold pill only if unlocked
      const thresholdPill = this.showThreshold
        ? `<span class="rune-pill" style="background:rgba(232,112,64,0.12);border-color:rgba(232,112,64,0.35);color:var(--ember);">Threshold</span>`
        : '';

      app.innerHTML = `
        <div class="header">
          <div class="header-lockup"><h1>The Deck of Paths</h1><span class="v4-badge">v4</span></div>
          <div class="subtitle">A scrying of the road ahead</div>
          <div class="divider"></div>
        </div>
        <div class="start-screen">
          <div class="start-sigil">⧖</div>
          <div class="start-title">Deck of Paths</div>
          <div class="start-edition">A Fortune-Telling Instrument</div>
          <div class="start-version">Version 4.0 — Threshold Edition</div>
          <div class="start-rune-row">
            <span class="rune-pill rn">Renown</span>
            <span class="rune-pill rs">Resolve</span>
            <span class="rune-pill rc">Calling</span>
            <span class="rune-pill rv">Voice</span>
            ${thresholdPill}
          </div>
          <div class="start-rule"></div>
          <p>Fourteen visions shall be drawn. Each presents a crossroads. Choose the path that is true — not the path that seems correct.<br><br>The cards do not always reward what seems wise. The road is uncertain. So is the reading. Some visions concern the work. Some the road beyond it. All concern the one who walks.</p>
          <button class="begin-btn" onclick="deck.start()">Draw the First Card</button>
          ${returningNote}
        </div>`;
      return;

    // ── FATE ──
    if (this.state === 'fate') {
      const reading = this.getFateReading();
      const voiceReading = this.getVoiceReading();
      const thresholdReading = this.getThresholdReading();
      const crossRunReading = this.getCrossRunReading();
      const paras = reading.split('\n\n');

      const thresholdRune = this.showThreshold
        ? `<div class="fate-rune fr5"><div class="f-val" style="color:var(--ember)">${this.scores.threshold}</div><div class="f-lbl">Threshold</div></div>`
        : '';

      const thresholdBlock = thresholdReading ? `
        <div class="fate-rule"></div>
        <div class="threshold-reading-block">
          <div class="threshold-reading-label">✦ The Threshold Speaks</div>

      app.innerHTML = `
        <div class="header">
          <div class="header-lockup"><h1>The Deck of Paths</h1><span class="v4-badge">v4</span></div>

          <div class="fate-title">The Cards Have Spoken</div>
          <div class="fate-runes">
            <div class="fate-rune fr1"><div class="f-val" style="color:var(--accent)">${this.scores.renown}</div><div class="f-lbl">Renown</div></div>
            <div class="fate-rune fr2"><div class="f-val" style="color:var(--amethyst)">${this.scores.resolve}</div><div class="f-lbl">Resolve</div></div>
            <div class="fate-rune fr3"><div class="f-val" style="color:var(--gold)">${this.scores.calling}</div><div class="f-lbl">Calling</div></div>
            <div class="fate-rune fr4"><div class="f-val" style="color:var(--teal)">${this.scores.voice}</div><div class="f-lbl">Voice</div></div>
            ${thresholdRune}
          </div>
          <div class="fate-rule"></div>
          ${paras.map(p => `<p class="fate-reading">${p}</p>`).join('')}
          <div class="fate-rule"></div>
          <div class="voice-reading-block">
            <div class="voice-reading-label">✦ The Voice Speaks</div>
            <div class="voice-reading-text">${voiceReading}</div>
          </div>
          ${thresholdBlock}
          ${crossRunBlock}
          <div class="fate-rule"></div>
          <button class="cast-again" onclick="deck.start()">✦ Cast Again</button>
        </div>`;
      return;
    }

    // ── PLAY ──
    const v = this.currentVision;
    const cardClass = this.getCardClass();
    const omen = this.findOmen(this.history);
    const memoryOmen = this.findMemoryOmen();
    const selected = this.selectedPath;
    const path = selected !== null ? v.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length - 1].scores : null;

    const axisNames  = { renown:'Renown', resolve:'Resolve', calling:'Calling', voice:'Voice', threshold:'Threshold' };
    const axisColors = { renown:'var(--accent)', resolve:'var(--amethyst)', calling:'var(--gold)', voice:'var(--teal)', threshold:'var(--ember)' };
    const axisNow    = { ...this.scores };

    let pathsHTML = '';
    if (selected === null) {
      pathsHTML = `<div class="paths">${v.choices.map((c,i) =>
        `<button class="path-btn" onclick="deck.choosePath(${i})">${c.text}</button>`
      ).join('')}</div>`;
    } else {
      const allScores = { ...modScores };
      const dominant = Object.entries(allScores)
        .filter(([,val]) => val !== undefined)
        .sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]))[0];
      const dVal = dominant[1];
      const dClass = dVal > 0 ? 'pos' : dVal < 0 ? 'neg' : 'zero';
      const dSign = dVal > 0 ? '+' : '';
      pathsHTML = `
        <div class="paths">${v.choices.map((c,i) =>
          `<button class="path-btn${i===selected?' chosen':''}" disabled>${c.text}</button>`
        ).join('')}</div>
        <div class="reading">
          <div class="reading-rune">
            <div class="delta ${dClass}">${dSign}${dVal}</div>
            <div class="axis-info">
              <div class="axis-name" style="color:${axisColors[dominant[0]]}">${axisNames[dominant[0]]}</div>
              <div class="axis-sub">Now: ${axisNow[dominant[0]]}</div>
            </div>
          </div>
          <div class="reading-text">${path.reading}</div>
          <button class="next-btn" onclick="deck.nextRound()">${this.round >= this.totalRounds ? '✦ Receive the Fate Reading' : '✦ Draw the Next Card'}</button>
        </div>`;
    }

    // Build rune bar — show threshold only if unlocked
    const thresholdRune = this.showThreshold
      ? `<div class="rune-item r5"><div class="rune-label">Threshold</div><div class="rune-val threshold">${this.scores.threshold}</div></div>`
      : '';

    // Memory omen takes priority over regular omen (only one shown at a time)
    const omenHTML = memoryOmen
      ? `<div class="card-memory-omen"><span class="memory-tag">The Road Remembers</span><br>${memoryOmen.text}</div>`
      : (omen && selected === null ? `<div class="card-omen"><span class="omen-tag">Omen</span><br>${omen.text}</div>` : '');

    app.innerHTML = `
      <div class="header">
        <div class="header-lockup"><h1>The Deck of Paths</h1><span class="v4-badge">v4</span></div>
      </div>
      <div class="progress-wrap">
        <div class="candle-track"><div class="candle-fill" style="width:${(this.round/this.totalRounds)*100}%"></div></div>
        <div class="candle-label">${this.round} / ${this.totalRounds}</div>
      </div>
      <div class="rune-bar">
        <div class="rune-item r1"><div class="rune-label">Renown</div><div class="rune-val renown">${this.scores.renown}</div></div>
        <div class="rune-item r2"><div class="rune-label">Resolve</div><div class="rune-val resolve">${this.scores.resolve}</div></div>
        <div class="rune-item r3"><div class="rune-label">Calling</div><div class="rune-val calling">${this.scores.calling}</div></div>
        <div class="rune-item r4"><div class="rune-label">Voice</div><div class="rune-val voice">${this.scores.voice}</div></div>
        ${thresholdRune}
      </div>
      <div class="card-draw-stage">
        <div class="card ${cardClass}">
          <div class="card-back-pattern"></div>
          <div class="card-corner tl"></div><div class="card-corner tr"></div>
          <div class="card-corner bl"></div><div class="card-corner br"></div>
          <div class="card-corner-inner tl"></div><div class="card-corner-inner tr"></div>
          <div class="card-corner-inner bl"></div><div class="card-corner-inner br"></div>
          <div class="card-side-left">✦ PATH ✦</div>
          <div class="card-side-right">✦ PATH ✦</div>
          <div class="card-number">${this.round} · XIV</div>
          <div class="card-arcana">${v.arcana}</div>
          <div class="card-vision">${v.vision}</div>
          ${omenHTML}
          <div class="card-question">${v.question}</div>
          ${pathsHTML}
        </div>
      </div>`;
  }
}

const deck = new DeckOfPaths();

// Route new users to intake
if (deck.isNewUser) {
  deck.state = 'intake';
  deck.render();
}
</script>
</body>
</html>
