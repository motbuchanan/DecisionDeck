<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hex</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:system-ui,sans-serif;color:#e8f0e4;overflow:hidden;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 20%,#1f3327 0%,#0c1410 70%);}
  #bar{display:flex;align-items:center;gap:10px;padding:12px 14px;}
  #bar a{color:#cfe6d8;text-decoration:none;font-size:14px;border:1px solid #3a5a47;border-radius:999px;padding:6px 12px;}
  #title{font-weight:800;font-size:20px;}
  #turnWrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
  #dot{width:16px;height:16px;border-radius:50%;}
  #turnName{font-weight:700;font-size:15px;}
  #wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;}
  canvas{box-shadow:0 14px 30px rgba(0,0,0,.55);border-radius:12px;touch-action:manipulation;}
  #msg{min-height:24px;text-align:center;font-size:14px;color:#d8e8dd;padding:0 16px;}
  #foot{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 14px 18px;}
  .act{font-family:inherit;font-size:15px;font-weight:bold;padding:10px 18px;border-radius:10px;border:none;
    color:#1c2b16;background:#b0d235;cursor:pointer;box-shadow:0 4px 0 #7e9a1f,0 5px 10px rgba(0,0,0,.4);}
  .act.ghost{background:#15241b;color:#cfe6d8;box-shadow:0 4px 0 #0b160f;border:1px solid #3a5a47;}
  #score{font-size:14px;color:#bcd6c7;}
  .ov{position:fixed;inset:0;background:rgba(7,12,9,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;text-align:center;padding:24px;}
  .ov.show{display:flex;}
  .ov h1{font-size:28px;}
  #confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .cf{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}
</style>
</head>
<body>
<div id="bar"><a href="index.html">&#8962; Shelf</a><div id="title">Hex</div><div id="turnWrap"><div id="dot"></div><div id="turnName"></div></div></div>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="msg"></div>
<div id="foot">
  <button class="act ghost" id="newBtn">New game</button>
  <div id="score"></div>
</div>
<div class="ov" id="overlay"><div id="confetti"></div><div style="font-size:54px;">&#11042;</div><h1 id="ovTitle"></h1><p id="ovText"></p>
  <button class="act" id="ovBtn">Play again</button><a href="index.html" style="font-size:14px;padding:9px 16px;border-radius:10px;border:1px solid #3a5a47;background:#15241b;color:#cfe6d8;text-decoration:none;">Back to shelf</a></div>
<script src="gamenight.js?v=3"></script>
<script>
const KEY="hex_games",N=11;
let P={A:{name:"Mot",main:"#d8312b",light:"#f06a60",dark:"#8d1d19"},B:{name:"Kathy",main:"#2f6fd0",light:"#6fa0ec",dark:"#194182"}};
function seatFrom(p){return{name:p.name,main:p.color,light:p.light,dark:p.dark};}
// A connects TOP<->BOTTOM, B connects LEFT<->RIGHT
let grid,turn="A",phase="over",GS=null,winPath=null,last=null,moves=0;
const NB=[[-1,0],[-1,1],[0,-1],[0,1],[1,-1],[1,0]];
function findPath(v){ // BFS from one edge to the other; returns Set of winning cells or null
  const start=[],goal=(r,c)=>v==="A"?r===N-1:c===N-1;
  for(let i=0;i<N;i++){if(v==="A"&&grid[0][i]===v)start.push([0,i]);
    if(v==="B"&&grid[i][0]===v)start.push([i,0]);}
  const prev=new Map(),seen=new Set(start.map(([r,c])=>r+","+c)),q=[...start];
  while(q.length){const[r,c]=q.shift();
    if(goal(r,c)){const path=new Set();let k=r+","+c;
      while(k){path.add(k);k=prev.get(k);}return path;}
    for(const[dr,dc]of NB){const rr=r+dr,cc=c+dc;
      if(rr<0||rr>=N||cc<0||cc>=N)continue;
      if(grid[rr][cc]!==v)continue;
      const key=rr+","+cc;if(seen.has(key))continue;
      seen.add(key);prev.set(key,r+","+c);q.push([rr,cc]);}}
  return null;}
const canvas=document.getElementById("cv"),ctx=canvas.getContext("2d");
let R=14,W=320,Hh=300,OX=0,OY=0;
function fit(){const maxW=Math.min(window.innerWidth-10,520);
  // width spans N + (N-1)/2 hexes horizontally for pointy-top axial layout
  R=Math.floor(maxW/((N+(N-1)/2)*Math.sqrt(3)+1.5));
  R=Math.max(10,Math.min(R,18));
  const hw=Math.sqrt(3)*R;
  W=Math.ceil(hw*(N+(N-1)/2)+R*2.2);
  Hh=Math.ceil(R*1.5*(N-1)+R*2.6);
  OX=hw*0.62+R*0.4;OY=R*1.3;
  canvas.width=W;canvas.height=Hh;render();}
window.addEventListener("resize",fit);
function center(r,c){const hw=Math.sqrt(3)*R;
  return{x:OX+hw*(c+r/2),y:OY+R*1.5*r};}
function hexPath(x,y,rad){ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-90);
    const px=x+rad*Math.cos(a),py=y+rad*Math.sin(a);
    i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
  ctx.closePath();}
function render(){if(!grid)return;
  ctx.clearRect(0,0,W,Hh);
  // border zones: A owns top+bottom strips, B owns left+right
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){const p=center(r,c);
    hexPath(p.x,p.y,R*0.96);
    const v=grid[r][c];
    if(v){const pc=P[v];
      const g=ctx.createRadialGradient(p.x-R*0.3,p.y-R*0.35,R*0.1,p.x,p.y,R);
      g.addColorStop(0,pc.light);g.addColorStop(0.7,pc.main);g.addColorStop(1,pc.dark);
      ctx.fillStyle=g;}
    else ctx.fillStyle="#1a2c21";
    ctx.fill();
    if(winPath&&winPath.has(r+","+c)){ctx.strokeStyle="#f4c542";ctx.lineWidth=3;}
    else if(last&&last[0]===r&&last[1]===c){ctx.strokeStyle="rgba(255,255,255,.9)";ctx.lineWidth=2.4;}
    else{ctx.strokeStyle="rgba(0,0,0,.45)";ctx.lineWidth=1.4;}
    ctx.stroke();}
  // edge ribbons
  ctx.lineWidth=R*0.42;ctx.lineCap="round";
  const tl=center(0,0),tr=center(0,N-1),bl=center(N-1,0),br=center(N-1,N-1);
  ctx.strokeStyle=P.A.main;
  ctx.beginPath();ctx.moveTo(tl.x-R,tl.y-R*1.25);ctx.lineTo(tr.x+R,tr.y-R*1.25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bl.x-R,bl.y+R*1.25);ctx.lineTo(br.x+R,br.y+R*1.25);ctx.stroke();
  ctx.strokeStyle=P.B.main;
  ctx.beginPath();ctx.moveTo(tl.x-R*1.5,tl.y-R*0.4);ctx.lineTo(bl.x-R*1.5,bl.y+R*0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tr.x+R*1.5,tr.y-R*0.4);ctx.lineTo(br.x+R*1.5,br.y+R*0.4);ctx.stroke();}
function newGame(){phase="over";winPath=null;last=null;moves=0;
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("confetti").innerHTML="";
  GN.matchStart(function(m){P={A:seatFrom(m.a),B:seatFrom(m.b)};
    grid=Array.from({length:N},()=>Array(N).fill(null));
    turn=(m.first===m.a)?"A":"B";phase="play";winPath=null;last=null;moves=0;
    GS={start:Date.now(),flipWinner:m.first.name,friendly:m.friendly,moves:{}};
    GS.moves[m.a.name]=0;GS.moves[m.b.name]=0;
    setMessage(P[turn].name+" connects "+(turn==="A"?"top to bottom":"left to right")+" \u2014 tap a hex.");
    refresh();render();});}
function setMessage(t){document.getElementById("msg").textContent=t;}
function refresh(){const pc=P[turn];
  document.getElementById("turnName").textContent=pc.name+" \u00b7 "+(turn==="A"?"\u2195":"\u2194");
  const d=document.getElementById("dot");
  d.style.background="radial-gradient(circle at 35% 30%,"+pc.light+","+pc.main+" 70%,"+pc.dark+")";
  d.style.boxShadow="0 0 0 3px rgba(255,255,255,.15),0 0 14px "+pc.main;
  const recs=GN.readGames(KEY);let a=0,b=0;
  for(const r of recs){if(r.winner===P.A.name)a++;else if(r.winner===P.B.name)b++;}
  document.getElementById("score").textContent=P.A.name+" "+a+" \u00b7 "+b+" "+P.B.name+((GS&&GS.friendly)?" \u00b7 friendly":"");}
canvas.addEventListener("click",e=>{if(phase!=="play")return;
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width),y=(e.clientY-rect.top)*(Hh/rect.height);
  let best=null,bd=1e9;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(grid[r][c])continue;
    const p=center(r,c),d=Math.hypot(p.x-x,p.y-y);
    if(d<bd){bd=d;best=[r,c];}}
  if(!best||bd>R*1.05)return;
  const[r,c]=best;
  grid[r][c]=turn;last=[r,c];moves++;GS.moves[P[turn].name]++;
  const path=findPath(turn);
  if(path){winPath=path;render();finish(turn);return;}
  turn=turn==="A"?"B":"A";
  setMessage(P[turn].name+" \u2014 "+(turn==="A"?"top to bottom":"left to right")+".");
  refresh();render();});
function finish(w){phase="over";
  const rec={start:GS.start,end:Date.now(),durationMs:Date.now()-GS.start,
    winner:P[w].name,loser:P[w==="A"?"B":"A"].name,
    flipWinner:GS.flipWinner,moves:GS.moves};
  GN.recordGame(KEY,rec);
  document.getElementById("ovTitle").textContent=P[w].name+" bridges the board!";
  document.getElementById("ovText").textContent="Connected in "+GS.moves[P[w].name]+" stones. Hex never ends in a draw \u2014 someone always gets across.";
  const box=document.getElementById("confetti"),cols=[P[w].main,P[w].light,"#f4c542","#fff"];
  for(let i=0;i<60;i++){const d=document.createElement("div");d.className="cf";d.style.left=Math.random()*100+"%";
    d.style.background=cols[i%cols.length];d.style.animationDuration=(2.2+Math.random()*1.8)+"s";
    d.style.animationDelay=(Math.random()*0.8)+"s";box.appendChild(d);}
  document.getElementById("overlay").classList.add("show");refresh();}
document.getElementById("newBtn").addEventListener("click",newGame);
document.getElementById("ovBtn").addEventListener("click",newGame);
GN.rulesButton(document.getElementById("foot"),{title:"Hex",sections:[
 {h:"Goal",p:"Build an unbroken chain of your hexes between your two edges \u2014 one of you bridges top to bottom, the other left to right. Your edge ribbons show your direction."},
 {h:"Playing",p:"Tap any empty hex to claim it. Stones never move. Hexes touching at any side count as connected."},
 {h:"No draws",p:"A beautiful mathematical fact: a full Hex board ALWAYS has exactly one winner. Blocking your opponent and building your own path are the same act."},
 {h:"Strategy",p:"Diagonal \u201cbridge\u201d pairs (two stones with two shared empty neighbors) can\u2019t be cut \u2014 build with them and connect later. First move is strong; rematch with seats swapped."}]});
GN.statsButton(document.getElementById("foot"),{title:"Hex",key:KEY,specials:[
 {label:"Fastest bridge (stones)",of:(r,n)=>{const w=r.filter(x=>x.winner===n&&x.moves&&x.moves[n]);return w.length?Math.min(...w.map(x=>x.moves[n])):0;}},
 {label:"Stones placed",of:(r,n)=>r.reduce((a,x)=>a+((x.moves&&x.moves[n])||0),0)},
 {label:"Coin flips won",of:(r,n)=>r.filter(x=>x.flipWinner===n).length}]});
fit();newGame();
</script>
</body>
</html>
