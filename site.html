<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Decision Deck — Site Lead Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1220;
    --card-bg: #0f1825;
    --card-border: #1e2d3a;
    --card-border-bright: #2a3f50;
    --accent: #f97316;
    --accent-dim: #9a3a06;
    --accent-glow: rgba(249,115,22,0.15);
    --axis1: #f97316;
    --axis2: #fbbf24;
    --axis3: #a78bfa;
    --axis1-glow: rgba(249,115,22,0.1);
    --axis2-glow: rgba(251,191,36,0.08);
    --axis3-glow: rgba(167,139,250,0.08);
    --positive: #34d399;
    --negative: #f87171;
    --neutral: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(249,115,22,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167,139,250,0.04) 0%, transparent 50%);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .app { max-width: 420px; margin: 0 auto; padding: 18px 16px 28px; min-height: 100dvh; display: flex; flex-direction: column; }
  .header { text-align: center; padding: 14px 0 8px; }
  .header-lockup { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
  .v2-badge {
    font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 1.5px; padding: 3px 7px; border-radius: 4px;
    background: linear-gradient(135deg, #f97316, #dc2626);
    color: #fff; text-transform: uppercase; box-shadow: 0 0 12px rgba(249,115,22,0.15);
  }
  .header .subtitle { font-size: 0.72rem; color: var(--text-dim); margin-top: 5px; }
  .progress-wrap { margin: 12px 0; display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 3px; background: var(--card-border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #f97316, #dc2626);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1); border-radius: 2px;
    box-shadow: 0 0 8px rgba(249,115,22,0.15);
  }
  .progress-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 600; color: var(--text-dim); min-width: 40px; text-align: right; }
  .score-bar {
    display: flex; justify-content: space-between; align-items: stretch;
    margin-bottom: 14px; background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); overflow: hidden;
  }
  .score-item { flex: 1; text-align: center; padding: 10px 8px; }
  .score-item + .score-item { border-left: 1px solid var(--card-border); }
  .score-item.s1 { background: linear-gradient(180deg, var(--axis1-glow) 0%, transparent 100%); }
  .score-item.s2 { background: linear-gradient(180deg, var(--axis2-glow) 0%, transparent 100%); }
  .score-item.s3 { background: linear-gradient(180deg, var(--axis3-glow) 0%, transparent 100%); }
  .score-item .label { font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 3px; }
  .score-item .value { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; line-height: 1; }
  .score-item .value.ax1 { color: var(--axis1); text-shadow: 0 0 12px var(--axis1-glow); }
  .score-item .value.ax2 { color: var(--axis2); text-shadow: 0 0 12px var(--axis2-glow); }
  .score-item .value.ax3 { color: var(--axis3); text-shadow: 0 0 12px var(--axis3-glow); }
  .card-container { flex: 1; display: flex; flex-direction: column; }
  .card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 22px 20px 20px;
    flex: 1; display: flex; flex-direction: column;
    animation: cardIn 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, #f97316 30%, #f97316 70%, transparent 100%);
    opacity: 0.7;
  }
  .card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(180deg, rgba(249,115,22,0.15) 0%, transparent 100%);
    pointer-events: none;
  }
  .card.checkin { border-color: rgba(167,139,250,0.3); background: linear-gradient(160deg, rgba(167,139,250,0.04) 0%, var(--card-bg) 40%); }
  .card.checkin::before { background: linear-gradient(90deg, transparent 0%, #a78bfa 30%, #a78bfa 70%, transparent 100%); }
  .card.checkin::after { background: linear-gradient(180deg, rgba(167,139,250,0.08) 0%, transparent 100%); }
  .card.offwork { border-color: rgba(251,191,36,0.2); background: linear-gradient(160deg, rgba(251,191,36,0.04) 0%, var(--card-bg) 40%); }
  .card.offwork::before { background: linear-gradient(90deg, transparent 0%, #fbbf24 30%, #fbbf24 70%, transparent 100%); }
  .card.offwork::after { background: linear-gradient(180deg, rgba(251,191,36,0.06) 0%, transparent 100%); }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
  .card-category {
    font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
    margin-bottom: 10px; position: relative; z-index: 1;
  }
  .card.checkin .card-category { color: #a78bfa; }
  .card.offwork .card-category { color: #fbbf24; }
  .card-context {
    font-size: 0.8rem; color: var(--text-mid); margin-bottom: 14px; line-height: 1.5;
    font-style: italic; padding-bottom: 14px; border-bottom: 1px solid var(--card-border);
    position: relative; z-index: 1;
  }
  .card-question { font-size: 1.08rem; line-height: 1.58; font-weight: 500; margin-bottom: 22px; flex: 1; color: var(--text); position: relative; z-index: 1; }
  .card-ref {
    font-size: 0.74rem; color: #fbbf24; margin-bottom: 12px; padding: 9px 12px;
    background: rgba(251,191,36,0.07); border-radius: var(--radius-sm);
    border-left: 2px solid #fbbf24; position: relative; z-index: 1; line-height: 1.5;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; margin-top: auto; position: relative; z-index: 1; }
  .choice-btn {
    background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
    padding: 13px 15px; color: var(--text-mid); font-family: 'Inter', sans-serif;
    font-size: 0.9rem; font-weight: 500; text-align: left; cursor: pointer;
    transition: all 0.18s ease; line-height: 1.45; position: relative; overflow: hidden;
  }
  .choice-btn::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent); opacity: 0; transition: opacity 0.18s ease;
  }
  .choice-btn:hover { border-color: var(--accent); color: var(--text); background: linear-gradient(90deg, var(--accent-glow), transparent); transform: translateX(2px); }
  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:active { transform: translateX(1px) scale(0.99); }
  .choice-btn.selected { border-color: var(--accent); color: var(--text); background: linear-gradient(90deg, var(--accent-glow), transparent); }
  .choice-btn.selected::before { opacity: 1; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn:disabled:not(.selected) { opacity: 0.35; }
  .result { animation: resultIn 0.3s ease; padding-top: 14px; position: relative; z-index: 1; }
  @keyframes resultIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .result-score {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    padding: 10px 12px; background: var(--bg2); border-radius: var(--radius-sm);
    border: 1px solid var(--card-border);
  }
  .result-score .delta { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; min-width: 44px; }
  .result-score .delta.pos { color: var(--positive); }
  .result-score .delta.neg { color: var(--negative); }
  .result-score .delta.zero { color: var(--neutral); }
  .result-score .stat-info { display: flex; flex-direction: column; }
  .result-score .stat-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1px; }
  .result-score .stat-sub { font-size: 0.68rem; color: var(--text-dim); margin-top: 1px; }
  .result-text { font-size: 0.9rem; line-height: 1.6; color: var(--text-mid); margin-bottom: 16px; }
  .next-btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #f97316, #dc2626);
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.15);
  }
  .next-btn:hover { box-shadow: 0 4px 28px rgba(249,115,22,0.15); transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0) scale(0.99); }
  .start-screen {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; gap: 0; animation: cardIn 0.5s ease; padding: 20px 0;
  }
  .start-logo {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(167,139,250,0.08));
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(249,115,22,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .start-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .start-version {
    font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    background: linear-gradient(90deg, #f97316, #dc2626);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 24px;
  }
  .start-divider { width: 100%; max-width: 300px; height: 1px; background: linear-gradient(90deg, transparent, var(--card-border-bright), transparent); margin: 20px auto; }
  .start-axes { display: flex; gap: 12px; margin-bottom: 20px; }
  .axis-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; border: 1px solid; }
  .axis-pill.a1 { background: var(--axis1-glow); border-color: rgba(255,255,255,0.12); color: var(--axis1); }
  .axis-pill.a2 { background: var(--axis2-glow); border-color: rgba(255,255,255,0.12); color: var(--axis2); }
  .axis-pill.a3 { background: var(--axis3-glow); border-color: rgba(255,255,255,0.12); color: var(--axis3); }
  .start-screen p { font-size: 0.88rem; color: var(--text-mid); line-height: 1.7; max-width: 310px; margin-bottom: 28px; }
  .start-btn {
    padding: 14px 48px; background: linear-gradient(135deg, #f97316, #dc2626);
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 4px 24px rgba(249,115,22,0.15);
    transition: all 0.2s ease;
  }
  .start-btn:hover { box-shadow: 0 4px 36px rgba(249,115,22,0.15); transform: translateY(-1px); }
  .start-note { margin-top: 14px; font-size: 0.72rem; color: var(--text-dim); }
  .end-screen {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; gap: 14px; animation: cardIn 0.5s ease; padding: 10px 0;
  }
  .end-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
  .end-screen .final-scores {
    display: flex; background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); overflow: hidden; width: 100%; max-width: 300px;
  }
  .end-screen .final-stat { flex: 1; text-align: center; padding: 14px 8px; }
  .end-screen .final-stat + .final-stat { border-left: 1px solid var(--card-border); }
  .end-screen .final-stat.e1 { background: linear-gradient(180deg, var(--axis1-glow), transparent); }
  .end-screen .final-stat.e2 { background: linear-gradient(180deg, var(--axis2-glow), transparent); }
  .end-screen .final-stat.e3 { background: linear-gradient(180deg, var(--axis3-glow), transparent); }
  .end-screen .final-stat .val { font-family: 'Space Grotesk', sans-serif; font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .end-screen .final-stat .lbl { font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }
  .end-divider { width: 100%; max-width: 320px; height: 1px; background: linear-gradient(90deg, transparent, var(--card-border-bright), transparent); }
  .end-screen .insight { font-size: 0.9rem; color: var(--text-mid); line-height: 1.7; max-width: 340px; text-align: left; }
  .play-again {
    padding: 13px 44px; background: linear-gradient(135deg, #f97316, #dc2626);
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(249,115,22,0.15); transition: all 0.2s ease;
  }
  .play-again:hover { box-shadow: 0 4px 28px rgba(249,115,22,0.15); transform: translateY(-1px); }
  .reflection-tag {
    display: inline-block; font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 4px; margin-bottom: 6px;
    background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2);
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SCENARIOS = [

  // ===== PROJECT MANAGEMENT =====
  {
    id: "pm-1", category: "Project Management", type: "work",
    context: "You're managing three projects simultaneously. Two are on track. One is slipping because you haven't had time to focus on it.",
    question: "Something has to give. How do you handle the slipping project?",
    choices: [
      { text: "Double down — work longer hours to get all three back on track", scores: { influence: -2, execution: 4, alignment: -3 }, feedback: "Brute force works short-term. But the version of you running on 12-hour days makes worse decisions than the version working 8 focused ones. You're not saving the project — you're borrowing against next week." },
      { text: "Delegate portions of the slipping project to someone capable", scores: { influence: 6, execution: 3, alignment: 5 }, feedback: "Hardest thing for a project owner to do — hand off a piece of something with your name on it. But the project doesn't care who finishes it. It only cares that it gets finished." },
      { text: "Flag it to leadership — reset the timeline with transparency", scores: { influence: 4, execution: -1, alignment: 6 }, feedback: "Feels like failure. It's not. A reset timeline with buy-in is infinitely better than a quiet miss that surprises everyone at the deadline. Leadership would rather adjust expectations than discover a problem you hid." }
    ],
    tags: ["projects", "capacity"]
  },
  {
    id: "pm-2", category: "Project Management", type: "work",
    context: "You've built a detailed project plan. A team member on the floor suggests a shortcut that would save time but skips a step you think matters.",
    question: "Their shortcut works. Your step is theoretically important but might be overengineered. What do you do?",
    choices: [
      { text: "Stick with the plan — the step exists for a reason", scores: { influence: -2, execution: 2, alignment: 4 }, feedback: "Maybe. But does the reason still hold, or did you build it for a scenario that hasn't happened? Plans are tools, not scripture. Defending a step because it's in the plan is process worship." },
      { text: "Test the shortcut on a small scale and compare results", scores: { influence: 5, execution: 4, alignment: 5 }, feedback: "You kept the plan alive while letting reality challenge it. If the shortcut works, you just improved your process. If it doesn't, the test proved your step matters — and now the team believes it too, not just you." },
      { text: "Adopt the shortcut — trust the floor knowledge", scores: { influence: 4, execution: 5, alignment: -1 }, feedback: "Bold. And it tells the floor their input matters, which is valuable. But if the step you skipped turns out to have prevented a downstream problem, you own that. Make sure you're cutting because it's smart, not because you want to be liked." }
    ],
    tags: ["projects", "process", "trust"]
  },
  {
    id: "pm-3", category: "Project Management", type: "work",
    context: "A project you championed is delivering results, but the team that executed it isn't getting recognized.",
    question: "You built the plan. They built the thing. Who gets the spotlight?",
    choices: [
      { text: "Highlight the team's execution — the plan means nothing without delivery", scores: { influence: 7, execution: 2, alignment: 5 }, feedback: "This is how you build people who want to execute your next project. Credit flows down, accountability flows up. That's not a slogan — it's a leadership architecture." },
      { text: "Share the credit — the plan and the execution were both essential", scores: { influence: 3, execution: 3, alignment: 3 }, feedback: "Fair and accurate. But 'sharing credit' often reads as 'making sure I'm included.' If the team delivered, let them have the moment. Your reputation as a project leader is built on their success stories, not your co-billing." },
      { text: "Present the results yourself — you drove the vision", scores: { influence: -4, execution: 5, alignment: -3 }, feedback: "The data looks great in your presentation. But the people who built it are watching. And they're learning that effort here is invisible — your framework gets the stage, their hands don't. Next project, they'll give you compliance, not commitment." }
    ],
    tags: ["projects", "trust", "team"]
  },
  {
    id: "pm-4", category: "Project Management", type: "work",
    context: "You're in a meeting presenting a project update. Someone asks a question about a detail you don't have the answer to.",
    question: "You could estimate, deflect, or admit the gap. The room is watching.",
    choices: [
      { text: "Give your best estimate based on what you know", scores: { influence: -2, execution: 3, alignment: -3 }, feedback: "You kept the meeting moving. But if that estimate turns out to be wrong, every number you present after this carries an asterisk. Credibility is built one accurate answer at a time and lost one guess at a time." },
      { text: "Say you don't have that specific data and will follow up by end of day", scores: { influence: 5, execution: 1, alignment: 6 }, feedback: "'I don't know, but I'll find out' is the most underrated power move in a meeting room. It requires security most people don't have. The follow-through is what makes it land — so actually follow through." },
      { text: "Redirect to what you do know and steer the conversation forward", scores: { influence: 2, execution: 4, alignment: 0 }, feedback: "Smooth. And sometimes appropriate. But the person who asked the question noticed you didn't answer it. If they ask again later and you still don't have it, the redirect becomes a pattern." }
    ],
    tags: ["projects", "integrity", "communication"]
  },

  // ===== PROCESS & SYSTEMS =====
  {
    id: "proc-1", category: "Process & Systems", type: "work",
    context: "You've designed a new workflow that should improve efficiency. The team hasn't been consulted on it yet.",
    question: "It's a good system. Do you roll it out or bring the team in first?",
    choices: [
      { text: "Roll it out — the data supports it, and discussion will just slow things down", scores: { influence: -5, execution: 6, alignment: -4 }, feedback: "Efficient. And doomed. A process the team didn't help build is a process the team will work around. You'll get compliance for a week and quiet sabotage for a month. The best system in the world fails if the people using it don't believe in it." },
      { text: "Present it to the team, get feedback, and adjust before launch", scores: { influence: 7, execution: 2, alignment: 6 }, feedback: "Slower to launch. Faster to stick. When people see their fingerprints on a process, they protect it instead of resisting it. The 20% you adjust based on their feedback is usually the 20% that would have broken it anyway." },
      { text: "Roll it out as a pilot with a clear feedback window — adjust based on results", scores: { influence: 4, execution: 5, alignment: 3 }, feedback: "Pragmatic. You get real data instead of hypothetical objections. Just make sure the 'feedback window' is real. If people give feedback and nothing changes, you've taught them that input is theater." }
    ],
    tags: ["process", "trust", "systems"]
  },
  {
    id: "proc-2", category: "Process & Systems", type: "work",
    context: "A process you implemented six months ago isn't being followed consistently. Some people skip steps. Results are mixed.",
    question: "Is the process wrong, the compliance wrong, or something else entirely?",
    choices: [
      { text: "Enforce compliance — the process was designed correctly, people need to follow it", scores: { influence: -3, execution: 5, alignment: 2 }, feedback: "Maybe. Or maybe the process has a friction point that makes skipping rational. When smart people consistently skip a step, the step might be the problem. Enforcement works for safety. For workflow, understanding works better." },
      { text: "Talk to the people skipping steps — understand why before deciding", scores: { influence: 6, execution: 2, alignment: 5 }, feedback: "The answer is almost always in the room with the people doing the work. They're not skipping steps because they're lazy — they're skipping because something about the step doesn't work in practice. Find out what, and you'll fix the real problem." },
      { text: "Audit the results — if the skip doesn't affect quality, maybe the step isn't needed", scores: { influence: 3, execution: 4, alignment: 4 }, feedback: "Data-driven. And honest. Some processes accumulate steps like sediment — each one made sense when it was added, but the pile becomes its own problem. Cutting a step that doesn't affect outcomes isn't lowering standards. It's improving the system." }
    ],
    tags: ["process", "systems", "trust"]
  },
  {
    id: "proc-3", category: "Process & Systems", type: "work",
    context: "You see a better way to do something in an area that isn't your direct responsibility.",
    question: "You have a legitimate improvement. But it's someone else's domain. What do you do?",
    choices: [
      { text: "Bring it directly to the person who owns that area — 'Hey, I noticed something that might help'", scores: { influence: 5, execution: 3, alignment: 6 }, feedback: "Respectful. Collaborative. And the way it should work. The key is delivery: 'I noticed something' is an offer. 'You should change this' is an intrusion. Same information, completely different impact." },
      { text: "Bring it to leadership and let them decide whether to implement it", scores: { influence: -2, execution: 2, alignment: -3 }, feedback: "You just went over someone's head about their own area. Even if the idea is good, the person who owns that domain now has to defend their process to their boss because of you. That's not collaboration — that's politics, even if you didn't mean it that way." },
      { text: "Implement a version of it in your own area and let the results speak", scores: { influence: 3, execution: 5, alignment: 1 }, feedback: "Lead by example. If it works in your area, the other person might adopt it organically. If it doesn't translate, you've learned something. Just make sure 'letting results speak' doesn't turn into 'showing someone up.'" }

  {

// ========== GAME ENGINE ==========
class DecisionDeck {
  constructor() {
    this.state = 'start';
    this.scores = { influence: 50, execution: 50, alignment: 50 };
    this.usedIds = new Set();
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentScenario = null;
    this.selectedChoice = null;
    this.usedIds = new Set();
    this.deck = [];
    this.render();
  }

  buildDeck() {
    if (this.usedIds.size >= SCENARIOS.length) this.usedIds = new Set();
    let pool = SCENARIOS.filter(s => !this.usedIds.has(s.id));
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const selected = [];
    const catCount = {};
    const typeCount = { work: 0, offwork: 0, checkin: 0 };
    const guarantees = [
      pool.find(s => s.type === 'checkin'),
      pool.find(s => s.type === 'checkin' && !selected.includes(s)),
      pool.find(s => s.type === 'offwork'),
      pool.find(s => s.type === 'offwork' && !selected.includes(s)),
      pool.find(s => s.category === 'Working Across Lanes'),
      pool.find(s => s.category === 'Site Oversight'),
      pool.find(s => s.category === 'Data & Tools'),
    ].filter(Boolean);
    for (const s of guarantees) {
      if (!selected.includes(s)) {
        selected.push(s);
        catCount[s.category] = (catCount[s.category] || 0) + 1;
        typeCount[s.type] = (typeCount[s.type] || 0) + 1;
      }
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.includes(s)) continue;
      const cc = catCount[s.category] || 0;
      if (cc >= 2) continue;
      if (s.type === 'checkin' && typeCount.checkin >= 3) continue;
      if (s.type === 'offwork' && typeCount.offwork >= 3) continue;
      selected.push(s);
      catCount[s.category] = cc + 1;
      typeCount[s.type] = (typeCount[s.type] || 0) + 1;
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.includes(s)) selected.push(s);
    }
    for (let i = selected.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [selected[i], selected[j]] = [selected[j], selected[i]];
    }
    if (selected[0] && selected[0].type === 'checkin') {
      const swapIdx = selected.findIndex((s, i) => i > 2 && s.type === 'work');
      if (swapIdx > 0) [selected[0], selected[swapIdx]] = [selected[swapIdx], selected[0]];
    }
    this.deck = selected;
  }

  findCallback(history) {
    if (history.length < 3) return null;
    const current = this.currentScenario;
    if (!current) return null;
    const tagOverlap = history.filter(h => {
      const past = SCENARIOS.find(s => s.id === h.id);
      if (!past) return false;
      return past.tags.some(t => current.tags.includes(t));
    });
    if (tagOverlap.length > 0) {
      const ref = tagOverlap[tagOverlap.length - 1];
      const past = SCENARIOS.find(s => s.id === ref.id);
      return {
        text: `Earlier, when faced with a ${past.category.toLowerCase()} situation, you chose: "${ref.choiceText}" — how does that shape your thinking here?`,
      };
    }
    return null;
  }

  applyScoreVariance(scores) {
    const modified = { ...scores };
    const roll = Math.random();
    if (roll < 0.18 && modified.influence > 3) {
      modified.influence = Math.round(modified.influence * 0.3);
    } else if (roll < 0.30 && modified.influence < -2) {
      modified.execution = Math.abs(modified.execution) + 3;
    } else if (roll < 0.42) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      if (Math.abs(modified[pick]) > 2) {
        modified[pick] = -Math.round(modified[pick] * 0.5);
      }
    } else if (roll < 0.50) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      modified[pick] = modified[pick] + (Math.random() > 0.5 ? 4 : -4);
    }
    return modified;
  }

  nextRound() {
    if (this.round >= this.totalRounds) {
      this.state = 'end';
      this.render();
      return;
    }
    this.currentScenario = this.deck[this.round];
    this.usedIds.add(this.currentScenario.id);
    this.selectedChoice = null;
    this.state = 'play';
    this.render();
  }

  selectChoice(index) {
    if (this.selectedChoice !== null) return;
    this.selectedChoice = index;
    const choice = this.currentScenario.choices[index];
    const modifiedScores = this.applyScoreVariance(choice.scores);
    this.scores.influence = Math.max(0, Math.min(100, this.scores.influence + modifiedScores.influence));
    this.scores.execution = Math.max(0, Math.min(100, this.scores.execution + modifiedScores.execution));
    this.scores.alignment = Math.max(0, Math.min(100, this.scores.alignment + modifiedScores.alignment));
    this.history.push({
      id: this.currentScenario.id,
      choiceIndex: index,
      choiceText: choice.text,
      scores: modifiedScores
    });
    this.round++;
    this.render();
  }

  getEndInsight() {
    const { influence, execution, alignment } = this.scores;
    const sorted = [
      { name: 'influence', val: influence },
      { name: 'execution', val: execution },
      { name: 'alignment', val: alignment }
    ].sort((a, b) => b.val - a.val);
    const highest = sorted[0].name;
    const middle = sorted[1].name;
    const lowest = sorted[2].name;
    const highVal = sorted[0].val;
    const spread = highVal - sorted[2].val;

    // Analyze actual choice patterns
    const executionDominant = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      if (!s) return false;
      const sc = s.choices[h.choiceIndex].scores;
      return sc.execution > 4 && sc.influence <= 0;
    }).length;
    const influencePositive = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.choices[h.choiceIndex].scores.influence > 3;
    }).length;
    const alignmentFocused = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.choices[h.choiceIndex].scores.alignment > 3;
    }).length;
    const controlPattern = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      if (!s) return false;
      const sc = s.choices[h.choiceIndex].scores;
      return sc.execution > 3 && sc.alignment <= 0;
    }).length;

    let reading = '';

    // Highest axis paragraph — varies by score magnitude and pattern
    if (highest === 'execution') {
      if (executionDominant >= 4) {
        reading += "Execution dominated — and that showed up in the pattern of choices, not just the score. You picked output over buy-in repeatedly. Systems shipped. Deadlines held. The question the scores are asking is whether the people who have to live with what you build were brought along, or just handed the result. A site manager who executes without alignment eventually runs out of people willing to execute with them.";
      } else if (highVal >= 65) {
        reading += "You get things done. Projects move under you, systems ship, and deadlines hold — that's rare and it's valuable. The execution instinct ran strongest across your choices this run. The watch-out: the drive to deliver can outrun the people who have to live inside what you deliver. Make sure the output is landing on people who understood what was coming.";
      } else {
        reading += "Execution edged ahead of the other two axes — just enough to name a preference for movement over process. That's not a flaw. It's a style. The narrow margin says the other instincts are present, which means you're not a one-speed leader. That kind of range is exactly what site-level work requires.";
      }
    } else if (highest === 'influence') {
      if (influencePositive >= 5) {
        reading += "Influence ran consistently through your choices — not once or twice, but as a pattern. You built trust before making demands, brought people along before announcing directions, and earned the outcomes rather than imposing them. In a site management role, that's the foundation everything else is built on. Teams that follow because they want to are fundamentally different from teams that comply because they have to.";
      } else if (highVal >= 65) {
        reading += "Your instinct is to lead through credibility and relationships. When people follow your direction, it's because you've earned it, not because the org chart says so. That kind of influence outlasts any title — including this one. Just know that the relational instinct, used exclusively, can become a way of avoiding the decisions that need to happen regardless of how people feel about them.";
      } else {
        reading += "Influence came out ahead — a lean margin over execution and alignment, but consistent enough to say something real about your default mode. When you weren't sure which instinct to use, you leaned toward the one that keeps people intact. That's a sound default in most situations. It's also worth pairing with a willingness to make the call that people won't like.";
      }
    } else {
      if (alignmentFocused >= 5) {
        reading += "Alignment drove the choices more than anything else this run. You kept reaching for the move that fits the larger system — not just what works in this room, but what connects to the room next door. That's the systems view that site management actually requires. The risk in a heavily alignment-focused style is that it can look like indecision to people who want faster calls. Make sure the alignment work is visible, not just the conclusions.";
      } else if (highVal >= 65) {
        reading += "You think about how the pieces fit together — not just your work, but how it connects to what's around it. That systems view is what separates a project runner from a site leader. The only thing to watch: systems thinkers sometimes over-architect simple problems. Not everything needs a framework. Some things need a fast decision and a willing team.";
      } else {
        reading += "Alignment ran slightly ahead of the other two axes, which says your first instinct when a decision lands is to fit it into the larger picture rather than optimize the immediate outcome. That's the right reflex for someone overseeing multiple areas. The narrow margin just means the execution and influence instincts are active too — and that range is an asset.";
      }
    }

    // Middle paragraph based on spread and pattern
    if (spread >= 25) {
      if (lowest === 'influence' && executionDominant >= 3) {
        reading += "\n\nThe spread in the scores says this wasn't balanced — execution pulled away from influence significantly. That pattern is worth examining directly. In a site role, the ability to get things done matters. So does the ability to bring people with you. If influence consistently lagged while execution dominated, there are probably people in the operation who are complying without being committed. That gap shows up eventually — in morale, in turnover, in the quiet quitting that doesn't look like quitting until something breaks.";
      } else if (lowest === 'execution' && influencePositive >= 4) {
        reading += "\n\nThe spread shows a consistent lean toward relationship over output. That's a real and valuable thing — it's also a pattern that can frustrate the people above you who are looking for delivery. The best version of your influence-first style uses trust as leverage to move things, not as a substitute for moving them. The question is whether the people you've brought along are actually going somewhere.";
      } else if (lowest === 'alignment') {
        reading += "\n\nAlignment consistently lagged in the choices this run. That usually means decisions were optimized for the immediate room without accounting for how they land in the rooms adjacent. Site-level work is inherently multi-room — what you build in one area sets conditions for others. A habit of local optimization without alignment thinking eventually creates coordination problems that are harder to fix than the original decisions.";
      } else {
        reading += "\n\nThe gap between your highest and lowest axis was significant across this run. That means a real stylistic preference — not random variation. The strongest instinct is genuinely useful. The one that lagged is probably the gap your team feels most acutely. Not as a judgment — as a developmental observation.";
      }
    } else if (spread <= 10) {
      reading += "\n\nYour three scores landed close together, which is genuinely uncommon. No single instinct dominated — you were moving between influence, execution, and alignment based on what the situation required. That adaptability is what site leadership actually demands. The thing to build on: learn to recognize which situations need which instinct most, so the switching is deliberate rather than reactive.";
    } else {
      reading += `\n\n${middle === 'influence' ? "The relational instinct stayed in the middle of your choices — present, but not leading. That's actually a functional place for it. Influence as a background constant keeps the team intact while execution and alignment do the visible work." : middle === 'execution' ? "Execution sat in the middle of this run — available when needed without overwhelming the other instincts. That's the right relationship to have with the output drive. You can push when it matters without making push mode your only gear." : "Alignment showed up in the middle — applied when it was clearly needed without crowding out the other instincts. That's disciplined systems thinking: knowing when the bigger picture matters most and when the immediate decision just needs to get made."}`;
    }

    // Check-in analysis
    const checkinHistory = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.type === 'checkin';
    });
    if (checkinHistory.length >= 2) {
      const controlCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.alignment < 1;
      }).length;
      const selfAwareCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.influence > 2;
      }).length;
      if (controlCount >= 2 && selfAwareCount < 2) {
        reading += "\n\nThe check-ins surfaced a pattern worth sitting with. There's a tension between your drive to build and control and your ability to let others own pieces of it. The best site leaders aren't the ones who do the most — they're the ones who make the most possible without being in the middle of everything.";
      } else if (selfAwareCount >= 2) {
        reading += "\n\nThe check-ins suggest you're examining your role rather than just performing it. That reflective instinct is an asset in a position this complex. Most people in site management are too busy reacting to stop and ask the larger questions. You seem to be doing both.";
      } else {
        reading += "\n\nThe check-ins showed a stable read on your current state — nothing alarming, nothing suppressed. That groundedness is worth protecting as the role gets more demanding.";
      }
    }

    return reading;
  }

  start() {
    this.scores = { influence: 50, execution: 50, alignment: 50 };
    this.usedIds = new Set();
    this.round = 0;
    this.history = [];
    this.selectedChoice = null;
    this.buildDeck();
    this.nextRound();
  }

  getCardClass() {
    if (!this.currentScenario) return '';
    if (this.currentScenario.type === 'checkin') return 'checkin';
    if (this.currentScenario.type === 'offwork') return 'offwork';
    return '';
  }

  render() {
    const app = document.getElementById('app');
    if (this.state === 'start') {
      app.innerHTML = `
        <div class="header">
          <div class="header-lockup">
            <h1>Decision Deck</h1>
            <span class="v2-badge">v2</span>
          </div>
          <div class="subtitle">Site Lead Edition</div>
        </div>
        <div class="start-screen">
          <div class="start-logo">⚙</div>
          <div class="start-title">Decision Deck</div>
          <div class="start-version">Version 2.0 — Updated</div>
          <div class="start-axes">
            <span class="axis-pill a1">Influence</span>
            <span class="axis-pill a2">Execution</span>
            <span class="axis-pill a3">Alignment</span>
          </div>
          <div class="start-divider"></div>
          <p>14 scenarios drawn from a larger pool. No perfect answers.<br><br>Projects. People. Processes. Where they intersect is where it gets hard.<br><br>Your earlier decisions will follow you into later ones.</p>
          <button class="start-btn" onclick="game.start()">Deal Me In</button>
          <div class="start-note">Scores vary across runs — this is by design</div>
        </div>`;
      return;
    }
    if (this.state === 'end') {
      const insight = this.getEndInsight();
      const paras = insight.split('\n\n');
      app.innerHTML = `
        <div class="header">
          <div class="header-lockup">
            <h1>Decision Deck</h1>
            <span class="v2-badge">v2</span>
          </div>
        </div>
        <div class="end-screen">
          <div class="end-title">Your Reading</div>
          <div class="final-scores">
            <div class="final-stat e1">
              <div class="val" style="color:var(--axis1)">${this.scores.influence}</div>
              <div class="lbl">Influence</div>
            </div>
            <div class="final-stat e2">
              <div class="val" style="color:var(--axis2)">${this.scores.execution}</div>
              <div class="lbl">Execution</div>
            </div>
            <div class="final-stat e3">
              <div class="val" style="color:var(--axis3)">${this.scores.alignment}</div>
              <div class="lbl">Alignment</div>
            </div>
          </div>
          <div class="end-divider"></div>
          ${paras.map(p => `<p class="insight">${p}</p>`).join('')}
          <div class="end-divider"></div>
          <button class="play-again" onclick="game.start()">Play Again</button>
        </div>`;
      return;
    }
    const s = this.currentScenario;
    const cardClass = this.getCardClass();
    const callback = this.findCallback(this.history);
    const selected = this.selectedChoice;
    const choice = selected !== null ? s.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length - 1].scores : null;
    let choicesHTML = '';
    if (selected === null) {
      choicesHTML = `<div class="choices">${s.choices.map((c, i) => `<button class="choice-btn" onclick="game.selectChoice(${i})">${c.text}</button>`).join('')}</div>`;
    } else {
      const dominant = Object.entries(modScores).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))[0];
      const deltaVal = dominant[1];
      const deltaClass = deltaVal > 0 ? 'pos' : deltaVal < 0 ? 'neg' : 'zero';
      const deltaSign = deltaVal > 0 ? '+' : '';
      const statLabels = { influence: 'Influence', execution: 'Execution', alignment: 'Alignment' };
      const statSubs = { influence: `Now: ${this.scores.influence}`, execution: `Now: ${this.scores.execution}`, alignment: `Now: ${this.scores.alignment}` };
      choicesHTML = `
        <div class="choices">${s.choices.map((c, i) => `<button class="choice-btn${i === selected ? ' selected' : ''}" disabled>${c.text}</button>`).join('')}</div>
        <div class="result">
          <div class="result-score">
            <div class="delta ${deltaClass}">${deltaSign}${deltaVal}</div>
            <div class="stat-info">
              <div class="stat-name">${statLabels[dominant[0]]}</div>
              <div class="stat-sub">${statSubs[dominant[0]]}</div>
            </div>
          </div>
          <div class="result-text">${choice.feedback}</div>
          <button class="next-btn" onclick="game.nextRound()">${this.round >= this.totalRounds ? 'See Results →' : 'Next Scenario →'}</button>
        </div>`;
    }
    app.innerHTML = `
      <div class="header">
        <div class="header-lockup">
          <h1>Decision Deck</h1>
          <span class="v2-badge">v2</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${(this.round / this.totalRounds) * 100}%"></div></div>
        <div class="progress-label">${this.round} / ${this.totalRounds}</div>
      </div>
      <div class="score-bar">
        <div class="score-item s1"><div class="label">Influence</div><div class="value ax1">${this.scores.influence}</div></div>
        <div class="score-item s2"><div class="label">Execution</div><div class="value ax2">${this.scores.execution}</div></div>
        <div class="score-item s3"><div class="label">Alignment</div><div class="value ax3">${this.scores.alignment}</div></div>
      </div>
      <div class="card-container">
        <div class="card ${cardClass}">
          <div class="card-category">${s.category}</div>
          <div class="card-context">${s.context}</div>
          ${callback && selected === null ? `<div class="card-ref"><span class="reflection-tag">Callback</span><br>${callback.text}</div>` : ''}
          <div class="card-question">${s.question}</div>
          ${choicesHTML}
        </div>
      </div>`;
  }
}

const game = new DecisionDeck();
</script>
</body>
</html>
