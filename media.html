<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Decision Deck — Transition Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0e0f1a;
  --bg2:        #14162a;
  --bg3:        #1c1f38;
  --card:       #181b32;
  --card2:      #1e2240;
  --border:     #2a2f55;
  --border2:    #3a4070;
  --ax1:        #a78bfa;   /* violet — Focus */
  --ax1d:       rgba(167,139,250,0.15);
  --ax1g:       rgba(167,139,250,0.3);
  --ax2:        #22d3ee;   /* cyan — Leverage */
  --ax2d:       rgba(34,211,238,0.12);
  --ax2g:       rgba(34,211,238,0.28);
  --ax3:        #fb7185;   /* rose — Boundaries */
  --ax3d:       rgba(251,113,133,0.12);
  --ax3g:       rgba(251,113,133,0.28);
  --ax4:        #34d399;   /* emerald — Clarity */
  --ax4d:       rgba(52,211,153,0.12);
  --ax4g:       rgba(52,211,153,0.28);
  --pos:        #34d399;
  --neg:        #f87171;
  --neu:        #94a3b8;
  --text:       #f1f5f9;
  --text-mid:   #cbd5e1;
  --text-dim:   #64748b;
  --text-faint: #334155;
  --rad:        12px;
  --rad-sm:     8px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
}
/* Ambient background */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 45% at 50% -5%,rgba(167,139,250,0.09) 0%,transparent 55%),
    radial-gradient(ellipse 50% 35% at 90% 110%,rgba(251,113,133,0.06) 0%,transparent 50%),
    radial-gradient(ellipse 40% 50% at 0% 60%,rgba(34,211,238,0.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
/* Subtle grid texture */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(167,139,250,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(167,139,250,0.025) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

.app{
  max-width:430px;margin:0 auto;padding:16px 16px 32px;
  min-height:100dvh;display:flex;flex-direction:column;
  position:relative;z-index:1;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0 14px;
  border-bottom:1px solid rgba(167,139,250,0.12);
  margin-bottom:16px;
}
.header-left{display:flex;align-items:center;gap:10px;}
.header h1{
  font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;
  letter-spacing:0.5px;color:var(--text);
}
.v3-badge{
  font-family:'Space Grotesk',sans-serif;font-size:0.52rem;font-weight:800;
  letter-spacing:1.5px;padding:3px 7px;border-radius:4px;
  background:linear-gradient(135deg,var(--ax1),#6366f1);
  color:#fff;text-transform:uppercase;
  box-shadow:0 0 14px rgba(167,139,250,0.3);
}
.header-sub{font-size:0.68rem;color:var(--text-dim);letter-spacing:0.5px;}

/* ── PROGRESS ── */
.progress-wrap{
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.progress-track{
  flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;
  position:relative;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--ax1),#6366f1,var(--ax2));
  background-size:200% 100%;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  border-radius:2px;
  box-shadow:0 0 10px rgba(167,139,250,0.4);
  animation:progressShimmer 3s linear infinite;
}
@keyframes progressShimmer{
  0%{background-position:100% 0;}
  100%{background-position:-100% 0;}
}
.progress-label{
  font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;
  color:var(--text-dim);min-width:38px;text-align:right;letter-spacing:0.5px;
}

/* ── SCORE BAR — 4 axes ── */
.score-bar{
  display:flex;margin-bottom:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rad);overflow:hidden;position:relative;
}
.score-bar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--ax1),var(--ax2),var(--ax3),var(--ax4));
  opacity:0.5;
}
.score-item{flex:1;text-align:center;padding:9px 3px;position:relative;}
.score-item+.score-item{border-left:1px solid var(--border);}
.score-item.s1{background:linear-gradient(180deg,var(--ax1d) 0%,transparent 100%);}
.score-item.s2{background:linear-gradient(180deg,var(--ax2d) 0%,transparent 100%);}
.score-item.s3{background:linear-gradient(180deg,var(--ax3d) 0%,transparent 100%);}
.score-item.s4{background:linear-gradient(180deg,var(--ax4d) 0%,transparent 100%);}
.score-item .label{
  font-size:0.48rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text-dim);margin-bottom:3px;
}
.score-item .value{
  font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;line-height:1;
  transition:all 0.4s ease;
}
.value.ax1{color:var(--ax1);text-shadow:0 0 14px var(--ax1g);}
.value.ax2{color:var(--ax2);text-shadow:0 0 14px var(--ax2g);}
.value.ax3{color:var(--ax3);text-shadow:0 0 14px var(--ax3g);}
.value.ax4{color:var(--ax4);text-shadow:0 0 14px var(--ax4g);}
.value.bumped{animation:numPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes numPop{0%{transform:scale(1.5);}100%{transform:scale(1);}}

/* ── CARD ── */
.card-container{flex:1;display:flex;flex-direction:column;}

@keyframes cardSlide{
  from{opacity:0;transform:translateY(20px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes cardCheckin{
  from{opacity:0;transform:translateY(14px) scale(0.98);}
  60%{transform:translateY(-3px) scale(1.005);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rad);padding:20px 18px 18px;
  flex:1;display:flex;flex-direction:column;
  animation:cardSlide 0.38s cubic-bezier(0.34,1.2,0.64,1);
  position:relative;overflow:hidden;
}
/* Moving gradient top border */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--ax1),var(--ax2),var(--ax3),var(--ax4),var(--ax1));
  background-size:300% 100%;
  opacity:0.7;
  animation:borderFlow 6s linear infinite;
}
@keyframes borderFlow{
  0%{background-position:0% 0;}
  100%{background-position:300% 0;}
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:80px;
  background:linear-gradient(180deg,rgba(167,139,250,0.06) 0%,transparent 100%);
  pointer-events:none;
}
/* Diagonal accent line */
.card .card-accent{
  position:absolute;bottom:0;right:0;width:100px;height:100px;
  background:linear-gradient(135deg,transparent 60%,rgba(167,139,250,0.04) 100%);
  pointer-events:none;
}

/* Card type variants */
.card.checkin{
  background:linear-gradient(160deg,rgba(167,139,250,0.06) 0%,var(--card) 40%);
  border-color:rgba(167,139,250,0.25);
  animation:cardCheckin 0.42s cubic-bezier(0.34,1.2,0.64,1);
}
.card.checkin::before{
  background:linear-gradient(90deg,var(--ax1),rgba(167,139,250,0.4),var(--ax1));
  background-size:200% 100%;
  opacity:0.9;
}
.card.checkin::after{background:linear-gradient(180deg,rgba(167,139,250,0.1) 0%,transparent 100%);}

.card.offwork{
  background:linear-gradient(160deg,rgba(251,191,36,0.05) 0%,var(--card) 40%);
  border-color:rgba(251,191,36,0.2);
}
.card.offwork::before{
  background:linear-gradient(90deg,#fbbf24,rgba(251,191,36,0.5),#fbbf24);
  background-size:200% 100%;
  opacity:0.7;
}
.card.offwork::after{background:linear-gradient(180deg,rgba(251,191,36,0.06) 0%,transparent 100%);}

/* Category label */
.card-category{
  display:flex;align-items:center;gap:7px;
  font-family:'Space Grotesk',sans-serif;font-size:0.58rem;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:var(--ax1);
  margin-bottom:10px;position:relative;z-index:1;
}
.card-category .cat-dot{
  width:6px;height:6px;border-radius:50%;background:var(--ax1);
  box-shadow:0 0 8px var(--ax1g);flex-shrink:0;
  animation:dotPulse 2.5s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 6px var(--ax1g);}
  50%{box-shadow:0 0 14px var(--ax1g),0 0 20px var(--ax1d);}
}
.card.checkin .card-category{color:var(--ax1);}
.card.checkin .card-category .cat-dot{background:var(--ax1);box-shadow:0 0 8px var(--ax1g);}
.card.offwork .card-category{color:#fbbf24;}
.card.offwork .card-category .cat-dot{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,0.4);}

/* Round counter on card */
.card-round{
  position:absolute;top:18px;right:18px;
  font-family:'Space Grotesk',sans-serif;font-size:0.55rem;font-weight:700;
  color:var(--text-faint);letter-spacing:1px;z-index:1;
}

.card-context{
  font-size:0.82rem;color:var(--text-mid);margin-bottom:12px;
  line-height:1.6;padding-bottom:12px;
  border-bottom:1px solid rgba(42,47,85,0.8);
  position:relative;z-index:1;
}
.card-question{
  font-size:1.06rem;line-height:1.58;font-weight:600;margin-bottom:18px;
  flex:1;color:var(--text);position:relative;z-index:1;
}
.card-callback{
  font-size:0.75rem;color:#fbbf24;margin-bottom:12px;
  padding:9px 12px;background:rgba(251,191,36,0.07);
  border-radius:var(--rad-sm);border-left:2px solid rgba(251,191,36,0.5);
  position:relative;z-index:1;line-height:1.5;
}
.callback-tag{
  display:inline-block;font-family:'Space Grotesk',sans-serif;
  font-size:0.5rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  padding:2px 6px;border-radius:3px;margin-bottom:5px;
  background:rgba(251,191,36,0.12);color:#fbbf24;
  border:1px solid rgba(251,191,36,0.25);
}

/* ── CHOICES ── */
.choices{display:flex;flex-direction:column;gap:7px;margin-top:auto;position:relative;z-index:1;}
.choice-btn{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rad-sm);padding:12px 14px;
  color:var(--text-mid);font-family:'Inter',sans-serif;
  font-size:0.86rem;font-weight:500;text-align:left;cursor:pointer;
  transition:all 0.18s ease;line-height:1.5;
  position:relative;overflow:hidden;
}
.choice-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--ax1),#6366f1);
  opacity:0;transition:opacity 0.18s;
}
.choice-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(167,139,250,0.06),transparent);
  opacity:0;transition:opacity 0.18s;
}
.choice-btn:hover{
  border-color:rgba(167,139,250,0.4);color:var(--text);
  transform:translateX(3px);
}
.choice-btn:hover::before{opacity:1;}
.choice-btn:hover::after{opacity:1;}
.choice-btn:active{transform:translateX(1px) scale(0.99);}
.choice-btn.selected{
  border-color:rgba(167,139,250,0.4);color:var(--text);
  background:var(--bg2);
}
.choice-btn.selected::before{opacity:1;}
.choice-btn.selected::after{opacity:1;}
.choice-btn:disabled{cursor:default;transform:none;}
.choice-btn:disabled:not(.selected){opacity:0.28;}

/* ── RESULT ── */
@keyframes resultRise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.result{animation:resultRise 0.3s ease;padding-top:12px;position:relative;z-index:1;}

.result-score{
  display:flex;align-items:center;gap:10px;margin-bottom:11px;
  padding:10px 13px;
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  border-radius:var(--rad-sm);border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.result-score::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--ax1),var(--ax2));
}
.result-score .delta{
  font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;min-width:44px;
}
.delta.pos{color:var(--pos);text-shadow:0 0 14px rgba(52,211,153,0.4);}
.delta.neg{color:var(--neg);text-shadow:0 0 14px rgba(248,113,113,0.35);}
.delta.zero{color:var(--neu);}
.stat-info{display:flex;flex-direction:column;}
.stat-name{
  font-family:'Space Grotesk',sans-serif;font-size:0.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mid);
}
.stat-sub{font-size:0.65rem;color:var(--text-dim);margin-top:2px;}

/* Clarity badge on result */
.clarity-badge{
  margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:0.55rem;font-weight:700;
  letter-spacing:1px;padding:3px 8px;border-radius:4px;
  background:var(--ax4d);color:var(--ax4);border:1px solid rgba(52,211,153,0.2);
  white-space:nowrap;
}

.result-text{
  font-size:0.88rem;line-height:1.65;color:var(--text-mid);margin-bottom:14px;
}
.next-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--ax1),#6366f1);
  color:#fff;border:none;border-radius:var(--rad-sm);
  font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:700;
  cursor:pointer;transition:all 0.2s ease;letter-spacing:0.3px;
  box-shadow:0 4px 20px rgba(167,139,250,0.2);
  position:relative;overflow:hidden;
}
.next-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:translateX(-100%);transition:transform 0.4s ease;
}
.next-btn:hover{box-shadow:0 4px 30px rgba(167,139,250,0.35);transform:translateY(-1px);}
.next-btn:hover::before{transform:translateX(100%);}
.next-btn:active{transform:translateY(0) scale(0.99);}

/* ── START SCREEN ── */
@keyframes startIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.start-screen{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;gap:0;
  animation:startIn 0.5s ease;padding:20px 0;
}
.start-mark{
  width:72px;height:72px;border-radius:18px;
  background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(99,102,241,0.08));
  border:1px solid rgba(167,139,250,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin-bottom:20px;
  box-shadow:0 0 40px rgba(167,139,250,0.12),inset 0 1px 0 rgba(255,255,255,0.05);
  animation:markFloat 4s ease-in-out infinite;
}
@keyframes markFloat{
  0%,100%{transform:translateY(0);box-shadow:0 0 40px rgba(167,139,250,0.12);}
  50%{transform:translateY(-6px);box-shadow:0 10px 50px rgba(167,139,250,0.2);}
}
.start-title{
  font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;
  color:var(--text);letter-spacing:-0.5px;margin-bottom:4px;
}
.start-edition{
  font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;
}
.start-version{
  font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--ax1),var(--ax2),var(--ax4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:20px;
}
.start-axes{
  display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;
}
.axis-pill{
  font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:1px;padding:5px 11px;border-radius:20px;border:1px solid;
}
.axis-pill.a1{background:var(--ax1d);border-color:rgba(167,139,250,0.3);color:var(--ax1);}
.axis-pill.a2{background:var(--ax2d);border-color:rgba(34,211,238,0.25);color:var(--ax2);}
.axis-pill.a3{background:var(--ax3d);border-color:rgba(251,113,133,0.25);color:var(--ax3);}
.axis-pill.a4{background:var(--ax4d);border-color:rgba(52,211,153,0.25);color:var(--ax4);}
.start-divider{
  width:200px;height:1px;margin:16px auto;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}
.start-screen p{
  font-size:0.9rem;color:var(--text-mid);line-height:1.75;
  max-width:310px;margin-bottom:22px;
}
.start-btn{
  padding:13px 40px;
  background:linear-gradient(135deg,var(--ax1),#6366f1);
  color:#fff;border:none;border-radius:var(--rad-sm);
  font-family:'Space Grotesk',sans-serif;font-size:0.92rem;font-weight:700;
  cursor:pointer;transition:all 0.22s ease;letter-spacing:0.5px;
  box-shadow:0 4px 24px rgba(167,139,250,0.25);
}
.start-btn:hover{box-shadow:0 4px 36px rgba(167,139,250,0.4);transform:translateY(-2px);}
.start-note{font-size:0.68rem;color:var(--text-faint);margin-top:12px;letter-spacing:0.3px;}

/* ── END SCREEN ── */
@keyframes endIn{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}
.end-screen{
  flex:1;display:flex;flex-direction:column;
  animation:endIn 0.4s ease;overflow-y:auto;
}
.end-eyebrow{
  font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--ax1);margin-bottom:8px;
}
.end-title{
  font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;
  color:var(--text);letter-spacing:-0.5px;margin-bottom:16px;line-height:1.1;
}

/* Final scores — 4 across */
.final-scores{
  display:flex;background:var(--card);
  border:1px solid var(--border);border-radius:var(--rad);
  overflow:hidden;margin-bottom:12px;position:relative;
}
.final-scores::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--ax1),var(--ax2),var(--ax3),var(--ax4));
  opacity:0.6;
}
.final-stat{flex:1;text-align:center;padding:12px 4px;}
.final-stat+.final-stat{border-left:1px solid var(--border);}
.final-stat.e1{background:linear-gradient(180deg,var(--ax1d),transparent);}
.final-stat.e2{background:linear-gradient(180deg,var(--ax2d),transparent);}
.final-stat.e3{background:linear-gradient(180deg,var(--ax3d),transparent);}
.final-stat.e4{background:linear-gradient(180deg,var(--ax4d),transparent);}
.final-stat .val{
  font-family:'Space Grotesk',sans-serif;font-size:1.85rem;font-weight:800;
  line-height:1;margin-bottom:4px;
}
.final-stat .lbl{
  font-size:0.5rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-dim);
}

/* Clarity standalone block */
.clarity-block{
  background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(52,211,153,0.03));
  border:1px solid rgba(52,211,153,0.2);border-radius:var(--rad-sm);
  padding:12px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
}
.clarity-val{
  font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;
  color:var(--ax4);text-shadow:0 0 20px var(--ax4g);line-height:1;flex-shrink:0;
}
.clarity-info{}
.clarity-label{
  font-family:'Space Grotesk',sans-serif;font-size:0.58rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--ax4);margin-bottom:4px;
}
.clarity-desc{font-size:0.75rem;color:var(--text-dim);line-height:1.5;}

.end-divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);

<body>
<div class="app" id="app"></div>
<script>

// ═══════════════════════════════════════════════════════
// DECISION DECK — TRANSITION EDITION v3
//
// 4 axes: focus, leverage, boundaries, clarity
// CLARITY = self-knowledge in transition. Scores heavily
// on Check-In cards. Other cards score it lightly.
//
// Score philosophy:
// - Strong choices: +7 to +10 on primary axis, -2 to -4 on opposing
// - Neutral choices: 0 to +2 on most axes
// - Avoidance choices: can go genuinely negative
// - No choice gives equal moderate points to everything
// ═══════════════════════════════════════════════════════

const SCENARIOS = [

  // ── LETTING GO ──────────────────────────────────────

  {id:"lg-1",category:"Letting Go",type:"work",
   context:"Someone on the lab side pulls you back in — a problem only you can solve, or so the framing goes. You have a deliverable due for the media department.",
   question:"What actually happens in this moment?",
   choices:[
     {text:"I redirect them — someone else can solve this or it waits",scores:{focus:9,leverage:3,boundaries:8,clarity:2},
      feedback:"This is the boundary that makes the transition real. Every time you hold the redirect, the lab's gravitational pull weakens slightly. It doesn't feel significant in the moment. It is."},
     {text:"I do both — I'll handle the lab thing and catch up on media tonight",scores:{focus:-5,leverage:1,boundaries:-6,clarity:1},
      feedback:"Tonight is a debt you've been accumulating. The transition happens in the hours you protect, not the hours you plan to recover. Tonight doesn't exist in the way you're imagining it."},
     {text:"I do the lab thing — it's genuinely urgent and I'll get back to media",scores:{focus:-3,leverage:0,boundaries:-4,clarity:0},
      feedback:"'Genuinely urgent' is doing a lot of work in that sentence. Is it urgent because it's actually on fire, or because that's how lab problems always feel? The distinction matters more than it's getting credit for."}
   ],tags:["boundaries","focus","transition"]},

  {id:"lg-2",category:"Letting Go",type:"work",
   context:"You're being asked to train your replacement in the lab. It's happening slower than you'd like and it's uncomfortable watching someone do the work differently.",
   question:"What's the most honest thing you can say about where you are with this?",
   choices:[
     {text:"I'm staying in it — giving them space to own it even when it's harder to watch than to fix",scores:{focus:7,leverage:2,boundaries:6,clarity:4},
      feedback:"The restraint is the work. Letting someone find their own way through something you could do in your sleep is one of the harder things in a transition. It's also exactly what makes the exit real."},
     {text:"I keep jumping in — I tell myself it's helping but I'm not sure it is",scores:{focus:-4,leverage:1,boundaries:-5,clarity:7},
      feedback:"The self-awareness here is worth more than the lost ground. Knowing you're jumping in for the wrong reason is the first step to stopping. What would it cost you to actually let the next thing fail without your intervention?"},
     {text:"I've mostly let go — I check in but I'm not doing the work anymore",scores:{focus:5,leverage:3,boundaries:5,clarity:3},
      feedback:"Mostly is doing real work. The checking in is the thread that hasn't been cut yet. Worth examining whether that thread is serving the transition or just keeping the option of going back available."}
   ],tags:["boundaries","identity","transition"]},

  {id:"lg-3",category:"Letting Go",type:"work",
   context:"The lab has an issue that your replacement doesn't know how to handle. You get a message asking for help.",
   question:"Do you step back in?",
   choices:[
     {text:"I answer the specific question and stop there — consulting, not returning",scores:{focus:4,leverage:3,boundaries:5,clarity:2},
      feedback:"Clean boundary. You transferred information without transferring ownership back to yourself. That's the version of helping that doesn't undo the transition."},
     {text:"I go handle it — it's faster and they need the help",scores:{focus:-7,leverage:0,boundaries:-8,clarity:1},
      feedback:"You just told the organization, yourself, and your replacement that the transition has a rewind button. The faster you handle it, the more clearly that message lands."},
     {text:"I redirect them to someone else who can handle it — I'm not the answer anymore",scores:{focus:8,leverage:4,boundaries:9,clarity:3},
      feedback:"This is the move that actually closes the door. It's uncomfortable the first few times. It gets easier. And your replacement learns something that they couldn't learn if you were always the answer."}
   ],tags:["boundaries","focus","transition"]},

  // ── BUILDING THE NEW ────────────────────────────────

  {id:"bn-1",category:"Building the New",type:"work",
   context:"You have two hours of uninterrupted time to work on media department development. No one is pulling you anywhere.",
   question:"What do you actually do with it?",
   choices:[
     {text:"I produce something — a deliverable, a draft, something that didn't exist before",scores:{focus:9,leverage:5,clarity:3,boundaries:2},
      feedback:"This is the hour that builds the department. Not the planning, not the strategy conversations — this. Keep a record of these sessions. They're the evidence that the department is real."},
     {text:"I plan and organize — set up frameworks for the work I'll do next time",scores:{focus:3,leverage:2,clarity:2,boundaries:1},
      feedback:"Planning has its place. But two uninterrupted hours spent planning future work is a form of resistance. The work wants to be made, not organized. What's one thing you could have started instead of framed?"},
     {text:"I handle some lingering operational stuff — it needed to get done anyway",scores:{focus:-6,leverage:-2,clarity:1,boundaries:-4},
      feedback:"The operational stuff will always exist and will always feel necessary. The media department only exists in the hours you protect from it. Today those hours went to something that wasn't the thing."}
   ],tags:["focus","leverage","transition"]},

  {id:"bn-2",category:"Building the New",type:"work",
   context:"You've completed a piece of media work you're genuinely proud of. It's sitting in a folder.",
   question:"What happens to it next?",
   choices:[
     {text:"I share it with Neil — he needs to see what this department produces",scores:{focus:4,leverage:9,clarity:2,boundaries:2},
      feedback:"The work in the folder doesn't exist for the people who make decisions. The moment you share it, it enters the organizational record. That's not self-promotion — it's how new functions get protected."},
     {text:"I use it as a foundation for the next thing — I'd rather build a body of work before I show anything",scores:{focus:5,leverage:-2,clarity:2,boundaries:3},
      feedback:"A body of work is worth building. But invisible work doesn't get resourced, and the person building it doesn't get protected. Find one person who should see this and show them."},
     {text:"I move on — finishing was the point, not sharing",scores:{focus:3,leverage:-5,clarity:1,boundaries:1},
      feedback:"You're describing how a hobbyist thinks about their work. You're not building a hobby. You're building a department. Those two things require completely different relationships to visibility."}
   ],tags:["leverage","focus","transition"]},

  {id:"bn-3",category:"Building the New",type:"work",
   context:"Someone asks what the media department actually does. You have thirty seconds.",
   question:"What do you say?",
   choices:[
     {text:"I have a crisp answer that leads with impact, not process",scores:{focus:4,leverage:8,clarity:5,boundaries:2},
      feedback:"The thirty-second version is the department's thesis statement. If you can say it clearly, you understand what you're building. If you can't, that's useful information about where the clarity needs work."},
     {text:"I give a decent answer but it comes out longer than thirty seconds and a bit scattered",scores:{focus:2,leverage:2,clarity:2,boundaries:1},
      feedback:"The scatter is telling you something about where the concept still lives in your head. Spend twenty minutes writing the department's mission in one sentence. Not a paragraph — one sentence. It's harder than it sounds and more useful than anything else you could do this week."},
     {text:"I struggle with this — the honest answer is I'm still figuring out how to describe it",scores:{focus:1,leverage:-3,clarity:7,boundaries:0},
      feedback:"The self-awareness is worth something. The description gap isn't a branding problem — it's a clarity problem. What would it mean for the department to succeed in two years? Start there and work backward to the sentence."}
   ],tags:["leverage","clarity","identity"]},

  // ── MANAGING YOURSELF ───────────────────────────────

  {id:"ms-1",category:"Managing Yourself",type:"work",
   context:"You've been running hard for several weeks. The calendar hasn't had a gap in it. You can feel the edge coming.",
   question:"What do you do with that feeling before it becomes a problem?",
   choices:[
     {text:"I create a gap — cancel or defer something and use it for nothing",scores:{focus:3,leverage:0,boundaries:8,clarity:5},
      feedback:"The nothing is the point. Not productive rest, not strategic recovery — just nothing. The version of you that does nothing for three hours is what the depleted version of you is running away from. Give it space."},
     {text:"I keep going — the pace is the pace, and there's too much at stake to stop",scores:{focus:1,leverage:2,clarity:-2,boundaries:-6},
      feedback:"The stakes being high is exactly the reason to stop. Nobody does their best transitional work depleted. The cost of the gap is smaller than the cost of the error you'll make without it."},
     {text:"I acknowledge it and plan to rest soon — after this sprint wraps up",scores:{focus:2,leverage:1,clarity:1,boundaries:-2},
      feedback:"After this sprint wraps up is the most dangerous phrase in the working vocabulary. The sprint ends and another begins, and the rest is always one sprint away. The gap has to be manufactured, not waited for."}
   ],tags:["boundaries","regulation","self-awareness"]},

  {id:"ms-2",category:"Managing Yourself",type:"work",
   context:"A decision you made three weeks ago isn't working the way you expected. You have two options: adjust course quietly or acknowledge it openly.",
   question:"Which one actually fits who you're trying to be in this role?",
   choices:[
     {text:"I acknowledge it — 'I thought X, it turned out to be Y, here's what I'm changing'",scores:{focus:5,leverage:6,clarity:8,boundaries:3},
      feedback:"Leaders who can name their own miscalibrations publicly build more trust than those who are always right. This is the version of the story that makes people want to follow you. It's also the story that's true."},
     {text:"I adjust quietly and move on — no need to make it a production",scores:{focus:3,leverage:0,clarity:3,boundaries:2},
      feedback:"Practical and often correct. Just make sure 'no need to make it a production' isn't covering for 'I'd rather not acknowledge I was wrong.' Those are different things, and the distinction is worth being honest about."},
     {text:"I defend the original decision — it was right given what I knew",scores:{focus:1,leverage:-4,clarity:-3,boundaries:1},
      feedback:"The sunk cost framing is almost always a losing position. 'Right given what I knew' is true but it doesn't help you or anyone working with you. What changed, and what does that change require? That's the useful version of this story."}
   ],tags:["clarity","leverage","self-awareness"]},

  {id:"ms-3",category:"Managing Yourself",type:"work",
   context:"You've been preparing for a leadership conversation for days. You've thought through angles, anticipated pushback, built the framework.",
   question:"How many more days of preparation do you actually need?",
   choices:[
     {text:"None — I need to stop preparing and start talking",scores:{focus:9,leverage:7,clarity:5,boundaries:3},
      feedback:"You were ready two days ago. Everything since then has been refinement in service of delay. Your instinct to prepare is a genuine strength with a real shadow: the loop becomes self-sustaining because there's always one more angle. Walk in with your three key points and trust yourself."},
     {text:"One more day — I want to tighten up one specific thing",scores:{focus:2,leverage:1,clarity:1,boundaries:1},
      feedback:"It's always one more thing. And then one more after that. The difference between today's version and tomorrow's version is invisible to everyone except you. The cost of waiting isn't quality — it's momentum you're losing while you refine."},
     {text:"I'm not sure I'm ready — there are still unknowns",scores:{focus:-4,leverage:-2,clarity:-2,boundaries:0},
      feedback:"There will always be unknowns. You cannot prepare for the other person's mood or the curveball you didn't anticipate. What you can prepare is your position and your ask. You have both. The readiness you're waiting for doesn't arrive before the conversation. It arrives inside it."}
   ],tags:["focus","leverage","self-awareness"]},

  // ── POLITICAL NAVIGATION ────────────────────────────

  {id:"pn-1",category:"Political Navigation",type:"work",
   context:"There's something you need to say directly to someone whose response you can't control. You've been approaching it indirectly for a while.",
   question:"What's actually keeping you from the direct version?",
   choices:[
     {text:"Honestly? I tend to overcomplicate things that just need a conversation",scores:{focus:8,leverage:5,clarity:9,boundaries:4},
      feedback:"That self-awareness is rare among people who are genuinely good at strategy. The direct path is uncomfortable because you can't control the other person's response. But the indirect path has costs too — time, energy, and the slow erosion of pretending something isn't bothering you while you engineer the approach."},
     {text:"The preparation — I want to say it right before I say it",scores:{focus:2,leverage:2,clarity:2,boundaries:1},
      feedback:"True to a point. But past a certain threshold, preparation is delay in a convincing costume. If you've been preparing for days to say something that takes two minutes, the preparation has become the project."},
     {text:"The timing — I'll say it directly when the moment is right",scores:{focus:0,leverage:1,clarity:1,boundaries:0},
      feedback:"When is the timing right, specifically? If you can't name a date or a trigger, 'the right timing' is an indefinite postponement. The timing will never feel perfect. The question is whether waiting makes it better or just makes it stale."}
   ],tags:["clarity","focus","communication"]},

  {id:"pn-2",category:"Political Navigation",type:"work",
   context:"You've been framing yourself as the person trying to leave a role. 'I don't want this, please let me transition out.' It's been effective at disarming the territory argument.",
   question:"Is that still the strongest frame — or has it served its purpose?",
   choices:[
     {text:"It's served its purpose — I should be leading with what I'm building, not what I'm leaving",scores:{focus:7,leverage:9,clarity:6,boundaries:3},
      feedback:"The difference between 'let me out of the lab' and 'here's what I'm building in media' is the difference between asking for permission and demonstrating value. One makes you a problem to solve. The other makes you an investment to protect. Lead with where you're going."},
     {text:"It's still working — no reason to change something that's effective",scores:{focus:2,leverage:2,clarity:1,boundaries:2},
      feedback:"It has a shelf life. If you keep framing yourself as the person who doesn't want the role they have, eventually people stop seeing you as the person who wants the role you're building. You've proven you're not territorial. Now prove you're building something worth the investment."},
     {text:"Both frames matter — leadership needs to know I'm committed to the transition AND excited about what's next",scores:{focus:4,leverage:5,clarity:3,boundaries:2},
      feedback:"The balanced answer. Probably right. But notice which one you lead with naturally. Do you open with the transition or the vision? Flip it. Start with what you're building. Let the leaving be the natural consequence, not the headline."}
   ],tags:["leverage","clarity","transition"]},

  {id:"pn-3",category:"Political Navigation",type:"work",
   context:"Someone with leadership's ear has been characterizing your work in ways that miss your best contributions. Not maliciously — just with incomplete information.",
   question:"What do you do about the narrative gap?",
   choices:[
     {text:"I make sure my results are directly visible to leadership — let the work speak where it needs to",scores:{focus:5,leverage:9,clarity:4,boundaries:3},
      feedback:"The long game. If leadership has a direct read on your work, no one else's characterization has as much power. Make it a practice, not a reaction."},
     {text:"I have a direct conversation with the person — 'I want to make sure my work is being described accurately'",scores:{focus:4,leverage:6,clarity:5,boundaries:5},
      feedback:"Direct and potentially productive. The risk is that if they're not aware they've been doing it, the conversation can create friction that didn't exist. Lead with curiosity, not correction."},
     {text:"I build a direct relationship with leadership so their read on me comes from firsthand experience",scores:{focus:4,leverage:8,clarity:5,boundaries:3},
      feedback:"The best defense against a bad narrator is being known directly. Once leadership has their own read on you, someone else's version has much less traction. This takes time and it's worth the investment."}
   ],tags:["leverage","clarity","work"]},

  // ── OFF THE CLOCK ───────────────────────────────────

  {id:"off-1",category:"Off the Clock",type:"offwork",
   context:"Your brain processes problems by talking them through. You've been talking through a lot of work problems lately — to Kathy, to colleagues, to anyone who'll engage.",
   question:"Is the processing productive, or has it become its own loop?",
   choices:[
     {text:"It's become a loop — I'm covering the same ground without new conclusions",scores:{focus:4,leverage:0,boundaries:7,clarity:8},
      feedback:"Recognizing the loop is how you break it. The signal: if you finish a work conversation and feel exactly the same as when you started, that wasn't processing — it was distributing anxiety. Venting has value and a ceiling. Past that ceiling, you're keeping the stress alive."},
     {text:"It's productive — I genuinely think better when I talk things through",scores:{focus:2,leverage:1,clarity:2,boundaries:0},
      feedback:"True in general. Track the ratio: how much of the talking leads to a new insight versus how much is rehearsing the analysis you've already done? Processing becomes a loop when you start having the same conversation with different people."},
     {text:"I don't know — it feels necessary given everything that's happening",scores:{focus:0,leverage:0,clarity:3,boundaries:-3},
      feedback:"'Right now given everything' has a way of becoming permanent. At some point the situation stabilizes and you're still processing at crisis intensity. Give yourself permission to put it down for an evening. See if the world survives your silence."}
   ],tags:["regulation","boundaries","self-awareness"]},

  {id:"off-2",category:"Off the Clock",type:"offwork",
   context:"You haven't had a purely personal creative outlet in a while. All your creative energy has been going into work projects.",
   question:"When was the last time you made something just for you?",
   choices:[
     {text:"The work IS the creative outlet — I'm building real things I care about",scores:{focus:2,leverage:2,clarity:1,boundaries:-4},
      feedback:"Sometimes true. But work creativity and personal creativity serve different functions. Work creativity solves someone else's problem, even if you love the work. Personal creativity refuels something that work can only spend. If the only canvas you have is the company's, you're borrowing from yourself and never paying it back."},
     {text:"It's been a while — I miss it but there's no time right now",scores:{focus:0,leverage:0,clarity:3,boundaries:-2},
      feedback:"There's never time. There's only prioritization. Thirty minutes of something purely yours does more for your operating system than thirty minutes of productive work. The time isn't missing. It's been allocated elsewhere."},
     {text:"I've been meaning to get back to it — it's on the list",scores:{focus:1,leverage:0,clarity:2,boundaries:-1},
      feedback:"The list is where personal projects go to die a slow, guilty death. Don't put it on the list. Do it tonight. Not because it makes you a better worker. Because you're a person who creates things and the version of you that doesn't create gets hollow in ways that show up everywhere."}
   ],tags:["regulation","self-awareness","boundaries"]},

  {id:"off-3",category:"Off the Clock",type:"offwork",
   context:"You've been the strong one for everyone around you. Your team, your family, the person you're mentoring.",
   question:"Who do you actually lean on?",
   choices:[
     {text:"I've got people — I actually use them, not just have them",scores:{focus:3,leverage:2,clarity:4,boundaries:5},
      feedback:"Good. The distinction — 'actually use them' — is the important one. Having people means nothing if you're still processing alone at midnight. Reach out before you need to, not after the weight becomes visible."},
     {text:"Honestly I process most of it internally or through tools",scores:{focus:2,leverage:1,clarity:3,boundaries:0},
      feedback:"Tools are useful. Internal processing is real. But neither one hugs you back. There's a version of self-sufficiency that's isolation in a productive mask. You don't have to perform strength for everyone all the time."},
     {text:"I don't really lean — I'm the one people come to, that's just how it is",scores:{focus:-1,leverage:1,clarity:1,boundaries:-7},
      feedback:"That identity — 'the one people come to' — is both your greatest strength and the thing most likely to break you. The weight you carry doesn't get lighter because you're strong enough to hold it. It just gets quieter. Until it doesn't."}
   ],tags:["regulation","boundaries","self-awareness"]},

  {id:"off-4",category:"Off the Clock",type:"offwork",
   context:"Kathy has something going on that needs your attention. You're also in the middle of something important at work.",
   question:"How do you decide which gets you right now?",
   choices:[
     {text:"She gets me — the work can hold, she can't always",scores:{focus:1,leverage:0,clarity:3,boundaries:7},
      feedback:"Right orientation. The work waits better than relationships do. That said, 'she can't always wait' shouldn't become a blanket rule. The question is which one is genuinely in need right now versus which one just has more friction."},
     {text:"It depends — I read what 'needs my attention' actually means before deciding",scores:{focus:4,leverage:2,clarity:4,boundaries:4},
      feedback:"Calibrated and reasonable. The difference between 'I need you now' and 'when you get a chance' is real and worth reading accurately. If you're consistently recategorizing her needs as 'can wait,' that's a pattern worth examining."},
     {text:"I split myself — try to do both and end up doing neither well",scores:{focus:-5,leverage:-2,clarity:1,boundaries:-6},
      feedback:"The honest answer when it's the real one. Splitting yourself is the worst outcome — she gets a distracted version and the work gets interrupted attention. The decision you're avoiding by splitting is almost always clearer than the anxiety about making it."}
   ],tags:["relationships","regulation","boundaries"]},

  {id:"off-5",category:"Off the Clock",type:"offwork",
   context:"Garrett asks what you do for work. You start to explain and realize the answer has changed significantly.",
   question:"How do you explain it — and what does his reaction tell you?",
   choices:[
     {text:"I tell him about the stories and the making — he gets the creative side before anything else",scores:{focus:4,leverage:2,clarity:7,boundaries:4},
      feedback:"Lead with what has energy. Kids don't need org charts — they need to feel what a parent does. 'I help tell the story of a company' is something he can picture. That picture matters more than the title, and the clarity you find explaining it to him is worth something for you too."},
     {text:"I give him the title and a simple version — he'll understand more when he's older",scores:{focus:1,leverage:1,clarity:1,boundaries:1},
      feedback:"Efficient and a little flat. The 'when you're older' deferral is fine for complex things. For this, there's a version he can understand now. The effort to find that version is worth it — for him and for how you're thinking about your own work."},
     {text:"I ask him what he thinks I do and start from there",scores:{focus:3,leverage:2,clarity:6,boundaries:3},
      feedback:"Good instinct. What he already believes reveals what he's absorbed watching you work. That picture might surprise you in ways that are useful and in ways that are worth adjusting."}
   ],tags:["identity","relationships","clarity"]},

  // ── CHECK-IN ────────────────────────────────────────

  {id:"chk-1",category:"Check-In",type:"checkin",
   context:"No scenario. Just you.",
   question:"Right now — are you building toward something, or running from something?",
   choices:[
     {text:"Building — I can see what I'm moving toward and it motivates me",scores:{focus:4,leverage:3,clarity:9,boundaries:2},
      feedback:"Hold onto that vision. On the days when the politics and the personalities cloud everything, remember: you're not fighting for a position. You're building something that didn't exist before. That's a completely different kind of energy."},
     {text:"A little of both — excited about the new role but also desperate to leave the old one",scores:{focus:2,leverage:1,clarity:5,boundaries:1},
      feedback:"Honest. The desperation to leave can pollute the excitement of arriving if you're not careful. Make sure the new thing is shaped by what you want, not by what you're running from. Otherwise you'll build a department defined by 'not the lab' instead of its own vision."},
     {text:"Running — if I'm being honest, I just need to get out of this situation",scores:{focus:-2,leverage:0,clarity:6,boundaries:0},
      feedback:"Worth slowing down for. If escape is the primary driver, you might take the first exit instead of the right one. And once you're out, you'll need something pulling you forward or you'll find a new situation to escape from. What does the destination look like, separate from the place you're leaving?"}
   ],tags:["clarity","focus","transition"]},

  {id:"chk-2",category:"Check-In",type:"checkin",
   context:"No scenario. Just a question.",
   question:"How many things on your plate right now are actually yours — versus things you're holding because you don't trust someone else to handle them?",
   choices:[
     {text:"Most of it is mine — I've been getting better at letting things go",scores:{focus:3,leverage:2,clarity:6,boundaries:6},
      feedback:"Progress. Real progress. Keep going. Getting better at letting go is a practice, not an achievement. Tomorrow there'll be a new thing that feels like only you can handle. Notice it. Question it. Let it go if it isn't yours."},
     {text:"Honestly, I'm still holding things that should be someone else's by now",scores:{focus:1,leverage:0,clarity:8,boundaries:1},
      feedback:"Name one. Right now. The one that's most clearly not yours. What would happen if you set it down tomorrow? The answer is probably 'someone would struggle with it for a day and then figure it out.' That's not failure. That's how capability transfers."},
     {text:"I don't know anymore — everything feels like mine",scores:{focus:-3,leverage:0,clarity:4,boundaries:-7},
      feedback:"When everything feels like yours, nothing gets your best. That's not a capacity problem — it's a boundary problem. And it's one only you can solve, because nobody else is going to walk up and take things off your plate. You have to set them down. Deliberately. Starting with the one that scares you least."}
   ],tags:["boundaries","clarity","self-awareness"]},

  {id:"chk-3",category:"Check-In",type:"checkin",
   context:"No scenario. Real talk.",
   question:"When you look at who shows up at work — is that who you want to be, or who the situation requires you to be?",
   choices:[
     {text:"Who I want to be — I'm getting closer to leading the way I naturally lead",scores:{focus:4,leverage:3,clarity:10,boundaries:3},
      feedback:"That alignment is worth everything. Protect it fiercely. The new role should be built around who you are, not who the org chart says you need to be. If you feel like yourself while doing the work, you're in the right place."},
     {text:"Who the situation requires — I'm adapting constantly",scores:{focus:1,leverage:1,clarity:3,boundaries:-1},

// ═══════════════════════════════
// ENGINE
// ═══════════════════════════════
class DecisionDeck {
  constructor() {
    this.state = 'start';
    this.scores = { focus:50, leverage:50, boundaries:50, clarity:50 };
    this.usedIds = new Set();
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentScenario = null;
    this.selectedChoice = null;
    this.deck = [];
    this.render();
  }

  buildDeck() {
    if (this.usedIds.size >= SCENARIOS.length) this.usedIds = new Set();
    let pool = SCENARIOS.filter(s => !this.usedIds.has(s.id));
    pool.sort(() => Math.random() - 0.5);

    const selected = [];
    const catCount = {};
    const typeCount = { work:0, offwork:0, checkin:0 };

    const guarantees = [
      pool.find(s => s.type === 'checkin'),
      pool.find(s => s.type === 'checkin' && !selected.some(x=>x.id===s.id)),
      pool.find(s => s.type === 'checkin' && !selected.some(x=>x.id===s.id)),
      pool.find(s => s.type === 'offwork'),
      pool.find(s => s.type === 'offwork' && !selected.some(x=>x.id===s.id)),
      pool.find(s => s.category === 'Letting Go'),
      pool.find(s => s.category === 'Building the New'),
      pool.find(s => s.category === 'Managing Yourself'),
    ].filter(Boolean);

    for (const s of guarantees) {
      if (s && !selected.some(x=>x.id===s.id)) {
        selected.push(s);
        catCount[s.category] = (catCount[s.category]||0) + 1;
        typeCount[s.type] = (typeCount[s.type]||0) + 1;
      }
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.some(x=>x.id===s.id)) continue;
      const cc = catCount[s.category]||0;
      if (cc >= 2) continue;
      if (s.type==='checkin' && typeCount.checkin >= 4) continue;
      if (s.type==='offwork' && typeCount.offwork >= 4) continue;
      selected.push(s);
      catCount[s.category] = cc + 1;
      typeCount[s.type] = (typeCount[s.type]||0) + 1;
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.some(x=>x.id===s.id)) selected.push(s);
    }
    selected.sort(() => Math.random() - 0.5);
    // Don't start with a check-in
    if (selected[0] && selected[0].type === 'checkin') {
      const swap = selected.findIndex((s,i) => i > 2 && s.type === 'work');
      if (swap > 0) [selected[0], selected[swap]] = [selected[swap], selected[0]];
    }
    this.deck = selected;
  }

  findCallback(history) {
    if (history.length < 3) return null;
    const current = this.currentScenario;
    if (!current) return null;
    const overlap = history.filter(h => {
      const past = SCENARIOS.find(s => s.id === h.id);
      return past && past.tags.some(t => current.tags.includes(t));
    });
    if (overlap.length > 0) {
      const ref = overlap[overlap.length - 1];
      const past = SCENARIOS.find(s => s.id === ref.id);
      return { text:`Earlier on a ${past.category.toLowerCase()} situation, you chose: "${ref.choiceText}" — carry that into this one.` };
    }
    return null;
  }

  applyVariance(scores) {
    const m = { ...scores };
    const roll = Math.random();
    const keys = Object.keys(m);
    if (roll < 0.15 && m.focus > 4) {
      m.focus = Math.round(m.focus * 0.3);
    } else if (roll < 0.28 && m.boundaries < -3) {
      m.clarity = (m.clarity||0) + 3;
    } else if (roll < 0.40) {
      const pick = keys[Math.floor(Math.random() * keys.length)];
      if (Math.abs(m[pick]||0) > 3) m[pick] = -Math.round((m[pick]||0) * 0.5);
    } else if (roll < 0.48) {
      const pick = keys[Math.floor(Math.random() * keys.length)];
      m[pick] = (m[pick]||0) + (Math.random() > 0.5 ? 4 : -4);
    }
    return m;
  }

  nextRound() {
    if (this.round >= this.totalRounds) { this.state = 'end'; this.render(); return; }
    this.currentScenario = this.deck[this.round];
    this.usedIds.add(this.currentScenario.id);
    this.selectedChoice = null;
    this.state = 'play';
    this.render();
  }

  selectChoice(index) {
    if (this.selectedChoice !== null) return;
    this.selectedChoice = index;
    const choice = this.currentScenario.choices[index];
    const mod = this.applyVariance(choice.scores);
    this.scores.focus     = Math.max(0, Math.min(100, this.scores.focus     + (mod.focus||0)));
    this.scores.leverage  = Math.max(0, Math.min(100, this.scores.leverage  + (mod.leverage||0)));
    this.scores.boundaries= Math.max(0, Math.min(100, this.scores.boundaries+ (mod.boundaries||0)));
    this.scores.clarity   = Math.max(0, Math.min(100, this.scores.clarity   + (mod.clarity||0)));
    this.history.push({ id:this.currentScenario.id, choiceIndex:index, choiceText:choice.text, scores:mod });
    this.round++;
    this.render();
  }

  getEndInsight() {
    const { focus, leverage, boundaries, clarity } = this.scores;
    const main = [
      {name:'focus',val:focus},
      {name:'leverage',val:leverage},
      {name:'boundaries',val:boundaries}
    ].sort((a,b) => b.val - a.val);
    const highest = main[0].name;
    const lowest  = main[2].name;
    const highVal = main[0].val;
    const spread  = highVal - main[2].val;

    const focusHits = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      return s && (s.choices[h.choiceIndex].scores.focus||0) >= 6;
    }).length;
    const boundaryHits = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      return s && (s.choices[h.choiceIndex].scores.boundaries||0) >= 6;
    }).length;
    const leverageHits = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      return s && (s.choices[h.choiceIndex].scores.leverage||0) >= 6;
    }).length;
    const driftCount = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      if (!s) return false;
      const sc = s.choices[h.choiceIndex].scores;
      return (sc.boundaries||0) < -3 && (sc.focus||0) < 1;
    }).length;

    let reading = '';

    // ── Primary axis reading ──
    if (highest === 'focus') {
      if (focusHits >= 6) {
        reading += "Focus dominated this run — not just edged ahead but ran consistently through your choices. In a transition that's competing with a decade of operational identity, that's not nothing. The media department gets built because you kept choosing it when the alternatives were available and sometimes easier.";
      } else if (highVal >= 68) {
        reading += "Focus led clearly this run. The noise didn't win. That clarity of direction is the difference between someone in transition and someone who's actually transitioning — the first group knows the destination, the second keeps choosing it under pressure. The score says you chose it.";
      } else {
        reading += "Focus edged ahead — just enough to say that when the competing pulls showed up, forward motion won more often than not. The narrow margin means the other instincts are alive too, which is healthy. A transition that loses all peripheral awareness for pure focus tends to damage things on the way out.";
      }
    } else if (highest === 'leverage') {
      if (leverageHits >= 6) {
        reading += "Leverage ran consistently — you kept making choices that build visibility, connect your output to the people who resource it, and position the work where it needs to be seen. In a new department with no established credibility, that's not vanity. It's strategy. The department doesn't get built in private.";
      } else if (highVal >= 68) {
        reading += "You know how to make work visible and positions strong. The strategic instinct ran high across these choices. Invisible work doesn't get resourced. Just make sure the strategy is serving the work and not replacing it — positioning without substance has a short shelf life.";
      } else {
        reading += "Leverage led slightly — a preference for choices that build the position alongside the work. For someone building a new function from nothing, that's the right instinct. The margin says it didn't crowd out focus or boundaries, which is the right balance.";
      }
    } else {
      if (boundaryHits >= 6) {
        reading += "Boundaries held consistently through these choices — again and again you chose the line rather than absorbing more. For someone who's been the catch-all for years, that's not an easy pattern to sustain. The fact that it ran this consistently says the understanding has moved from intellectual to actual. That's a different kind of progress than a score shows.";
      } else if (highVal >= 68) {
        reading += "You're getting better at knowing where you end and other people's problems begin. That line is the hardest thing for someone who cares deeply to hold — and the most important one for a transition to succeed. The old role kept getting fed because you kept feeding it. These choices show that changing.";
      } else {
        reading += "Boundaries led this run — a slight preference for choices that protect your time and direction rather than expand your obligations. In the context of what you're building, that's appropriate. The transition doesn't happen while you're still doing everything.";
      }
    }

    // ── Spread / pattern reading ──
    if (spread >= 28) {
      if (lowest === 'boundaries' && driftCount >= 3) {
        reading += "\n\nThe spread tells the real story. Boundaries lagged significantly, and the pattern in the choices shows drift — repeatedly absorbing things outside your lane while forward motion toward the media role slowed. This is the exact pattern that makes transitions take twice as long as they should. The lab's gravity is real. The only thing that counters it is a harder line than feels comfortable.";
      } else if (lowest === 'focus') {
        reading += "\n\nFocus took the hardest hits this run. That usually means other people's urgencies won more often than your own direction did. The transition won't happen in the margins of someone else's priority. The focus has to be protected not eventually, not when things settle — now, while the department is still being defined by what gets your best energy.";
      } else if (lowest === 'leverage') {
        reading += "\n\nLeverage lagged significantly. In a new-function context, that means the work may be happening without the right people seeing it. Depth without visibility is incomplete. What you're building needs to be visible to the people who protect it before they start wondering what you're doing. That's not politics — it's the difference between a department that gets resourced and one that gets cut.";
      } else {
        reading += "\n\nThe spread across your scores points to a clear stylistic preference running through this run. The highest axis won because you kept choosing it. The lowest lost for the same reason. That consistency is information — either a strength being used well or a default gear being used when something else was needed.";
      }
    } else if (spread <= 12) {
      reading += "\n\nYour three main scores landed close together — no single axis dominated. In a transition, that can mean genuinely balanced judgment or a run where competing pulls cancelled out. Either way, no one instinct ran away with it. That's a reasonable read for someone navigating the complexity you're holding right now.";
    } else {
      const mid = main[1];
      reading += `\n\n${mid.name === 'focus' ? "Focus stayed in the middle — present without leading. The direction was available without being the only thing. That's the right relationship to the transition goal: important enough to keep choosing, not so consuming that everything else gets dropped." : mid.name === 'leverage' ? "Leverage sat in the middle — strategic thinking engaged without dominating. That's the right use of the visibility instinct: available when the situation calls for it, not applied to everything indiscriminately." : "Boundaries held in the middle — present enough to keep the load manageable, not so rigid that the relational work got dropped. That's the version of boundary-holding that actually works in a complex organization."}`;
    }

    // ── Clarity reading ──
    const clarityHigh = clarity >= 70;
    const clarityLow  = clarity <= 46;
    const checkinHistory = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      return s && s.type === 'checkin';
    });
    const selfAware = checkinHistory.filter(h => {
      const s = SCENARIOS.find(sc => sc.id===h.id);
      return s && (s.choices[h.choiceIndex].scores.clarity||0) >= 6;
    }).length;

    if (clarityHigh && selfAware >= 3) {
      reading += "\n\nClarity ran high this run — the check-in questions got real answers rather than comfortable ones. That kind of honesty about where you actually are, as opposed to where you'd like to be, is the underpinning for everything else. Decisions made from a clear read of yourself tend to hold. Decisions made from a managed version of yourself tend to need revisiting.";
    } else if (clarityLow) {
      reading += "\n\nClarity sat low this run — the self-assessment questions got more protected answers than honest ones. That's not unusual during a high-pressure transition where every conversation feels like it's being evaluated. But the protection has a cost: decisions made without accurate self-knowledge tend to be decisions you have to remake. Find one question from this run where you gave the safe answer instead of the true one. Start there.";
    } else {
      reading += "\n\nClarity landed near the middle — honest in some places, managed in others. That's a realistic read of someone carrying real complexity. The questions where you chose the truest answer are the ones that will actually move something. The ones where you chose the safer answer are the ones worth coming back to.";
    }

    return reading;
  }

  start() {
    this.scores = { focus:50, leverage:50, boundaries:50, clarity:50 };
    this.usedIds = new Set();
    this.round = 0; this.history = []; this.selectedChoice = null;
    this.buildDeck(); this.nextRound();
  }

  getCardClass() {
    if (!this.currentScenario) return '';
    if (this.currentScenario.type === 'checkin') return 'checkin';
    if (this.currentScenario.type === 'offwork') return 'offwork';
    return '';
  }

  render() {
    const app = document.getElementById('app');

    // ── START ──
    if (this.state === 'start') {
      app.innerHTML = `
        <div class="header">
          <div class="header-left">
            <h1>Decision Deck</h1>
            <span class="v3-badge">v3</span>
          </div>
          <div class="header-sub">Transition Edition</div>
        </div>
        <div class="start-screen">
          <div class="start-mark">◈</div>
          <div class="start-title">Decision Deck</div>
          <div class="start-edition">Transition Edition</div>
          <div class="start-version">Version 3.0 — Clarity Update</div>
          <div class="start-axes">
            <span class="axis-pill a1">Focus</span>
            <span class="axis-pill a2">Leverage</span>
            <span class="axis-pill a3">Boundaries</span>
            <span class="axis-pill a4">Clarity</span>
          </div>
          <div class="start-divider"></div>
          <p>14 scenarios drawn from a larger pool. No perfect answers.<br><br>Letting go. Building new. Navigating the space between. A fourth axis has been added: <strong style="color:var(--ax4)">Clarity</strong> — how honestly you see yourself in the middle of all of it.<br><br>Your earlier decisions will follow you into later ones.</p>
          <button class="start-btn" onclick="game.start()">Deal Me In</button>
          <div class="start-note">Scores vary across runs — this is by design</div>
        </div>`;
      return;
    }

    // ── END ──
    if (this.state === 'end') {
      const insight = this.getEndInsight();
      const paras = insight.split('\n\n');
      const { focus, leverage, boundaries, clarity } = this.scores;
      const mainAxes = [
        {label:'Focus',val:focus,cls:'e1',color:'var(--ax1)'},
        {label:'Leverage',val:leverage,cls:'e2',color:'var(--ax2)'},
        {label:'Boundaries',val:boundaries,cls:'e3',color:'var(--ax3)'}
      ];
      const tendencies = mainAxes.filter(a => a.val >= 65).map(a => a.label);
      app.innerHTML = `
        <div class="header">
          <div class="header-left">
            <h1>Decision Deck</h1>
            <span class="v3-badge">v3</span>
          </div>
        </div>
        <div class="end-screen">
          <div class="end-eyebrow">Your Reading</div>
          <div class="end-title">Run Complete</div>
          <div class="final-scores">
            ${mainAxes.map(a => `
              <div class="final-stat ${a.cls}">
                <div class="val" style="color:${a.color}">${a.val}</div>
                <div class="lbl">${a.label}</div>
              </div>`).join('')}
          </div>
          <div class="clarity-block">
            <div class="clarity-val">${clarity}</div>
            <div class="clarity-info">
              <div class="clarity-label">Clarity</div>
              <div class="clarity-desc">How honestly you're reading yourself in the middle of the transition. Scores highest on Check-In cards.</div>
            </div>
          </div>
          ${tendencies.length > 0 ? `<div class="tendency-row">${tendencies.map(t=>`<span class="tendency-tag">${t}</span>`).join('')}</div>` : ''}
          <div class="end-divider"></div>
          ${paras.map(p => `<p class="insight">${p}</p>`).join('')}
          <div class="end-divider"></div>
          <button class="play-again" onclick="game.start()">Run Again</button>
        </div>`;
      return;
    }

    // ── PLAY ──
    const s = this.currentScenario;
    const cardClass = this.getCardClass();
    const callback = this.findCallback(this.history);
    const selected = this.selectedChoice;
    const choice = selected !== null ? s.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length-1].scores : null;

    const axColors = {focus:'var(--ax1)',leverage:'var(--ax2)',boundaries:'var(--ax3)',clarity:'var(--ax4)'};
    const axLabels = {focus:'Focus',leverage:'Leverage',boundaries:'Boundaries',clarity:'Clarity'};

    let choicesHTML = '';
    if (selected === null) {
      choicesHTML = `<div class="choices">${s.choices.map((c,i)=>
        `<button class="choice-btn" onclick="game.selectChoice(${i})">${c.text}</button>`
      ).join('')}</div>`;
    } else {
      // Find dominant delta (excluding clarity for primary display)
      const entries = Object.entries(modScores).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
      const dom = entries[0];
      const dVal = dom[1]; const dKey = dom[0];
      const dClass = dVal>0?'pos':dVal<0?'neg':'zero';
      const dSign = dVal>0?'+':'';
      const clarityDelta = modScores.clarity||0;
      const clarityBadge = clarityDelta && Math.abs(clarityDelta) >= 3
        ? `<span class="clarity-badge">${clarityDelta>0?'+':''}${clarityDelta} Clarity</span>` : '';
      choicesHTML = `
        <div class="choices">${s.choices.map((c,i)=>
          `<button class="choice-btn${i===selected?' selected':''}" disabled>${c.text}</button>`
        ).join('')}</div>
        <div class="result">
          <div class="result-score">
            <div class="delta ${dClass}">${dSign}${dVal}</div>
            <div class="stat-info">
              <div class="stat-name" style="color:${axColors[dKey]||'var(--ax1)'}">${axLabels[dKey]||dKey}</div>
              <div class="stat-sub">Now: ${this.scores[dKey]}</div>
            </div>
            ${clarityBadge}
          </div>
          <div class="result-text">${choice.feedback}</div>
          <button class="next-btn" onclick="game.nextRound()">${this.round>=this.totalRounds?'See Results →':'Next →'}</button>
        </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <div class="header-left">
          <h1>Decision Deck</h1>
          <span class="v3-badge">v3</span>
        </div>
        <div class="header-sub">${s.category}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${(this.round/this.totalRounds)*100}%"></div></div>
        <div class="progress-label">${this.round} / ${this.totalRounds}</div>
      </div>
      <div class="score-bar">
        <div class="score-item s1"><div class="label">Focus</div><div class="value ax1">${this.scores.focus}</div></div>
        <div class="score-item s2"><div class="label">Leverage</div><div class="value ax2">${this.scores.leverage}</div></div>
        <div class="score-item s3"><div class="label">Bounds</div><div class="value ax3">${this.scores.boundaries}</div></div>
        <div class="score-item s4"><div class="label">Clarity</div><div class="value ax4">${this.scores.clarity}</div></div>
      </div>
      <div class="card-container">
        <div class="card ${cardClass}">
          <div class="card-accent"></div>
          <div class="card-round">${this.round+1} · ${this.totalRounds}</div>
          <div class="card-category">
            <span class="cat-dot"></span>${s.category}
          </div>
          <div class="card-context">${s.context}</div>
          ${callback&&selected===null?`<div class="card-callback"><span class="callback-tag">Callback</span><br>${callback.text}</div>`:''}
          <div class="card-question">${s.question}</div>
          ${choicesHTML}
        </div>
      </div>`;
  }
}

const game = new DecisionDeck();
</script>
</body>
</html>
