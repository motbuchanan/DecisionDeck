  // ===== CREATIVE LEADERSHIP =====
  {
    id: "cl-1", category: "Creative Leadership", type: "work",
    context: "Someone in leadership has a strong opinion about a creative decision in your area. They're not the audience and they don't have a media background. But they're the boss.",
    question: "Their input would weaken the work. They're not asking — they're directing. What do you do?",
    choices: [
      { text: "Push back with reasoning — 'Here's why I'd recommend the other approach' — and let them choose", scores: { focus: 5, leverage: 6, boundaries: 5 }, feedback: "The professional response. You're not refusing — you're informing the decision with your expertise. If they still want it their way after hearing your reasoning, that's their call to make. But they need the information first, and you're the only one who can give it to them. Silence in the face of bad creative direction isn't deference. It's malpractice." },
      { text: "Make the change they're asking for — they're the decision-maker", scores: { focus: -3, leverage: 1, boundaries: -2 }, feedback: "If you make every change requested without pushback, you've made yourself a production resource, not a creative leader. The whole reason a media department exists is to provide the expertise leadership doesn't have. If your value is doing what you're told, you're easily replaceable. If your value is informed judgment, you're indispensable." },
      { text: "Implement a hybrid — incorporate part of their input while preserving the core of your approach", scores: { focus: 3, leverage: 4, boundaries: 2 }, feedback: "Diplomatic. Sometimes works. But be honest about whether the 'hybrid' is genuinely better or just a way to avoid the confrontation. If you'd never have included their idea on its own merits, building it in to keep the peace is creative compromise wearing a strategic costume." }
    ],
    tags: ["creative", "leverage", "communication"]
  },
  {
    id: "cl-2", category: "Creative Leadership", type: "work",
    context: "You're getting pulled into producing things for everyone. Marketing wants this, operations wants that, someone else wants a quick video. Your actual strategic priorities are slipping.",
    question: "You're becoming the 'department of yes.' How do you reset the relationship?",
    choices: [
      { text: "Introduce a request process — formalize how work comes into the department", scores: { focus: 6, leverage: 5, boundaries: 7 }, feedback: "The right structural answer. A request form, a queue, a clear prioritization process. It feels bureaucratic until you realize the alternative is being interrupted into ineffectiveness. The process protects the work — yours and theirs. It also gives you a tool to say 'we'll prioritize this against the other 12 things in the queue' instead of 'no.'" },
      { text: "Start saying no to small things — preserve bandwidth for what matters most", scores: { focus: 5, leverage: 3, boundaries: 6 }, feedback: "Necessary but harder without structure. 'No' from a person feels personal. 'No' from a process feels neutral. If you say no without a system behind it, people will go around you to leadership and your no becomes the thing leadership has to litigate. Build the process first, then the no's land cleaner." },
      { text: "Keep saying yes for now — you're building credibility and that takes goodwill", scores: { focus: -3, leverage: 1, boundaries: -4 }, feedback: "There's an expiration date on this strategy. Credibility built on always saying yes turns into a reputation as the person who can be asked for anything. By the time you try to reset expectations, the pattern is set. Goodwill is real, but it has limits. Spend it intentionally, not by default." }
    ],
    tags: ["creative", "boundaries", "focus"]
  },
  {
    id: "cl-3", category: "Creative Leadership", type: "work",
    context: "You're using AI tools heavily in your work. They make you faster and let you do things at a level you couldn't otherwise. But you sometimes wonder if you're leaning too hard.",
    question: "The tools work. But is your work yours, or theirs?",
    choices: [
      { text: "Mine — I'm directing it, I'm shaping the output, the judgment is human", scores: { focus: 4, leverage: 5, boundaries: 3 }, feedback: "If that's true, you're using the tools the right way. The test: when AI gives you something, do you ever change it substantively? Or do you mostly accept and refine? If you're not changing the underlying logic or rejecting outputs, you might be leaning more than you realize." },
      { text: "Somewhere in between — and I'm not always sure where the line is", scores: { focus: 3, leverage: 3, boundaries: 5 }, feedback: "Honest. That uncertainty is actually a sign you're using the tools mindfully. The people who don't worry about this are the ones to worry about. Stay aware of it. Periodically take on something without AI to make sure the skills you're not using haven't atrophied." },
      { text: "More AI than I'd publicly admit — but the output is good, so does it matter?", scores: { focus: 1, leverage: 2, boundaries: 2 }, feedback: "It matters in two ways. One: your ability to evaluate the output depends on having done the work yourself enough times to know what good looks like. Two: there's a credibility risk if anyone ever asks how you produced something and the answer is 'I just prompted it.' Use the tools, but make sure you could defend the work without them if you had to." }
    ],
    tags: ["creative", "tools", "self-awareness"]
  },

  // ===== FAMILY & SELF =====
  {
    id: "fam-1", category: "Family & Self", type: "offwork",
    context: "You've been distracted at home — physically present but mentally still at work. Someone in your family has noticed and made a small comment about it.",
    question: "It wasn't a confrontation. Just an observation. How do you respond?",
    choices: [
      { text: "Acknowledge it directly and put the phone down — start there", scores: { focus: 4, leverage: 3, boundaries: 6 }, feedback: "The small comment is usually the warning before the bigger conversation. They're telling you they've noticed and they're not okay with it, but they're being gentle about it. Honor the gentleness by actually responding to it. Action means more than apology — and the action they need is your full presence, not your defense." },
      { text: "Explain what's been on your mind — they should know what you're dealing with", scores: { focus: 1, leverage: 1, boundaries: -2 }, feedback: "Context is good. But context isn't a substitute for presence. If your response to 'you've been distracted' is to explain the work problems causing the distraction, you've made it about you and your stress instead of about them and what they need. Save the work context for a different conversation." },
      { text: "Promise to do better — the situation is temporary and you'll be back to normal soon", scores: { focus: -2, leverage: 0, boundaries: -3 }, feedback: "How many times have you used some version of 'when this is over' as a placeholder for actual presence? Promises about the future cost nothing. The thing that matters is what you do in the next hour. Don't promise to be present later. Be present now." }
    ],
    tags: ["relationships", "regulation", "boundaries"]
  },
  {
    id: "fam-2", category: "Family & Self", type: "offwork",
    context: "You have a creative project that's just for you. It's been sitting untouched for weeks because work has been consuming you.",
    question: "There's an hour you could spend on it tonight. Or you could use that hour to get ahead on tomorrow.",
    choices: [
      { text: "Work on the personal project — the work hour won't actually get you ahead", scores: { focus: 5, leverage: 3, boundaries: 6 }, feedback: "Right answer. The hour spent on work tonight will be replaced by an hour of new work tomorrow. The hour spent on the personal project is irreplaceable — it's the only one that refuels the part of you that isn't a worker. Without that fuel, the work suffers anyway. Counterintuitive, but true." },
      { text: "Get ahead on work — the personal project will still be there next week", scores: { focus: -2, leverage: 2, boundaries: -3 }, feedback: "Will it? When? Next week is going to look exactly like this week. There will always be a work reason to push the personal thing further out. The only way personal work ever happens is if you treat it with the same protectedness as work commitments. Otherwise it stays untouched forever." },
      { text: "Split it — thirty minutes on each", scores: { focus: 2, leverage: 2, boundaries: 1 }, feedback: "Compromise. Sometimes works. But thirty minutes on a personal project is rarely enough to get into the flow that makes it satisfying. And thirty minutes of work is rarely enough to actually move anything forward. You might end the hour feeling like you did neither well." }
    ],
    tags: ["regulation", "self-awareness", "boundaries"]
  },

  // ===== MORE TRANSITION =====
  {
    id: "tr-1", category: "Letting Go", type: "work",
    context: "Someone in your old area is struggling with something you used to handle. They haven't asked for help. You know they're not going to ask.",
    question: "Your help would be welcomed even if it's not requested. Or would it?",
    choices: [
      { text: "Wait to be asked — unsolicited help reinforces that they can't do it without me", scores: { focus: 6, leverage: 3, boundaries: 7 }, feedback: "Right answer. Even if your help would be welcomed, the act of offering it without being asked sends a message: 'I'm watching, I can see you're struggling, I think you need me.' That message is the opposite of what builds confidence. Let them struggle. If they need help, they know where to find you." },
      { text: "Reach out — pretending not to notice is its own kind of message", scores: { focus: -2, leverage: 2, boundaries: -3 }, feedback: "Sometimes true with close friends. With someone who's stepping into your old role, 'I noticed you're struggling' lands very differently. Even gently delivered, it tells them you're watching their performance and assessing it. That's a heavier weight than they need from you." },
      { text: "Mention it casually next time you see them — leave the door open without forcing it", scores: { focus: 2, leverage: 2, boundaries: 1 }, feedback: "Better than offering directly. Still risky. Anything that signals you're aware of their struggle puts you in evaluator mode in their head. The cleanest move is to act like you haven't noticed and trust them to ask if they need you. If they don't ask, they didn't need you." }
    ],
    tags: ["transition", "boundaries", "trust"]
  },
  {
    id: "tr-2", category: "Navigating Up", type: "work",
    context: "You've negotiated your transition timeline. Then something happens — a new urgent project, a staffing change, a leadership ask — that would justify extending it.",
    question: "There's a legitimate reason to push your full transition back. Do you accept the extension or hold the line?",
    choices: [
      { text: "Hold the line — every extension teaches that the timeline is flexible", scores: { focus: 6, leverage: 5, boundaries: 7 }, feedback: "The first extension creates the template for every extension after it. If you accept this one, the next legitimate reason will get the same treatment, and you'll still be straddling roles a year from now. Hold the timeline you negotiated. If you can't fully transition because of the new reality, that's a renegotiation conversation, not an automatic extension." },
      { text: "Accept the extension — the situation has legitimately changed", scores: { focus: -2, leverage: 1, boundaries: -3 }, feedback: "Reasonable on the surface. Dangerous in pattern. The situation will always be 'legitimately changing.' If the criterion for extending is 'something important came up,' you'll extend forever. The whole point of a negotiated timeline is that it survives normal organizational chaos." },
      { text: "Propose a modified plan — partial transition by the original date, full by a new date", scores: { focus: 3, leverage: 4, boundaries: 3 }, feedback: "Negotiation rather than acceptance. Better than caving entirely, worse than holding firm. The risk is that 'partial by date one, full by date two' becomes 'partial forever' because date two is also flexible. If you go this route, the second date needs to be as firm as the first." }
    ],
    tags: ["transition", "boundaries", "strategy"]
  },

  // ===== CHECK-IN =====
  {
    id: "chk-6", category: "Check-In", type: "checkin",
    context: "No scenario. Just a thought to sit with.",
    question: "If you imagine yourself in this new role six months from now, fully transitioned, doing the work you actually wanted to do — what does the day look like?",
    choices: [
      { text: "I can see it clearly — that's what I'm building toward", scores: { focus: 4, leverage: 3, boundaries: 3 }, feedback: "Hold onto that picture. On the days when the politics and the personalities cloud everything, that vision is your compass. Most people in transitions can't articulate where they're going. You can. That's an advantage." },
      { text: "I have a fuzzy picture — I know the direction but not the details", scores: { focus: 2, leverage: 2, boundaries: 2 }, feedback: "Fuzzy is honest. Six months out is far enough that the details shouldn't be sharp yet. But the fuzziness can also mean you haven't taken the time to actually envision it. Try this: spend ten minutes writing what an ideal Tuesday in that role looks like, hour by hour. Specifics turn fuzzy pictures into actionable targets." },
      { text: "Honestly? I've been so focused on the transition itself that I haven't pictured the destination clearly", scores: { focus: 0, leverage: 1, boundaries: 2 }, feedback: "That's worth fixing. If you can't see the destination, you can't tell if you're heading toward it. You can spend your whole transition managing the exit and arrive somewhere you didn't choose. Take the time to picture it — not as escape from the current situation, but as the actual life you want to be living. Then steer toward that, not just away from this." }
    ],
    tags: ["self-awareness", "focus", "transition"]
  }
];

// ========== GAME ENGINE ==========
class DecisionDeck {
  constructor() {
    this.state = 'start';
    this.scores = { focus: 50, leverage: 50, boundaries: 50 };
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentScenario = null;
    this.selectedChoice = null;
    this.usedIds = new Set();
    this.deck = [];
    this.render();
  }

  buildDeck() {
    let pool = SCENARIOS.filter(s => !this.usedIds.has(s.id));
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const selected = [];
    const catCount = {};
    const typeCount = { work: 0, offwork: 0, checkin: 0 };
    const guarantees = [
      pool.find(s => s.type === 'checkin'),
      pool.find(s => s.type === 'checkin' && !selected.includes(s)),
      pool.find(s => s.type === 'offwork'),
      pool.find(s => s.type === 'offwork' && !selected.includes(s)),
      pool.find(s => s.category === 'Letting Go'),
      pool.find(s => s.category === 'Building the New'),
      pool.find(s => s.category === 'Managing Yourself'),
    ].filter(Boolean);
    for (const s of guarantees) {
      if (!selected.includes(s)) {
        selected.push(s);
        catCount[s.category] = (catCount[s.category] || 0) + 1;
        typeCount[s.type] = (typeCount[s.type] || 0) + 1;
      }
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.includes(s)) continue;
      const cc = catCount[s.category] || 0;
      if (cc >= 2) continue;
      if (s.type === 'checkin' && typeCount.checkin >= 3) continue;
      if (s.type === 'offwork' && typeCount.offwork >= 3) continue;
      selected.push(s);
      catCount[s.category] = cc + 1;
      typeCount[s.type] = (typeCount[s.type] || 0) + 1;
    }
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.includes(s)) selected.push(s);
    }
    for (let i = selected.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [selected[i], selected[j]] = [selected[j], selected[i]];
    }
    if (selected[0] && selected[0].type === 'checkin') {
      const swapIdx = selected.findIndex((s, i) => i > 2 && s.type === 'work');
      if (swapIdx > 0) [selected[0], selected[swapIdx]] = [selected[swapIdx], selected[0]];
    }
    this.deck = selected;
  }

  findCallback(history) {
    if (history.length < 3) return null;
    const current = this.currentScenario;
    if (!current) return null;
    const tagOverlap = history.filter(h => {
      const past = SCENARIOS.find(s => s.id === h.id);
      if (!past) return false;
      return past.tags.some(t => current.tags.includes(t));
    });
    if (tagOverlap.length > 0) {
      const ref = tagOverlap[tagOverlap.length - 1];
      const past = SCENARIOS.find(s => s.id === ref.id);
      return { text: `Earlier, when faced with a ${past.category.toLowerCase()} situation, you chose: "${ref.choiceText}" — how does that shape your thinking here?` };
    }
    return null;
  }

  applyScoreVariance(scores) {
    const modified = { ...scores };
    const roll = Math.random();
    if (roll < 0.18 && modified.focus > 3) {
      modified.focus = Math.round(modified.focus * 0.3);
    } else if (roll < 0.30 && modified.focus < -2) {
      modified.leverage = Math.abs(modified.leverage) + 3;
    } else if (roll < 0.42) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      if (Math.abs(modified[pick]) > 2) { modified[pick] = -Math.round(modified[pick] * 0.5); }
    } else if (roll < 0.50) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      modified[pick] = modified[pick] + (Math.random() > 0.5 ? 4 : -4);
    }
    return modified;
  }

  nextRound() {
    if (this.round >= this.totalRounds) { this.state = 'end'; this.render(); return; }
    this.currentScenario = this.deck[this.round];
    this.usedIds.add(this.currentScenario.id);
    this.selectedChoice = null;
    this.state = 'play';
    this.render();
  }

  selectChoice(index) {
    if (this.selectedChoice !== null) return;
    this.selectedChoice = index;
    const choice = this.currentScenario.choices[index];
    const modifiedScores = this.applyScoreVariance(choice.scores);
    this.scores.focus = Math.max(0, Math.min(100, this.scores.focus + modifiedScores.focus));
    this.scores.leverage = Math.max(0, Math.min(100, this.scores.leverage + modifiedScores.leverage));
    this.scores.boundaries = Math.max(0, Math.min(100, this.scores.boundaries + modifiedScores.boundaries));
    this.history.push({ id: this.currentScenario.id, choiceIndex: index, choiceText: choice.text, scores: modifiedScores });
    this.round++;
    this.render();
  }

  getEndInsight() {
    const { focus, leverage, boundaries } = this.scores;
    const sorted = [
      { name: 'focus', val: focus }, { name: 'leverage', val: leverage }, { name: 'boundaries', val: boundaries }
    ].sort((a, b) => b.val - a.val);
    const highest = sorted[0].name;
    const lowest = sorted[2].name;
    const insights = {
      focus: {
        high: "You know where you're going. The noise doesn't pull you off course as much as it used to. That clarity of direction is what separates someone in transition from someone who's arrived.",
        low: "Focus took some hits. That usually means other people's problems got more of your energy than your own forward motion. Understandable in a chaotic environment. But at some point, their chaos stops being your responsibility and your direction starts being your priority."
      },
      leverage: {
        high: "You know how to make your work visible and your position strong. That strategic instinct is genuine. Just make sure the strategy serves the work, not the other way around — building something real is always more durable than positioning.",
        low: "Leverage dipped. That might mean you chose depth over visibility, substance over positioning. That's not always wrong. But invisible work has a ceiling. At some point, what you build has to be seen by the people who decide what gets resourced."
      },
      boundaries: {
        high: "You're getting better at knowing where you end and other people's problems begin. That line is the hardest thing for someone who cares deeply to draw — and the most important.",
        low: "Boundaries got soft. That's the cost of caring about people and being good at too many things — you end up holding everything because you can. But 'can' and 'should' aren't the same word. The things you're holding for other people are the things keeping you from building what's yours."
      }
    };
    const checkinHistory = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.type === 'checkin';
    });
    let checkinNote = '';
    if (checkinHistory.length >= 2) {
      const heavyCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.boundaries < 1 || choice.scores.focus < 1;
      }).length;
      if (heavyCount >= 2) {
        checkinNote = "\n\nThe check-ins painted a picture worth looking at. You're carrying more than you need to, processing longer than necessary, and giving away energy that belongs to your own next chapter. That pattern doesn't break itself. You break it — by choosing, every day, to put your own oxygen mask on first.";
      } else {
        checkinNote = "\n\nThe check-ins suggest you're self-aware about where you are and what you're carrying. That awareness is your biggest asset — it means the adjustments you need to make are refinements, not overhauls. Keep checking in with yourself. The mirror is the tool.";
      }
    }
    return `Your strongest instinct: ${highest}. ${insights[highest].high}\n\nWhere to reflect: ${lowest}. ${insights[lowest].low}${checkinNote}`;
  }

  start() {
    this.scores = { focus: 50, leverage: 50, boundaries: 50 };
    this.round = 0; this.history = []; this.selectedChoice = null;
    this.buildDeck(); this.nextRound();
  }

  getCardClass() {
    if (!this.currentScenario) return '';
    if (this.currentScenario.type === 'checkin') return 'checkin';
    if (this.currentScenario.type === 'offwork') return 'offwork';
    return '';
  }

  render() {
    const app = document.getElementById('app');
    if (this.state === 'start') {
      app.innerHTML = `
        <div class="header">
          <h1>Decision Deck</h1>
          <div class="subtitle">Transition Edition</div>
        </div>
        <div class="start-screen">
          <div class="icon">◆</div>
          <p>14 scenarios. No perfect answers.<br><br>
          You'll be scored on three axes: <strong style="color:var(--accent)">Focus</strong>, <strong style="color:var(--gold)">Leverage</strong>, and <strong style="color:#a78bfa">Boundaries</strong>.<br><br>
          The scoring won't always make sense. Transitions never do.<br><br>
          Letting go. Building new. Navigating the space between.<br><br>
          Your earlier decisions will follow you.</p>
          <button class="start-btn" onclick="game.start()">Deal Me In</button>
        </div>`;
      return;
    }
    if (this.state === 'end') {
      const insight = this.getEndInsight();
      const paras = insight.split('\n\n');
      app.innerHTML = `
        <div class="header"><h1>Decision Deck</h1><div class="subtitle">Results</div></div>
        <div class="end-screen">
          <div class="final-scores">
            <div class="final-stat"><div class="val" style="color:var(--accent)">${this.scores.focus}</div><div class="lbl">Focus</div></div>
            <div class="final-stat"><div class="val" style="color:var(--gold)">${this.scores.leverage}</div><div class="lbl">Leverage</div></div>
            <div class="final-stat"><div class="val" style="color:#a78bfa">${this.scores.boundaries}</div><div class="lbl">Boundaries</div></div>
          </div>
          ${paras.map(p => `<p class="insight">${p}</p>`).join('')}
          <button class="play-again" onclick="game.start()">Play Again</button>
        </div>`;
      return;
    }
    const s = this.currentScenario;
    const cardClass = this.getCardClass();
    const callback = this.findCallback(this.history);
    const selected = this.selectedChoice;
    const choice = selected !== null ? s.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length - 1].scores : null;
    let choicesHTML = '';
    if (selected === null) {
      choicesHTML = `<div class="choices">${s.choices.map((c, i) => `<button class="choice-btn" onclick="game.selectChoice(${i})">${c.text}</button>`).join('')}</div>`;
    } else {
      const dominant = Object.entries(modScores).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))[0];
      const deltaVal = dominant[1];
      const deltaClass = deltaVal > 0 ? 'pos' : deltaVal < 0 ? 'neg' : 'zero';
      const deltaSign = deltaVal > 0 ? '+' : '';
      const statLabels = { focus: 'Focus', leverage: 'Leverage', boundaries: 'Boundaries' };
      choicesHTML = `
        <div class="choices">${s.choices.map((c, i) => `<button class="choice-btn${i === selected ? ' selected' : ''}" disabled>${c.text}</button>`).join('')}</div>
        <div class="result">
          <div class="result-score"><div class="delta ${deltaClass}">${deltaSign}${deltaVal}</div><div class="stat-name">${statLabels[dominant[0]]}</div></div>
          <div class="result-text">${choice.feedback}</div>
          <button class="next-btn" onclick="game.nextRound()">${this.round >= this.totalRounds ? 'See Results' : 'Next Scenario'}</button>
        </div>`;
    }
    app.innerHTML = `
      <div class="header"><h1>Decision Deck</h1></div>
      <div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${(this.round / this.totalRounds) * 100}%"></div></div><div class="progress-label">${this.round}/${this.totalRounds}</div></div>
      <div class="score-bar">
        <div class="score-item"><div class="label">Focus</div><div class="value focus">${this.scores.focus}</div></div>
        <div class="score-item"><div class="label">Leverage</div><div class="value leverage">${this.scores.leverage}</div></div>
        <div class="score-item"><div class="label">Boundaries</div><div class="value boundaries">${this.scores.boundaries}</div></div>
      </div>
      <div class="card-container">
        <div class="card ${cardClass}" key="${s.id}-${selected}">
          <div class="card-category">${s.category}</div>
          <div class="card-context">${s.context}</div>
          ${callback && selected === null ? `<div class="card-ref"><span class="reflection-tag">Callback</span><br>${callback.text}</div>` : ''}
          <div class="card-question">${s.question}</div>
          ${choicesHTML}
        </div>
      </div>`;
  }
}
const game = new DecisionDeck();
</script>
</body>
</html>
