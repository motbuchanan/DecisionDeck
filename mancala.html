<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mancala — Mot vs Kathy</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--accent:#b0d235;--accentSh:#7e9a1f;--text:#e8f0e4;}
  html,body{height:100%;}
  body{font-family:system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;overflow:hidden;
    background:radial-gradient(110% 80% at 50% 20%,#1f3327 0%,#0c1410 80%);}
  #bar{width:100%;max-width:640px;display:flex;align-items:center;gap:10px;padding:10px 14px 4px;}
  #bar a{color:#cfe6d8;text-decoration:none;font-size:13px;border:1px solid #3a5a47;background:#15241b;border-radius:999px;padding:6px 12px;}
  #title{font-weight:800;font-size:17px;}
  #turn{margin-left:auto;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
  #dot{width:14px;height:14px;border-radius:50%;animation:dp 1.8s ease-in-out infinite;}
  @keyframes dp{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
  #wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:6px 8px;}
  canvas{display:block;border-radius:24px;touch-action:none;box-shadow:0 14px 34px rgba(0,0,0,.6);}
  #msg{min-height:20px;font-size:14px;color:#cfe6d8;text-align:center;padding:2px 12px;}
  #foot{padding:0 0 14px;display:flex;gap:12px;align-items:center;}
  button.act{font-family:inherit;font-size:15px;font-weight:bold;padding:9px 16px;border-radius:10px;border:none;color:#1c2b16;background:var(--accent);cursor:pointer;box-shadow:0 4px 0 var(--accentSh),0 5px 10px rgba(0,0,0,.4);}
  #score{font-size:13px;color:#9fbdac;}
  .ov{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;background:rgba(7,12,9,.88);}
  .ov.show{display:flex;}
  .ov h1{font-size:34px;}
  #confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .cfp{position:absolute;top:-16px;width:9px;height:14px;border-radius:2px;opacity:.95;animation-name:cfall;animation-timing-function:linear;animation-fill-mode:forwards;}
  @keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);}100%{transform:translateY(108vh) rotate(680deg);}}
  #ovTrophy{font-size:58px;line-height:1;}
  .ov.show #ovTrophy,.ov.show h1{animation:winpop .65s cubic-bezier(.2,1.5,.4,1) both;}
  @keyframes winpop{0%{transform:scale(.25);opacity:0;}100%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div id="bar"><a href="index.html">&#8962; Shelf</a><div id="title">Mancala</div><div id="turn"><div id="dot"></div><span id="turnName"></span></div></div>
<div id="wrap"><canvas id="board"></canvas></div>
<div id="msg"></div>
<div id="foot"><button class="act" id="newBtn">New game</button><button class="act" id="modeBtn" style="background:#15241b;color:#cfe6d8;box-shadow:0 4px 0 #0b160f,0 5px 10px rgba(0,0,0,.4);border:1px solid #3a5a47;">Rules: Kalah</button><div id="score"></div></div>
<div class="ov" id="overlay"><div id="confetti"></div><div id="ovTrophy">&#127942;</div><h1 id="ovTitle"></h1><p id="ovText"></p><button class="act" id="ovBtn">Play again</button><a href="index.html" style="font-size:14px;padding:9px 16px;border-radius:10px;border:1px solid #3a5a47;background:#15241b;color:#cfe6d8;text-decoration:none;">Back to shelf</a></div>
<script src="gamenight.js"></script>
<script>
// pits 0-5 Kathy (bottom, left->right), 6 Kathy store, 7-12 Mot (top, right->left visually), 13 Mot store
let P={top:{name:"Mot",main:"#d8312b",light:"#f06a60",dark:"#8d1d19",pits:[7,8,9,10,11,12],store:13},
         bot:{name:"Kathy",main:"#2f6fd0",light:"#6fa0ec",dark:"#194182",pits:[0,1,2,3,4,5],store:6}};
const canvas=document.getElementById("board"),ctx=canvas.getContext("2d");
let W=600,H=300,pits=[],turn="bot",phase="pick",pulsing=false,GS=null,sowing=null;
const KEY="mancala_games";let _mem=[];
const Store={load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return _mem.slice();}},
  save(l){try{localStorage.setItem(KEY,JSON.stringify(l));}catch(e){_mem=l.slice();}}};
const PULSE=()=>0.5+0.5*Math.sin(performance.now()/280);
const STONE_COLS=["#cfe2f0","#e7cfef","#cfe9d6","#efe6c8","#e7d2c2","#d4d8ef"];
function fit(){W=Math.min(window.innerWidth-16,640);H=Math.min(window.innerHeight-160,Math.max(240,W*0.48));
  canvas.width=W;canvas.height=H;render();}
function pitXY(i){const m=W*0.16,span=W-2*m,step=span/5;
  if(i===6)return{x:W-W*0.085,y:H/2,store:true};
  if(i===13)return{x:W*0.085,y:H/2,store:true};
  if(i<6)return{x:m+i*step,y:H*0.72};
  return{x:m+(12-i)*step,y:H*0.28};}
function seatFrom(p,seat){return Object.assign({},seat,{name:p.name,main:p.color,light:p.light,dark:p.dark});}
function newGame(){pits=Array(14).fill(4);pits[6]=0;pits[13]=0;
  phase="over";sowing=null;
  document.getElementById("overlay").classList.remove("show");document.getElementById("confetti").innerHTML="";render();
  GN.matchStart(function(m){P={top:seatFrom(m.a,P.top),bot:seatFrom(m.b,P.bot)};
    turn=(m.first===m.a)?"top":"bot";phase="pick";
    GS={start:Date.now(),flipWinner:m.first.name,mode:MODE,captures:{},extras:{}};
    GS.captures[m.a.name]=0;GS.captures[m.b.name]=0;GS.extras[m.a.name]=0;GS.extras[m.b.name]=0;
    updateBar();setMode(MODE);setMessage(P[turn].name+" sows first ("+(MODE==="kalah"?"Kalah":"Avalanche")+" rules) \u2014 tap one of your pits");render();ensurePulse();});}
function setMessage(t){document.getElementById("msg").textContent=t;}
function updateBar(){const pc=P[turn];document.getElementById("turnName").textContent=pc.name+"'s turn";
  const d=document.getElementById("dot");
  d.style.background="radial-gradient(circle at 35% 30%,"+pc.light+","+pc.main+" 70%,"+pc.dark+")";
  d.style.boxShadow="0 0 0 3px rgba(255,255,255,.15),0 0 14px "+pc.main;
  const g=Store.load();let m=0,k=0;for(const r of g){if(r.winner===P.top.name)m++;else if(r.winner===P.bot.name)k++;}
  document.getElementById("score").textContent=P.top.name+" "+m+" \u00b7 "+k+" "+P.bot.name;}
function oppOf(i){return 12-i;} // opposite pit across the board (0..5 <-> 12..7)
let MODE=(function(){try{return localStorage.getItem("mancala_mode")||"kalah";}catch(e){return "kalah";}})();
function setMode(m){MODE=m;try{localStorage.setItem("mancala_mode",m);}catch(e){}
  document.getElementById("modeBtn").textContent="Rules: "+(m==="kalah"?"Kalah":"Avalanche");}
function avalanchePlan(side,pit){const me=P[side],skip=side==="top"?6:13;
  const arr=pits.slice(),ops=[];let hand=arr[pit],i=pit,guard=0;arr[pit]=0;ops.push({scoop:pit});
  while(guard++<600){
    while(hand>0){i=(i+1)%14;if(i===skip)continue;arr[i]++;ops.push({drop:i});hand--;}
    if(i===me.store)return{ops,extra:true};
    if(arr[i]>1&&i!==6&&i!==13){hand=arr[i];arr[i]=0;ops.push({scoop:i});continue;}
    return{ops,extra:false};}
  return{ops,extra:false};}
function sowPlan(side,pit){ // pure: returns {seq:[pitIdx...], capture:{from,opp}|null, extra:bool}
  const me=P[side],skip=side==="top"?6:13;
  let n=pits[pit],i=pit;const seq=[];
  while(n>0){i=(i+1)%14;if(i===skip)continue;seq.push(i);n--;}
  const last=seq[seq.length-1];
  let capture=null,extra=false;
  if(last===me.store)extra=true;
  else{const passes=seq.filter(x=>x===last).length;
    if(me.pits.includes(last)&&pits[last]+passes===1&&pits[oppOf(last)]>0)capture={from:last,opp:oppOf(last)};}
  return{seq,capture,extra};}
function sideEmpty(side){return P[side].pits.every(i=>pits[i]===0);}
function legalPits(side){return P[side].pits.filter(i=>pits[i]>0);}
function doSow(pit){const side=turn;
  if(MODE==="avalanche"){const plan=avalanchePlan(side,pit);phase="anim";let k=0;
    (function step(){if(k<plan.ops.length){const op=plan.ops[k++];
      if(op.drop!==undefined)pits[op.drop]++;else pits[op.scoop]=0;
      render();setTimeout(step,op.scoop!==undefined?260:110);return;}
      finishMove(plan);})();return;}
  const plan=sowPlan(side,pit);
  phase="anim";let hand=pits[pit];pits[pit]=0;let k=0;
  (function step(){if(k<plan.seq.length){pits[plan.seq[k]]++;k++;render();setTimeout(step,120);return;}
    if(plan.capture){const got=pits[plan.capture.from]+pits[plan.capture.opp];
      pits[plan.capture.from]=0;pits[plan.capture.opp]=0;pits[P[side].store]+=got;
      GS.captures[P[side].name]+=got;setMessage(P[side].name+" captures "+got+"!");render();}
    finishMove(plan);})();}
function finishMove(plan){const side=turn;
  if(sideEmpty("top")||sideEmpty("bot")){ // sweep remainder
    for(const s of["top","bot"])for(const i of P[s].pits){pits[P[s].store]+=pits[i];pits[i]=0;}
    render();endGame();return;}
  if(plan.extra){GS.extras[P[side].name]++;phase="pick";
    setMessage(P[side].name+" landed in the store \u2014 go again!");render();ensurePulse();return;}
  turn=side==="top"?"bot":"top";phase="pick";updateBar();
  setMessage(P[turn].name+"'s sow");render();ensurePulse();}
function endGame(){phase="over";
  const m=pits[13],k=pits[6];
  const winSide=m>k?"top":k>m?"bot":null;
  const rec={start:GS.start,end:Date.now(),durationMs:Date.now()-GS.start,
    winner:winSide?P[winSide].name:null,loser:winSide?P[winSide==="top"?"bot":"top"].name:null,
    draw:!winSide,flipWinner:GS.flipWinner,mode:GS.mode,score:(function(){const s={};s[P.top.name]=m;s[P.bot.name]=k;return s;})(),captures:GS.captures,extras:GS.extras};
  GN.recordGame(KEY,rec);
  document.getElementById("ovTitle").textContent=winSide?P[winSide].name+" wins!":"It's a tie!";
  document.getElementById("ovTitle").style.color=winSide?P[winSide].main:"#e8f0e4";
  document.getElementById("ovTrophy").textContent=winSide?"\uD83C\uDFC6":"\uD83E\uDD1D";
  document.getElementById("ovText").textContent=P.top.name+" "+m+" \u00b7 "+k+" "+P.bot.name;
  if(winSide)spawnConfetti(winSide);updateBar();
  setTimeout(()=>document.getElementById("overlay").classList.add("show"),500);}
function stonesIn(x,y,rx,ry,n,seedI){
  const show=Math.min(n,14);
  for(let s=0;s<show;s++){const a=(s*2.399+seedI*1.7),rr=(s%3+1)/3.6;
    const sx=x+Math.cos(a)*rx*rr*0.62,sy=y+Math.sin(a)*ry*rr*0.62,r=Math.min(rx,ry)*0.21;
    const col=STONE_COLS[(s+seedI)%STONE_COLS.length];
    const g=ctx.createRadialGradient(sx-r*0.3,sy-r*0.35,r*0.15,sx,sy,r);
    g.addColorStop(0,"#fff");g.addColorStop(0.35,col);g.addColorStop(1,"#7d7468");
    ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.fillStyle=g;ctx.fill();}}
function render(){ctx.clearRect(0,0,W,H);
  // wooden board
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#8a5a2e");g.addColorStop(0.5,"#6e431f");g.addColorStop(1,"#4f2c11");
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(0,0,W,H,24);ctx.fill();
  ctx.strokeStyle="rgba(255,220,170,.18)";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(3,3,W-6,H-6,21);ctx.stroke();
  // wood grain
  ctx.save();ctx.globalAlpha=0.08;ctx.strokeStyle="#2c1606";
  for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(0,H*(0.1+i*0.11));
    ctx.bezierCurveTo(W*0.3,H*(0.08+i*0.11),W*0.7,H*(0.14+i*0.11),W,H*(0.1+i*0.11));ctx.stroke();}
  ctx.restore();
  // table-light vignette over the wood
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.62);
  vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,.22)");
  ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,24);ctx.clip();
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);ctx.restore();
  const pu=PULSE(),legal=phase==="pick"?legalPits(turn):[];
  for(let i=0;i<14;i++){const p=pitXY(i),store=!!p.store;
    const rx=store?W*0.052:W*0.055,ry=store?H*0.36:H*0.155;
    // pit hollow
    const pg=ctx.createRadialGradient(p.x,p.y-ry*0.2,Math.min(rx,ry)*0.2,p.x,p.y,Math.max(rx,ry));
    pg.addColorStop(0,"#241105");pg.addColorStop(1,"#3a1f0c");
    ctx.beginPath();ctx.ellipse(p.x,p.y,rx,ry,0,0,7);ctx.fillStyle=pg;ctx.fill();
    // carved depth: heavy shadow rolling in from the top lip
    ctx.save();ctx.beginPath();ctx.ellipse(p.x,p.y,rx,ry,0,0,7);ctx.clip();
    const lip=ctx.createLinearGradient(0,p.y-ry,0,p.y+ry*0.35);
    lip.addColorStop(0,"rgba(0,0,0,.55)");lip.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=lip;ctx.fillRect(p.x-rx,p.y-ry,rx*2,ry*1.4);ctx.restore();
    ctx.strokeStyle="rgba(0,0,0,.55)";ctx.lineWidth=2.5;ctx.stroke();
    // sunlight catching the bottom rim
    ctx.beginPath();ctx.ellipse(p.x,p.y,rx,ry,0,Math.PI*0.15,Math.PI*0.85);
    ctx.strokeStyle="rgba(255,215,160,.30)";ctx.lineWidth=1.8;ctx.stroke();
    if(legal.includes(i)){ctx.save();ctx.strokeStyle="#f7f3da";ctx.globalAlpha=0.5+0.45*pu;
      ctx.lineWidth=Math.max(2,W*0.006);ctx.beginPath();ctx.ellipse(p.x,p.y,rx+4+2*pu,ry+4+2*pu,0,0,7);ctx.stroke();ctx.restore();}
    stonesIn(p.x,p.y,rx,ry,pits[i],i);
    // count badge
    ctx.save();ctx.fillStyle="rgba(243,233,210,.92)";
    ctx.font="bold "+Math.round(Math.min(W*0.03,16)+2)+"px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";
    const by=store?p.y+ry+14:(i<7?p.y+ry+13:p.y-ry-13);
    ctx.fillText(pits[i],p.x,Math.max(12,Math.min(H-10,by)));ctx.restore();}
  // side labels
  ctx.save();ctx.font="bold "+Math.round(Math.min(W*0.026,14))+"px system-ui";ctx.textAlign="center";
  ctx.fillStyle=P.top.light;ctx.fillText("MOT \u2192 sows this way \u2192",W/2,H*0.07);
  ctx.fillStyle=P.bot.light;ctx.fillText("\u2190 sows this way \u2190 KATHY",W/2,H*0.94);ctx.restore();}
function ensurePulse(){if(pulsing)return;pulsing=true;
  (function tick(){if(phase!=="pick"){pulsing=false;render();return;}render();requestAnimationFrame(tick);})();}
canvas.addEventListener("pointerup",e=>{if(phase!=="pick")return;
  const rect=canvas.getBoundingClientRect(),f=canvas.width/rect.width;
  const x=(e.clientX-rect.left)*f,y=(e.clientY-rect.top)*f;
  let best=null,bd=1e9;
  for(const i of legalPits(turn)){const p=pitXY(i),d=Math.hypot(x-p.x,y-p.y);
    if(d<W*0.085&&d<bd){bd=d;best=i;}}
  if(best!==null)doSow(best);});
document.getElementById("newBtn").addEventListener("click",newGame);
GN.rulesButton(document.getElementById("foot"),{title:"Mancala",sections:[
 {h:"Goal",p:"Bank more stones in your store (the big pit on your right) than your opponent."},
 {h:"Sowing",p:"Tap one of your six pits. Its stones are sown one-by-one counter-clockwise, including your own store but skipping your opponent\u2019s."},
 {h:"Kalah rules",p:"Last stone in your store: free turn. Last stone in an empty pit on YOUR side: capture that stone plus everything in the pit directly opposite. When one side empties, the other player sweeps their remaining stones \u2014 highest store wins."},
 {h:"Avalanche rules",p:"Last stone landing in any occupied pit scoops that pit and keeps sowing. The chain only ends in your store (free turn) or an empty pit. No captures \u2014 the chains are everything."}]});
GN.statsButton(document.getElementById("foot"),{title:"Mancala",key:KEY,specials:[
  {label:"Stones captured",of:(r,n)=>r.reduce((a,x)=>a+((x.captures&&x.captures[n])||0),0)},
  {label:"Free turns",of:(r,n)=>r.reduce((a,x)=>a+((x.extras&&x.extras[n])||0),0)},
  {label:"Kalah wins",of:(r,n)=>r.filter(x=>x.winner===n&&x.mode!=="avalanche").length},
  {label:"Avalanche wins",of:(r,n)=>r.filter(x=>x.winner===n&&x.mode==="avalanche").length}]});
document.getElementById("modeBtn").addEventListener("click",()=>{setMode(MODE==="kalah"?"avalanche":"kalah");newGame();});
document.getElementById("ovBtn").addEventListener("click",newGame);
window.addEventListener("resize",fit);
fit();newGame();
</script>
</body>
</html>
