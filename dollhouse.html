<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFF8F2">
<title>Storyhouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFF8F2; --card:#FFFFFF; --ink:#3A3340; --soft:#8A8190;
  --coral:#FF7A66; --coral-d:#F2624C; --teal:#4FC2B8; --yellow:#FFC94D;
  --lilac:#B79CED; --line:#EFE5DC; --line-2:#E6D8CC; --shadow:rgba(58,51,64,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--paper);
  overflow:hidden;-webkit-user-select:none;user-select:none;}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;background:var(--paper);}

header{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:14px 16px 10px;}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.logo{width:34px;height:34px;flex:0 0 auto;}
.brand h1{font-family:'Fredoka';font-weight:600;font-size:21px;margin:0;line-height:1;letter-spacing:.2px;}
.story-name{font-family:'Fredoka';font-weight:500;font-size:13px;color:var(--coral-d);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.icon-btn{flex:0 0 auto;width:40px;height:40px;border:none;border-radius:14px;background:var(--card);
  box-shadow:0 2px 8px var(--shadow);display:grid;place-items:center;cursor:pointer;}
.icon-btn:active{transform:scale(.94);}
.icon-btn svg{width:21px;height:21px;}

main{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px 18px;}
main::-webkit-scrollbar{display:none;}
.screen{display:none;animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.stage{background:var(--card);border-radius:24px;box-shadow:0 6px 20px var(--shadow);padding:10px;position:relative;overflow:hidden;}
#dollSvg{display:block;width:100%;height:auto;}
.studio-head{display:flex;align-items:center;gap:10px;margin:2px 2px 10px;}
.studio-head input{flex:1;min-width:0;border:2px solid var(--line);background:var(--card);border-radius:14px;
  padding:10px 13px;font-family:'Fredoka';font-weight:500;font-size:16px;color:var(--ink);-webkit-user-select:text;user-select:text;}
.studio-head input:focus{outline:none;border-color:var(--teal);}
.who-tag{font-size:11px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;
  background:var(--paper);border-radius:10px;padding:7px 10px;flex:0 0 auto;}

.eyebrow{font-family:'Fredoka';font-weight:600;font-size:13px;color:var(--soft);letter-spacing:.6px;text-transform:uppercase;margin:18px 2px 9px;}
.row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;}
.row::-webkit-scrollbar{display:none;}
.pill{flex:0 0 auto;border:2px solid var(--line);background:var(--card);padding:8px 14px;border-radius:14px;
  font-family:'Fredoka';font-weight:500;font-size:14px;color:var(--ink);cursor:pointer;white-space:nowrap;transition:all .12s;}
.pill.on{border-color:var(--coral);background:var(--coral);color:#fff;box-shadow:0 3px 10px rgba(255,122,102,.35);}
.pill:active{transform:scale(.95);}

.swatches{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;padding:2px;}
.sw{aspect-ratio:1;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px var(--shadow);cursor:pointer;position:relative;}
.sw.on{box-shadow:0 0 0 3px var(--ink);}
.sw:active{transform:scale(.9);}
.sw.custom{display:grid;place-items:center;overflow:hidden;background:conic-gradient(#FF7A66,#FFC94D,#4FC2B8,#B79CED,#FF7A66);}
.sw.custom input{opacity:0;width:100%;height:100%;cursor:pointer;}
.sw.custom svg{position:absolute;width:15px;height:15px;pointer-events:none;}
.mini-label{font-size:11px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.4px;margin:6px 2px 6px;}

.field{margin-bottom:14px;}
.field label{display:block;font-family:'Fredoka';font-weight:500;font-size:14px;margin:0 2px 7px;color:var(--ink);}
.field input,.field textarea{width:100%;border:2px solid var(--line);background:var(--card);border-radius:16px;
  padding:13px 15px;font-family:'Nunito';font-size:15px;font-weight:600;color:var(--ink);resize:none;-webkit-user-select:text;user-select:text;}
.field textarea{min-height:96px;line-height:1.45;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal);}
.spark{width:100%;border:none;border-radius:18px;padding:15px;cursor:pointer;
  background:linear-gradient(135deg,var(--lilac),#9F7FE6);color:#fff;font-family:'Fredoka';font-weight:600;font-size:16px;
  box-shadow:0 5px 16px rgba(159,127,230,.4);display:flex;align-items:center;justify-content:center;gap:9px;}
.spark:active{transform:scale(.98);}
.premise-card{background:#FBF4FF;border:2px dashed var(--lilac);border-radius:18px;padding:16px;margin-top:14px;
  font-family:'Fredoka';font-weight:500;font-size:17px;line-height:1.5;color:#5E4B86;display:none;}
.premise-card.show{display:block;animation:pop .3s ease;}
@keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
.premise-card .use{margin-top:12px;background:var(--lilac);color:#fff;border:none;border-radius:12px;padding:9px 16px;font-family:'Fredoka';font-weight:500;font-size:14px;cursor:pointer;}

/* Family screen */
.fam-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.fam-card{background:var(--card);border-radius:20px;box-shadow:0 3px 12px var(--shadow);padding:10px 10px 12px;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;border:2px solid transparent;}
.fam-card:active{transform:scale(.97);}
.fam-card.active{border-color:var(--coral);}
.fam-card .pic{width:100%;height:124px;display:flex;align-items:flex-end;justify-content:center;}
.fam-card .pic svg{height:100%;width:auto;}
.fam-card .nm{font-family:'Fredoka';font-weight:600;font-size:14px;margin-top:4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.fam-card .rl{font-size:11px;color:var(--soft);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.fam-card .rm{position:absolute;top:6px;right:6px;width:26px;height:26px;border:none;border-radius:9px;background:#FFE7E2;color:var(--coral-d);font-weight:800;cursor:pointer;font-size:13px;}
.add-card{border:2px dashed var(--line-2);background:none;border-radius:20px;min-height:170px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--soft);font-family:'Fredoka';font-weight:500;font-size:14px;}
.add-card:active{transform:scale(.97);}
.add-card svg{width:26px;height:26px;}
.add-card.full{opacity:.4;pointer-events:none;}

.btn-primary{width:100%;border:none;border-radius:18px;padding:15px;cursor:pointer;margin-top:14px;
  background:var(--coral);color:#fff;font-family:'Fredoka';font-weight:600;font-size:16px;
  box-shadow:0 5px 16px rgba(255,122,102,.4);display:flex;align-items:center;justify-content:center;gap:9px;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{width:100%;border:2px solid var(--line);border-radius:18px;padding:13px;cursor:pointer;margin-top:10px;
  background:var(--card);color:var(--ink);font-family:'Fredoka';font-weight:500;font-size:15px;}

.card-preview{background:var(--card);border-radius:24px;box-shadow:0 6px 20px var(--shadow);padding:12px;}
#cardCanvas{width:100%;height:auto;display:block;border-radius:16px;}

nav{flex:0 0 auto;display:flex;background:var(--card);box-shadow:0 -3px 16px var(--shadow);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-radius:24px 24px 0 0;}
.tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--soft);}
.tab svg{width:24px;height:24px;}
.tab span{font-family:'Fredoka';font-weight:500;font-size:11px;}
.tab.on{color:var(--coral);}

.sheet-back{position:absolute;inset:0;background:rgba(58,51,64,.32);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
.sheet-back.show{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--paper);border-radius:26px 26px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,1.2,.5,1);z-index:41;max-height:82%;
  display:flex;flex-direction:column;padding:8px 16px calc(18px + env(safe-area-inset-bottom));}
.sheet.show{transform:none;}
.grip{width:42px;height:5px;background:var(--line-2);border-radius:3px;margin:8px auto 12px;}
.sheet h2{font-family:'Fredoka';font-weight:600;font-size:19px;margin:0 2px 12px;}
.lives{overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.life{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:18px;padding:10px 12px;box-shadow:0 2px 8px var(--shadow);cursor:pointer;}
.life .thumb{width:54px;height:54px;flex:0 0 auto;border-radius:12px;background:var(--paper);overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.life .thumb svg{height:96%;width:auto;}
.life .meta{flex:1;min-width:0;}
.life .meta .nm{font-family:'Fredoka';font-weight:600;font-size:15px;}
.life .meta .pr{font-size:12px;color:var(--soft);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.life .del{flex:0 0 auto;width:34px;height:34px;border:none;border-radius:10px;background:#FFE7E2;color:var(--coral-d);font-weight:800;cursor:pointer;}
.new-life{border:2px dashed var(--line-2);background:none;border-radius:18px;padding:14px;font-family:'Fredoka';font-weight:500;font-size:15px;color:var(--soft);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

.kind-picker{display:flex;flex-direction:column;gap:10px;}
.kp{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;font-family:'Fredoka';font-weight:500;font-size:16px;}
.kp:active{transform:scale(.98);}
.kp .ic{width:42px;height:42px;flex:0 0 auto;}

.toast{position:absolute;left:50%;bottom:96px;transform:translate(-50%,20px);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:14px;font-family:'Fredoka';font-weight:500;font-size:14px;opacity:0;pointer-events:none;
  transition:all .3s;z-index:60;white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,0);}

.house-wrap{background:var(--card);border-radius:24px;box-shadow:0 6px 20px var(--shadow);padding:10px;}
#houseSvg{display:block;width:100%;height:auto;}
.hint{font-size:13px;color:var(--soft);font-weight:700;text-align:center;margin:12px 6px 0;}
.room-back{border:none;background:var(--card);box-shadow:0 2px 8px var(--shadow);border-radius:14px;padding:9px 14px;font-family:'Fredoka';font-weight:500;font-size:14px;color:var(--ink);cursor:pointer;margin-bottom:10px;}
.room-back:active{transform:scale(.96);}
.room-wrap{background:var(--card);border-radius:24px;box-shadow:0 6px 20px var(--shadow);padding:10px;}
#roomSvg{display:block;width:100%;height:auto;border-radius:16px;touch-action:none;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:4px;}
.cat-item{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:7px 7px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cat-item:active{transform:scale(.93);}
.cat-item svg{width:100%;height:42px;}
.cat-item span{font-size:10px;font-weight:800;color:var(--soft);}
.sel-bar{display:none;gap:6px;background:var(--card);border-radius:16px;padding:8px;margin-top:10px;box-shadow:0 3px 12px var(--shadow);align-items:center;}
.sel-bar.show{display:flex;}
.sel-bar .nudge{flex:0 0 auto;width:36px;height:36px;border:none;border-radius:11px;background:var(--line);font-size:16px;font-weight:800;color:var(--ink);cursor:pointer;}
.sel-bar .nudge:active{background:var(--line-2);}
.sel-bar .grow{flex:1;font-size:12px;font-weight:800;color:var(--soft);text-align:center;text-transform:capitalize;}
.sel-bar .danger{background:#FFE7E2;color:var(--coral-d);}
.subtabs{display:flex;gap:6px;margin:14px 0 2px;}
.subtab{flex:1;border:2px solid var(--line);background:var(--card);border-radius:13px;padding:8px 2px;font-family:'Fredoka';font-weight:500;font-size:12px;color:var(--soft);cursor:pointer;}
.subtab.on{border-color:var(--teal);background:var(--teal);color:#fff;}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:2px;}
.chip{border:2px solid var(--line);background:var(--card);border-radius:14px;padding:9px 14px;font-family:'Fredoka';font-weight:500;font-size:14px;color:var(--ink);cursor:pointer;}
.chip.in{border-color:var(--teal);background:var(--teal);color:#fff;}
.rrow{display:flex;gap:8px;}
.rname{flex:1;border:2px solid var(--line);background:var(--card);border-radius:14px;padding:10px 12px;font-family:'Fredoka';font-weight:500;font-size:15px;color:var(--ink);-webkit-user-select:text;user-select:text;}
.rname:focus{outline:none;border-color:var(--teal);}
.rdel{border:none;background:#FFE7E2;color:var(--coral-d);border-radius:14px;padding:0 16px;font-family:'Fredoka';font-weight:500;font-size:14px;cursor:pointer;}
@keyframes breathe{0%,100%{transform:translateY(0) scaleY(1);}50%{transform:translateY(-2px) scaleY(1.013);}}
.breathe{transform-box:fill-box;transform-origin:50% 100%;animation:breathe 4s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-0.8deg);}50%{transform:rotate(0.8deg);}}
@media (prefers-reduced-motion: reduce){.breathe{animation:none;}}
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="icon-btn" id="galleryBtn" aria-label="Saved households">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3A3340" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 40" fill="none"><path d="M20 5 L34 16 V34 H6 V16 Z" fill="#FFC94D"/><path d="M20 5 L34 16 H6 Z" fill="#FF7A66"/><rect x="16" y="23" width="8" height="11" rx="1" fill="#fff"/><circle cx="20" cy="18.5" r="2.4" fill="#4FC2B8"/></svg>
      <div style="min-width:0;">
        <h1>Storyhouse</h1>
        <div class="story-name" id="hdrName">make a little life</div>
      </div>
    </div>
    <button class="icon-btn" id="saveBtn" aria-label="Save">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FF7A66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
    </button>
  </header>

  <main id="main">
    <!-- STORY -->
    <section class="screen active" id="screen-story">
      <div class="eyebrow">The idea first</div>
      <div class="field">
        <label>Name this household</label>
        <input id="inHouse" type="text" placeholder="The Finch household…" maxlength="34">
      </div>
      <div class="field">
        <label>Their story</label>
        <textarea id="inPremise" placeholder="A candle maker in a tropical city… a dog walker who got abducted by aliens… start with the story, the rest follows."></textarea>
      </div>
      <button class="spark" id="sparkBtn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M12 2l1.8 5.6L19.5 9l-4.5 3.4L16.5 18 12 14.7 7.5 18l1.5-5.6L4.5 9l5.7-1.4z"/></svg>
        Spark an idea
      </button>
      <div class="premise-card" id="premiseCard">
        <span id="premiseText"></span>
        <div><button class="use" id="usePremise">Use this story →</button></div>
      </div>
    </section>

    <!-- FAMILY -->
    <section class="screen" id="screen-family">
      <div class="eyebrow">The household</div>
      <div class="fam-grid" id="famGrid"></div>
      <div class="eyebrow">Pets</div>
      <div class="fam-grid" id="petGrid"></div>
    </section>

    <!-- STUDIO -->
    <section class="screen" id="screen-studio">
      <div class="stage">
        <svg id="dollSvg" viewBox="0 0 240 480" aria-label="Preview"></svg>
      </div>
      <div class="studio-head">
        <input id="inMemberName" type="text" placeholder="Name" maxlength="24">
        <span class="who-tag" id="whoTag">Adult</span>
      </div>
      <div id="studioControls"></div>
    </section>

    <!-- CARD -->
    <section class="screen" id="screen-card">
      <div class="eyebrow">Share the household</div>
      <div class="card-preview">
        <canvas id="cardCanvas" width="900" height="1100"></canvas>
      </div>
      <button class="btn-primary" id="downloadCard">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>
        Save card to photos
      </button>
      <button class="btn-ghost" id="shareCard">Share…</button>
    </section>

    <!-- HOUSE (cutaway) -->
    <section class="screen" id="screen-house">
      <div class="eyebrow">Your dollhouse</div>
      <div class="house-wrap"><svg id="houseSvg" aria-label="Dollhouse"></svg></div>
      <p class="hint" id="houseHint">Tap a + to build your first room.</p>
    </section>

    <!-- ROOM design -->
    <section class="screen" id="screen-room">
      <button class="room-back" id="roomBack">← House</button>
      <div class="room-wrap"><svg id="roomSvg" viewBox="0 0 400 300" aria-label="Room"></svg></div>
      <div class="sel-bar" id="rselBar">
        <button class="nudge" data-n="-1">◀</button>
        <button class="nudge" data-n="up">▲</button>
        <button class="nudge" data-n="down">▼</button>
        <button class="nudge" data-n="1">▶</button>
        <span class="grow" id="rName">piece</span>
        <button class="nudge" id="rFwd">⬆</button>
        <button class="nudge danger" id="rDel">✕</button>
      </div>
      <div class="subtabs" id="roomSubtabs">
        <button class="subtab on" data-rt="walls">Walls &amp; floor</button>
        <button class="subtab" data-rt="furniture">Furniture</button>
        <button class="subtab" data-rt="wall">Wall</button>
        <button class="subtab" data-rt="people">People</button>
      </div>
      <div id="roomControls"></div>
    </section>
  </main>

  <nav>
    <button class="tab on" data-screen="story"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg><span>Story</span></button>
    <button class="tab" data-screen="family"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><circle cx="17" cy="9" r="2.4"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M15 20a4 4 0 0 1 6 0"/></svg><span>Family</span></button>
    <button class="tab" data-screen="studio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 2 2-7 7-2-2zM12 19H8v-4l8-8 4 4-8 8z"/><circle cx="12" cy="7" r="0"/></svg><span>Studio</span></button>
    <button class="tab" data-screen="house"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><rect x="9" y="13" width="6" height="8"/></svg><span>House</span></button>
    <button class="tab" data-screen="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><circle cx="8.5" cy="10" r="1.7"/><path d="M21 16l-5-5L5 19"/></svg><span>Card</span></button>
  </nav>

  <div class="sheet-back" id="sheetBack"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h2 id="sheetTitle">Your households</h2>
    <div class="lives" id="sheetBody"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
/* ============================ DATA ============================ */

// Rebuilt character renderer — better proportions, connected arms, real feet, depth/light/shadow.
// darken/lighten a hex
function shade(hex,amt){ // amt -1..1
  hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  let r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  const f=amt<0?0:255, t=Math.abs(amt);
  r=Math.round(r+(f-r)*t); g=Math.round(g+(f-g)*t); b=Math.round(b+(f-b)*t);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
const paint=(parts,fill)=>parts.map(d=>`<path d="${d}" fill="${fill}"/>`).join("");

/* ---- body silhouette geometry (viewBox 240x480) ---- */
const TORSO=`M58 184 C58 172 68 166 80 166 L160 166 C172 166 182 172 182 184 L176 256 Q188 300 166 306 L74 306 Q52 300 64 256 Z`;
const ARM_L=`M46 178 q0 -13 12 -13 q12 0 12 13 l0 110 q0 14 -12 14 q-12 0 -12 -14 Z`;
const ARM_R=`M170 178 q0 -13 12 -13 q12 0 12 13 l0 110 q0 14 -12 14 q-12 0 -12 -14 Z`;
const LEG_L=`M80 300 h32 v140 q0 13 -16 13 q-16 0 -16 -13 Z`;
const LEG_R=`M128 300 h32 v140 q0 13 -16 13 q-16 0 -16 -13 Z`;

function buildDoll(c){
  __P=[];
  const skin=skinC(c.skin), hc=hairC(c.hairCol);
  const skinSh=shade(skin,-0.16), skinHi=shade(skin,0.18);
  const dress=c.wear!=="pieces";
  let s="";
  // ground shadow
  s+=`<ellipse cx="120" cy="462" rx="58" ry="11" fill="#3A3340" opacity="0.10"/>`;
  // back hair
  s+=hairBack(c.hair,hc);
  // ---- legs (skin) ----
  s+=paint([LEG_L,LEG_R],skin);
  s+=paint([LEG_L,LEG_R],"url(#gLimb)");
  // inner-leg shadow
  s+=`<path d="M110 304 h2 v138 h-2 Z" fill="${skinSh}" opacity="0.45"/><path d="M128 304 h2 v138 h-2 Z" fill="${skinSh}" opacity="0.45"/>`;
  // ---- arms (skin) ---- (drawn before torso so shoulders fuse)
  s+=paint([ARM_L,ARM_R],skin);
  s+=paint([ARM_L,ARM_R],"url(#gLimb)");
  // ---- skin torso/shoulders (fuses arms to body; shows for bare-shoulder looks) ----
  s+=paint([TORSO],skin);
  s+=paint([TORSO],"url(#gV)");
  // ---- clothing ----
  if(dress){ const g=dress2(c.dress.style); const f=fillFor(c.dress.pattern,resolve(c.dress.base),resolve(c.dress.ink));
    s+=paint(g.parts,f)+paint(g.parts,"url(#gV)")+g.details(resolve(c.dress.ink)); }
  else {
    const gb=bottom2(c.bottom.style); const bf=fillFor(c.bottom.pattern,resolve(c.bottom.base),resolve(c.bottom.ink));
    s+=paint(gb.parts,bf)+paint(gb.parts,"url(#gV)")+gb.details(resolve(c.bottom.ink));
    const gt=top2(c.top.style); const tf=fillFor(c.top.pattern,resolve(c.top.base),resolve(c.top.ink));
    s+=paint(gt.parts,tf)+paint(gt.parts,"url(#gV)")+gt.details(resolve(c.top.ink));
  }
  // ---- shoes (drawn over pant cuffs so they read clearly) ----
  s+=shoe2(c.shoes.style,resolve(c.shoes.base),resolve(c.shoes.ink));
  // ---- neck + head ----
  s+=`<path d="M104 150 h32 v22 q0 10 -16 10 q-16 0 -16 -10 Z" fill="${skin}"/>`;
  s+=`<path d="M104 168 q16 10 32 0 v6 q-16 9 -32 0 Z" fill="${skinSh}" opacity="0.55"/>`; // neck shadow
  s+=`<ellipse cx="120" cy="98" rx="50" ry="54" fill="${skin}"/>`;
  s+=`<ellipse cx="71" cy="100" rx="8" ry="11" fill="${skin}"/><ellipse cx="169" cy="100" rx="8" ry="11" fill="${skin}"/>`;
  s+=`<ellipse cx="120" cy="98" rx="50" ry="54" fill="url(#gHead)"/>`;
  // face
  s+=face2(c.eyes,c.mouth,c.blush,c.glasses,skinSh);
  // front hair + hat
  s+=hairFront(c.hair,hc);
  if(c.hat&&c.hat!=="none") s+=hat2(c.hat,resolve(c.hatCol));
  let body=s;
  if(c.build==="child") body=`<g transform="translate(120,452) scale(0.82) translate(-120,-452)">${s}</g>`;
  return {inner:DEFS.replace("</defs>", __P.join("")+"</defs>")+body};
}

/* ---- pattern fills ---- */
let pidc=0;
function patternDef(pid,type,b,k){
  if(type==="stripe") return `<pattern id="${pid}" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="16" height="16" fill="${b}"/><rect width="8" height="16" fill="${k}"/></pattern>`;
  if(type==="dot") return `<pattern id="${pid}" width="18" height="18" patternUnits="userSpaceOnUse"><rect width="18" height="18" fill="${b}"/><circle cx="9" cy="9" r="3.4" fill="${k}"/></pattern>`;
  if(type==="gingham") return `<pattern id="${pid}" width="18" height="18" patternUnits="userSpaceOnUse"><rect width="18" height="18" fill="${b}"/><rect width="9" height="18" fill="${k}" opacity="0.4"/><rect width="18" height="9" fill="${k}" opacity="0.4"/></pattern>`;
  if(type==="floral") return `<pattern id="${pid}" width="24" height="24" patternUnits="userSpaceOnUse"><rect width="24" height="24" fill="${b}"/><g fill="${k}"><circle cx="7" cy="7" r="2.2"/><circle cx="10.5" cy="7" r="2.2"/><circle cx="8.7" cy="10.4" r="2.2"/><circle cx="8.7" cy="3.6" r="2.2"/><circle cx="8.7" cy="7" r="1.7" fill="${b}"/><circle cx="19" cy="18" r="2.2"/><circle cx="22.5" cy="18" r="2.2"/><circle cx="20.7" cy="21.4" r="2.2"/><circle cx="20.7" cy="14.6" r="2.2"/><circle cx="20.7" cy="18" r="1.7" fill="${b}"/></g></pattern>`;
  return "";
}
let __P=[]; function fillFor(type,base,ink){ if(type==="solid"||!type) return base; const pid="pp"+(pidc++); __P.push(patternDef(pid,type,base,ink)); return `url(#${pid})`; }

/* ---- face ---- */
function face2(eyes,mouth,blush,glasses,skinSh){
  let s="";
  const ex1=101,ex2=139,ey=98;
  // soft hairline shadow on forehead
  s+=`<path d="M78 66 Q120 56 162 66 Q120 78 78 66 Z" fill="${skinSh}" opacity="0.25"/>`;
  // nose hint
  s+=`<path d="M118 104 q2 6 4 8 q-3 2 -6 0" stroke="${skinSh}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.55"/>`;
  // brows
  s+=`<path d="M92 84 Q101 80 110 84" stroke="#5A4A45" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M130 84 Q139 80 148 84" stroke="#5A4A45" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.6"/>`;
  if(eyes==="dot") s+=eyeBall(ex1,ey)+eyeBall(ex2,ey);
  else if(eyes==="happy") s+=eyeBall(ex1,ey,true)+eyeBall(ex2,ey,true);
  else if(eyes==="sleepy") s+=`<path d="M${ex1-6} ${ey} Q${ex1} ${ey+5} ${ex1+6} ${ey}" stroke="#3A3340" stroke-width="3.4" fill="none" stroke-linecap="round"/><path d="M${ex2-6} ${ey} Q${ex2} ${ey+5} ${ex2+6} ${ey}" stroke="#3A3340" stroke-width="3.4" fill="none" stroke-linecap="round"/>`;
  else if(eyes==="wink") s+=eyeBall(ex1,ey,true)+`<path d="M${ex2-6} ${ey} Q${ex2} ${ey-5} ${ex2+6} ${ey}" stroke="#3A3340" stroke-width="3.4" fill="none" stroke-linecap="round"/>`;
  if(blush) s+=`<ellipse cx="88" cy="112" rx="9" ry="5.5" fill="#FF7A66" opacity="0.30"/><ellipse cx="152" cy="112" rx="9" ry="5.5" fill="#FF7A66" opacity="0.30"/>`;
  if(mouth==="smile") s+=`<path d="M108 120 Q120 130 132 120" stroke="#C0432F" stroke-width="3.4" fill="none" stroke-linecap="round"/>`;
  else if(mouth==="grin") s+=`<path d="M106 118 Q120 134 134 118 Z" fill="#B83A28"/><path d="M108 119 H132" stroke="#fff" stroke-width="2.6"/>`;
  else if(mouth==="soft") s+=`<path d="M111 122 Q120 126 129 122" stroke="#C0432F" stroke-width="3.4" fill="none" stroke-linecap="round"/>`;
  else if(mouth==="o") s+=`<ellipse cx="120" cy="123" rx="6" ry="7.5" fill="#B83A28"/>`;
  if(glasses) s+=`<circle cx="${ex1}" cy="${ey}" r="12" fill="#9fd8e8" fill-opacity="0.18" stroke="#3A3340" stroke-width="2.6"/><circle cx="${ex2}" cy="${ey}" r="12" fill="#9fd8e8" fill-opacity="0.18" stroke="#3A3340" stroke-width="2.6"/><path d="M113 ${ey} H127" stroke="#3A3340" stroke-width="2.6"/>`;
  return s;
}

/* ============================ CONTROL BUILDERS ============================ */
function styleRow(label,options,current,onPick,fmt){
  const wrap=document.createElement("div");
  let html=`<div class="eyebrow">${label}</div><div class="row">`;
  options.forEach(o=>{ html+=`<button class="pill${o===current?" on":""}" data-v="${o}">${fmt?fmt(o):o}</button>`; });
  html+=`</div>`; wrap.innerHTML=html;
  wrap.querySelectorAll(".pill").forEach(p=>p.addEventListener("click",()=>onPick(p.dataset.v)));
  return wrap;
}
function swatchRow(label,list,currentIdx,onPick){
  const wrap=document.createElement("div");
  let html=`<div class="mini-label">${label}</div><div class="swatches">`;
  list.forEach((c,i)=>{ html+=`<div class="sw${i===currentIdx?" on":""}" style="background:${c}" data-i="${i}"></div>`; });
  html+=`<label class="sw custom"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg><input type="color" data-custom="1"></label></div>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll(".sw[data-i]").forEach(s=>s.addEventListener("click",()=>onPick(parseInt(s.dataset.i))));
  wrap.querySelector("input[data-custom]").addEventListener("input",e=>onPick(e.target.value));
  return wrap;
}
function idxOf(v){ return typeof v==="number"?v:-1; }

function buildControls(ent){
  const box=$("#studioControls"); box.innerHTML="";

  else petControls(box,ent);
}
function personControls(box,c){
  box.appendChild(styleRow("Age",["adult","child"],c.build,v=>{c.build=v;renderStudio();},cap));
  box.appendChild(swatchRow("Skin",SKIN,idxOf(c.skin),v=>{c.skin=v;renderStudio();}));
  box.appendChild(styleRow("Hair",HAIR,c.hair,v=>{c.hair=v;renderStudio();},nm));
  box.appendChild(swatchRow("Hair color",HAIRCOL,idxOf(c.hairCol),v=>{c.hairCol=v;renderStudio();}));
  box.appendChild(styleRow("Eyes",FACE_EYES,c.eyes,v=>{c.eyes=v;renderStudio();},nm));
  box.appendChild(styleRow("Mouth",FACE_MOUTH,c.mouth,v=>{c.mouth=v;renderStudio();},nm));

  tog.innerHTML=`<div class="eyebrow">Details</div><div class="row"><button class="pill${c.blush?" on":""}" id="tB">Blush</button><button class="pill${c.glasses?" on":""}" id="tG">Glasses</button></div>`;

  if(c.hat!=="none") box.appendChild(swatchRow("Hat color",PALETTE,idxOf(c.hatCol),v=>{c.hatCol=v;renderStudio();}));
  box.appendChild(styleRow("Outfit",["pieces"].concat(DRESSES),c.wear==="pieces"?"pieces":c.dress.style,v=>{
    if(v==="pieces"){c.wear="pieces";} else {c.wear="dress";c.dress.style=v;} renderStudio();
  },v=>v==="pieces"?"Top + bottom":nm(v)));

function garment(box,label,g,styles,hasPattern){
  box.appendChild(styleRow(label,styles,g.style,v=>{g.style=v;renderStudio();},nm));
  if(hasPattern) box.appendChild(styleRow(label+" pattern",PATTERNS,g.pattern,v=>{g.pattern=v;renderStudio();},cap));
  box.appendChild(swatchRow(label+" color",PALETTE,idxOf(g.base),v=>{g.base=v;renderStudio();}));
  if(hasPattern) box.appendChild(swatchRow(label+" accent",PALETTE,idxOf(g.ink),v=>{g.ink=v;renderStudio();}));
}
function petControls(box,p){
  box.appendChild(styleRow("Kind",PET_KINDS,p.kind,v=>{p.kind=v;renderStudio();},nm));
  box.appendChild(swatchRow(p.kind==="bird"?"Feathers":"Fur",PALETTE,idxOf(p.base),v=>{p.base=v;renderStudio();}));
  box.appendChild(swatchRow("Belly / inner",PALETTE,idxOf(p.belly),v=>{p.belly=v;renderStudio();}));
  box.appendChild(swatchRow(p.kind==="bird"?"Crest":(p.kind==="dog"?"Ears":"Nose"),PALETTE,idxOf(p.ink),v=>{p.ink=v;renderStudio();}));
}

/* ============================ FAMILY CARD ============================ */
function svgToImage(svgStr,w,h){
  return new Promise((res,rej)=>{
    const blob=new Blob([`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${svgStr}</svg>`],{type:"image/svg+xml"});
    const url=URL.createObjectURL(blob); const img=new Image();
    img.onload=()=>{res(img);URL.revokeObjectURL(url);}; img.onerror=e=>{URL.revokeObjectURL(url);rej(e);}; img.src=url;
  });
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(" "); let line="",yy=y;
  for(const w of words){ const t=line?line+" "+w:w; if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=w;yy+=lh;}else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}
async function renderCard(){
  const cv=$("#cardCanvas"),ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  await (document.fonts?document.fonts.ready:Promise.resolve());
  ctx.fillStyle="#FFF8F2"; ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,0); g.addColorStop(0,"#FFE08A"); g.addColorStop(1,"#FFC0B0");
  ctx.fillStyle=g; roundRect(ctx,40,40,W-80,210,30); ctx.fill();
  ctx.fillStyle="#3A3340"; ctx.textAlign="center"; ctx.font="700 60px Fredoka, sans-serif";
  ctx.fillText(state.name||"A little household",W/2,128);
  ctx.font="600 28px Nunito, sans-serif"; ctx.fillStyle="#6E5B86";
  wrapText(ctx,state.premise||"made in Storyhouse",W/2,180,W-150,36);
  // people row (bottom-aligned, fit to column width)
  const people=state.members.slice(0,4);
  const padX=50, gap=20, maxPH=470, baseline=790;
  const cw=(W-padX*2-gap*(people.length-1))/people.length;
  for(let i=0;i<people.length;i++){
    try{ const img=await svgToImage(buildDoll(people[i]).inner,240,480);
      let iw=Math.min(cw*0.94, maxPH*240/480); let ih=iw*480/240;
      const cx=padX+i*(cw+gap)+cw/2;
      ctx.drawImage(img,cx-iw/2,baseline-ih,iw,ih);
      if(people[i].name){ ctx.fillStyle="#3A3340"; ctx.font="600 26px Fredoka, sans-serif"; ctx.textAlign="center"; ctx.fillText(people[i].name,cx,baseline+34); }
    }catch(e){}
  }
  // pets row (bottom-aligned, fit to column width)
  const pets=state.pets.slice(0,4);
  if(pets.length){
    const pBaseline=H-72, maxPetH=170;
    const pcw=(W-padX*2-gap*(pets.length-1))/pets.length;
    for(let i=0;i<pets.length;i++){
      try{ const img=await svgToImage(buildPet(pets[i]).inner,200,190);
        let iw=Math.min(pcw*0.82, maxPetH*200/190); let ih=iw*190/200;
        const cx=padX+i*(pcw+gap)+pcw/2;
        ctx.drawImage(img,cx-iw/2,pBaseline-ih,iw,ih);
      }catch(e){}
    }
  }
  ctx.textAlign="center"; ctx.fillStyle="#8A8190"; ctx.font="700 26px Fredoka, sans-serif";
  ctx.fillText("· made in Storyhouse ·",W/2,H-36);
}

    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000);

async function shareCard(){
  $("#cardCanvas").toBlob(async b=>{
    const file=new File([b],"storyhouse.png",{type:"image/png"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ try{await navigator.share({files:[file],title:state.name||"Storyhouse"});}catch(e){} }
    else downloadCard();
  },"image/png");
}

/* ============================ NAV ============================ */
function go(screen){
  $$(".screen").forEach(s=>s.classList.remove("active"));
  $("#screen-"+screen).classList.add("active");
  const ts = screen==="room"?"house":screen;
  $$(".tab").forEach(t=>t.classList.toggle("on",t.dataset.screen===ts));
  $("#main").scrollTop=0;
  if(screen==="family") renderFamily();
  if(screen==="studio") renderStudio();
  if(screen==="house") renderHouse();
  if(screen==="room") renderRoom();
  if(screen==="card") renderCard();
}

/* ============================ INIT ============================ */
function init(){
  loadHouses();
  $$(".tab").forEach(t=>t.addEventListener("click",()=>go(t.dataset.screen)));
  $("#inHouse").addEventListener("input",()=>{state.name=$("#inHouse").value;updateHeader();});
  $("#inPremise").addEventListener("input",()=>{state.premise=$("#inPremise").value;});
  $("#sparkBtn").addEventListener("click",spark);
  $("#usePremise").addEventListener("click",()=>{ const p=$("#premiseCard").dataset.premise||""; $("#inPremise").value=p; state.premise=p; toast("Story set — now build the family"); go("family"); });
  $("#inMemberName").addEventListener("input",()=>{ const e=activeEntity(); if(e){ e.name=$("#inMemberName").value; } });
  $("#saveBtn").addEventListener("click",saveCurrent);
  $("#galleryBtn").addEventListener("click",openGallery);
  $("#sheetBack").addEventListener("click",closeSheet);
  $("#downloadCard").addEventListener("click",downloadCard);
  $("#shareCard").addEventListener("click",shareCard);
  initHouse(); updateHeader(); renderFamily(); renderStudio();
}

/* ===== HOUSE ENGINE ===== */
// Dollhouse renderer — shaded rooms, furniture with depth, cutaway grid.

const RW=400, RH=300, FLOORY=212;          // room viewBox + floor line
const COLS=8, COLW=RW/COLS;                  // furniture grid

const RDEFS=`<defs>
<linearGradient id="rWall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.16"/><stop offset="60%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.10"/></linearGradient>
<linearGradient id="rFloor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0.14"/><stop offset="40%" stop-color="#000" stop-opacity="0.02"/><stop offset="100%" stop-color="#fff" stop-opacity="0.12"/></linearGradient>
<radialGradient id="rVign" cx="50%" cy="42%" r="72%"><stop offset="60%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.12"/></radialGradient>
<linearGradient id="gItem" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.18"/><stop offset="55%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.16"/></linearGradient>
</defs>`;

let _rp=0;
function rpattern(type,b,k){
  if(type==="solid"||!type) return null;
  const id="rp"+(_rp++); let p;
  if(type==="stripe") p=`<pattern id="${id}" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="22" height="22" fill="${b}"/><rect width="11" height="22" fill="${k}" opacity="0.5"/></pattern>`;
  else if(type==="dot") p=`<pattern id="${id}" width="26" height="26" patternUnits="userSpaceOnUse"><rect width="26" height="26" fill="${b}"/><circle cx="13" cy="13" r="4" fill="${k}" opacity="0.55"/></pattern>`;
  else if(type==="gingham") p=`<pattern id="${id}" width="24" height="24" patternUnits="userSpaceOnUse"><rect width="24" height="24" fill="${b}"/><rect width="12" height="24" fill="${k}" opacity="0.30"/><rect width="24" height="12" fill="${k}" opacity="0.30"/></pattern>`;
  else if(type==="floral") p=`<pattern id="${id}" width="30" height="30" patternUnits="userSpaceOnUse"><rect width="30" height="30" fill="${b}"/><g fill="${k}" opacity="0.5"><circle cx="9" cy="9" r="2.6"/><circle cx="13" cy="9" r="2.6"/><circle cx="11" cy="13" r="2.6"/><circle cx="11" cy="5" r="2.6"/><circle cx="23" cy="22" r="2.6"/><circle cx="27" cy="22" r="2.6"/><circle cx="25" cy="26" r="2.6"/><circle cx="25" cy="18" r="2.6"/></g></pattern>`;
  return {id,def:p};
}

/* ---- furniture (sits on baseline y=0, drawn upward) ---- */
function itemH(t){return {sofa:62,armchair:66,bed:60,table:54,stool:42,plant:84,lamp:104,shelf:92,dresser:66,rug:12,tv:70,counter:64,window:0,painting:0,clock:0,wshelf:0,wlight:0,banner:0}[t]||56;}
function itemW(t){return ({sofa:3,armchair:2,bed:3,table:2,stool:1,plant:1,lamp:1,shelf:2,dresser:2,rug:3,tv:2,counter:2,window:2,painting:1,clock:1,wshelf:2,wlight:1,banner:2}[t]||1)*COLW;}
const G=(x,d)=>`<g transform="translate(${x},0)">${d}</g>`;
const OV=(d)=>`<path d="${d}" fill="url(#gItem)"/>`;

function furniture2(it){
  const x=it.col*COLW;
  const b=resolve(it.base), d=shade(b,-0.20), l=shade(b,0.16), k=resolve(it.ink);
  switch(it.type){
    case "sofa":{const w=`M4 -42 q-2 -14 12 -14 h118 q14 0 12 14 l0 6 q-8 -2 -10 8 l0 18 h-112 l0 -18 q-2 -10 -10 -8 Z`;
      return G(x,`<rect x="2" y="-22" width="146" height="24" rx="8" fill="${d}"/><path d="${w}" fill="${b}"/>${OV(w)}<rect x="14" y="-22" width="122" height="22" rx="7" fill="${l}"/><path d="M22 -38 q14 -6 30 0 l0 16 q-15 5 -30 0 Z" fill="${k}" opacity="0.5"/><path d="M98 -38 q14 -6 30 0 l0 16 q-15 5 -30 0 Z" fill="${k}" opacity="0.5"/>`);}
    case "armchair":{const w=`M4 -46 q-2 -14 12 -14 h64 q14 0 12 14 l0 8 q-8 -2 -10 8 l0 14 h-58 l0 -14 q-2 -10 -10 -8 Z`;
      return G(x,`<rect x="2" y="-22" width="92" height="24" rx="8" fill="${d}"/><path d="${w}" fill="${b}"/>${OV(w)}<rect x="16" y="-22" width="64" height="22" rx="7" fill="${l}"/><path d="M26 -42 q20 -7 44 0 l0 18 q-22 6 -44 0 Z" fill="${k}" opacity="0.42"/>`);}
    case "bed":{return G(x,`<rect x="4" y="-16" width="146" height="18" rx="5" fill="${d}"/><rect x="4" y="-58" width="30" height="58" rx="7" fill="${b}"/>${OV('M4 -58 h30 v58 h-30 Z')}<path d="M34 -34 H150 V-4 Q150 2 142 2 H42 Q34 2 34 -4 Z" fill="${l}"/><path d="M34 -34 H150 V-4 Q150 2 142 2 H42 Q34 2 34 -4 Z" fill="url(#gItem)"/><rect x="44" y="-44" width="42" height="20" rx="9" fill="#fff"/><rect x="44" y="-44" width="42" height="20" rx="9" fill="url(#gItem)"/>`);}
    case "table":{return G(x,`<rect x="10" y="-26" width="8" height="26" rx="3" fill="${d}"/><rect x="82" y="-26" width="8" height="26" rx="3" fill="${d}"/><rect x="4" y="-38" width="92" height="13" rx="5" fill="${b}"/>${OV('M4 -38 h92 v13 h-92 Z')}<rect x="4" y="-38" width="92" height="4" rx="2" fill="${l}"/>`);}
    case "stool":{return G(x,`<rect x="9" y="-30" width="6" height="30" rx="3" fill="${d}"/><rect x="35" y="-30" width="6" height="30" rx="3" fill="${d}"/><ellipse cx="25" cy="-32" rx="22" ry="8" fill="${b}"/><ellipse cx="25" cy="-34" rx="22" ry="7" fill="${l}"/>`);}
    case "plant":{return G(x,`<path d="M14 -28 h22 l-4 28 h-14 Z" fill="${b}"/>${OV('M14 -28 h22 l-4 28 h-14 Z')}<path d="M25 -26 Q8 -60 16 -82 Q26 -58 25 -26" fill="#6AAE5A"/><path d="M25 -26 Q44 -64 36 -86 Q28 -58 25 -26" fill="#7DBF6C"/><path d="M25 -26 Q26 -74 25 -88 Q20 -60 25 -26" fill="#5C9E4F"/>`);}
    case "lamp":{return G(x,`<ellipse cx="25" cy="-2" rx="16" ry="5" fill="${d}"/><rect x="23" y="-78" width="4" height="76" fill="${shade(k,-0.1)}"/><path d="M8 -104 L42 -104 L34 -76 L16 -76 Z" fill="${b}"/><path d="M8 -104 L42 -104 L34 -76 L16 -76 Z" fill="url(#gItem)"/><ellipse cx="25" cy="-78" rx="9" ry="3" fill="#FFE9A8" opacity="0.8"/>`);}
    case "shelf":{return G(x,`<rect x="6" y="-92" width="88" height="92" rx="5" fill="${b}"/>${OV('M6 -92 h88 v92 h-88 Z')}<rect x="12" y="-86" width="76" height="24" fill="${d}" opacity="0.55"/><rect x="12" y="-56" width="76" height="24" fill="${d}" opacity="0.55"/><rect x="16" y="-84" width="8" height="20" fill="#FF7A66"/><rect x="26" y="-82" width="8" height="18" fill="#4FC2B8"/><rect x="36" y="-86" width="8" height="22" fill="#FFC94D"/><rect x="46" y="-83" width="8" height="19" fill="#B79CED"/><rect x="18" y="-54" width="8" height="18" fill="#8BC34A"/><rect x="28" y="-52" width="8" height="16" fill="#FF9F68"/><rect x="64" y="-52" width="16" height="16" rx="8" fill="#7EC8E3"/>`);}
    case "dresser":{return G(x,`<rect x="6" y="-58" width="88" height="58" rx="6" fill="${b}"/>${OV('M6 -58 h88 v58 h-88 Z')}<rect x="14" y="-50" width="72" height="17" rx="3" fill="${d}" opacity="0.5"/><rect x="14" y="-28" width="72" height="17" rx="3" fill="${d}" opacity="0.5"/><circle cx="50" cy="-41" r="2.6" fill="${k}"/><circle cx="50" cy="-19" r="2.6" fill="${k}"/>`);}
    case "rug":{return G(x,`<ellipse cx="75" cy="-2" rx="74" ry="11" fill="${shade(b,-0.05)}"/><ellipse cx="75" cy="-3" rx="74" ry="11" fill="${b}"/><ellipse cx="75" cy="-3" rx="58" ry="7.5" fill="none" stroke="${k}" stroke-width="2.4" opacity="0.45"/>`);}
    case "tv":{return G(x,`<rect x="40" y="-12" width="20" height="12" fill="${d}"/><rect x="8" y="-50" width="84" height="40" rx="5" fill="#2B2733"/><rect x="13" y="-45" width="74" height="30" rx="3" fill="${l}" opacity="0.9"/><rect x="13" y="-45" width="74" height="30" rx="3" fill="url(#gItem)"/>`);}
    case "counter":{return G(x,`<rect x="6" y="-56" width="88" height="56" rx="4" fill="${b}"/>${OV('M6 -56 h88 v56 h-88 Z')}<rect x="4" y="-66" width="92" height="12" rx="4" fill="${d}"/><line x1="50" y1="-54" x2="50" y2="-2" stroke="${shade(b,-0.18)}" stroke-width="2" opacity="0.5"/><circle cx="50" cy="-30" r="3" fill="${k}"/>`);}
    default: return "";
  }
}
function wallItem2(it){
  const x=it.col*COLW, y=(it.row||1)*38;
  const b=resolve(it.base), d=shade(b,-0.2), k=resolve(it.ink);
  switch(it.type){
    case "window":return `<g transform="translate(${x},${y})"><rect x="4" y="4" width="92" height="66" rx="4" fill="#CBEAF2"/><rect x="4" y="4" width="92" height="34" rx="4" fill="#BFE0EE"/><rect x="4" y="4" width="92" height="66" rx="4" fill="none" stroke="${b}" stroke-width="7"/><line x1="50" y1="4" x2="50" y2="70" stroke="${b}" stroke-width="6"/><line x1="4" y1="37" x2="96" y2="37" stroke="${b}" stroke-width="6"/></g>`;
    case "painting":return `<g transform="translate(${x},${y})"><rect x="8" y="6" width="36" height="46" rx="2" fill="${b}"/><rect x="12" y="10" width="28" height="38" fill="#fff"/><path d="M14 44 L23 28 L29 36 L36 24 L38 48 L14 48 Z" fill="${k}" opacity="0.5"/></g>`;
    case "clock":return `<g transform="translate(${x},${y})"><circle cx="25" cy="28" r="19" fill="#fff" stroke="${b}" stroke-width="5"/><line x1="25" y1="28" x2="25" y2="15" stroke="${k}" stroke-width="2.6"/><line x1="25" y1="28" x2="34" y2="31" stroke="${k}" stroke-width="2.6"/></g>`;
    case "wshelf":return `<g transform="translate(${x},${y})"><rect x="6" y="36" width="92" height="9" rx="3" fill="${b}"/><rect x="6" y="42" width="92" height="3" fill="${d}"/><rect x="16" y="14" width="9" height="22" fill="#FF7A66"/><rect x="28" y="18" width="9" height="18" fill="#4FC2B8"/><rect x="40" y="12" width="9" height="24" fill="#FFC94D"/><circle cx="66" cy="29" r="7" fill="#8BC34A"/></g>`;
    case "wlight":return `<g transform="translate(${x},${y})"><rect x="22" y="4" width="6" height="14" fill="${shade(b,-0.2)}"/><path d="M8 18 h34 l-7 16 h-20 z" fill="${b}"/><ellipse cx="25" cy="40" rx="14" ry="6" fill="#FFE9A8" opacity="0.7"/></g>`;
    case "banner":return `<g transform="translate(${x},${y})"><path d="M6 10 h88 v22 l-44 8 l-44 -8 Z" fill="${b}"/><circle cx="26" cy="22" r="6" fill="#fff" opacity="0.85"/><circle cx="50" cy="22" r="6" fill="#fff" opacity="0.85"/><circle cx="74" cy="22" r="6" fill="#fff" opacity="0.85"/></g>`;
    default: return "";
  }
}

/* ---- room (zoomed) ---- */
function selBox(it){
  if(it.wall){const y=(it.row||1)*38;return {x:it.col*COLW+2,y:y+2,w:itemW(it.type)-4,h:itemH(it.type)>0?itemH(it.type):72};}
  return {x:it.col*COLW+2,y:FLOORY-itemH(it.type)-4,w:itemW(it.type)-4,h:itemH(it.type)+8};
}
function buildRoom(room, occ, selUid){
  const defs=[]; let s="";
  const wallP=rpattern(room.wall.pattern,resolve(room.wall.base),resolve(room.wall.ink));
  const floorP=rpattern(room.floor.pattern,resolve(room.floor.base),resolve(room.floor.ink));
  if(wallP){defs.push(wallP.def);} if(floorP){defs.push(floorP.def);}
  const wallFill=wallP?`url(#${wallP.id})`:resolve(room.wall.base);
  const floorFill=floorP?`url(#${floorP.id})`:resolve(room.floor.base);
  s+=`<rect x="0" y="0" width="${RW}" height="${FLOORY}" fill="${wallFill}"/>`;
  s+=`<rect x="0" y="0" width="${RW}" height="${FLOORY}" fill="url(#rWall)"/>`;
  s+=`<rect x="0" y="${FLOORY}" width="${RW}" height="${RH-FLOORY}" fill="${floorFill}"/>`;
  s+=`<rect x="0" y="${FLOORY}" width="${RW}" height="${RH-FLOORY}" fill="url(#rFloor)"/>`;
  s+=`<rect x="0" y="${FLOORY-10}" width="${RW}" height="10" fill="#000" opacity="0.06"/>`;
  s+=`<rect x="0" y="${FLOORY}" width="${RW}" height="6" fill="${shade(resolve(room.floor.base),-0.2)}" opacity="0.5"/>`;
  const items=(room.items||[]).slice().sort((a,b)=>(a.z||0)-(b.z||0));
  for(const it of items){
    s+=`<g data-uid="${it.uid}">`;
    if(it.wall){ s+=wallItem2(it); }
    else {
      const x=it.col*COLW, w=itemW(it.type);
      if(it.type!=="rug") s+=`<ellipse cx="${x+w/2}" cy="${FLOORY+2}" rx="${w*0.42}" ry="6" fill="#000" opacity="0.10"/>`;
      s+=`<g transform="translate(0,${FLOORY})">${furniture2(it)}</g>`;
    }
    if(selUid&&selUid===it.uid){const b=selBox(it);s+=`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="6" fill="none" stroke="#4FC2B8" stroke-width="3" stroke-dasharray="7 5"/>`;}
    s+=`</g>`;
  }
  if(occ){ for(const o of occ){ s+=`<g data-occ="${o.id}">`+o.svg(o.col*COLW)+(selUid===("occ:"+o.id)?`<rect x="${o.col*COLW+COLW/2-26}" y="120" width="52" height="170" rx="8" fill="none" stroke="#4FC2B8" stroke-width="3" stroke-dasharray="7 5"/>`:"")+`</g>`; } }
  s+=`<rect x="0" y="0" width="${RW}" height="${RH}" fill="url(#rVign)"/>`;
  return {inner:RDEFS+`<defs>${defs.join("")}</defs>`+s};
}

/* ---- dollhouse cutaway ---- */
const CW=176, CH=132, FRAME=14, ROOF=64, GCOLS=3, GROWS=2;
function buildCutaway(house){
  const innerW=GCOLS*CW, innerH=GROWS*CH;
  const W=innerW+FRAME*2, H=innerH+FRAME*2+ROOF;
  let defs=`<defs><clipPath id="rcell"><rect x="0" y="0" width="${CW}" height="${CH}"/></clipPath><linearGradient id="roofG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E8896B"/><stop offset="100%" stop-color="#D26A4E"/></linearGradient><linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F2E7DC"/><stop offset="100%" stop-color="#E5D5C5"/></linearGradient></defs>`;
  let s=`<ellipse cx="${W/2}" cy="${H-6}" rx="${W*0.46}" ry="12" fill="#000" opacity="0.08"/>`;
  // roof
  s+=`<path d="M${FRAME-10} ${ROOF} L${W/2} 6 L${W-FRAME+10} ${ROOF} Z" fill="url(#roofG)"/>`;
  s+=`<path d="M${FRAME-10} ${ROOF} L${W/2} 6 L${W-FRAME+10} ${ROOF} Z" fill="#fff" opacity="0.06"/>`;
  // body frame
  s+=`<rect x="0" y="${ROOF-2}" width="${W}" height="${innerH+FRAME*2+2}" rx="10" fill="url(#wallG)"/>`;
  // cells
  for(let gy=0;gy<GROWS;gy++)for(let gx=0;gx<GCOLS;gx++){
    const cx=FRAME+gx*CW, cy=ROOF+FRAME+gy*CH;
    const room=(house.rooms||[]).find(r=>r.gx===gx&&r.gy===gy);
    s+=`<g transform="translate(${cx},${cy})" data-gx="${gx}" data-gy="${gy}">`;
    if(room){
      const {inner}=buildRoom(room,null);
      const sc=Math.min(CW/RW,CH/RH);
      const ox=(CW-RW*sc)/2, oy=(CH-RH*sc)/2;
      s+=`<g clip-path="url(#rcell)"><rect width="${CW}" height="${CH}" fill="${resolve(room.wall.base)}"/><g transform="translate(${ox},${oy}) scale(${sc})">${inner}</g></g>`;
      s+=`<rect x="0" y="0" width="${CW}" height="${CH}" fill="none" stroke="#C9B6A2" stroke-width="2"/>`;
      if(room.name) s+=`<rect x="6" y="6" width="${Math.max(38,room.name.length*7+14)}" height="18" rx="9" fill="#fff" opacity="0.82"/><text x="14" y="19" font-family="sans-serif" font-size="11" font-weight="700" fill="#3A3340">${room.name}</text>`;
    } else {
      s+=`<rect x="3" y="3" width="${CW-6}" height="${CH-6}" rx="8" fill="#F8EFE6" stroke="#D8C6B4" stroke-width="2" stroke-dasharray="6 6"/><circle cx="${CW/2}" cy="${CH/2}" r="17" fill="#fff" opacity="0.7"/><path d="M${CW/2-8} ${CH/2} h16 M${CW/2} ${CH/2-8} v16" stroke="#B79CED" stroke-width="3" stroke-linecap="round"/>`;
    }
    s+=`<rect x="0" y="0" width="${CW}" height="${CH}" fill="transparent"/></g>`;
  }
  // grid dividers
  s+=`<rect x="0" y="${ROOF-2}" width="${W}" height="${innerH+FRAME*2+2}" rx="10" fill="none" stroke="#C9B6A2" stroke-width="${FRAME*2}"/>`;
  return {inner:defs+s, W, H};
}

/* ---- cutaway screen ---- */
function renderHouse(){
  const {inner,W,H}=buildCutaway(state.house);
  const svg=$("#houseSvg"); svg.setAttribute("viewBox","0 0 "+W+" "+H); svg.innerHTML=inner;
  svg.querySelectorAll("g[data-gx]").forEach(g=>{
    g.style.cursor="pointer";
    g.addEventListener("click",()=>{
      const gx=+g.dataset.gx, gy=+g.dataset.gy;
      const room=state.house.rooms.find(r=>r.gx===gx&&r.gy===gy);
      if(room) openRoom(room.id); else addRoomAt(gx,gy);
    });
  });
  const n=state.house.rooms.length;
  $("#houseHint").textContent = n? "Tap a room to design it, or a + to add one." : "Tap a + to build your first room.";
}
function addRoomAt(gx,gy){
  pendingSlot={gx,gy};
  openKindSheet("What kind of room?", ROOM_TYPES.map(t=>({
    label:t.name,
    ic:`<svg viewBox="0 0 60 45" width="42" height="42"><rect width="60" height="45" rx="6" fill="${resolve(t.wall.base)}"/><rect y="32" width="60" height="13" fill="${resolve(t.floor.base)}"/></svg>`,
    act:()=>{ const r=newRoom(t.id,pendingSlot.gx,pendingSlot.gy); state.house.rooms.push(r); closeSheet(); openRoom(r.id); }
  })));
}
function openRoom(id){ currentRoomId=id; selUid=null; roomSub="walls"; go("room"); }

/* ---- room design screen ---- */
function occupantsRender(room){
  const out=[];
  (room.occupants||[]).forEach(o=>{
    if(o.kind==="person"){ const m=state.members.find(x=>x.id===o.id); if(!m)return; const sc=0.31;
      out.push({id:o.id,col:o.col,svg:(x)=>`<g transform="translate(${(x+25)-120*sc},${290-452*sc}) scale(${sc})"><g class="breathe">${buildDoll(m).inner}</g></g>`}); }
    else { const p=state.pets.find(x=>x.id===o.id); if(!p)return; const sc=0.42;
      out.push({id:o.id,col:o.col,svg:(x)=>`<g transform="translate(${(x+25)-100*sc},${292-168*sc}) scale(${sc})"><g class="breathe">${buildPet(p).inner}</g></g>`}); }
  });
  return out;
}
function renderRoom(){
  const room=curRoom(); if(!room){ go("house"); return; }
  const svg=$("#roomSvg");
  svg.innerHTML=buildRoom(room,occupantsRender(room),selUid).inner;
  bindRoomDrag();
  renderRoomControls();
  updateRSel();
}
function selItem(){ return selUid&&selUid.indexOf("occ:")!==0 ? curRoom().items.find(i=>i.uid===selUid) : null; }
function renderRoomControls(){
  const box=$("#roomControls"); box.innerHTML="";
  const it=selItem();
  if(it){
    box.appendChild(swatchRow("Color",PALETTE,idxOf(it.base),v=>{it.base=v;renderRoom();}));
    box.appendChild(swatchRow("Accent",PALETTE,idxOf(it.ink),v=>{it.ink=v;renderRoom();}));
    return;
  }
  if(selUid&&selUid.indexOf("occ:")===0) return; // occupant selected: just the bar
  if(roomSub==="walls"){
    const r=curRoom();
    const head=document.createElement("div");
    head.innerHTML=`<div class="eyebrow">Room</div><div class="rrow"><input id="roomName" class="rname" value="${esc(r.name||"")}" maxlength="20" placeholder="Room name"><button class="rdel" id="delRoom">Delete</button></div>`;
    head.querySelector("#roomName").addEventListener("input",e=>{r.name=e.target.value;});
    head.querySelector("#delRoom").addEventListener("click",()=>{ state.house.rooms=state.house.rooms.filter(x=>x.id!==r.id); go("house"); });
    box.appendChild(head);
    box.appendChild(styleRow("Wall pattern",PATTERNS,r.wall.pattern,v=>{r.wall.pattern=v;renderRoom();},cap));
    box.appendChild(swatchRow("Wall color",PALETTE,idxOf(r.wall.base),v=>{r.wall.base=v;renderRoom();}));
    box.appendChild(swatchRow("Wall accent",PALETTE,idxOf(r.wall.ink),v=>{r.wall.ink=v;renderRoom();}));
    box.appendChild(styleRow("Floor pattern",PATTERNS,r.floor.pattern,v=>{r.floor.pattern=v;renderRoom();},cap));
    box.appendChild(swatchRow("Floor color",PALETTE,idxOf(r.floor.base),v=>{r.floor.base=v;renderRoom();}));
    box.appendChild(swatchRow("Floor accent",PALETTE,idxOf(r.floor.ink),v=>{r.floor.ink=v;renderRoom();}));
  } else if(roomSub==="furniture"){ box.appendChild(catGridH(FURN,false)); }
  else if(roomSub==="wall"){ box.appendChild(catGridH(WALL,true)); }
  else { box.appendChild(peopleChips()); }
}
function catGridH(list,wall){
  const wrap=document.createElement("div"); const g=document.createElement("div"); g.className="cat-grid";
  list.forEach(item=>{
    const el=document.createElement("button"); el.className="cat-item";
    let icon;
    if(wall){ icon=`<svg viewBox="0 0 100 72">${wallItem2({type:item.id,col:0,base:17,ink:18,row:0})}</svg>`; }
    else { icon=`<svg viewBox="0 0 158 112"><g transform="translate(0,106)">${furniture2({type:item.id,col:0,base:20,ink:18})}</g></svg>`; }
    el.innerHTML=icon+`<span>${item.name}</span>`;
    el.onclick=()=>addRoomItem(item.id,wall);
    g.appendChild(el);
  });
  wrap.appendChild(g); return wrap;
}
function addRoomItem(type,wall){
  const r=curRoom(); const uid="it"+Date.now()+Math.floor(Math.random()*999);
  const w=Math.round(itemW(type)/COLW), maxCol=COLS-w;
  r.items.push({uid,type,col:Math.min(2,Math.max(0,maxCol)),base:wall?17:20,ink:18,pattern:"solid",z:nextRZ++,wall:!!wall,row:wall?1:0});
  selUid=uid; renderRoom(); toast(type+" added");
}
function peopleChips(){
  const wrap=document.createElement("div"); wrap.className="chips";
  const r=curRoom();
  const mk=(label,inRoom,onTap)=>{ const c=document.createElement("button"); c.className="chip"+(inRoom?" in":""); c.innerHTML=(inRoom?"✓ ":"+ ")+esc(label); c.onclick=onTap; return c; };
  state.members.forEach(m=>{ const inR=(r.occupants||[]).some(o=>o.kind==="person"&&o.id===m.id);
    wrap.appendChild(mk(m.name||"Person",inR,()=>{ toggleOcc("person",m.id); })); });
  state.pets.forEach(p=>{ const inR=(r.occupants||[]).some(o=>o.kind==="pet"&&o.id===p.id);
    wrap.appendChild(mk(p.name||nm(p.kind),inR,()=>{ toggleOcc("pet",p.id); })); });
  if(!state.members.length&&!state.pets.length){ const e=document.createElement("p"); e.className="hint"; e.textContent="Make a household in Family, then place them here."; wrap.appendChild(e); }
  return wrap;
}
function toggleOcc(kind,id){
  const r=curRoom(); r.occupants=r.occupants||[];
  const i=r.occupants.findIndex(o=>o.kind===kind&&o.id===id);
  if(i>=0){ r.occupants.splice(i,1); if(selUid==="occ:"+id) selUid=null; }
  else { r.occupants.push({kind,id,col:Math.floor(Math.random()*6)+1}); selUid="occ:"+id; }
  renderRoom();
}

/* ---- drag + selection ---- */
function bindRoomDrag(){
  const svg=$("#roomSvg");
  svg.querySelectorAll("g[data-uid]").forEach(g=>g.addEventListener("pointerdown",e=>startRDrag(e,"item",g.dataset.uid)));
  svg.querySelectorAll("g[data-occ]").forEach(g=>g.addEventListener("pointerdown",e=>startRDrag(e,"occ",g.dataset.occ)));
}
function rPoint(e){ const svg=$("#roomSvg"); const p=svg.createSVGPoint(); p.x=e.clientX; p.y=e.clientY; return p.matrixTransform(svg.getScreenCTM().inverse()); }
let rdrag=null;
function startRDrag(e,kind,key){
  e.stopPropagation();
  selUid = kind==="occ" ? ("occ:"+key) : key;
  const r=curRoom();
  const ent = kind==="occ" ? (r.occupants||[]).find(o=>o.id===key) : r.items.find(i=>i.uid===key);
  if(!ent){ return; }
  const p=rPoint(e);
  rdrag={kind,key,sx:p.x,sy:p.y,col0:ent.col,row0:ent.row||1};
  try{ $("#roomSvg").setPointerCapture(e.pointerId); }catch(_){}
  renderRoom(); updateRSel();
  const mv=ev=>onRDrag(ev), up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); rdrag=null; };
  window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
}
function onRDrag(e){
  if(!rdrag) return; const r=curRoom();
  const ent = rdrag.kind==="occ" ? (r.occupants||[]).find(o=>o.id===rdrag.key) : r.items.find(i=>i.uid===rdrag.key);
  if(!ent) return;
  const p=rPoint(e), dx=p.x-rdrag.sx;
  const w = rdrag.kind==="occ" ? 1 : Math.round(itemW(ent.type)/COLW);
  ent.col=Math.max(0,Math.min(COLS-w, Math.round(rdrag.col0+dx/COLW)));
  if(rdrag.kind==="item"&&ent.wall){ const dy=p.y-rdrag.sy; ent.row=Math.max(0,Math.min(4,Math.round(rdrag.row0+dy/38))); }
  renderRoom();
}
function updateRSel(){
  const bar=$("#rselBar");
  if(!selUid){ bar.classList.remove("show"); return; }
  const occ = selUid.indexOf("occ:")===0;
  $("#rFwd").style.display = occ ? "none":"";
  $("#rName").textContent = occ ? "in room" : (selItem()?selItem().type:"piece");
  bar.classList.add("show");
}
function rNudge(dir){
  const r=curRoom(); if(!selUid) return;
  const occ=selUid.indexOf("occ:")===0;
  const ent= occ ? (r.occupants||[]).find(o=>("occ:"+o.id)===selUid) : r.items.find(i=>i.uid===selUid);
  if(!ent) return;
  const w= occ?1:Math.round(itemW(ent.type)/COLW);
  if(dir==="up"){ if(!occ&&ent.wall) ent.row=Math.max(0,(ent.row||1)-1); }
  else if(dir==="down"){ if(!occ&&ent.wall) ent.row=Math.min(4,(ent.row||1)+1); }
  else ent.col=Math.max(0,Math.min(COLS-w, ent.col+parseInt(dir)));
  renderRoom();
}
function rForward(){ const it=selItem(); if(it){ it.z=nextRZ++; renderRoom(); } }
function rDelete(){
  const r=curRoom(); if(!selUid) return;
  if(selUid.indexOf("occ:")===0){ const id=selUid.slice(4); r.occupants=(r.occupants||[]).filter(o=>o.id!==id); }
  else { r.items=r.items.filter(i=>i.uid!==selUid); }
  selUid=null; renderRoom(); updateRSel();
}
function initHouse(){
  $("#roomBack").addEventListener("click",()=>{ selUid=null; go("house"); });
  $$("#roomSubtabs .subtab").forEach(t=>t.addEventListener("click",()=>{
    $$("#roomSubtabs .subtab").forEach(x=>x.classList.remove("on")); t.classList.add("on");
    roomSub=t.dataset.rt; selUid=null; renderRoom();
  }));
  $$("#rselBar .nudge[data-n]").forEach(b=>b.addEventListener("click",()=>rNudge(b.dataset.n)));
  $("#rFwd").addEventListener("click",rForward);
  $("#rDel").addEventListener("click",rDelete);
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
