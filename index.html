<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>The Game Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:system-ui,sans-serif;color:#f0e6d6;overflow-x:hidden;
    background:
      radial-gradient(120% 90% at 50% 0%,rgba(255,214,150,.10),rgba(0,0,0,0) 55%),
      linear-gradient(180deg,#332214 0%,#2a1c12 40%,#211509 100%);}
  header{text-align:center;padding:26px 16px 10px;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:clamp(26px,7vw,40px);letter-spacing:.5px;
    color:#f6e7c8;text-shadow:0 3px 14px rgba(0,0,0,.6);}
  .sub{margin-top:6px;color:#c9ab85;font-size:14px;}
  .tally{margin-top:10px;display:inline-flex;align-items:center;gap:10px;font-size:13px;color:#e8d4b4;
    background:rgba(0,0,0,.25);border:1px solid rgba(255,220,170,.15);border-radius:999px;padding:6px 14px;}
  .tally b{font-size:16px;} .tally .m{color:#ff8d86;} .tally .k{color:#8fb8ff;}
  #shelves{max-width:760px;margin:8px auto 60px;padding:0 14px;}
  .row{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:0 10px 0;align-items:end;}
  @media(min-width:560px){.row{grid-template-columns:repeat(3,1fr);}}
  .plank{height:16px;margin:0 2px 30px;border-radius:3px;position:relative;
    background:linear-gradient(180deg,#9a6b3c,#6e4421 55%,#4c2c13);
    box-shadow:0 10px 18px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,230,190,.35);}
  .plank::before,.plank::after{content:"";position:absolute;top:14px;width:10px;height:14px;background:linear-gradient(180deg,#3c2410,#2a1709);border-radius:0 0 3px 3px;}
  .plank::before{left:8%;} .plank::after{right:8%;}
  .box{position:relative;display:block;border:none;background:none;color:inherit;font-family:inherit;cursor:pointer;
    aspect-ratio:3/3.6;perspective:600px;text-align:left;padding:0;transform:translateY(4px);}
  .face{position:absolute;inset:0;border-radius:6px 10px 10px 6px;overflow:hidden;
    transform:rotateY(-7deg);transform-origin:left center;transform-style:preserve-3d;
    box-shadow:6px 8px 16px rgba(0,0,0,.55),14px 18px 30px rgba(0,0,0,.35);
    transition:transform .18s ease,box-shadow .18s ease;}
  .box:active .face{transform:rotateY(-3deg) translateY(-8px);box-shadow:8px 16px 26px rgba(0,0,0,.6),18px 26px 40px rgba(0,0,0,.4);}
  .edge{position:absolute;top:0;bottom:0;right:0;width:9%;border-radius:0 10px 10px 0;
    background:linear-gradient(90deg,rgba(0,0,0,.28),rgba(0,0,0,.55));mix-blend-mode:multiply;}
  .cover{position:absolute;inset:0;display:flex;flex-direction:column;}
  .cover .name{font-weight:800;letter-spacing:.5px;line-height:1.02;padding:10px 10px 4px;font-size:clamp(17px,4.6vw,24px);
    text-shadow:0 2px 4px rgba(0,0,0,.35);}
  .cover .tag{padding:0 10px;font-size:10.5px;opacity:.85;letter-spacing:.4px;text-transform:uppercase;}
  .art{flex:1;position:relative;}
  .art svg{position:absolute;inset:0;width:100%;height:100%;}
  .soon .face{filter:saturate(.35) brightness(.62);}
  .soon{cursor:default;}
  .soon:active .face{transform:rotateY(-7deg);box-shadow:6px 8px 16px rgba(0,0,0,.55),14px 18px 30px rgba(0,0,0,.35);}
  .sticker{position:absolute;top:8px;right:2px;z-index:3;background:#f4c542;color:#3a2a05;font-size:10px;font-weight:800;
    letter-spacing:.6px;padding:4px 9px;border-radius:3px;transform:rotate(8deg);box-shadow:0 2px 6px rgba(0,0,0,.5);}
  footer{text-align:center;color:#8d6f50;font-size:12px;padding:0 0 28px;}
  @media (prefers-reduced-motion:reduce){.face{transition:none;}}
</style>
</head>
<body>
<header>
  <h1>The Game Shelf</h1>
  <div class="sub">Pick a box. Loser racks up the next one.</div>
  <div style="margin-top:10px;"><button id="tvToggle" class="tally" style="cursor:pointer;border:1px solid rgba(255,220,170,.25);font-family:inherit;">📺 TV mode: <b id="tvState">Off</b></button></div>
  <div class="tally" id="tally" hidden><span class="m"><b id="motW">0</b> Mot</span><span>·</span><span class="k">Kathy <b id="kathyW">0</b></span><span style="opacity:.6">all games</span></div>
</header>

<div id="shelves"></div>
<footer>Built by Mot · one shelf, no batteries<br><button id="resetStats" style="margin-top:10px;background:none;border:none;color:#8d6f50;font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;">Reset all stats on this device</button>
<button id="syncBtn" style="margin-top:6px;background:none;border:none;color:#8d6f50;font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;"></button></footer>

<script src="gamenight.js"></script>
<script>
const GAMES=[
 {id:"sorry",name:"Sorry!",tag:"Slide. Bump. Sweet revenge.",href:"sorry.html",key:"sorry_games",
  bg:"linear-gradient(165deg,#e2423b,#9c1c16)",ink:"#fff",
  art:'<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"><g transform="rotate(-8 50 60)"><rect x="18" y="44" width="64" height="30" rx="7" fill="#fff"/><text x="50" y="65" font-size="15" font-weight="800" text-anchor="middle" fill="#c0271f" font-family="system-ui">SORRY!</text></g><circle cx="26" cy="26" r="8" fill="#ffd9d6"/><circle cx="26" cy="23" r="5" fill="#fff"/><circle cx="78" cy="30" r="8" fill="#7eb3ff"/><circle cx="78" cy="27" r="5" fill="#a9ccff"/></svg>'},
 {id:"checkers",name:"Checkers",tag:"Kings will be crowned.",href:"checkers.html",key:"checkers_games",
  bg:"linear-gradient(165deg,#2e2622,#17120e)",ink:"#f3e4c8",
  art:'<svg viewBox="0 0 100 100"><g transform="rotate(-6 50 55)"><rect x="20" y="30" width="60" height="60" fill="#d9c49a"/><g fill="#6b3b22">'+(()=>{let s="";for(let r=0;r<4;r++)for(let c=0;c<4;c++)if((r+c)%2)s+='<rect x="'+(20+c*15)+'" y="'+(30+r*15)+'" width="15" height="15"/>';return s;})()+'</g><circle cx="42.5" cy="52.5" r="6" fill="#d8312b"/><circle cx="57.5" cy="67.5" r="6" fill="#2f6fd0"/><path d="M52 38 l3 6 4-4 1 7 -11 0 1-7 4 4z" fill="#f4c542" transform="translate(-9.5,7)"/></g></svg>'},
 {id:"connect4",name:"Connect Four",tag:"Four in a row wins it.",href:"connect4.html",key:"c4_games",
  bg:"linear-gradient(165deg,#1d3a2a,#0d1f14)",ink:"#eaf6ee",
  art:'<svg viewBox="0 0 100 100"><rect x="16" y="26" width="68" height="58" rx="8" fill="#173f6e"/>'+(()=>{let s="";const cols=[["e","e","r"],["e","r","b"],["r","b","b"],["e","e","r"]];for(let c=0;c<4;c++)for(let r=0;r<3;r++){const v=cols[c][r];const col=v==="r"?"#d8312b":v==="b"?"#2f6fd0":"#0c1626";s+='<circle cx="'+(28+c*15)+'" cy="'+(40+r*15)+'" r="6" fill="'+col+'"/>';}return s;})()+'</svg>'},
 {id:"trouble",name:"Trouble",tag:"Pop it. Don't get popped.",href:"trouble.html",key:"trouble_games",
  bg:"linear-gradient(165deg,#f0f0ee,#c9c9c2)",ink:"#243042",
  art:'<svg viewBox="0 0 100 100"><circle cx="50" cy="58" r="26" fill="#dfe9f5" stroke="#9fb2c8" stroke-width="2"/><ellipse cx="42" cy="46" rx="10" ry="6" fill="#fff" opacity=".85"/><rect x="42" y="50" width="16" height="16" rx="3" fill="#fff" stroke="#aaa"/><circle cx="46" cy="54" r="1.8" fill="#243042"/><circle cx="54" cy="62" r="1.8" fill="#243042"/><circle cx="50" cy="58" r="1.8" fill="#243042"/></svg>'},
 {id:"battleship",name:"Battleship",tag:"You sank it.",href:"battleship.html",key:"bs_games",
  bg:"linear-gradient(165deg,#10314f,#071524)",ink:"#dceaf8",
  art:'<svg viewBox="0 0 100 100"><g stroke="#3d6f9e" stroke-width="1" opacity=".7">'+(()=>{let s="";for(let i=0;i<6;i++){s+='<line x1="'+(18+i*13)+'" y1="34" x2="'+(18+i*13)+'" y2="86"/><line x1="18" y1="'+(34+i*10)+'" x2="83" y2="'+(34+i*10)+'"/>';}return s;})()+'</g><path d="M30 66 h36 l8-8 h-14 v-6 h-12 v6 h-18z" fill="#9fb4c4"/><circle cx="66" cy="44" r="5" fill="#e23b30"/><circle cx="66" cy="44" r="9" fill="none" stroke="#e23b30" stroke-width="1.6"/></svg>'},
 {id:"backgammon",name:"Backgammon",tag:"The oldest race in the world.",href:"backgammon.html",key:"bg_games",
  bg:"linear-gradient(165deg,#5b3a1e,#33200f)",ink:"#f3e4c8",
  art:'<svg viewBox="0 0 100 100">'+(()=>{let s="";for(let i=0;i<5;i++){const x=18+i*13;const col=i%2?"#d9c49a":"#8c3b24";s+='<polygon points="'+x+',86 '+(x+13)+',86 '+(x+6.5)+',38" fill="'+col+'"/>';}return s;})()+'<circle cx="31" cy="78" r="5.5" fill="#f5efe2"/><circle cx="31" cy="67" r="5.5" fill="#f5efe2"/><circle cx="57" cy="78" r="5.5" fill="#2b2622"/></svg>'},
 {id:"mancala",name:"Mancala",tag:"Sow. Capture. Count.",href:"mancala.html",key:"mancala_games",
  bg:"linear-gradient(165deg,#7a5230,#46290f)",ink:"#f7ead2",
  art:'<svg viewBox="0 0 100 100">'+(()=>{let s="";for(let c=0;c<3;c++)for(let r=0;r<2;r++){s+='<ellipse cx="'+(30+c*20)+'" cy="'+(52+r*22)+'" rx="8.5" ry="7" fill="#2e1a08"/>';}return s;})()+'<circle cx="27" cy="50" r="2.6" fill="#c9e2f0"/><circle cx="33" cy="53" r="2.6" fill="#e9c8f0"/><circle cx="49" cy="73" r="2.6" fill="#c8f0d4"/><circle cx="52" cy="50" r="2.6" fill="#f0e3c8"/></svg>'},
 {id:"dominoes",name:"Dominoes",tag:"Bones on the table.",href:"dominoes.html",key:"dom_games",
  bg:"linear-gradient(165deg,#27583e,#123422)",ink:"#eef7ef",
  art:'<svg viewBox="0 0 100 100"><g transform="rotate(-10 50 60)"><rect x="26" y="40" width="22" height="44" rx="4" fill="#f7f3ea" stroke="#bbb"/><line x1="26" y1="62" x2="48" y2="62" stroke="#999"/><circle cx="37" cy="51" r="2.4" fill="#222"/><circle cx="31" cy="73" r="2.4" fill="#222"/><circle cx="37" cy="73" r="2.4" fill="#222"/><circle cx="43" cy="73" r="2.4" fill="#222"/></g><g transform="rotate(8 64 56)"><rect x="52" y="34" width="22" height="44" rx="4" fill="#f7f3ea" stroke="#bbb"/><line x1="52" y1="56" x2="74" y2="56" stroke="#999"/><circle cx="58" cy="44" r="2.4" fill="#222"/><circle cx="68" cy="48" r="2.4" fill="#222"/><circle cx="63" cy="67" r="2.4" fill="#222"/></g></svg>'},
 {id:"yahtzee",name:"Yahtzee",tag:"Shake. Score. Shout it.",href:"yahtzee.html",key:"yahtzee_games",
  bg:"linear-gradient(165deg,#b3211b,#6e0f0b)",ink:"#fff",
  art:'<svg viewBox="0 0 100 100"><g transform="rotate(-12 40 62)"><rect x="26" y="48" width="26" height="26" rx="6" fill="#fff"/><circle cx="33" cy="55" r="2.6" fill="#b3211b"/><circle cx="45" cy="55" r="2.6" fill="#b3211b"/><circle cx="39" cy="61" r="2.6" fill="#b3211b"/><circle cx="33" cy="67" r="2.6" fill="#b3211b"/><circle cx="45" cy="67" r="2.6" fill="#b3211b"/></g><g transform="rotate(10 66 52)"><rect x="54" y="40" width="26" height="26" rx="6" fill="#fff"/><circle cx="61" cy="47" r="2.6" fill="#b3211b"/><circle cx="73" cy="59" r="2.6" fill="#b3211b"/></g></svg>'},
 {id:"chinese",name:"Chinese Checkers",tag:"Hop the whole star.",href:"chinese.html",key:"cc_games",
  bg:"linear-gradient(165deg,#274055,#101e2a)",ink:"#e8f1f8",
  art:'<svg viewBox="0 0 100 100"><polygon points="50,28 62,48 84,48 67,62 73,84 50,71 27,84 33,62 16,48 38,48" fill="#0c1a26"/>'+(()=>{const cols=["#d8312b","#2f6fd0","#f4c542","#46b06a","#b06ad0","#e88030"];let s="";const pts=[[50,34],[60,50],[40,50],[50,62],[64,68],[36,68]];pts.forEach((p,i)=>{s+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="5" fill="'+cols[i]+'"/><circle cx="'+(p[0]-1.6)+'" cy="'+(p[1]-1.8)+'" r="1.6" fill="rgba(255,255,255,.8)"/>';});return s;})()+'</svg>'}
];
const shelves=document.getElementById("shelves");
const perRow=()=>window.innerWidth>=560?3:2;
function build(){shelves.innerHTML="";const n=perRow();
  for(let i=0;i<GAMES.length;i+=n){const row=document.createElement("div");row.className="row";
    GAMES.slice(i,i+n).forEach(g=>{const b=document.createElement(g.soon?"div":"a");
      b.className="box"+(g.soon?" soon":"");if(!g.soon)b.href=g.href;
      b.innerHTML=(g.soon?'<span class="sticker">SOON</span>':"")+
        '<div class="face" style="background:'+g.bg+'"><div class="cover" style="color:'+g.ink+'">'+
        '<div class="name">'+g.name+'</div><div class="tag">'+g.tag+'</div><div class="art">'+g.art+'</div></div>'+
        '<div class="edge"></div></div>';
      row.appendChild(b);});
    shelves.appendChild(row);
    const plank=document.createElement("div");plank.className="plank";shelves.appendChild(plank);}}
let lastN=perRow();build();
window.addEventListener("resize",()=>{const n=perRow();if(n!==lastN){lastN=n;build();}});
// Reset stats: wipes every game ledger + the global ledger on THIS device.
// Keeps players, TV mode, themes, rule choices, and saved games.
(function(){const b=document.getElementById("syncBtn");
  function label(){b.textContent=GN.sync.status()==="on"?"Household sync: ON \u2713 (tap to turn off)":"Sync this device to the household";}
  label();
  b.addEventListener("click",function(){
    if(GN.sync.status()==="on"){if(confirm("Turn off household sync on this device? Stats stay saved locally."))GN.sync.disable();label();return;}
    const code=prompt("Household passcode (same on every family device):");
    if(code&&GN.sync.enable(code)){alert("Synced! Stats now flow to the household record.");location.reload();}});})();
document.getElementById("resetStats").addEventListener("click",function(){
  if(!confirm("Erase ALL game records and global stats on this device? Players and settings are kept. This cannot be undone."))return;
  try{
    for(const g of GAMES)localStorage.removeItem(g.key);
    localStorage.removeItem("sorry_skunks");
    localStorage.removeItem("gn_global");
  }catch(e){}
  try{if(GN.sync.status()==="on")GN.sync.resetCloud();}catch(e){}
  setTimeout(()=>location.reload(),400);});
// TV mode: fixed board orientation for shared screens (Fire Stick etc.)
(function(){const btn=document.getElementById("tvToggle"),st=document.getElementById("tvState");
  function refresh(){let on=false;try{on=localStorage.getItem("shelf_tv")==="1";}catch(e){}
    st.textContent=on?"On":"Off";btn.style.background=on?"rgba(176,210,53,.18)":"rgba(0,0,0,.25)";}
  btn.addEventListener("click",()=>{try{const on=localStorage.getItem("shelf_tv")==="1";
    if(on)localStorage.removeItem("shelf_tv");else localStorage.setItem("shelf_tv","1");}catch(e){}refresh();});
  refresh();})();
// all-games tally: global ledger first (any players), legacy per-game scan as fallback
(function(){const t=document.getElementById("tally");
  try{const g=JSON.parse(localStorage.getItem("gn_global"));
    if(g&&g.wins&&Object.keys(g.wins).length){
      const top=Object.entries(g.wins).sort((a,b)=>b[1]-a[1]).slice(0,3);
      t.innerHTML=top.map(([n,w],i)=>'<span style="color:'+(i===0?"#ff8d86":i===1?"#8fb8ff":"#9be3ae")+'"><b>'+w+'</b> '+n+'</span>').join('<span>\u00b7</span>')+'<span style="opacity:.6">all games</span>';
      t.hidden=false;return;}}catch(e){}
  let m=0,k=0,any=false;
  for(const g of GAMES){try{const list=JSON.parse(localStorage.getItem(g.key))||[];
    for(const rec of list){if(rec.winner==="Mot")m++;else if(rec.winner==="Kathy")k++;any=true;}}catch(e){}}
  if(any){document.getElementById("motW").textContent=m;document.getElementById("kathyW").textContent=k;t.hidden=false;}})();
</script>
</body>
</html>
