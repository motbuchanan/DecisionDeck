<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Decision Deck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --card-border: #2a2d3a;
    --accent: #4ecdc4;
    --accent-dim: #2a7a74;
    --warn: #ff6b6b;
    --gold: #f7d354;
    --text: #e8e6e3;
    --text-dim: #8a8895;
    --positive: #4ecdc4;
    --negative: #ff6b6b;
    --neutral: #f7d354;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .header { text-align: center; padding: 20px 0 10px; }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header .subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .progress-wrap { margin: 16px 0; display: flex; align-items: center; gap: 10px; }
  .progress-track {
    flex: 1; height: 4px; background: var(--card-border);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.5s ease; border-radius: 2px;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim);
    min-width: 45px; text-align: right;
  }
  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 10px 14px;
    background: var(--card-bg); border-radius: 10px;
    border: 1px solid var(--card-border);
  }
  .score-item { text-align: center; }
  .score-item .label {
    font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 2px;
  }
  .score-item .value { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; }
  .score-item .value.trust { color: var(--accent); }
  .score-item .value.momentum { color: var(--gold); }
  .score-item .value.clarity { color: #a78bfa; }
  .card-container { flex: 1; display: flex; flex-direction: column; }
  .card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 24px 20px;
    flex: 1; display: flex; flex-direction: column;
    animation: cardIn 0.4s ease; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-dim));
  }
  .card.checkin::before { background: linear-gradient(90deg, #a78bfa, #6d5acd); }
  .card.offwork::before { background: linear-gradient(90deg, var(--gold), #c4a530); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-category {
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent); margin-bottom: 8px;
  }
  .card.checkin .card-category { color: #a78bfa; }
  .card.offwork .card-category { color: var(--gold); }
  .card-context {
    font-size: 0.78rem; color: var(--text-dim); margin-bottom: 14px;
    line-height: 1.4; font-style: italic;
    padding-bottom: 12px; border-bottom: 1px solid var(--card-border);
  }
  .card-question {
    font-size: 1.05rem; line-height: 1.55;
    font-weight: 500; margin-bottom: 24px; flex: 1;
  }
  .card-ref {
    font-size: 0.72rem; color: var(--gold); margin-bottom: 12px;
    padding: 8px 10px; background: rgba(247, 211, 84, 0.08);
    border-radius: 8px; border-left: 3px solid var(--gold);
  }
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
  .choice-btn {
    background: transparent; border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    text-align: left; cursor: pointer; transition: all 0.2s ease; line-height: 1.4;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn:hover { border-color: var(--accent); background: rgba(78, 205, 196, 0.06); }
  .choice-btn.selected { border-color: var(--accent); background: rgba(78, 205, 196, 0.1); }
  .choice-btn:disabled { cursor: default; opacity: 0.5; }
  .result { animation: resultIn 0.3s ease; padding-top: 12px; }
  @keyframes resultIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-score { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .result-score .delta { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; }
  .result-score .delta.pos { color: var(--positive); }
  .result-score .delta.neg { color: var(--negative); }
  .result-score .delta.zero { color: var(--neutral); }
  .result-score .stat-name {
    font-size: 0.75rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .result-text { font-size: 0.88rem; line-height: 1.55; color: var(--text-dim); margin-bottom: 16px; }
  .next-btn {
    width: 100%; padding: 14px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s ease; letter-spacing: 0.5px;
  }
  .next-btn:active { transform: scale(0.97); }
  .start-screen {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    gap: 20px; animation: cardIn 0.5s ease;
  }
  .start-screen .icon { font-size: 3rem; margin-bottom: 10px; }
  .start-screen p { font-size: 0.88rem; color: var(--text-dim); line-height: 1.6; max-width: 320px; }
  .start-screen .start-btn {
    margin-top: 10px; padding: 14px 40px; background: var(--accent);
    color: var(--bg); border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
  }
  .end-screen {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    gap: 16px; animation: cardIn 0.5s ease;
  }
  .end-screen .final-scores { display: flex; gap: 20px; margin: 10px 0; }
  .end-screen .final-stat { text-align: center; }
  .end-screen .final-stat .val { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; }
  .end-screen .final-stat .lbl {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-dim); margin-top: 2px;
  }
  .end-screen .insight {
    font-size: 0.9rem; color: var(--text-dim);
    line-height: 1.6; max-width: 340px; margin: 10px 0;
  }
  .end-screen .play-again {
    margin-top: 10px; padding: 14px 40px; background: var(--accent);
    color: var(--bg); border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    font-weight: 700; cursor: pointer;
  }
  .reflection-tag {
    display: inline-block; font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 1.5px; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
    background: rgba(167, 139, 250, 0.15); color: #a78bfa;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SCENARIOS = [
  // ===== DELEGATION =====
  {
    id: "del-1", category: "Delegation", type: "work",
    context: "A technician asks you how to handle a device modification they've done before.",
    question: "They know the process. They're really asking for permission. What do you do?",
    choices: [
      { text: "Walk them through it step by step to be safe", scores: { trust: -5, momentum: 3, clarity: 0 }, feedback: "They already knew. You just told them their experience doesn't count. Sometimes helping is the thing that slows everyone down." },
      { text: "Tell them you trust their judgment and to flag you if something unexpected comes up", scores: { trust: 8, momentum: 5, clarity: 3 }, feedback: "They walked away standing taller. That cost you nothing and bought you something you can't fake." },
      { text: "Ask them what they think the right approach is, then confirm it", scores: { trust: 4, momentum: 0, clarity: 5 }, feedback: "Solid middle ground. They got the validation, you got the verification. Just know — do this every time and it starts to feel like a test, not trust." }
    ],
    tags: ["trust", "autonomy"]
  },
  {
    id: "del-2", category: "Delegation", type: "work",
    context: "A job is running behind. You could jump in and do it yourself faster.",
    question: "You know you can get it done quicker. But should you?",
    choices: [
      { text: "Jump in and get it done — production comes first", scores: { trust: -3, momentum: 8, clarity: -2 }, feedback: "The job got done. But your team just learned that when things get tight, you don't trust them to deliver. They'll wait for you next time too." },
      { text: "Check in on the bottleneck and help them problem-solve it", scores: { trust: 5, momentum: 3, clarity: 4 }, feedback: "Slower today. Faster every day after. They solved it with your support, not your hands — that's the difference between a supervisor and a technician who gives orders." },
      { text: "Let it run late — they need to feel the consequences", scores: { trust: -2, momentum: -5, clarity: 2 }, feedback: "There's a version of this that works: when someone needs to learn from failure. But letting production slip to teach a lesson? That's a cost the whole team pays for one person's education." }
    ],
    tags: ["delegation", "production"]
  },
  {
    id: "del-3", category: "Delegation", type: "work",
    context: "You delegated a task last week. It got done, but not the way you would have done it. The result is fine.",
    question: "Do you say something?",
    choices: [
      { text: "No — the result met the standard, their method is their business", scores: { trust: 7, momentum: 4, clarity: 2 }, feedback: "This is one of the hardest things for a good technician turned supervisor. Your way isn't the only way. It might not even be the best way. Letting go of method when the outcome is solid is how you build a team that can function without you." },
      { text: "Mention your preferred approach for next time", scores: { trust: -3, momentum: 2, clarity: 3 }, feedback: "You just told them the right answer didn't count because they got there the wrong way. Next time they'll do it your way — not because it's better, but because it's safer. That's compliance, not growth." },
      { text: "Ask them to walk you through their process — you might learn something", scores: { trust: 6, momentum: 2, clarity: 5 }, feedback: "Bold move. Most supervisors never ask this question because it means admitting someone else might have a better method. The ones who do ask it get smarter every week." }
    ],
    tags: ["delegation", "trust"]
  },

  // ===== CONFLICT =====
  {
    id: "con-1", category: "Conflict", type: "work",
    context: "Two technicians are arguing about the right way to do a setup. Both approaches work.",
    question: "How do you handle it?",
    choices: [
      { text: "Pick the better method and settle it", scores: { trust: -4, momentum: 5, clarity: 3 }, feedback: "Fast. Clean. And one of them just became the person who was wrong in front of their peer. They'll remember that longer than the method." },
      { text: "Separate them, hear both sides privately, and decide later", scores: { trust: 3, momentum: -3, clarity: 2 }, feedback: "Respectful, but now you've turned a 5-minute disagreement into a process. Sometimes the best move is to not make it bigger than it is." },
      { text: "Ask them to test both and go with whatever gets better results", scores: { trust: 6, momentum: 2, clarity: 5 }, feedback: "Nobody lost. The work decided. And you just built a decision-making framework they'll use without you next time." }
    ],
    tags: ["conflict", "team"]
  },
  {
    id: "con-2", category: "Conflict", type: "work",
    context: "A staff member comes to you frustrated about another supervisor giving them contradictory instructions.",
    question: "They're telling you they're confused. What do you do?",
    choices: [
      { text: "Tell them to follow your instructions and you'll handle the rest", scores: { trust: 2, momentum: 3, clarity: -3 }, feedback: "You solved their immediate problem. But you just drew a line that might not hold, and there's a power question in the air that everyone can smell." },
      { text: "Acknowledge the confusion and tell them you'll get clarification on the chain", scores: { trust: 5, momentum: 0, clarity: 7 }, feedback: "They didn't need you to win a fight. They needed to know someone heard them and would bring order. That's exactly what leadership looks like when things are messy." },
      { text: "Ask what the other supervisor told them so you can understand the conflict", scores: { trust: 3, momentum: -2, clarity: 4 }, feedback: "Good instinct. But be careful — if they think you're gathering intel instead of solving the problem, you've turned a confused employee into an informant." }
    ],
    tags: ["conflict", "clarity"]
  },

  // ===== ACCOUNTABILITY =====
  {
    id: "acc-1", category: "Accountability", type: "work",
    context: "Someone made a mistake on a device. Not their first time. But they caught it themselves and brought it to you.",
    question: "They self-reported. How do you handle it?",
    choices: [
      { text: "Thank them for catching it, fix it together, and document it", scores: { trust: 7, momentum: 2, clarity: 4 }, feedback: "They just learned that honesty is safe here. That's worth more than any write-up. The documentation keeps it real without making it punitive." },
      { text: "Address the pattern — this keeps happening and it needs to stop", scores: { trust: -3, momentum: 0, clarity: 5 }, feedback: "You're right that the pattern matters. But you just punished the one time they came to you voluntarily. Next time they'll hide it." },
      { text: "Let it go this time since they caught it", scores: { trust: 2, momentum: 4, clarity: -4 }, feedback: "Generous. But no documentation means no trail, and if it happens again you're starting from scratch. Kindness without structure is just avoidance." }
    ],
    tags: ["accountability", "trust"]
  },
  {
    id: "acc-2", category: "Accountability", type: "work",
    context: "A strong performer has been showing up late for the third time this month. No one has said anything because their work is excellent.",
    question: "Their output is great. Their punctuality isn't. Does it matter?",
    choices: [
      { text: "Pull them aside privately — the standard applies to everyone", scores: { trust: 3, momentum: 0, clarity: 8 }, feedback: "Hardest conversation to have because they'll feel singled out. But the rest of the team is watching, and they already noticed you haven't said anything." },
      { text: "Let it slide — results matter more than the clock", scores: { trust: -2, momentum: 3, clarity: -5 }, feedback: "You just set the precedent that rules are flexible for people you like. Your weaker performers just noticed." },
      { text: "Check in casually — 'Hey, noticed you've been running late, everything ok?'", scores: { trust: 4, momentum: 2, clarity: 2 }, feedback: "Checking in before correcting. That's human. Just don't let 'checking in' become a pattern of never actually addressing it." }
    ],
    tags: ["accountability", "standards"]
  },
  {
    id: "acc-3", category: "Accountability", type: "work",
    context: "You discover a process has been done incorrectly for weeks. Multiple people were involved but nobody flagged it.",
    question: "It's systemic, not individual. But someone needs to own the fix. What do you do?",
    choices: [
      { text: "Own it yourself — you should have caught it sooner", scores: { trust: 5, momentum: -2, clarity: 3 }, feedback: "Honorable. And probably partially true. But be careful not to train your team that quality control is your job, not theirs. Absorbing every failure eventually teaches people not to look." },
      { text: "Gather the group, explain the issue, and build the fix together", scores: { trust: 4, momentum: 3, clarity: 6 }, feedback: "No blame, no hero. Just a problem and a team solving it. This is what 'we' actually looks like when it's not a performance." },
      { text: "Find the root cause and address it with whoever started the chain", scores: { trust: -2, momentum: 4, clarity: 4 }, feedback: "Efficient. Targeted. But the person at the root might not even know they started it. And everyone who continued the pattern without questioning it — they just got a pass they didn't earn." }
    ],
    tags: ["accountability", "systems"]
  },

  // ===== COMMUNICATION =====
  {
    id: "com-1", category: "Communication", type: "work",
    context: "Leadership made a decision you disagree with. Your team is going to ask you about it.",
    question: "You didn't make this call. You might not agree with it. But you have to deliver it.",
    choices: [
      { text: "Own it as if it were yours", scores: { trust: -2, momentum: 5, clarity: 3 }, feedback: "Clean delivery. But if they find out you disagreed and said nothing, they'll wonder what else you're not telling them." },
      { text: "Deliver it, acknowledge their concerns, and commit to being their voice upward", scores: { trust: 8, momentum: 2, clarity: 5 }, feedback: "You didn't throw anyone under the bus. You gave them the truth and a reason to trust that their perspective matters." },
      { text: "Be honest that you disagree but the decision is made", scores: { trust: 4, momentum: -3, clarity: 0 }, feedback: "Honest. But you just gave your team permission to not respect the decision because their boss doesn't either. That ripples." }
    ],
    tags: ["communication", "leadership"]
  },
  {
    id: "com-2", category: "Communication", type: "work",
    context: "You overheard a staff member venting about you to a coworker. It wasn't flattering.",
    question: "It stings. What do you do with it?",
    choices: [
      { text: "Address it directly — 'I heard what you said, can we talk?'", scores: { trust: 3, momentum: -2, clarity: 5 }, feedback: "Brave. But the line between 'approachable leader' and 'you can't say anything around here' is thinner than you think." },
      { text: "Let it go — people vent, it's not personal", scores: { trust: 2, momentum: 3, clarity: -2 }, feedback: "Mature. But if what they said had a kernel of truth, you just chose comfort over growth." },
      { text: "Don't address it, but reflect on whether there's truth in it", scores: { trust: 5, momentum: 2, clarity: 6 }, feedback: "The hardest option because it requires you to sit with discomfort without reacting. This is how good leaders get better — they listen even when people aren't talking to them." }
    ],
    tags: ["communication", "self-awareness"]
  },

  // ===== PRESSURE =====
  {
    id: "pre-1", category: "Under Pressure", type: "work",
    context: "End of day. You're behind. Your team is tired. Pushing means the job gets done but morale takes a hit.",
    question: "The work matters. So do the people. What wins tonight?",
    choices: [
      { text: "Push through — sometimes the job comes first", scores: { trust: -4, momentum: 7, clarity: 0 }, feedback: "Got it done. But tomorrow your team walks in tired and resentful. You made a withdrawal from an account that takes a long time to refill." },
      { text: "Call it — hit it fresh tomorrow", scores: { trust: 5, momentum: -4, clarity: 2 }, feedback: "Your team went home feeling like a human being decided their schedule, not a spreadsheet. They'll attack it harder tomorrow because you didn't burn them out tonight." },
      { text: "Give them the choice", scores: { trust: 6, momentum: 3, clarity: 3 }, feedback: "They chose. Either way, it was theirs. The difference between being told and being asked is the whole difference between compliance and commitment." }
    ],
    tags: ["pressure", "morale"]
  },
  {
    id: "pre-2", category: "Under Pressure", type: "work",
    context: "Someone above you is pressuring you for a status update on something you don't have full visibility on.",
    question: "You could give a partial answer, stall, or admit the gap.",
    choices: [
      { text: "Give the best answer you have and fill in gaps later", scores: { trust: -3, momentum: 4, clarity: -3 }, feedback: "Fast response. But if the gaps turn out to be wrong, you've got credibility damage on top of the original problem." },
      { text: "Say 'I don't have the full picture — give me an hour and I'll get you a solid answer'", scores: { trust: 5, momentum: 0, clarity: 7 }, feedback: "One of the most powerful sentences a manager can say. It tells them accuracy matters more to you than looking good." },
      { text: "Go get the information immediately and respond once you have it", scores: { trust: 3, momentum: 2, clarity: 4 }, feedback: "Good instinct. Just make sure urgency doesn't make you cut corners on the answer." }
    ],
    tags: ["pressure", "integrity"]
  },

  // ===== BOUNDARIES =====
  {
    id: "bnd-1", category: "Boundaries", type: "work",
    context: "A peer in a different role starts giving direction to your team without talking to you first.",
    question: "Your people are getting instructions from someone outside your chain. How do you respond?",
    choices: [
      { text: "Talk to the peer directly — 'Can you run things through me so we're not sending mixed signals?'", scores: { trust: 4, momentum: 2, clarity: 7 }, feedback: "Direct, professional, kept between the two of you. It only fails if they don't respect the boundary — and then that's information you need." },
      { text: "Tell your team to check with you before acting on outside direction", scores: { trust: 3, momentum: 0, clarity: 3 }, feedback: "Protects the workflow. But you put the burden on your team instead of handling it at the source." },
      { text: "Escalate it — leadership needs to define the lanes", scores: { trust: 0, momentum: -2, clarity: 5 }, feedback: "Sometimes necessary. But going up before going sideways can look like you can't handle peer relationships. Try direct first." }
    ],
    tags: ["boundaries", "authority"]
  },
  {
    id: "bnd-2", category: "Boundaries", type: "work",
    context: "A team member wants to be friends outside of work. They're pushing for a social dynamic that blurs the line.",
    question: "You like them. But you're their supervisor. Where's the line?",
    choices: [
      { text: "Keep it professional — friendly at work, but that's it", scores: { trust: 2, momentum: 2, clarity: 6 }, feedback: "Clean. Safe. And a little lonely. But the first time you have to give them critical feedback, you'll be grateful for the boundary." },
      { text: "Be human about it — grab a beer sometimes, keep the work relationship clear", scores: { trust: 5, momentum: 3, clarity: -2 }, feedback: "It can work. But the moment there's a performance issue, that beer becomes a complication. Know that going in." },
      { text: "Match their energy without initiating more", scores: { trust: 4, momentum: 2, clarity: 3 }, feedback: "Responsive without leading. Emotionally intelligent. Just make sure it doesn't look like favoritism to the rest of the team." }
    ],
    tags: ["boundaries", "relationships"]
  },

  // ===== SELF-MANAGEMENT =====
  {
    id: "self-1", category: "Self-Management", type: "work",
    context: "You had a terrible morning. Personal stuff. You can feel it affecting your tone.",
    question: "You're not at your best and you know it. Now what?",
    choices: [
      { text: "Push through — everyone has bad days", scores: { trust: -2, momentum: 3, clarity: -2 }, feedback: "You pushed through. Your team noticed anyway. They always do." },
      { text: "Give yourself five minutes, reset, and be intentional about your interactions", scores: { trust: 4, momentum: 2, clarity: 5 }, feedback: "Five minutes now saves an hour of cleanup later. Being aware you're off is already better than most managers ever get." },
      { text: "Tell your team — 'Having a rough day, bear with me'", scores: { trust: 6, momentum: 0, clarity: 3 }, feedback: "Vulnerable. Human. Do this rarely enough that it carries weight and doesn't become an excuse." }
    ],
    tags: ["self-awareness", "regulation"]
  },
  {
    id: "self-2", category: "Self-Management", type: "work",
    context: "You made a call yesterday that turned out to be wrong. There's rework now.",
    question: "Everyone knows it was your decision. How do you handle it?",
    choices: [
      { text: "Own it openly — 'My call, I was wrong. Here's how we fix it.'", scores: { trust: 8, momentum: 3, clarity: 5 }, feedback: "The hardest sentence in management. Your team just learned that accountability flows up, not just down." },
      { text: "Fix it quietly and move on", scores: { trust: -4, momentum: 4, clarity: -3 }, feedback: "They know. Even if you don't say it. Now they also know you won't admit it." },
      { text: "Frame it as a team decision — 'We made a call, it didn't work'", scores: { trust: -1, momentum: 2, clarity: 0 }, feedback: "Everyone was in the room. They know whose call it was. Softening 'I' into 'we' when things go wrong but keeping 'I' when they go right — people notice that fast." }
    ],
    tags: ["accountability", "leadership"]
  },

  // ===== GROWTH =====
  {
    id: "gro-1", category: "Growth", type: "work",
    context: "A junior team member wants to take on a task above their skill level. There's real risk they'll mess it up.",

// ========== GAME ENGINE ==========
class DecisionDeck {
  constructor() {
    this.state = 'start';
    this.scores = { trust: 50, momentum: 50, clarity: 50 };
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentScenario = null;
    this.selectedChoice = null;
    this.usedIds = new Set();
    this.deck = [];
    this.render();
  }

  buildDeck() {
    let pool = SCENARIOS.filter(s => !this.usedIds.has(s.id));
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    const selected = [];
    const catCount = {};
    const typeCount = { work: 0, offwork: 0, checkin: 0 };

    // Guarantees: at least 2 offwork, at least 2 checkins, at least 1 dynamics
    const guarantees = [
      pool.find(s => s.type === 'checkin'),
      pool.find(s => s.type === 'checkin' && s !== (selected[0])),
      pool.find(s => s.type === 'offwork'),
      pool.find(s => s.type === 'offwork' && !selected.includes(s)),
      pool.find(s => s.category === 'Dynamics'),
    ].filter(Boolean);

    for (const s of guarantees) {
      if (!selected.includes(s)) {
        selected.push(s);
        catCount[s.category] = (catCount[s.category] || 0) + 1;
        typeCount[s.type] = (typeCount[s.type] || 0) + 1;
      }
    }

    // Fill rest with variety
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.includes(s)) continue;
      const cc = catCount[s.category] || 0;
      if (cc >= 2) continue;
      // Cap types
      if (s.type === 'checkin' && typeCount.checkin >= 3) continue;
      if (s.type === 'offwork' && typeCount.offwork >= 3) continue;

      selected.push(s);
      catCount[s.category] = cc + 1;
      typeCount[s.type] = (typeCount[s.type] || 0) + 1;
    }

    // Fill any remaining slots
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.includes(s)) selected.push(s);
    }

    // Shuffle the final deck but ensure checkins aren't first or back-to-back
    for (let i = selected.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [selected[i], selected[j]] = [selected[j], selected[i]];
    }

    // Move checkins away from position 0
    if (selected[0] && selected[0].type === 'checkin') {
      const swapIdx = selected.findIndex((s, i) => i > 2 && s.type === 'work');
      if (swapIdx > 0) [selected[0], selected[swapIdx]] = [selected[swapIdx], selected[0]];
    }

    this.deck = selected;
  }

  findCallback(history) {
    if (history.length < 3) return null;
    const current = this.currentScenario;
    if (!current) return null;
    const tagOverlap = history.filter(h => {
      const past = SCENARIOS.find(s => s.id === h.id);
      if (!past) return false;
      return past.tags.some(t => current.tags.includes(t));
    });
    if (tagOverlap.length > 0) {
      const ref = tagOverlap[tagOverlap.length - 1];
      const past = SCENARIOS.find(s => s.id === ref.id);
      return {
        text: `Earlier, when faced with a ${past.category.toLowerCase()} situation, you chose: "${ref.choiceText}" — how does that shape your thinking here?`,
      };
    }
    return null;
  }

  applyScoreVariance(scores) {
    const modified = { ...scores };
    const roll = Math.random();
    if (roll < 0.18 && modified.trust > 3) {
      modified.trust = Math.round(modified.trust * 0.3);
    } else if (roll < 0.30 && modified.trust < -2) {
      modified.momentum = Math.abs(modified.momentum) + 3;
    } else if (roll < 0.42) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      if (Math.abs(modified[pick]) > 2) {
        modified[pick] = -Math.round(modified[pick] * 0.5);
      }
    } else if (roll < 0.50) {
      // Bonus: unexpected stat spike
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      modified[pick] = modified[pick] + (Math.random() > 0.5 ? 4 : -4);
    }
    return modified;
  }

  nextRound() {
    if (this.round >= this.totalRounds) {
      this.state = 'end';
      this.render();
      return;
    }
    this.currentScenario = this.deck[this.round];
    this.usedIds.add(this.currentScenario.id);
    this.selectedChoice = null;
    this.state = 'play';
    this.render();
  }

  selectChoice(index) {
    if (this.selectedChoice !== null) return;
    this.selectedChoice = index;
    const choice = this.currentScenario.choices[index];
    const modifiedScores = this.applyScoreVariance(choice.scores);
    this.scores.trust = Math.max(0, Math.min(100, this.scores.trust + modifiedScores.trust));
    this.scores.momentum = Math.max(0, Math.min(100, this.scores.momentum + modifiedScores.momentum));
    this.scores.clarity = Math.max(0, Math.min(100, this.scores.clarity + modifiedScores.clarity));
    this.history.push({
      id: this.currentScenario.id,
      choiceIndex: index,
      choiceText: choice.text,
      scores: modifiedScores
    });
    this.round++;
    this.render();
  }

  getEndInsight() {
    const { trust, momentum, clarity } = this.scores;
    const sorted = [
      { name: 'trust', val: trust }, { name: 'momentum', val: momentum }, { name: 'clarity', val: clarity }
    ].sort((a, b) => b.val - a.val);
    const highest = sorted[0].name;
    const lowest = sorted[2].name;

    const insights = {
      trust: {
        high: "Your instinct is to lead through relationships. People follow you because they believe in you, not because they have to. Guard that — it's rare and it's real.",
        low: "Trust took some hits. That doesn't mean you're untrustworthy — it means some choices prioritized speed or control over connection. Sometimes that's the right call. Sometimes it costs more than it saves."
      },
      momentum: {
        high: "You keep things moving. Production doesn't stall under you. Just watch that the pace isn't outrunning the people. A machine that runs hot eventually breaks.",
        low: "You chose people over pace more than once. That's not weakness. But be honest about whether 'taking care of the team' sometimes lets you avoid the harder push."
      },
      clarity: {
        high: "You think in systems. Roles, structure, expectations — you want everyone to know where they stand. That's a foundation other people can build on.",
        low: "Some situations stayed murkier than they had to. Clarity isn't rigidity — it's making sure no one has to guess what you expect or where they stand."
      }
    };

    // Count check-in sentiment
    const checkinHistory = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.type === 'checkin';
    });

    let checkinNote = '';
    if (checkinHistory.length >= 2) {
      const negCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.momentum < 0 || choice.scores.trust < 0;
      }).length;
      if (negCount >= 2) {
        checkinNote = "\n\nThe check-ins told a story too. You're carrying more than you're letting on — not to anyone else, but to yourself. That weight is real. Don't wait until it breaks something to address it.";
      } else {
        checkinNote = "\n\nThe check-ins suggest you've got a handle on where you are right now. That self-awareness is a tool. Use it before things get heavy, not just after.";
      }
    }

    return `Your strongest instinct: ${highest}. ${insights[highest].high}\n\nWhere to reflect: ${lowest}. ${insights[lowest].low}${checkinNote}`;
  }

  start() {
    this.scores = { trust: 50, momentum: 50, clarity: 50 };
    this.round = 0;
    this.history = [];
    this.selectedChoice = null;
    this.buildDeck();
    this.nextRound();
  }

  getCardClass() {
    if (!this.currentScenario) return '';
    if (this.currentScenario.type === 'checkin') return 'checkin';
    if (this.currentScenario.type === 'offwork') return 'offwork';
    return '';
  }

  render() {
    const app = document.getElementById('app');

    if (this.state === 'start') {
      app.innerHTML = `
        <div class="header">
          <h1>Decision Deck</h1>
          <div class="subtitle">A leadership exercise</div>
        </div>
        <div class="start-screen">
          <div class="icon">◆</div>
          <p>14 scenarios. No perfect answers.<br><br>
          You'll be scored on three axes: <strong style="color:var(--accent)">Trust</strong>, <strong style="color:var(--gold)">Momentum</strong>, and <strong style="color:#a78bfa">Clarity</strong>.<br><br>
          The scoring won't always make sense. That's the point.<br><br>
          Some cards are about work. Some aren't. All of them count.<br><br>
          Your earlier decisions will follow you.</p>
          <button class="start-btn" onclick="game.start()">Deal Me In</button>
        </div>`;
      return;
    }

    if (this.state === 'end') {
      const insight = this.getEndInsight();
      const paras = insight.split('\n\n');
      app.innerHTML = `
        <div class="header">
          <h1>Decision Deck</h1>
          <div class="subtitle">Results</div>
        </div>
        <div class="end-screen">
          <div class="final-scores">
            <div class="final-stat">
              <div class="val" style="color:var(--accent)">${this.scores.trust}</div>
              <div class="lbl">Trust</div>
            </div>
            <div class="final-stat">
              <div class="val" style="color:var(--gold)">${this.scores.momentum}</div>
              <div class="lbl">Momentum</div>
            </div>
            <div class="final-stat">
              <div class="val" style="color:#a78bfa">${this.scores.clarity}</div>
              <div class="lbl">Clarity</div>
            </div>
          </div>
          ${paras.map(p => `<p class="insight">${p}</p>`).join('')}
          <button class="play-again" onclick="game.start()">Play Again</button>
        </div>`;
      return;
    }

    const s = this.currentScenario;
    const cardClass = this.getCardClass();
    const callback = this.findCallback(this.history);
    const selected = this.selectedChoice;
    const choice = selected !== null ? s.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length - 1].scores : null;

    let choicesHTML = '';
    if (selected === null) {
      choicesHTML = `<div class="choices">
        ${s.choices.map((c, i) => `
          <button class="choice-btn" onclick="game.selectChoice(${i})">${c.text}</button>
        `).join('')}
      </div>`;
    } else {
      const dominant = Object.entries(modScores).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))[0];
      const deltaVal = dominant[1];
      const deltaClass = deltaVal > 0 ? 'pos' : deltaVal < 0 ? 'neg' : 'zero';
      const deltaSign = deltaVal > 0 ? '+' : '';
      const statLabels = { trust: 'Trust', momentum: 'Momentum', clarity: 'Clarity' };
      choicesHTML = `
        <div class="choices">
          ${s.choices.map((c, i) => `
            <button class="choice-btn${i === selected ? ' selected' : ''}" disabled>${c.text}</button>
          `).join('')}
        </div>
        <div class="result">
          <div class="result-score">
            <div class="delta ${deltaClass}">${deltaSign}${deltaVal}</div>
            <div class="stat-name">${statLabels[dominant[0]]}</div>
          </div>
          <div class="result-text">${choice.feedback}</div>
          <button class="next-btn" onclick="game.nextRound()">${this.round >= this.totalRounds ? 'See Results' : 'Next Scenario'}</button>
        </div>`;
    }

    app.innerHTML = `
      <div class="header"><h1>Decision Deck</h1></div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" style="width:${(this.round / this.totalRounds) * 100}%"></div>
        </div>
        <div class="progress-label">${this.round}/${this.totalRounds}</div>
      </div>
      <div class="score-bar">
        <div class="score-item"><div class="label">Trust</div><div class="value trust">${this.scores.trust}</div></div>
        <div class="score-item"><div class="label">Momentum</div><div class="value momentum">${this.scores.momentum}</div></div>
        <div class="score-item"><div class="label">Clarity</div><div class="value clarity">${this.scores.clarity}</div></div>
      </div>
      <div class="card-container">
        <div class="card ${cardClass}" key="${s.id}-${selected}">
          <div class="card-category">${s.category}</div>
          <div class="card-context">${s.context}</div>
          ${callback && selected === null ? `<div class="card-ref"><span class="reflection-tag">Callback</span><br>${callback.text}</div>` : ''}
          <div class="card-question">${s.question}</div>
          ${choicesHTML}
        </div>
      </div>`;
  }
}

const game = new DecisionDeck();
</script>
</body>
</html>
