<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Decision Deck v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1420;
    --card-bg: #111827;
    --card-bg2: #162035;
    --card-border: #1e2d45;
    --card-border-bright: #2a4060;
    --accent: #38bdf8;
    --accent-dim: #0e6a9e;
    --accent-glow: rgba(56, 189, 248, 0.15);
    --trust: #38bdf8;
    --momentum: #fb923c;
    --clarity: #a78bfa;
    --trust-glow: rgba(56, 189, 248, 0.2);
    --momentum-glow: rgba(251, 146, 60, 0.2);
    --clarity-glow: rgba(167, 139, 250, 0.2);
    --positive: #34d399;
    --negative: #f87171;
    --neutral: #fb923c;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167,139,250,0.05) 0%, transparent 50%);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 18px 16px 28px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 14px 0 8px;
    position: relative;
  }
  .header-lockup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .v2-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 7px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    color: #fff;
    text-transform: uppercase;
    box-shadow: 0 0 12px rgba(56,189,248,0.3);
  }
  .header .subtitle {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--card-border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #818cf8);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .progress-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-dim);
    min-width: 40px;
    text-align: right;
    letter-spacing: 0.5px;
  }

  /* ── SCORE BAR ── */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    margin-bottom: 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .score-item {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
    position: relative;
    transition: background 0.3s ease;
  }
  .score-item + .score-item {
    border-left: 1px solid var(--card-border);
  }
  .score-item.trust-item { background: linear-gradient(180deg, rgba(56,189,248,0.06) 0%, transparent 100%); }
  .score-item.momentum-item { background: linear-gradient(180deg, rgba(251,146,60,0.06) 0%, transparent 100%); }
  .score-item.clarity-item { background: linear-gradient(180deg, rgba(167,139,250,0.06) 0%, transparent 100%); }
  .score-item .label {
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .score-item .value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1;
  }
  .score-item .value.trust { color: var(--trust); text-shadow: 0 0 12px var(--trust-glow); }
  .score-item .value.momentum { color: var(--momentum); text-shadow: 0 0 12px var(--momentum-glow); }
  .score-item .value.clarity { color: var(--clarity); text-shadow: 0 0 12px var(--clarity-glow); }

  /* Score change flash animation */
  @keyframes scoreUp {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  @keyframes scoreDown {
    0% { transform: scale(1); }
    40% { transform: scale(0.85); }
    100% { transform: scale(1); }
  }
  .score-flash-up { animation: scoreUp 0.4s ease; }
  .score-flash-down { animation: scoreDown 0.4s ease; }

  /* ── CARD ── */
  .card-container { flex: 1; display: flex; flex-direction: column; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 22px 20px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    animation: cardIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  /* Glow top border */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
    opacity: 0.7;
  }
  /* Subtle inner glow */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(180deg, var(--accent-glow) 0%, transparent 100%);
    pointer-events: none;
  }

  .card.checkin {
    border-color: rgba(167,139,250,0.3);
    background: linear-gradient(160deg, rgba(167,139,250,0.04) 0%, var(--card-bg) 40%);
  }
  .card.checkin::before {
    background: linear-gradient(90deg, transparent 0%, var(--clarity) 30%, var(--clarity) 70%, transparent 100%);
  }
  .card.checkin::after {
    background: linear-gradient(180deg, rgba(167,139,250,0.08) 0%, transparent 100%);
  }

  .card.offwork {
    border-color: rgba(251,146,60,0.25);
    background: linear-gradient(160deg, rgba(251,146,60,0.04) 0%, var(--card-bg) 40%);
  }
  .card.offwork::before {
    background: linear-gradient(90deg, transparent 0%, var(--momentum) 30%, var(--momentum) 70%, transparent 100%);
  }
  .card.offwork::after {
    background: linear-gradient(180deg, rgba(251,146,60,0.07) 0%, transparent 100%);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-category {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }
  .card.checkin .card-category { color: var(--clarity); }
  .card.offwork .card-category { color: var(--momentum); }

  .card-context {
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-bottom: 14px;
    line-height: 1.5;
    font-style: italic;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
    position: relative;
    z-index: 1;
  }

  .card-question {
    font-size: 1.08rem;
    line-height: 1.58;
    font-weight: 500;
    margin-bottom: 22px;
    flex: 1;
    color: var(--text);
    position: relative;
    z-index: 1;
  }

  .card-ref {
    font-size: 0.74rem;
    color: var(--momentum);
    margin-bottom: 12px;
    padding: 9px 12px;
    background: rgba(251,146,60,0.07);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--momentum);
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  /* ── CHOICES ── */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
    position: relative;
    z-index: 1;
  }

  .choice-btn {
    background: var(--bg2);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 13px 15px;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.45;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .choice-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: linear-gradient(90deg, var(--accent-glow), transparent);
    transform: translateX(2px);
  }
  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:active { transform: translateX(1px) scale(0.99); }
  .choice-btn.selected {
    border-color: var(--accent);
    color: var(--text);
    background: linear-gradient(90deg, var(--accent-glow), transparent);
  }
  .choice-btn.selected::before { opacity: 1; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn:disabled:not(.selected) { opacity: 0.35; }

  /* ── RESULT ── */
  .result {
    animation: resultIn 0.3s ease;
    padding-top: 14px;
    position: relative;
    z-index: 1;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-score {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--card-border);
  }
  .result-score .delta {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    min-width: 44px;
  }
  .result-score .delta.pos { color: var(--positive); }
  .result-score .delta.neg { color: var(--negative); }
  .result-score .delta.zero { color: var(--neutral); }
  .result-score .stat-info { display: flex; flex-direction: column; }
  .result-score .stat-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .result-score .stat-sub {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .result-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text-mid);
    margin-bottom: 16px;
  }

  .next-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(56,189,248,0.2);
  }
  .next-btn:hover { box-shadow: 0 4px 24px rgba(56,189,248,0.35); transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0) scale(0.99); }

  /* ── START SCREEN ── */
  .start-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 0;
    animation: cardIn 0.5s ease;
    padding: 20px 0;
  }

  .start-logo {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(129,140,248,0.15));
    border: 1px solid rgba(56,189,248,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(56,189,248,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .start-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .start-version {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--clarity));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
  }

  .start-divider {
    width: 100%;
    max-width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-border-bright), transparent);
    margin: 20px auto;
  }

  .start-axes {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .axis-pill {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid;
  }
  .axis-pill.t { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: var(--trust); }
  .axis-pill.m { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.3); color: var(--momentum); }
  .axis-pill.c { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.3); color: var(--clarity); }

  .start-screen p {
    font-size: 0.88rem;
    color: var(--text-mid);
    line-height: 1.7;
    max-width: 310px;
    margin-bottom: 28px;
  }

  .start-btn {
    padding: 14px 48px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 24px rgba(56,189,248,0.25);
    transition: all 0.2s ease;
  }
  .start-btn:hover { box-shadow: 0 4px 32px rgba(56,189,248,0.4); transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  .start-note {
    margin-top: 14px;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }

  /* ── END SCREEN ── */
  .end-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 14px;
    animation: cardIn 0.5s ease;
    padding: 10px 0;
  }

  .end-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .end-screen .final-scores {
    display: flex;
    gap: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    max-width: 300px;
  }
  .end-screen .final-stat {
    flex: 1;
    text-align: center;
    padding: 14px 8px;
  }
  .end-screen .final-stat + .final-stat { border-left: 1px solid var(--card-border); }
  .end-screen .final-stat.t { background: linear-gradient(180deg, rgba(56,189,248,0.06), transparent); }
  .end-screen .final-stat.m { background: linear-gradient(180deg, rgba(251,146,60,0.06), transparent); }
  .end-screen .final-stat.c { background: linear-gradient(180deg, rgba(167,139,250,0.06), transparent); }
  .end-screen .final-stat .val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .end-screen .final-stat .lbl {
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  .end-divider {
    width: 100%;
    max-width: 320px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-border-bright), transparent);
  }

  .end-screen .insight {
    font-size: 0.9rem;
    color: var(--text-mid);
    line-height: 1.7;
    max-width: 340px;
    text-align: left;
  }

  .play-again {
    padding: 13px 44px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(56,189,248,0.2);
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  .play-again:hover { box-shadow: 0 4px 28px rgba(56,189,248,0.35); transform: translateY(-1px); }

  /* ── CALLBACK TAG ── */
  .reflection-tag {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
    background: rgba(167, 139, 250, 0.12);
    color: var(--clarity);
    border: 1px solid rgba(167,139,250,0.2);
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SCENARIOS = [
  // ===== DELEGATION =====
  {
    id: "del-1", category: "Delegation", type: "work",
    context: "A technician asks you how to handle a device modification they've done before.",
    question: "They know the process. They're really asking for permission. What do you do?",
    choices: [
      { text: "Walk them through it step by step to be safe", scores: { trust: -5, momentum: 3, clarity: 0 }, feedback: "They already knew. You just told them their experience doesn't count. Sometimes helping is the thing that slows everyone down." },
      { text: "Tell them you trust their judgment and to flag you if something unexpected comes up", scores: { trust: 8, momentum: 5, clarity: 3 }, feedback: "They walked away standing taller. That cost you nothing and bought you something you can't fake." },
      { text: "Ask them what they think the right approach is, then confirm it", scores: { trust: 4, momentum: 0, clarity: 5 }, feedback: "Solid middle ground. They got the validation, you got the verification. Just know — do this every time and it starts to feel like a test, not trust." }
    ],
    tags: ["trust", "autonomy"]
  },
  {
    id: "del-2", category: "Delegation", type: "work",
    context: "A job is running behind. You could jump in and do it yourself faster.",
    question: "You know you can get it done quicker. But should you?",
    choices: [
      { text: "Jump in and get it done — production comes first", scores: { trust: -3, momentum: 8, clarity: -2 }, feedback: "The job got done. But your team just learned that when things get tight, you don't trust them to deliver. They'll wait for you next time too." },
      { text: "Check in on the bottleneck and help them problem-solve it", scores: { trust: 5, momentum: 3, clarity: 4 }, feedback: "Slower today. Faster every day after. They solved it with your support, not your hands — that's the difference between a supervisor and a technician who gives orders." },
      { text: "Let it run late — they need to feel the consequences", scores: { trust: -2, momentum: -5, clarity: 2 }, feedback: "There's a version of this that works: when someone needs to learn from failure. But letting production slip to teach a lesson? That's a cost the whole team pays for one person's education." }
    ],
    tags: ["delegation", "production"]
  },
  {
    id: "del-3", category: "Delegation", type: "work",
    context: "You delegated a task last week. It got done, but not the way you would have done it. The result is fine.",
    question: "Do you say something?",
    choices: [
      { text: "No — the result met the standard, their method is their business", scores: { trust: 7, momentum: 4, clarity: 2 }, feedback: "This is one of the hardest things for a good technician turned supervisor. Your way isn't the only way. It might not even be the best way. Letting go of method when the outcome is solid is how you build a team that can function without you." },
      { text: "Mention your preferred approach for next time", scores: { trust: -3, momentum: 2, clarity: 3 }, feedback: "You just told them the right answer didn't count because they got there the wrong way. Next time they'll do it your way — not because it's better, but because it's safer. That's compliance, not growth." },
      { text: "Ask them to walk you through their process — you might learn something", scores: { trust: 6, momentum: 2, clarity: 5 }, feedback: "Bold move. Most supervisors never ask this question because it means admitting someone else might have a better method. The ones who do ask it get smarter every week." }
    ],
    tags: ["delegation", "trust"]
  },

  // ===== CONFLICT =====
  {
    id: "con-1", category: "Conflict", type: "work",
    context: "Two technicians are arguing about the right way to do a setup. Both approaches work.",
    question: "How do you handle it?",
    choices: [
      { text: "Pick the better method and settle it", scores: { trust: -4, momentum: 5, clarity: 3 }, feedback: "Fast. Clean. And one of them just became the person who was wrong in front of their peer. They'll remember that longer than the method." },

// ========== GAME ENGINE ==========
class DecisionDeck {
  constructor() {
    this.state = 'start';
    this.scores = { trust: 50, momentum: 50, clarity: 50 };
    this.usedIds = new Set();
    this.round = 0;
    this.totalRounds = 14;
    this.history = [];
    this.currentScenario = null;
    this.selectedChoice = null;
    this.usedIds = new Set();
    this.deck = [];
    this.render();
  }

  buildDeck() {
    if (this.usedIds.size >= SCENARIOS.length) this.usedIds = new Set();
    let pool = SCENARIOS.filter(s => !this.usedIds.has(s.id));
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    const selected = [];
    const catCount = {};
    const typeCount = { work: 0, offwork: 0, checkin: 0 };

    // Guarantees: at least 2 offwork, at least 2 checkins, at least 1 dynamics
    const guarantees = [
      pool.find(s => s.type === 'checkin'),
      pool.find(s => s.type === 'checkin' && s !== (selected[0])),
      pool.find(s => s.type === 'offwork'),
      pool.find(s => s.type === 'offwork' && !selected.includes(s)),
      pool.find(s => s.category === 'Dynamics'),
    ].filter(Boolean);

    for (const s of guarantees) {
      if (!selected.includes(s)) {
        selected.push(s);
        catCount[s.category] = (catCount[s.category] || 0) + 1;
        typeCount[s.type] = (typeCount[s.type] || 0) + 1;
      }
    }

    // Fill rest with variety
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (selected.includes(s)) continue;
      const cc = catCount[s.category] || 0;
      if (cc >= 2) continue;
      // Cap types
      if (s.type === 'checkin' && typeCount.checkin >= 3) continue;
      if (s.type === 'offwork' && typeCount.offwork >= 3) continue;

      selected.push(s);
      catCount[s.category] = cc + 1;
      typeCount[s.type] = (typeCount[s.type] || 0) + 1;
    }

    // Fill any remaining slots
    for (const s of pool) {
      if (selected.length >= this.totalRounds) break;
      if (!selected.includes(s)) selected.push(s);
    }

    // Shuffle the final deck but ensure checkins aren't first or back-to-back
    for (let i = selected.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [selected[i], selected[j]] = [selected[j], selected[i]];
    }

    // Move checkins away from position 0
    if (selected[0] && selected[0].type === 'checkin') {
      const swapIdx = selected.findIndex((s, i) => i > 2 && s.type === 'work');
      if (swapIdx > 0) [selected[0], selected[swapIdx]] = [selected[swapIdx], selected[0]];
    }

    this.deck = selected;
  }

  findCallback(history) {
    if (history.length < 3) return null;
    const current = this.currentScenario;
    if (!current) return null;
    const tagOverlap = history.filter(h => {
      const past = SCENARIOS.find(s => s.id === h.id);
      if (!past) return false;
      return past.tags.some(t => current.tags.includes(t));
    });
    if (tagOverlap.length > 0) {
      const ref = tagOverlap[tagOverlap.length - 1];
      const past = SCENARIOS.find(s => s.id === ref.id);
      return {
        text: `Earlier, when faced with a ${past.category.toLowerCase()} situation, you chose: "${ref.choiceText}" — how does that shape your thinking here?`,
      };
    }
    return null;
  }

  applyScoreVariance(scores) {
    const modified = { ...scores };
    const roll = Math.random();
    if (roll < 0.18 && modified.trust > 3) {
      modified.trust = Math.round(modified.trust * 0.3);
    } else if (roll < 0.30 && modified.trust < -2) {
      modified.momentum = Math.abs(modified.momentum) + 3;
    } else if (roll < 0.42) {
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      if (Math.abs(modified[pick]) > 2) {
        modified[pick] = -Math.round(modified[pick] * 0.5);
      }
    } else if (roll < 0.50) {
      // Bonus: unexpected stat spike
      const stats = Object.keys(modified);
      const pick = stats[Math.floor(Math.random() * stats.length)];
      modified[pick] = modified[pick] + (Math.random() > 0.5 ? 4 : -4);
    }
    return modified;
  }

  nextRound() {
    if (this.round >= this.totalRounds) {
      this.state = 'end';
      this.render();
      return;
    }
    this.currentScenario = this.deck[this.round];
    this.usedIds.add(this.currentScenario.id);
    this.selectedChoice = null;
    this.state = 'play';
    this.render();
  }

  selectChoice(index) {
    if (this.selectedChoice !== null) return;
    this.selectedChoice = index;
    const choice = this.currentScenario.choices[index];
    const modifiedScores = this.applyScoreVariance(choice.scores);
    this.scores.trust = Math.max(0, Math.min(100, this.scores.trust + modifiedScores.trust));
    this.scores.momentum = Math.max(0, Math.min(100, this.scores.momentum + modifiedScores.momentum));
    this.scores.clarity = Math.max(0, Math.min(100, this.scores.clarity + modifiedScores.clarity));
    this.history.push({
      id: this.currentScenario.id,
      choiceIndex: index,
      choiceText: choice.text,
      scores: modifiedScores
    });
    this.round++;
    this.render();
  }

  getEndInsight() {
    const { trust, momentum, clarity } = this.scores;
    const sorted = [
      { name: 'trust', val: trust },
      { name: 'momentum', val: momentum },
      { name: 'clarity', val: clarity }
    ].sort((a, b) => b.val - a.val);
    const highest = sorted[0].name;
    const middle = sorted[1].name;
    const lowest = sorted[2].name;
    const highVal = sorted[0].val;
    const lowVal = sorted[2].val;
    const spread = highVal - lowVal;

    // Analyze actual choice patterns from history
    const totalChoices = this.history.length;
    const trustPositive = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.choices[h.choiceIndex].scores.trust > 3;
    }).length;
    const momentumDominant = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      if (!s) return false;
      const sc = s.choices[h.choiceIndex].scores;
      return sc.momentum > 4 && sc.trust < 0;
    }).length;
    const clarityFocused = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.choices[h.choiceIndex].scores.clarity > 3;
    }).length;
    const controlPattern = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      if (!s) return false;
      const sc = s.choices[h.choiceIndex].scores;
      return sc.momentum > 3 && sc.trust <= 0;
    }).length;

    // Build the reading from actual patterns
    let reading = '';

    // --- HIGHEST AXIS PARAGRAPH ---
    if (highest === 'momentum') {
      if (momentumDominant >= 4) {
        reading += "Production is your north star, and that came through clearly in these choices. You move things forward. Deadlines don't slip when you're running point. What the scores also show is that you made that choice deliberately — more than once, you picked speed over connection and owned the tradeoff. That's not a flaw. It's a style. Just know that teams can feel when they're being driven versus led, and over time the difference shows up in who stays and who burns out.";
      } else if (highVal >= 65) {
        reading += "You keep things moving. Production doesn't stall under you, and people who need a clear direction get one. The momentum score says you've got a bias toward action — which is exactly what a floor supervisor needs. The question worth sitting with is whether that bias ever moves faster than the people you're moving with. A pace that works for you doesn't always work for everyone behind it.";
      } else {
        reading += "Momentum ran through your choices more than the other two axes, which says you value getting things done. Not glamorously — just done. That's underrated. The gap between your highest and lowest score is narrow enough that no single instinct dominated this run. That kind of balance is usually what good judgment looks like under pressure.";
      }
    } else if (highest === 'trust') {
      if (trustPositive >= 5) {
        reading += "The relationship axis ran strong through almost everything you chose. People are the lens you lead through — their state, their buy-in, whether they feel seen. That's the harder path in a production environment, and you took it consistently. It accumulates into something: teams that follow you not because the schedule says to, but because they've decided you're worth following. That kind of loyalty doesn't show up in any metric until it's suddenly the only thing holding things together on a bad day.";
      } else if (highVal >= 65) {
        reading += "Your instinct is to lead through relationships. People follow you because they believe in you, not because they have to. Guard that — it's rare, it's real, and it's the kind of thing that gets taken for granted until it's gone. The only watch-out: some situations genuinely require you to push past the relational instinct and make a call people won't like. The trust you've built is the account you draw from in those moments.";
      } else {
        reading += "Trust edged out the other two axes, which means when the choices got hard, you leaned toward keeping people intact over keeping the process clean. That's a values call, not a mistake. A narrow margin here just means you're not a one-note leader — the other instincts are present too. That's usually a strength in complex environments.";
      }
    } else {
      if (clarityFocused >= 5) {
        reading += "You reached for structure consistently — clear roles, defined expectations, explicit agreements. That's the instinct of someone who's been burned by ambiguity before, or who's watched ambiguity burn other people. It's a real and valuable kind of intelligence. The thing to hold alongside it: not every situation benefits from being crystallized. Some things need room to be worked out. The ability to know which is which is what separates good structure from rigidity.";
      } else if (highVal >= 65) {
        reading += "You think in systems. Roles, structure, expectations — you want everyone to know where they stand. That's a foundation other people can build on. The risk is that structure built without enough relational trust underneath it can feel like control rather than clarity. Keep the two connected and you've got something durable.";
      } else {
        reading += "Clarity came through as your leading instinct — just ahead of the others. When situations were murky, you moved toward definition. That's a useful reflex in a supervisory role. The narrow margin says you're not ignoring the human elements or the pace requirements, which is the right balance.";
      }
    }

    // --- PATTERN NOTE (middle paragraph) ---
    if (spread >= 25) {
      // Large spread — strong dominant style
      if (lowest === 'trust' && momentumDominant >= 3) {
        reading += "\n\nThe spread between your highest and lowest scores was significant. Production-first choices came up repeatedly in a way that traded relationship cost for output — and the deck scored it accordingly. That's not a verdict. It's a mirror. The question worth asking is whether that tradeoff was intentional each time, or whether it's become the default setting. Defaults are fine until they become the only gear you have.";
      } else if (lowest === 'momentum' && trustPositive >= 4) {
        reading += "\n\nThe gap between your scores says something clear: you consistently chose connection over pace, and the momentum axis reflects that cost. That's not a problem — it's a philosophy. But supervisors who only have the relational gear sometimes avoid the harder pushes because they've confused kindness with leadership. The best version of what you're doing uses trust as leverage to actually move people, not just to keep them comfortable.";
      } else if (lowest === 'clarity') {
        reading += "\n\nThe spread in your scores points to a consistent pattern of keeping things human at the cost of keeping them structured. That plays well in relationships and rough patches. It tends to create confusion over time in day-to-day operations — people who don't know exactly what's expected don't always ask. They guess. And the guesses compound. A little more definition around expectations won't undermine the relational work. It'll give it something to stand on.";
      } else {
        reading += "\n\nThe spread between your scores tells a story about a consistent style — not a random set of choices. Whatever your highest axis says about you, you picked it repeatedly under pressure, which is different from picking it once in an easy scenario. That consistency is worth knowing about yourself. It's the instinct you'll default to when things get hard. Make sure it's the right tool for the moment, not just the familiar one.";
      }
    } else if (spread <= 10) {
      // Tight spread — balanced
      reading += "\n\nYour three scores landed close together, which is unusual. It means no single instinct dominated — you were genuinely weighing the relational, the operational, and the structural across different situations. That's a sign of situational judgment rather than a fixed style. The risk with balanced scores is that balance can sometimes mean underpowered in all three directions. But in a leadership role, it more often means adaptable. That's a real asset.";
    } else {
      // Medium spread
      reading += `\n\n${middle === 'trust' ? "The relational instinct ran through the middle of your choices — present, but not dominant. You used it when it was clearly the right tool and set it aside when something else was needed. That's not indifference to people — it's judgment about when the relationship capital gets spent and when it gets built." : middle === 'momentum' ? "Your drive to move things forward sat in the middle of your choices — available when needed, but not overriding everything else. That's the right relationship to have with production pressure. It means you can push when it matters without making push mode your permanent state." : "Structure and clarity showed up in the middle of your decision-making — neither your first instinct nor your last resort. You reached for it when the situation called for it and left space for other approaches when it didn't. That's how good supervisors use systems: as tools, not as the whole job."}`;
    }

    // --- CHECK-IN ANALYSIS ---
    const checkinHistory = this.history.filter(h => {
      const s = SCENARIOS.find(sc => sc.id === h.id);
      return s && s.type === 'checkin';
    });

    if (checkinHistory.length >= 2) {
      const negCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.momentum < 0 || choice.scores.trust < 0;
      }).length;
      const selfAwareCount = checkinHistory.filter(h => {
        const s = SCENARIOS.find(sc => sc.id === h.id);
        const choice = s.choices[h.choiceIndex];
        return choice.scores.clarity > 2;
      }).length;

      if (negCount >= 2 && selfAwareCount >= 1) {
        reading += "\n\nThe check-ins told a separate story. You're carrying something — not necessarily visible to anyone else, but present in how you answered those quieter questions. That weight doesn't go away by itself. It's worth naming, even if just to yourself.";
      } else if (selfAwareCount >= 2) {
        reading += "\n\nThe check-ins suggest a clear-eyed read on where you actually are — not where you'd like to be or where you think you should be. That kind of self-awareness is the foundation that everything else builds on. Use it.";
      } else if (negCount >= 2) {
        reading += "\n\nThe check-ins flagged something worth sitting with. When the scenarios had no external pressure — just an honest question — the answers pointed toward some depletion. Not failure. Just a tank that could use some filling.";
      } else {
        reading += "\n\nThe check-ins showed a grounded read on your current state. Nothing alarming, nothing suppressed. That's a decent place to be running from.";
      }
    }

    return reading;
  }

  start() {
    this.scores = { trust: 50, momentum: 50, clarity: 50 };
    this.usedIds = new Set();
    this.round = 0;
    this.history = [];
    this.selectedChoice = null;
    this.buildDeck();
    this.nextRound();
  }

  getCardClass() {
    if (!this.currentScenario) return '';
    if (this.currentScenario.type === 'checkin') return 'checkin';
    if (this.currentScenario.type === 'offwork') return 'offwork';
    return '';
  }

  render() {
    const app = document.getElementById('app');

    if (this.state === 'start') {
      app.innerHTML = `
        <div class="header">
          <div class="header-lockup">
            <h1>Decision Deck</h1>
            <span class="v2-badge">v2</span>
          </div>
          <div class="subtitle">A leadership reflection tool</div>
        </div>
        <div class="start-screen">
          <div class="start-logo">◆</div>
          <div class="start-title">Decision Deck</div>
          <div class="start-version">Version 2.0 — Updated</div>
          <div class="start-axes">
            <span class="axis-pill t">Trust</span>
            <span class="axis-pill m">Momentum</span>
            <span class="axis-pill c">Clarity</span>
          </div>
          <div class="start-divider"></div>
          <p>14 scenarios drawn from a larger pool. No perfect answers — the scoring won't always reward what seems right. That's the point.<br><br>Some cards are about work. Some aren't. All of them count.<br><br>Your earlier decisions will follow you into later ones.</p>
          <button class="start-btn" onclick="game.start()">Deal Me In</button>
          <div class="start-note">Scores vary across runs — this is by design</div>
        </div>`;
      return;
    }

    if (this.state === 'end') {
      const insight = this.getEndInsight();
      const paras = insight.split('\n\n');
      app.innerHTML = `
        <div class="header">
          <div class="header-lockup">
            <h1>Decision Deck</h1>
            <span class="v2-badge">v2</span>
          </div>
        </div>
        <div class="end-screen">
          <div class="end-title">Your Reading</div>
          <div class="final-scores">
            <div class="final-stat t">
              <div class="val" style="color:var(--trust)">${this.scores.trust}</div>
              <div class="lbl">Trust</div>
            </div>
            <div class="final-stat m">
              <div class="val" style="color:var(--momentum)">${this.scores.momentum}</div>
              <div class="lbl">Momentum</div>
            </div>
            <div class="final-stat c">
              <div class="val" style="color:var(--clarity)">${this.scores.clarity}</div>
              <div class="lbl">Clarity</div>
            </div>
          </div>
          <div class="end-divider"></div>
          ${paras.map(p => `<p class="insight">${p}</p>`).join('')}
          <div class="end-divider"></div>
          <button class="play-again" onclick="game.start()">Play Again</button>
        </div>`;
      return;
    }

    const s = this.currentScenario;
    const cardClass = this.getCardClass();
    const callback = this.findCallback(this.history);
    const selected = this.selectedChoice;
    const choice = selected !== null ? s.choices[selected] : null;
    const modScores = selected !== null ? this.history[this.history.length - 1].scores : null;

    let choicesHTML = '';
    if (selected === null) {
      choicesHTML = `<div class="choices">
        ${s.choices.map((c, i) => `
          <button class="choice-btn" onclick="game.selectChoice(${i})">${c.text}</button>
        `).join('')}
      </div>`;
    } else {
      const dominant = Object.entries(modScores).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))[0];
      const deltaVal = dominant[1];
      const deltaClass = deltaVal > 0 ? 'pos' : deltaVal < 0 ? 'neg' : 'zero';
      const deltaSign = deltaVal > 0 ? '+' : '';
      const statLabels = { trust: 'Trust', momentum: 'Momentum', clarity: 'Clarity' };
      const statSubs = {
        trust: `Now: ${this.scores.trust}`,
        momentum: `Now: ${this.scores.momentum}`,
        clarity: `Now: ${this.scores.clarity}`
      };
      choicesHTML = `
        <div class="choices">
          ${s.choices.map((c, i) => `
            <button class="choice-btn${i === selected ? ' selected' : ''}" disabled>${c.text}</button>
          `).join('')}
        </div>
        <div class="result">
          <div class="result-score">
            <div class="delta ${deltaClass}">${deltaSign}${deltaVal}</div>
            <div class="stat-info">
              <div class="stat-name">${statLabels[dominant[0]]}</div>
              <div class="stat-sub">${statSubs[dominant[0]]}</div>
            </div>
          </div>
          <div class="result-text">${choice.feedback}</div>
          <button class="next-btn" onclick="game.nextRound()">${this.round >= this.totalRounds ? 'See Results →' : 'Next Scenario →'}</button>
        </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <div class="header-lockup">
          <h1>Decision Deck</h1>
          <span class="v2-badge">v2</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" style="width:${(this.round / this.totalRounds) * 100}%"></div>
        </div>
        <div class="progress-label">${this.round} / ${this.totalRounds}</div>
      </div>
      <div class="score-bar">
        <div class="score-item trust-item">
          <div class="label">Trust</div>
          <div class="value trust">${this.scores.trust}</div>
        </div>
        <div class="score-item momentum-item">
          <div class="label">Momentum</div>
          <div class="value momentum">${this.scores.momentum}</div>
        </div>
        <div class="score-item clarity-item">
          <div class="label">Clarity</div>
          <div class="value clarity">${this.scores.clarity}</div>
        </div>
      </div>
      <div class="card-container">
        <div class="card ${cardClass}">
          <div class="card-category">${s.category}</div>
          <div class="card-context">${s.context}</div>
          ${callback && selected === null ? `<div class="card-ref"><span class="reflection-tag">Callback</span><br>${callback.text}</div>` : ''}
          <div class="card-question">${s.question}</div>
          ${choicesHTML}
        </div>
      </div>`;
  }
}

const game = new DecisionDeck();
</script>
</body>
</html>
