<style>
  :root{
    --paper:#EFE4CE; --paper-deep:#E1D2B4; --ink:#3B2F2E; --soft:#90806C; --line:#E0CFAE;
    --berry:#C9445F; --berry-deep:#A6324B; --gold:#F0C173; --cool:#3A2E48;
    --card-top:#FFFBEF; --card-bot:#F6EAD2; --accent:#F4B8C4;

  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Nunito',system-ui,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain;
    background:
      radial-gradient(120% 90% at 16% 4%, rgba(240,193,115,.40), transparent 52%),
      radial-gradient(130% 110% at 102% 104%, rgba(58,46,72,.20), transparent 58%),
      radial-gradient(150% 130% at 50% 42%, transparent 56%, rgba(60,46,40,.16) 100%),
      linear-gradient(162deg, var(--paper) 0%, var(--paper-deep) 100%);
    background-attachment:fixed;
  }

  const O='M21 66 C18 42 30 26 60 26 C90 26 102 42 99 66';
  const HL=' C95 61 76 58 60 58 C44 58 26 61 21 66 Z';
  switch(st){
    case 'tuft': return '<path class="hairbase" d="'+O+' C90 58 70 56 60 56 C50 56 30 58 21 66 Z" fill="'+c+'"/><path'+tb+' d="M60 26 C53 8 71 9 63 23 C74 9 78 23 65 27 Z" fill="'+t+'"/>';
    case 'bowl': return '<path class="hairbase" d="'+O+' C96 60 80 59 60 59 C40 59 24 60 21 66 Z" fill="'+c+'"/><path'+tb+' d="M64 26 C60 12 74 13 70 25 Z" fill="'+t+'"/>';
    case 'bangs': return '<path class="hairbase" d="'+O+' C93 61 88 57 82 61 C77 57 71 61 66 58 C61 62 56 57 50 61 C45 57 39 61 34 58 C29 61 24 62 21 66 Z" fill="'+c+'"/>';
    case 'swoosh': return '<path class="hairbase" d="'+O+' C94 56 70 55 54 60 C44 63 30 63 21 66 Z" fill="'+c+'"/>';
    case 'spiky': return hairSpikes(c,t,O);
    case 'mohawk': return hairMohawk(c,t);
    case 'curly': return hairCurly(c,O);
    case 'long': return '<path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    case 'wavy': return '<path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    case 'braids': return '<path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    case 'pigtails': return '<path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    case 'buns': return '<circle class="hairbase" cx="42" cy="24" r="9" fill="'+c+'"/><circle class="hairbase" cx="78" cy="24" r="9" fill="'+c+'"/><path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    case 'pony': return '<path class="hairbase" d="'+O+HL+'" fill="'+c+'"/>';
    default: return '';

}
let _gid=0;
function nextGid(){ return 'g'+(_gid++); }
function lightenHex(hex,amt){ hex=hex||'#F4B8C4'; const n=hex.replace('#',''); const r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16); const to=v=>('0'+Math.round(v+(255-v)*amt).toString(16)).slice(-2); return '#'+to(r)+to(g)+to(b); }

    +legsSVG(cr.feet||'blocky', c)

      +'<g transform="translate(0 '+hairDy+')">'+hairBack(cr)+'</g>'

      +'<g clip-path="url(#clip'+g+')">'

        +'<rect x="0" y="0" width="120" height="120" fill="url(#hi'+g+')"/>'

function motesHTML(n){
  n=n||6; let s='';
  for(let i=0;i<n;i++){
    const left=8+Math.random()*84, size=(3+Math.random()*4).toFixed(1), dur=(7+Math.random()*7).toFixed(1), delay=(Math.random()*7).toFixed(1), bottom=(6+Math.random()*42).toFixed(0);
    s+='<span class="mote" style="left:'+left.toFixed(1)+'%;bottom:'+bottom+'%;width:'+size+'px;height:'+size+'px;animation-duration:'+dur+'s;animation-delay:'+delay+'s"></span>';
  }
  return s;
}
function idleClass(traits){
  traits = traits||[];
  for(const t of IDLE_PRIORITY){ if(traits.includes(t)) return 'idle-'+t.toLowerCase(); }
  return '';
}
function accentSpans(traits){
  traits = traits||[];
  const seen={}; const list=[];
  traits.forEach(t=>{ const a=ACCENTS[t]; if(a && !seen[a]){ seen[a]=1; list.push(a); } });
  const top=list.slice(0,3);
  const pos=['top:4px;left:-4px','top:0;right:-6px','top:-12px;left:50%;margin-left:-9px'];
  return top.map((e,i)=>'<span class="accent" style="'+pos[i]+';animation-delay:'+(i*0.5)+'s">'+e+'</span>').join('');
}
function stageInner(cr, opts){
  opts=opts||{};
  const idle = opts.idle ? idleClass(cr.traits) : '';
  const animId = opts.animId ? ' id="'+opts.animId+'"' : '';
  const delay = opts.delay ? ' style="animation-delay:'+opts.delay+'s"' : '';
  const acc = opts.accents ? accentSpans(cr.traits) : '';
  return '<div class="creature-anim '+idle+'"'+animId+delay+'>'+bodySVG(cr,opts)+'</div>'+acc;
}
function creatureStage(cr, opts){
  opts=opts||{};
  const sid = opts.stageId ? ' id="'+opts.stageId+'"' : '';
  return '<div class="creature-stage"'+sid+'>'+stageInner(cr,opts)+'</div>';
}

/* ---------- routing ---------- */
let view = {name:'gallery', id:null};
function go(name,id,flag){ view={name,id:id||null,flag:flag||null}; window.scrollTo(0,0); render(); }
function render(){
  const el = document.getElementById('app');
  document.documentElement.style.setProperty('--accent','#F4B8C4');
  if(view.name==='gallery') el.innerHTML = galleryHTML();
  else if(view.name==='detail') el.innerHTML = detailHTML(byId(view.id));
  else if(view.name==='form') el.innerHTML = formHTML(view.id?byId(view.id):null);
  wire();
  if(view.name==='detail' && view.flag==='created'){
    const a=document.getElementById('detail-creature');
    if(a){ a.classList.add('hop'); setTimeout(()=>a.classList.remove('hop'),760); }
    celebrate();
  }
  startAmbient();
}

/* ---------- gallery ---------- */
function galleryHTML(){
  const bar = '<div class="bar" style="margin-bottom:16px">'
    +'<button class="btn primary" data-act="new">+ New creature</button>'
    +'<button class="btn small ghost" data-act="export">Backup</button>'
    +'<button class="btn small ghost" data-act="import">Restore</button></div>';
  if(state.creatures.length===0){
    return bar + '<div class="empty"><div class="egg">\u{1F95A}</div><h2>No creatures yet</h2>'
      +'<p>Make your first one. Pick how it looks, give it a name,<br>and tell its story.</p>'
      +'<button class="btn primary" data-act="new" style="margin-top:6px">Start the first creature</button></div>';
  }
  const cards = state.creatures.map((c,i)=>
    '<div class="ccard" data-open="'+c.id+'" style="--accent:'+(c.color||'#F4B8C4')+';animation-delay:'+(i*0.05)+'s">'

/* ---------- detail ---------- */
function detailHTML(c){
  if(!c) return galleryHTML();
  const row = (lab,val)=> val ? '<div class="field-row"><div class="lab">'+lab+'</div><div class="val">'+val+'</div></div>' : '';
  const traitChips = (c.traits&&c.traits.length)
    ? '<div class="chips">'+c.traits.map(t=>'<span class="chip">'+(ACCENTS[t]?ACCENTS[t]+' ':'')+esc(t)+'</span>').join('')+'</div>' : '';
  let knowsHTML='';
  if(c.knowledge && c.knowledge.length){
    knowsHTML = '<div class="field-row"><div class="lab">Knows how to</div>'+
      c.knowledge.map(k=>{
        const t = k.teacherId ? byId(k.teacherId) : null;
        const from = t ? ' <span class="from">from <span class="link-creature" data-open="'+t.id+'">'+(esc(t.name)||'Unnamed')+'</span></span>' : '';
        return '<div class="kn-line">\u2B50 '+esc(k.skill)+from+'</div>';
      }).join('')+'</div>';
  }
  const taught = teachersOf(c.id);
  let taughtHTML='';
  if(taught.length){
    const bySkill={};
    taught.forEach(t=>{ (bySkill[t.skill]=bySkill[t.skill]||[]).push(t.learner); });
    taughtHTML = '<div class="field-row"><div class="lab">Has taught</div>'+
      Object.keys(bySkill).map(sk=>{
        const learners = bySkill[sk].map(l=>'<span class="link-creature" data-open="'+l.id+'">'+(esc(l.name)||'Unnamed')+'</span>').join(', ');
        return '<div class="taught-line"><b>'+esc(sk)+'</b> to '+learners+'</div>';
      }).join('')+'</div>';
  }
  const n=(c.knowledge||[]).length;
  const learned = n? '<div class="learned-row"><span class="learned-stars">'+'\u2B50'.repeat(Math.min(n,14))+'</span><span class="learned-txt">'+n+' learned</span></div>':'';
  return '<button class="btn small ghost" data-act="back">\u2039 Back to guide</button>'
    +'<div class="detail-hero" style="--accent:'+(c.color||'#F4B8C4')+'">'
    +'<div class="detail-top">'+motesHTML(8)+creatureStage(c,{stageId:'detail-stage',animId:'detail-creature',accents:true,idle:true})
    +'<div class="num">#'+String(c.num).padStart(2,'0')+'</div>'
    +'<h2>'+(esc(c.name)||'Unnamed')+'</h2>'
    +'<div class="flav">'+(esc(c.flavor)||'')+'</div>'
    +(c.stage?'<div><span class="stage-pill">'+esc(c.stage)+'</span></div>':'')
    +(c.birthday?'<div><span class="age-pill">🎂 '+ageLabel(c.birthday)+'</span></div>':'')
    +learned+'</div>'
    +'<div class="detail-body">'
    +(traitChips?'<div class="field-row"><div class="lab">Personality</div>'+traitChips+'</div>':'')
    +row('Loves', esc(c.loves))
    +row('Not a fan of', esc(c.dislikes))
    +row('Sound it makes', esc(c.sound))
    +row('Born on', c.birthday?formatDate(c.birthday):'')
    +knowsHTML+taughtHTML
    +(c.story?'<div class="field-row"><div class="lab">Their story</div><div class="val story">'+esc(c.story)+'</div></div>':'')
    +'</div></div>'
    +'<div class="bar"><button class="btn" data-act="edit" data-id="'+c.id+'">Edit</button>'
    +'<button class="btn ghost danger" data-act="delete" data-id="'+c.id+'">Delete</button></div>';
}

function knows(skill){ return draft.knowledge.find(k=>k.skill===skill); }

    +'<option value="">figured it out</option>'+opts+'</select>';

/* ---------- live preview ---------- */
function pvAnim(){ return document.getElementById('pv-anim'); }
function pulse(el, cls, ms){ if(!el) return; el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); setTimeout(()=>el.classList.remove(cls),ms); }
function pvPop(){ pulse(pvAnim(),'pop',470); }
function pvReact(){ pulse(pvAnim(),'react',640); }
function pvColor(c, doPop){
  const p=document.getElementById('preview'); if(p) p.style.setProperty('--accent',c);
  const b=document.getElementById('pv-body'); if(b) b.setAttribute('fill',c);
  const eb=document.getElementById('sh-blob'); if(eb) eb.setAttribute('fill',c);
  const _hc=darkenHex(c,0.16); document.querySelectorAll('#pv-stage .hairbase').forEach(el=>el.setAttribute('fill',_hc));
  document.querySelectorAll('#pv-stage .bodypart').forEach(el=>el.setAttribute('fill',c));
  const _dp=lightenHex(c,0.55); document.querySelectorAll('#pv-stage .dresspart').forEach(el=>el.setAttribute('fill',_dp));
  if(doPop) pvPop();
  updateSummaries();
}
function pvTopping(e){ document.querySelectorAll('#pv-stage .ctop').forEach(t=>t.textContent=e); pvPop(); updateSummaries(); }
function updateSummaries(){
  const a=document.getElementById('sum-looks'); if(a) a.innerHTML='<span class="dot" style="background:'+draft.color+'"></span>'+(draft.topping||'')+(draft.topping||'');
  const b=document.getElementById('sum-personality'); if(b) b.textContent=draft.traits.length?('('+draft.traits.length+')'):'';
  const c=document.getElementById('sum-skills'); if(c) c.textContent=draft.knowledge.length?('('+draft.knowledge.length+')'):'';
}
function rebuildCreature(){
  const stage=document.getElementById('pv-stage'); if(!stage) return;
  stage.innerHTML = stageInner(draft,{animId:'pv-anim',bodyId:'pv-body',clipPathId:'pv-clippath',accents:true,idle:true});
  pvPop(); updateSummaries();
}
function renderShapeEditor(){
  const blob=document.getElementById('sh-blob'); if(!blob) return;
  const pts=shapePts(draft.shape);
  blob.setAttribute('d', catmullRomClosed(pts));
  blob.setAttribute('fill', draft.color);
  const svg=document.getElementById('sh-editor');
  svg.querySelectorAll('.sh-handle').forEach(g=>{ const i=+g.getAttribute('data-idx'); g.setAttribute('transform','translate('+pts[i][0].toFixed(2)+' '+pts[i][1].toFixed(2)+')'); });
}
function updatePreviewShape(){
  const d=blobPath(draft.shape);
  const b=document.getElementById('pv-body'); if(b) b.setAttribute('d',d);
  const cp=document.getElementById('pv-clippath'); if(cp) cp.setAttribute('d',d);
}
function roundShape(){ const r=draft.shape.r; const m=r.reduce((a,b)=>a+b,0)/r.length; draft.shape.r=r.map(v=>v+(m-v)*0.5); renderShapeEditor(); rebuildCreature(); }
let calView=null;
function openCal(){
  const pop=document.getElementById('cal-pop'); if(!pop) return;
  if(pop.style.display==='none'){
    const base= draft.birthday? parseISO(draft.birthday) : {y:new Date().getFullYear(),m:new Date().getMonth()};
    calView={y:base.y,m:base.m}; pop.style.display='block'; renderCalendar();
    pop.scrollIntoView({behavior:'smooth',block:'nearest'});
  } else { pop.style.display='none'; }
}
function renderCalendar(){
  const pop=document.getElementById('cal-pop'); if(!pop||!calView) return;
  const y=calView.y, m=calView.m, first=new Date(y,m,1).getDay(), dim=daysInMonth(y,m), today=todayMid();
  const sel= draft.birthday? parseISO(draft.birthday):null;
  let cells='';
  for(let i=0;i<first;i++) cells+='<div class="cal-day empty"></div>';
  for(let d=1;d<=dim;d++){
    const cur=new Date(y,m,d), future=cur>today; let cls='cal-day';
    if(!future && today.getFullYear()===y && today.getMonth()===m && today.getDate()===d) cls+=' today';
    if(sel && sel.y===y && sel.m===m && sel.d===d) cls+=' sel';
    if(future){ cls+=' future'; cells+='<div class="'+cls+'">'+d+'</div>'; }
    else cells+='<button type="button" class="'+cls+'" data-day="'+d+'">'+d+'</button>';
  }
  const dow=['S','M','T','W','T','F','S'].map(x=>'<div class="cal-dow">'+x+'</div>').join('');
  pop.innerHTML='<div class="cal-head"><button type="button" class="cal-arrow" data-cal="pm">‹</button><div class="cal-title">'+MN[m]+'</div><button type="button" class="cal-arrow" data-cal="nm">›</button></div>'
    +'<div class="cal-head cal-year"><button type="button" class="cal-arrow" data-cal="py">‹</button><div class="cal-title" style="font-size:15px">'+y+'</div><button type="button" class="cal-arrow" data-cal="ny">›</button></div>'
    +'<div class="cal-grid">'+dow+cells+'</div>';
  pop.querySelectorAll('[data-cal]').forEach(b=>b.addEventListener('click',()=>navCal(b.getAttribute('data-cal'))));
  pop.querySelectorAll('[data-day]').forEach(b=>b.addEventListener('click',()=>selectDay(+b.getAttribute('data-day'))));
}
function navCal(dir){
  if(dir==='pm'){ calView.m--; if(calView.m<0){calView.m=11;calView.y--;} }
  else if(dir==='nm'){ calView.m++; if(calView.m>11){calView.m=0;calView.y++;} }
  else if(dir==='py'){ calView.y--; } else if(dir==='ny'){ calView.y++; }
  renderCalendar();
}
function selectDay(d){
  draft.birthday=isoYMD(calView.y,calView.m,d);
  const row=document.getElementById('bday-row'); if(row){ row.innerHTML=bdayRowInner(draft); reWireBday(); }
  const pa=document.getElementById('pv-age'); if(pa) pa.textContent=ageLabel(draft.birthday);
  const pop=document.getElementById('cal-pop'); if(pop) pop.style.display='none';
}
function clearBday(){
  draft.birthday=null;
  const row=document.getElementById('bday-row'); if(row){ row.innerHTML=bdayRowInner(draft); reWireBday(); }
  const pa=document.getElementById('pv-age'); if(pa) pa.textContent='';
  const pop=document.getElementById('cal-pop'); if(pop) pop.style.display='none';
}
function reWireBday(){
  const row=document.getElementById('bday-row'); if(!row) return;
  row.querySelectorAll('[data-bday="open"]').forEach(b=>b.addEventListener('click',openCal));
  row.querySelectorAll('[data-bday="clear"]').forEach(b=>b.addEventListener('click',clearBday));
}
let shapeDrag=null;
function shapeEditorWire(){
  const svg=document.getElementById('sh-editor'); if(!svg) return;
  const toSvg=(e)=>{ const r=svg.getBoundingClientRect(); return [ (e.clientX-r.left)/r.width*120, (e.clientY-r.top)/r.height*120 ]; };
  const onMove=(e)=>{
    if(shapeDrag==null) return; e.preventDefault();
    const xy=toSvg(e); const i=shapeDrag; const ang=-Math.PI/2+i*(2*Math.PI/12);
    const w=draft.shape.w||1, h=draft.shape.h||1;
    const ux=(xy[0]-60)/w, uy=(xy[1]-62)/h;
    let rr=ux*Math.cos(ang)+uy*Math.sin(ang); rr=Math.max(12,Math.min(56,rr));
    draft.shape.r[i]=rr; renderShapeEditor(); updatePreviewShape();
  };
  const onUp=()=>{ if(shapeDrag!=null){ shapeDrag=null; rebuildCreature(); window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); window.removeEventListener('pointercancel',onUp); } };
  svg.querySelectorAll('.sh-handle').forEach(g=>g.addEventListener('pointerdown',(e)=>{
    e.preventDefault(); shapeDrag=parseInt(g.getAttribute('data-idx'),10);
    window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
  }));
}
function speak(stage, text){
  if(!stage) return;
  const old=stage.querySelector('.bubble'); if(old) old.remove();
  const b=document.createElement('span'); b.className='bubble'; b.textContent=text||'...';
  stage.appendChild(b);
  pulse(stage.querySelector('.creature-anim'),'react',640);
  setTimeout(()=>{ b.classList.add('out'); setTimeout(()=>{ if(b.parentNode) b.remove(); },300); },1500);
}
function sayText(cr){ return cr.sound || (cr.loves? ('I love '+cr.loves+'!') : '...'); }

/* ---------- events ---------- */
function wire(){
  document.querySelectorAll('[data-open]').forEach(n=>n.addEventListener('click',e=>{ e.stopPropagation(); go('detail', n.getAttribute('data-open')); }));
  document.querySelectorAll('.sec-head[data-toggle]').forEach(h=>h.addEventListener('click',()=>{
    const key=h.getAttribute('data-toggle'); const sec=h.closest('.section');
    if(openSections.has(key)){ openSections.delete(key); sec.classList.remove('open'); }
    else { openSections.add(key); sec.classList.add('open'); }
  }));
  shapeEditorWire();
  reWireBday();
  document.querySelectorAll('[data-preset]').forEach(b=>b.addEventListener('click',()=>{
    draft.shape={r:SHAPE_PRESETS[b.getAttribute('data-preset')].slice(),w:1,h:1};
    const sw=document.getElementById('sh-w'); if(sw) sw.value=1;
    const sh=document.getElementById('sh-h'); if(sh) sh.value=1;
    renderShapeEditor(); rebuildCreature();
  }));
  const sw=document.getElementById('sh-w');
  if(sw){ sw.addEventListener('input',()=>{ draft.shape.w=parseFloat(sw.value); renderShapeEditor(); updatePreviewShape(); }); sw.addEventListener('change',()=>rebuildCreature()); }
  const shh=document.getElementById('sh-h');
  if(shh){ shh.addEventListener('input',()=>{ draft.shape.h=parseFloat(shh.value); renderShapeEditor(); updatePreviewShape(); }); shh.addEventListener('change',()=>rebuildCreature()); }
  document.querySelectorAll('[data-act]').forEach(n=>n.addEventListener('click',()=>{
    const act=n.getAttribute('data-act');
    if(act==='new') go('form');
    else if(act==='back') go('gallery');
    else if(act==='edit') go('form', n.getAttribute('data-id'));
    else if(act==='delete') doDelete(n.getAttribute('data-id'));
    else if(act==='save') doSave();
    else if(act==='add-trait') addTrait();
    else if(act==='add-topping') addTopping();
    else if(act==='add-skill') addSkill();
    else if(act==='round-shape') roundShape();
    else if(act==='export') doExport();
    else if(act==='import') doImport();
  }));
  // color swatches
  document.querySelectorAll('#swatches .sw').forEach(s=>s.addEventListener('click',()=>{
    draft.color=s.getAttribute('data-color');
    document.querySelectorAll('#swatches .sw').forEach(x=>x.classList.remove('sel'));
    s.classList.add('sel'); pvColor(draft.color,true);
  }));
  const cc=document.getElementById('customcolor');
  if(cc){
    cc.addEventListener('input',()=>{ draft.color=cc.value; document.querySelectorAll('#swatches .sw').forEach(x=>x.classList.remove('sel')); pvColor(draft.color,false); });
    cc.addEventListener('change',()=>{ pvPop(); });
  }
  // look option groups
  document.querySelectorAll('[data-optfield]').forEach(b=>b.addEventListener('click',()=>{
    const f=b.getAttribute('data-optfield'), v=b.getAttribute('data-optval');
    draft[f]=v;
    document.querySelectorAll('[data-optfield="'+f+'"]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); rebuildCreature();
  }));
  document.querySelectorAll('#tipswatches .sw').forEach(s=>s.addEventListener('click',()=>{
    const v=s.getAttribute('data-hairtip'); draft.hairTip=(v==='same'?null:v);
    document.querySelectorAll('#tipswatches .sw').forEach(x=>x.classList.remove('sel'));
    s.classList.add('sel'); rebuildCreature();
  }));
  // toppings
  document.querySelectorAll('.emo[data-emo]').forEach(b=>b.addEventListener('click',()=>{
    draft.topping=b.getAttribute('data-emo');
    document.querySelectorAll('.emo[data-emo]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); pvTopping(draft.topping);
  }));
  // personality
  document.querySelectorAll('#traits .trait').forEach(b=>b.addEventListener('click',()=>{
    const t=b.getAttribute('data-trait');
    if(draft.traits.includes(t)){ draft.traits=draft.traits.filter(x=>x!==t); b.classList.remove('sel'); }
    else { draft.traits.push(t); b.classList.add('sel'); }
    rebuildCreature();
  }));
  // skills
  document.querySelectorAll('#knlist .kn-toggle').forEach(b=>b.addEventListener('click',()=>{
    const sk=b.getAttribute('data-skill');
    const sel = document.querySelector('#knlist .kn-teacher[data-skill="'+cssEsc(sk)+'"]');
    if(knows(sk)){ draft.knowledge=draft.knowledge.filter(k=>k.skill!==sk); b.classList.remove('sel'); if(sel){sel.style.display='none'; sel.value='';} }
    else { draft.knowledge.push({skill:sk, teacherId:null}); b.classList.add('sel'); if(sel){sel.style.display='';} pvReact(); }
    const ln=document.getElementById('pv-learned'); if(ln) ln.textContent=learnedLabel(draft);
    updateSummaries();
  }));
  document.querySelectorAll('#knlist .kn-teacher').forEach(s=>s.addEventListener('change',()=>{
    const sk=s.getAttribute('data-skill'); const k=knows(sk); if(k) k.teacherId = s.value || null;
  }));
  // live name/flavor
  const nm=document.getElementById('f_name');
  if(nm) nm.addEventListener('input',()=>{ const el=document.getElementById('pv-name'); if(el) el.textContent = nm.value.trim()||'Your new creature'; });
  const fl=document.getElementById('f_flavor');
  if(fl) fl.addEventListener('input',()=>{ const el=document.getElementById('pv-flav'); if(el) el.textContent = fl.value.trim(); });
  // tap to speak (preview)
  const pvStage=document.getElementById('pv-stage');
  if(pvStage) pvStage.addEventListener('click',()=>{ readForm(); speak(pvStage, sayText(draft)); });
  // tap to speak (detail)
  const dStage=document.getElementById('detail-stage');
  if(dStage) dStage.addEventListener('click',()=>{ const c=byId(view.id); if(c) speak(dStage, sayText(c)); });
}
function cssEsc(s){ return (s||'').replace(/"/g,'\\"'); }

function addTrait(){
  const v=document.getElementById('add_trait').value.trim(); if(!v) return;
  if(!allTraits().includes(v)){ state.customTraits.push(v); save(); }
  if(!draft.traits.includes(v)) draft.traits.push(v);
  reRenderForm();
}
function addTopping(){
  const v=document.getElementById('add_topping').value.trim(); if(!v) return;
  if(!allToppings().includes(v)){ state.customToppings.push(v); save(); }
  draft.topping=v; reRenderForm();
}
function addSkill(){
  const v=document.getElementById('add_skill').value.trim(); if(!v) return;
  if(!allSkills().includes(v)){ state.skills.push(v); save(); }
  if(!knows(v)) draft.knowledge.push({skill:v, teacherId:null});
  reRenderForm();
}
function reRenderForm(){
  readForm();
  const keepId = draft.id;
  document.getElementById('app').innerHTML = formHTML(keepId?draft:Object.assign({},draft,{id:null}));
  draft.id = keepId; wire();
}

function doSave(){
  readForm();
  if(!draft.name && !draft.flavor){ alert('Give your creature at least a name first.'); return; }
  if(draft.id){
    const i=state.creatures.findIndex(c=>c.id===draft.id);
    if(i>-1) state.creatures[i]=Object.assign(state.creatures[i],draft);
    save(); go('detail', draft.id);
  }else{
    draft.id=uid(); draft.num=state.nextNum++;
    state.creatures.push(JSON.parse(JSON.stringify(draft)));
    save(); go('detail', draft.id, 'created');
  }
}
function doDelete(id){
  const c=byId(id);
  if(confirm('Delete '+((c&&c.name)||'this creature')+'? This cannot be undone.')){
    state.creatures=state.creatures.filter(c=>c.id!==id);
    state.creatures.forEach(c=>{ (c.knowledge||[]).forEach(k=>{ if(k.teacherId===id) k.teacherId=null; }); });
    save(); go('gallery');
  }
}

/* ---------- celebration ---------- */
function celebrate(){
  try{ if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return; }catch(e){}
  const colors=['#E2607A','#BFE3D0','#F4E08A','#CBB8E0','#F3B0DD','#A9C4E8'];
  const layer=document.createElement('div');
  layer.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(layer);
  for(let i=0;i<28;i++){
    const p=document.createElement('div'); const col=colors[i%colors.length];
    const left=Math.random()*100, size=6+Math.random()*7, dur=950+Math.random()*750, delay=Math.random()*220, rot=Math.random()*360;
    p.style.cssText='position:absolute;top:-24px;left:'+left+'%;width:'+size+'px;height:'+size+'px;background:'+col+';border-radius:'+(Math.random()<.5?'50%':'3px')+';opacity:.92;transform:rotate('+rot+'deg);animation:cfall '+dur+'ms ease-in '+delay+'ms forwards';
    layer.appendChild(p);
  }
  setTimeout(()=>layer.remove(),2100);
}

let ambientTimer=null;
function reducedMotion(){ try{ return window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } }
function startAmbient(){
  clearInterval(ambientTimer);
  if(reducedMotion()) return;
  ambientTimer=setInterval(()=>{
    const el=document.getElementById('pv-anim')||document.getElementById('detail-creature');
    if(!el) return;
    if(el.classList.contains('pop')||el.classList.contains('react')||el.classList.contains('hop')) return;
    if(Math.random()<0.78) pulse(el,'react',640); else pulse(el,'hop',760);
  }, 7000);
}

/* ---------- backup / restore ---------- */
function doExport(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='garrett-creatures-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url);
}
function doImport(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(data && Array.isArray(data.creatures)){
          state=data;
          if(!state.skills) state.skills=[]; if(!state.customTraits) state.customTraits=[]; if(!state.customToppings) state.customToppings=[];
          if(!state.nextNum) state.nextNum=state.creatures.length+1;
          state.creatures.forEach(c=>{ if(!c.knowledge) c.knowledge=[]; if(typeof c.shape!=='object'||!c.shape||!Array.isArray(c.shape.r)) c.shape=shapeObj(c.shape); c.eyes=c.eyes||'dots'; c.mouth=c.mouth||'smile'; c.arms=c.arms||'paws'; if(c.arms==='nubs') c.arms='open'; c.feet=c.feet||'blocky'; c.emblem=c.emblem||'none'; c.pattern=c.pattern||'none'; c.accessory=c.accessory||'none'; c.hair=c.hair||'none'; c.hairColor=c.hairColor||'#6B4A2B'; if(c.hairTip===undefined) c.hairTip=null; if(c.birthday===undefined) c.birthday=null; });
          save(); go('gallery');
        }else alert('That file does not look like a creature backup.');
      }catch(e){ alert('Could not read that file.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

render();
</script>
