<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>BeatForge</title>
<link rel="manifest" href='data:application/json,{"name":"BeatForge","short_name":"BeatForge","start_url":".","display":"standalone","background_color":"%230a0a0c","theme_color":"%230a0a0c","orientation":"portrait","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27512%27 height=%27512%27%3E%3Crect width=%27512%27 height=%27512%27 fill=%27%230a0a0c%27/%3E%3Ccircle cx=%27256%27 cy=%27256%27 r=%27150%27 fill=%27none%27 stroke=%27%23b0d235%27 stroke-width=%2738%27 stroke-dasharray=%2750 30%27/%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
<style>
  :root{
    --bg:#0a0a0c; --panel:#141417; --line:#26262b; --txt:#e8e8ec; --dim:#8a8a92;
    --accent:#b0d235;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    user-select:none;-webkit-user-select:none;}
  body{display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}

  header{display:flex;align-items:center;gap:12px;padding:14px 16px 10px;}
  header h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.3px;flex:1;}
  .kitsel{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:7px 10px;font-size:13px;}
  .icobtn{width:38px;height:38px;border-radius:50%;background:var(--panel);
    border:1px solid var(--line);color:var(--dim);font-size:16px;display:flex;
    align-items:center;justify-content:center;}
  .icobtn.rec.on{color:#ff4b4b;border-color:#ff4b4b;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.45;}}

  .transport{display:flex;align-items:center;gap:14px;padding:0 16px 10px;}
  .transport .bpm{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);}
  .transport input[type=range]{flex:1;accent-color:var(--accent);}
  .bpmval{color:var(--txt);font-variant-numeric:tabular-nums;width:34px;text-align:right;}

  main{flex:1;overflow-y:auto;padding:0 12px 8px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

  .pad{position:relative;aspect-ratio:1/1;border-radius:14px;border:1px solid rgba(255,255,255,.06);
    display:flex;flex-direction:column;justify-content:flex-end;padding:9px;overflow:hidden;
    transition:transform .06s, box-shadow .12s;}
  .pad:active{transform:scale(.96);}
  .pad .ring{position:absolute;top:9px;left:9px;width:22px;height:22px;border-radius:50%;
    border:2.5px dashed currentColor;opacity:.55;transition:opacity .15s;}
  .pad.live .ring{opacity:1;animation:spin 2.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .pad .lbl{font-size:13px;font-weight:600;line-height:1.1;}
  .pad.live{box-shadow:0 0 0 2px currentColor, 0 0 18px -2px currentColor;}
  .pad .bar{position:absolute;left:0;bottom:0;height:3px;width:0;background:currentColor;opacity:.9;}

  /* Mix view */
  .mix{display:none;flex-direction:column;gap:6px;}
  .mixrow{display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .mixrow .dot{width:12px;height:12px;border-radius:3px;flex:none;}
  .mixrow .mname{font-size:12px;width:60px;color:var(--dim);}
  .mixrow input[type=range]{flex:1;}
  .mixrow .mute{font-size:11px;padding:5px 9px;border-radius:7px;background:#222;
    border:1px solid var(--line);color:var(--dim);}
  .mixrow .mute.on{background:#3a1414;color:#ff7a7a;border-color:#6a2020;}

  /* FX view */
  .fx{display:none;flex-direction:column;gap:10px;}
  .fxrow{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:12px;}
  .fxrow .fxname{width:74px;font-size:13px;font-weight:600;}
  .fxrow .toggle{margin-left:auto;width:46px;height:26px;border-radius:14px;background:#2a2a30;
    position:relative;flex:none;transition:background .15s;}
  .fxrow .toggle.on{background:var(--accent);}
  .fxrow .toggle::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;
    border-radius:50%;background:#fff;transition:left .15s;}
  .fxrow .toggle.on::after{left:23px;}
  .fxrow input[type=range]{flex:1;accent-color:var(--accent);}

  nav{display:flex;border-top:1px solid var(--line);background:#0c0c0e;}
  nav button{flex:1;background:none;border:none;color:var(--dim);padding:11px 0 14px;
    font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;}
  nav button .ni{font-size:18px;line-height:1;}
  nav button.active{color:var(--accent);}

  /* Training / overlay */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;z-index:40;
    align-items:center;justify-content:center;padding:24px;}
  .scrim.show{display:flex;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:22px;max-width:340px;width:100%;}
  .card h2{margin:0 0 6px;font-size:18px;}
  .card .step{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .card p{font-size:14px;line-height:1.5;color:#d4d4da;margin:0 0 18px;}
  .card .row{display:flex;gap:10px;}
  .card button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);
    background:#1d1d22;color:var(--txt);font-size:14px;font-weight:600;}
  .card button.primary{background:var(--accent);color:#10130a;border-color:var(--accent);}
  .card .skip{background:none;border:none;color:var(--dim);font-size:12px;margin-top:14px;width:100%;}

  .hl{position:fixed;border:2px solid var(--accent);border-radius:14px;z-index:39;
    pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.55);transition:all .25s;display:none;}
  .hl.show{display:block;}

  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
    background:#1d1d22;border:1px solid var(--line);color:var(--txt);padding:10px 16px;
    border-radius:20px;font-size:13px;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>BeatForge</h1>
  <select class="kitsel" id="kitsel"></select>
  <button class="icobtn rec" id="recbtn" title="Record">●</button>
  <button class="icobtn" id="helpbtn" title="How it works">?</button>
</header>

<div class="transport">
  <div class="bpm">BPM</div>
  <input type="range" id="bpm" min="70" max="160" value="100">
  <span class="bpmval" id="bpmval">100</span>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="mix" id="mix"></div>
  <div class="fx" id="fx">
    <div class="fxrow" data-fx="filter">
      <span class="fxname">Filter</span>
      <input type="range" min="200" max="14000" value="14000" id="fx-filter">
      <div class="toggle" data-toggle="filter"></div>
    </div>
    <div class="fxrow" data-fx="delay">
      <span class="fxname">Delay</span>
      <input type="range" min="0" max="80" value="35" id="fx-delay">
      <div class="toggle" data-toggle="delay"></div>
    </div>
    <div class="fxrow" data-fx="reverb">
      <span class="fxname">Reverb</span>
      <input type="range" min="0" max="100" value="45" id="fx-reverb">
      <div class="toggle" data-toggle="reverb"></div>
    </div>
    <div class="fxrow" data-fx="crush">
      <span class="fxname">Drive</span>
      <input type="range" min="0" max="100" value="30" id="fx-crush">
      <div class="toggle" data-toggle="crush"></div>
    </div>
  </div>
</main>

<nav>
  <button data-view="grid" class="active"><span class="ni">◎</span>Loop</button>
  <button data-view="mix"><span class="ni">≡</span>Mix</button>
  <button data-view="fx"><span class="ni">∿</span>FX</button>
  <button id="addbtn"><span class="ni">＋</span>Add</button>
</nav>
<input type="file" id="fileinput" accept="audio/*" multiple style="display:none">

<div class="hl" id="hl"></div>
<div class="scrim" id="scrim">
  <div class="card">
    <div class="step" id="t-step"></div>
    <h2 id="t-title"></h2>
    <p id="t-body"></p>
    <div class="row">
      <button id="t-back">Back</button>
      <button class="primary" id="t-next">Next</button>
    </div>
    <button class="skip" id="t-skip">Skip tutorial</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
//==================================================================
// BeatForge — single-file loop launcher. Web Audio synth engine,
// tempo-synced loops, mix, FX, recording, sample import, training.
//==================================================================
const A = {ctx:null, master:null, started:false};

// ---- Audio graph (built lazily on first user gesture) ----
function makeImpulse(ctx, seconds, decay){
  const rate = ctx.sampleRate, len = rate*seconds;
  const buf = ctx.createBuffer(2, len, rate);
  for(let c=0;c<2;c++){
    const d = buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, decay);
  }
  return buf;
}
function initAudio(){
  if(A.ctx) return;
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  A.ctx = ctx;

  const master = ctx.createGain(); master.gain.value = 0.9;

  // FX chain: busIn -> drive -> filter -> [dry + delay + reverb] -> master -> out
  const busIn = ctx.createGain();
  const drive = ctx.createWaveShaper();
  const filter = ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=14000;
  const dry = ctx.createGain(); dry.gain.value=1;

  const delay = ctx.createDelay(1.0); delay.delayTime.value=0.30;
  const fb = ctx.createGain(); fb.gain.value=0.35;
  const delaySend = ctx.createGain(); delaySend.gain.value=0;
  delay.connect(fb); fb.connect(delay);

  const reverb = ctx.createConvolver(); reverb.buffer = makeImpulse(ctx,2.4,3.0);
  const revSend = ctx.createGain(); revSend.gain.value=0;

  busIn.connect(drive); drive.connect(filter);
  filter.connect(dry); dry.connect(master);
  filter.connect(delaySend); delaySend.connect(delay); delay.connect(master);
  filter.connect(revSend); revSend.connect(reverb); reverb.connect(master);

  // recording tap
  const recDest = ctx.createMediaStreamDestination();
  master.connect(ctx.destination);
  master.connect(recDest);

  A.master=master; A.busIn=busIn; A.drive=drive; A.filter=filter;
  A.delaySend=delaySend; A.revSend=revSend; A.recDest=recDest;
  setDrive(0);
}
function setDrive(amount){ // amount 0..1
  const k = amount*100, n=44100, curve=new Float32Array(n), deg=Math.PI/180;
  for(let i=0;i<n;i++){ const x=i*2/n-1; curve[i]=(3+k)*x*20*deg/(Math.PI+k*Math.abs(x)); }
  if(A.drive) A.drive.curve = amount>0?curve:null;
}

// ---- Note helpers ----
function ntf(n){ return 440*Math.pow(2,(n-69)/12); } // midi -> Hz
const SCALE = {Am:[57,60,62,64,65,67,69], C:[60,62,64,65,67,69,71]};

// ---- Voices (each returns nothing, schedules at time t) ----
function vKick(t){ const c=A.ctx,o=c.createOscillator(),g=c.createGain();
  o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(48,t+.12);
  g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(.001,t+.28);
  o.connect(g); g.connect(busFor()); o.start(t); o.stop(t+.3); }
function vSnare(t){ const c=A.ctx; const nb=noise(.2),hp=c.createBiquadFilter();
  hp.type='highpass';hp.frequency.value=1400; const g=c.createGain();
  g.gain.setValueAtTime(.8,t); g.gain.exponentialRampToValueAtTime(.001,t+.18);
  nb.connect(hp);hp.connect(g);g.connect(busFor());nb.start(t);nb.stop(t+.2);
  const o=c.createOscillator(),og=c.createGain();o.type='triangle';o.frequency.value=190;
  og.gain.setValueAtTime(.5,t);og.gain.exponentialRampToValueAtTime(.001,t+.12);
  o.connect(og);og.connect(busFor());o.start(t);o.stop(t+.12);}
function vHat(t,open){ const c=A.ctx,nb=noise(open?.3:.06),hp=c.createBiquadFilter();
  hp.type='highpass';hp.frequency.value=7000;const g=c.createGain();
  const d=open?.22:.05;g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  nb.connect(hp);hp.connect(g);g.connect(busFor());nb.start(t);nb.stop(t+d+.02);}
function vBass(t,midi){ const c=A.ctx,o=c.createOscillator(),lp=c.createBiquadFilter(),g=c.createGain();
  o.type='sawtooth';o.frequency.value=ntf(midi);lp.type='lowpass';lp.frequency.value=700;
  g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.5,t+.01);
  g.gain.exponentialRampToValueAtTime(.001,t+.34);
  o.connect(lp);lp.connect(g);g.connect(busFor());o.start(t);o.stop(t+.36);}
function vLead(t,midi){ const c=A.ctx,o=c.createOscillator(),g=c.createGain();
  o.type='square';o.frequency.value=ntf(midi);
  g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.28,t+.01);
  g.gain.exponentialRampToValueAtTime(.001,t+.3);
  o.connect(g);g.connect(busFor());o.start(t);o.stop(t+.32);}
function vPad(t,midis,dur){ const c=A.ctx,g=c.createGain();
  g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.16,t+.25);
  g.gain.setValueAtTime(.16,t+dur-.3);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2600;
  midis.forEach(m=>{const o=c.createOscillator();o.type='sawtooth';o.frequency.value=ntf(m);
    o.detune.value=(Math.random()*8-4);o.connect(g);o.start(t);o.stop(t+dur);});
  g.connect(lp);lp.connect(busFor());}
function vArp(t,midi){ const c=A.ctx,o=c.createOscillator(),g=c.createGain();
  o.type='triangle';o.frequency.value=ntf(midi);
  g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.16);
  o.connect(g);g.connect(busFor());o.start(t);o.stop(t+.18);}
function noise(dur){ const c=A.ctx,b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; const s=c.createBufferSource();s.buffer=b;return s;}
let _busTarget=null; function busFor(){ return _busTarget; }

// ---- Pad model ----
// type: drum role / pitched role. pattern of length L (16 steps = 1 bar).
// Each pad has its own gain node feeding the FX bus.
function P(label,family,len,fn){ return {label,family,len,fn}; }

// Kits: families map to colors. Each pad's fn(step,t) triggers its loop slice.
const FAM = {
  Beat:'#9b5de5', Bass:'#3a86ff', Chord:'#ef476f', Pad:'#ff70a6',
  Lead:'#c08a3e', Arp:'#56b870', Keys:'#f4a261', Synth:'#48cae4', Sample:'#9aa0aa'
};

function kitSynthWave(){
  const am=[57,60,64], f=[53,57,60], c=[48,55,60], g=[55,59,62]; // chords
  const prog=[am,am,f,c,g,c,am,am];
  const bassNotes=[33,33,29,36,31,36,33,33];
  const leadRiff=[69,67,64,67,69,72,71,69, 64,67,69,71,69,67,64,62];
  const arpSeq=[57,64,69,72,69,64,60,69];
  return [
    P('Beat',  'Beat', 16, (s,t)=>{ if(s%4===0)vKick(t); if(s%8===4)vSnare(t); if(s%2===0)vHat(t,false);}),
    P('Beat',  'Beat', 16, (s,t)=>{ if(s%8===0||s===6)vKick(t); if(s%8===4)vSnare(t); vHat(t,s%4===2);}),
    P('Beat',  'Beat', 16, (s,t)=>{ if(s%4===0)vKick(t); if(s%4===2)vHat(t,true);}),
    P('Beat',  'Beat', 16, (s,t)=>{ if([0,3,6,8,10,14].includes(s))vKick(t); if(s%8===4)vSnare(t);}),
    P('Bass',  'Bass', 16, (s,t)=>{ if(s%2===0)vBass(t,bassNotes[(s/2)|0]);}),
    P('Bass',  'Bass', 16, (s,t)=>{ if(s%4===0)vBass(t,bassNotes[(s/4)|0]-12<24?bassNotes[(s/4)|0]:bassNotes[(s/4)|0]);}),
    P('Bass',  'Bass', 16, (s,t)=>{ if([0,3,6,8,11,14].includes(s))vBass(t,bassNotes[(s/2)|0]||33);}),
    P('Bass',  'Bass', 16, (s,t)=>{ if(s===0||s===8)vBass(t,33);}),
    P('Chord', 'Chord',16, (s,t)=>{ if(s===0)vPad(t,prog[0],beat()*4); if(s===8)vPad(t,prog[2],beat()*4);}),
    P('Chord', 'Chord',16, (s,t)=>{ if(s===0)vPad(t,prog[4],beat()*4); if(s===8)vPad(t,prog[6],beat()*4);}),
    P('Pad',   'Pad',  16, (s,t)=>{ if(s===0)vPad(t,[64,69,72],beat()*8);}),
    P('Pad',   'Pad',  16, (s,t)=>{ if(s===0)vPad(t,[60,64,67,71],beat()*8);}),
    P('Lead',  'Lead', 16, (s,t)=>{ vLead(t,leadRiff[s]); }),
    P('Lead',  'Lead', 16, (s,t)=>{ if(s%2===0)vLead(t,leadRiff[s]+12);}),
    P('Lead',  'Lead', 16, (s,t)=>{ if([0,4,8,12].includes(s))vLead(t,[69,72,76,72][s/4]);}),
    P('Lead',  'Lead', 16, (s,t)=>{ if(s%4===2)vLead(t,leadRiff[15-s]);}),
    P('Arp',   'Arp',  16, (s,t)=>{ if(s%2===0)vArp(t,arpSeq[(s/2)%8]);}),
    P('Arp',   'Arp',  16, (s,t)=>{ vArp(t,arpSeq[s%8]+(s>=8?12:0));}),
    P('Arp',   'Arp',  16, (s,t)=>{ if(s%4===0)vArp(t,arpSeq[(s/4)%8]+12);}),
    P('Sync',  'Arp',  16, (s,t)=>{ if(s%2===0)vArp(t,[57,60,64,69][(s/2)%4]); if(s%4===0)vHat(t,true);}),
  ];
}

function kitHipHop(){
  const bn=[28,28,31,28,33,28,31,29];
  const keys=[60,63,67,70,67,63,60,58];
  return [
    P('Beat','Beat',16,(s,t)=>{ if(s===0||s===10)vKick(t); if(s%8===4)vSnare(t); if(s%2===0)vHat(t,false);}),
    P('Beat','Beat',16,(s,t)=>{ if([0,6,10].includes(s))vKick(t); if(s===4||s===12)vSnare(t); vHat(t,s===14);}),
    P('Beat','Beat',16,(s,t)=>{ if(s%4===0)vHat(t,false); if(s%4===2)vHat(t,true);}),
    P('Beat','Beat',16,(s,t)=>{ if(s===0)vKick(t); if(s===8)vSnare(t);}),
    P('Bass','Bass',16,(s,t)=>{ if(s%4===0)vBass(t,bn[(s/4)*2%8]);}),
    P('Bass','Bass',16,(s,t)=>{ if([0,7,10].includes(s))vBass(t,bn[s%8]);}),
    P('Bass','Bass',16,(s,t)=>{ if(s===0||s===6)vBass(t,28);}),
    P('Bass','Bass',16,(s,t)=>{ if(s%2===0)vBass(t,bn[(s/2)%8]);}),
    P('Keys','Keys',16,(s,t)=>{ if(s%4===0)vLead(t,keys[(s/4)%8]);}),
    P('Keys','Keys',16,(s,t)=>{ if(s===0)vPad(t,[60,63,67],beat()*4); if(s===8)vPad(t,[58,62,65],beat()*4);}),
    P('Keys','Keys',16,(s,t)=>{ if(s%2===0)vArp(t,keys[(s/2)%8]);}),
    P('Keys','Keys',16,(s,t)=>{ vLead(t,keys[s%8]); }),
    P('Pad','Pad',16,(s,t)=>{ if(s===0)vPad(t,[48,55,60],beat()*8);}),
    P('Pad','Pad',16,(s,t)=>{ if(s===0)vPad(t,[51,58,63],beat()*8);}),
    P('Synth','Synth',16,(s,t)=>{ if([0,4,8,12].includes(s))vLead(t,[72,75,79,75][s/4]);}),
    P('Synth','Synth',16,(s,t)=>{ if(s%4===2)vArp(t,[72,76,79,84][(s-2)/4%4]);}),
    P('Lead','Lead',16,(s,t)=>{ if(s%4===0)vLead(t,keys[(s/4)%8]+12);}),
    P('Lead','Lead',16,(s,t)=>{ if([0,3,6,9].includes(s))vLead(t,keys[s%8]+12);}),
    P('Arp','Arp',16,(s,t)=>{ if(s%2===0)vArp(t,[60,63,67,70][(s/2)%4]);}),
    P('Sync','Arp',16,(s,t)=>{ if(s%2===0)vHat(t,s%4===2); if(s===0)vKick(t);}),
  ];
}

const KITS = {'SynthWave':kitSynthWave, 'Modern Hip-Hop':kitHipHop};

// ---- State ----
let pads=[];        // active kit pad defs + nodes + on/off
let bpm=100;
function beat(){ return 60/bpm; }            // seconds per quarter note
function stepDur(){ return beat()/4; }       // 16th note

// ---- Sequencer (lookahead scheduler) ----
const SCHED = {next:0, step:0, timer:null, lookahead:0.10, interval:25, q:[]};
function startClock(){
  if(SCHED.timer) return;
  SCHED.next = A.ctx.currentTime + 0.06; SCHED.step=0;
  SCHED.timer = setInterval(scheduler, SCHED.interval);
}
function stopClock(){ clearInterval(SCHED.timer); SCHED.timer=null; }
function scheduler(){
  const sd = stepDur();
  while(SCHED.next < A.ctx.currentTime + SCHED.lookahead){
    const t = SCHED.next, step = SCHED.step;
    _busTarget = A.busIn; // default; per-pad overrides below
    pads.forEach(p=>{
      if(!p.on || p.muted) return;
      _busTarget = p.gain;            // route this pad's voices to its own gain
      try{ p.fn(step % p.len, t); }catch(e){}
    });
    SCHED.q.push({step, t});
    SCHED.next += sd; SCHED.step = (SCHED.step+1)%16;
  }
}
// visual step pulse
function drawLoop(){
  if(A.ctx){
    const now = A.ctx.currentTime;
    while(SCHED.q.length && SCHED.q[0].t < now){
      const cur = SCHED.q.shift().step;
      pads.forEach(p=>{ if(p.on && p.barEl){
        p.barEl.style.transition='none';
        p.barEl.style.width = ((cur%p.len)/(p.len-1)*100)+'%';
      }});
    }
  }
  requestAnimationFrame(drawLoop);
}
requestAnimationFrame(drawLoop);

// ---- Build UI for a kit ----
function loadKit(name){
  // stop everything
  pads.forEach(p=>{ if(p.gain) p.gain.disconnect(); });
  pads = KITS[name]().map(def=>({...def, on:false, muted:false, vol:0.85}));
  // include any imported samples
  samples.forEach(s=> pads.push(makeSamplePad(s)));
  buildGrid(); buildMix();
}
function ensureNodes(p){
  if(p.gain) return;
  const g=A.ctx.createGain(); g.gain.value=p.vol; g.connect(A.busIn); p.gain=g;
}
function buildGrid(){
  const grid=document.getElementById('grid'); grid.innerHTML='';
  pads.forEach((p,i)=>{
    const el=document.createElement('div'); el.className='pad';
    const col=FAM[p.family]||'#888'; el.style.color=col;
    el.style.background='linear-gradient(160deg,'+hexA(col,.22)+','+hexA(col,.07)+')';
    el.innerHTML='<div class="ring"></div><div class="bar"></div><div class="lbl">'+p.label+'</div>';
    p.el=el; p.barEl=el.querySelector('.bar');
    el.addEventListener('click',()=>togglePad(p));
    grid.appendChild(el);
  });
}
function togglePad(p){
  startAudio();
  ensureNodes(p);
  p.on=!p.on;
  p.el.classList.toggle('live',p.on);
  if(p.on) startClock();
  if(!pads.some(x=>x.on)){ /* keep clock running; cheap */ }
  if(p.mixEl) p.mixEl.querySelector('.dot').style.opacity = p.on?1:.3;
}
function buildMix(){
  const mix=document.getElementById('mix'); mix.innerHTML='';
  pads.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='mixrow';
    const col=FAM[p.family]||'#888';
    row.innerHTML='<span class="dot" style="background:'+col+';opacity:.3"></span>'+
      '<span class="mname">'+p.label+'</span>'+
      '<input type="range" min="0" max="100" value="'+Math.round(p.vol*100)+'">'+
      '<button class="mute">M</button>';
    const slider=row.querySelector('input'), mute=row.querySelector('.mute');
    slider.addEventListener('input',()=>{ p.vol=slider.value/100; ensureNodes(p); p.gain.gain.value=p.vol; });
    mute.addEventListener('click',()=>{ p.muted=!p.muted; mute.classList.toggle('on',p.muted); });
    p.mixEl=row; mix.appendChild(row);
  });
}
function hexA(hex,a){ const n=parseInt(hex.slice(1),16);
  return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')'; }

// ---- Imported samples (persisted in IndexedDB) ----
let samples=[]; // {id,name,buffer}
function makeSamplePad(s){
  return P(s.name.slice(0,8),'Sample',16,(step,t)=>{ if(step%16===0){
    const src=A.ctx.createBufferSource(); src.buffer=s.buffer; src.connect(busFor()); src.start(t);
  }});
}
// IndexedDB
let DB=null;
function openDB(){ return new Promise((res)=>{
  const r=indexedDB.open('beatforge',1);
  r.onupgradeneeded=()=>{ r.result.createObjectStore('samples',{keyPath:'id'}); };
  r.onsuccess=()=>{ DB=r.result; res(); }; r.onerror=()=>res();
});}
async function loadSamples(){
  if(!DB) return;
  const tx=DB.transaction('samples','readonly').objectStore('samples').getAll();
  tx.onsuccess=async()=>{
    for(const rec of tx.result){
      try{ const buf=await A.ctx.decodeAudioData(rec.data.slice(0)); 
        samples.push({id:rec.id,name:rec.name,buffer:buf}); }catch(e){}
    }
    if(samples.length){ loadKit(document.getElementById('kitsel').value); toast(samples.length+' saved sound(s) loaded'); }
  };
}
function saveSample(id,name,arraybuf){
  if(!DB) return;
  DB.transaction('samples','readwrite').objectStore('samples').put({id,name,data:arraybuf});
}
async function importFiles(files){
  startAudio();
  for(const f of files){
    const ab=await f.arrayBuffer();
    try{
      const buf=await A.ctx.decodeAudioData(ab.slice(0));
      const id='s'+Date.now()+Math.random().toString(36).slice(2,6);
      samples.push({id,name:f.name.replace(/\.[^.]+$/,''),buffer:buf});
      saveSample(id,f.name.replace(/\.[^.]+$/,''),ab);
    }catch(e){ toast('Could not read '+f.name); }
  }
  loadKit(document.getElementById('kitsel').value);
  toast('Added '+files.length+' sound(s)');
}

// ---- FX wiring ----
function wireFX(){
  document.querySelectorAll('.toggle').forEach(tg=>{
    tg.addEventListener('click',()=>{ startAudio();
      tg.classList.toggle('on'); applyFX();
    });
  });
  ['filter','delay','reverb','crush'].forEach(id=>{
    document.getElementById('fx-'+id).addEventListener('input',()=>{ startAudio(); applyFX(); });
  });
}
function applyFX(){
  if(!A.ctx) return;
  const on=k=>document.querySelector('.toggle[data-toggle="'+k+'"]').classList.contains('on');
  const v=id=>+document.getElementById('fx-'+id).value;
  A.filter.frequency.value = on('filter') ? v('filter') : 14000;
  A.delaySend.gain.value = on('delay') ? v('delay')/100 : 0;
  A.revSend.gain.value = on('reverb') ? v('reverb')/100 : 0;
  setDrive(on('crush') ? v('crush')/100 : 0);
}

// ---- Recording ----
let recorder=null, chunks=[];
function toggleRec(){
  startAudio();
  const btn=document.getElementById('recbtn');
  if(recorder && recorder.state==='recording'){
    recorder.stop(); btn.classList.remove('on'); return;
  }
  chunks=[];
  const mime = MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
  recorder=new MediaRecorder(A.recDest.stream,{mimeType:mime});
  recorder.ondataavailable=e=>{ if(e.data.size)chunks.push(e.data); };
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download='beatforge-'+Date.now()+(mime.includes('webm')?'.webm':'.m4a');
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),4000);
    toast('Recording saved to downloads');
  };
  recorder.start(); btn.classList.add('on'); toast('Recording…');
}

// ---- View switching ----
function setView(v){
  document.getElementById('grid').style.display = v==='grid'?'grid':'none';
  document.getElementById('mix').style.display = v==='mix'?'flex':'none';
  document.getElementById('fx').style.display = v==='fx'?'flex':'none';
  document.querySelectorAll('nav button[data-view]').forEach(b=>
    b.classList.toggle('active', b.dataset.view===v));
}

// ---- Audio gate (mobile autoplay) ----
function startAudio(){
  initAudio();
  if(A.ctx.state==='suspended') A.ctx.resume();
  if(!A.started){ A.started=true; loadSamples(); }
}

// ---- Toast ----
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }

//==================================================================
// Training mode
//==================================================================
const TOUR=[
  {sel:'.grid',title:'The pad grid',body:'Each pad is a looping piece of a song — drums, bass, chords, leads. Tap one to start its loop. Tap again to stop it. The colors group pads by instrument.'},
  {sel:'#kitsel',title:'Sound kits',body:'A kit is a matched set of sounds in one style. Pick a kit here. Every pad in a kit is tuned to play in time and in key with the others, so anything you layer fits together.'},
  {sel:'.grid',title:'Build a beat',body:'Start with a Beat pad. Then layer a Bass pad, a Chord pad, and a Lead. All loops snap to the same tempo, so they stay locked together no matter when you tap them.'},
  {sel:'.transport',title:'Tempo',body:'Drag BPM to speed up or slow down the whole track. Everything follows it instantly.'},
  {sel:'nav button[data-view="mix"]',title:'Mix',body:'The Mix tab gives every pad its own volume slider and a mute button — balance the parts, or drop one out for a breakdown.'},
  {sel:'nav button[data-view="fx"]',title:'FX',body:'Flip on Filter, Delay, Reverb, or Drive and drag to taste. These shape the whole mix in real time.'},
  {sel:'#recbtn',title:'Record',body:'Hit the red dot to capture what you’re playing. Tap it again to stop — the audio file saves straight to your phone’s downloads.'},
  {sel:'#addbtn',title:'Add your own sounds',body:'Tap Add to pull audio files from your phone’s storage. They become new pads and are saved inside the app, so they’re still here next time you open it.'},
];
let ti=0;
function showTour(i){
  ti=i; const s=TOUR[i];
  document.getElementById('t-step').textContent='Step '+(i+1)+' of '+TOUR.length;
  document.getElementById('t-title').textContent=s.title;
  document.getElementById('t-body').textContent=s.body;
  document.getElementById('t-back').style.visibility = i===0?'hidden':'visible';
  document.getElementById('t-next').textContent = i===TOUR.length-1?'Done':'Next';
  document.getElementById('scrim').classList.add('show');
  const el=document.querySelector(s.sel), hl=document.getElementById('hl');
  if(el){ const r=el.getBoundingClientRect();
    hl.style.top=(r.top-6)+'px'; hl.style.left=(r.left-6)+'px';
    hl.style.width=(r.width+12)+'px'; hl.style.height=(r.height+12)+'px';
    hl.classList.add('show');
  } else hl.classList.remove('show');
}
function endTour(){ document.getElementById('scrim').classList.remove('show');
  document.getElementById('hl').classList.remove('show');
  try{localStorage.setItem('bf_seen','1');}catch(e){} }

//==================================================================
// Boot
//==================================================================
function boot(){
  // kit selector
  const ks=document.getElementById('kitsel');
  Object.keys(KITS).forEach(n=>{ const o=document.createElement('option'); o.value=n;o.textContent=n; ks.appendChild(o); });
  ks.addEventListener('change',()=>{ startAudio(); samples.forEach(()=>{}); loadKit(ks.value); });

  // bpm
  const bp=document.getElementById('bpm');
  bp.addEventListener('input',()=>{ bpm=+bp.value; document.getElementById('bpmval').textContent=bpm; });

  // nav
  document.querySelectorAll('nav button[data-view]').forEach(b=>
    b.addEventListener('click',()=>setView(b.dataset.view)));
  document.getElementById('addbtn').addEventListener('click',()=>document.getElementById('fileinput').click());
  document.getElementById('fileinput').addEventListener('change',e=>{ if(e.target.files.length) importFiles(e.target.files); e.target.value=''; });

  document.getElementById('recbtn').addEventListener('click',toggleRec);
  document.getElementById('helpbtn').addEventListener('click',()=>showTour(0));

  // tour controls
  document.getElementById('t-next').addEventListener('click',()=>{ ti<TOUR.length-1?showTour(ti+1):endTour(); });
  document.getElementById('t-back').addEventListener('click',()=>showTour(Math.max(0,ti-1)));
  document.getElementById('t-skip').addEventListener('click',endTour);

  wireFX();
  loadKit(Object.keys(KITS)[0]);
  openDB();

  // first run -> auto tutorial
  let seen=null; try{seen=localStorage.getItem('bf_seen');}catch(e){}
  if(!seen) setTimeout(()=>showTour(0),400);
}
boot();
</script>
