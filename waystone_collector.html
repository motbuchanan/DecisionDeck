var axes = {flame:35,thread:35,stone:35,spark:35,root:35};
var collection = {};    // id -> {found,nick}
var inventory = {};     // item_id -> true
var lucky_sparks = 0;
var run_count = 0;
var runEncounters = [];
var runIdx = 0;
var RUN_LEN = 6;
var seenIds = new Set();
var pendingDisc = null;
var residentEncounters = {};
var locationVisits = {beach:0,forest:0,market:0,lighthouse:0,bridge:0};

var detailId = null;
var currentFam = `all`;
var CARRY = 0.6;        // 60% axis carry-forward between runs

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function loadState() {
  try {
    var raw = localStorage.getItem(`waystone_v3`);
    if (raw) {
      var s = JSON.parse(raw);
      collection = s.collection || {};
      inventory = s.inventory || {};
      lucky_sparks = s.lucky_sparks || 0;
      run_count = s.run_count || 0;
      seenIds = new Set(s.seenIds || []);
      residentEncounters = s.residentEncounters || {};
      locationVisits = s.locationVisits || {beach:0,forest:0,market:0,lighthouse:0,bridge:0};
    }
  } catch(e) {}
  CREATURES.forEach(function(c) {
    if (!collection[c.id]) collection[c.id] = {found:false, nick:``, friendship:0};
    if (collection[c.id].friendship === undefined) collection[c.id].friendship = 0;
  });
}

function saveState() {
  try {
    localStorage.setItem(`waystone_v3`, JSON.stringify({
      collection:collection, inventory:inventory,
      lucky_sparks:lucky_sparks, run_count:run_count,
      seenIds:[...seenIds], residentEncounters:residentEncounters,
      locationVisits:locationVisits
    }));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// SCREEN
// ═══════════════════════════════════════════════════════════════
function show(id) {
  // Clean up any lingering ceremony overlays
  var sil = document.getElementById('disc-sil-overlay');
  if (sil && sil.parentNode) sil.parentNode.removeChild(sil);
  var screens = document.querySelectorAll(`.screen`);
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove(`active`);
  document.getElementById(id).classList.add(`active`);
}

// ═══════════════════════════════════════════════════════════════
// SHUFFLE
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ═══════════════════════════════════════════════════════════════
// BUILD RUN — 9 encounters, carry-forward axes
// ═══════════════════════════════════════════════════════════════
function buildRun() {
  // Carry 60% of current axes into new run
  var keys = [`flame`,`thread`,`stone`,`spark`,`root`];
  keys.forEach(function(k) {
    axes[k] = Math.round(35 + (axes[k] - 35) * CARRY);
    axes[k] = Math.max(15, Math.min(85, axes[k]));
  });

  // Pick 9 encounters: 1 mirror guaranteed, 1 per other cat, fill remainder
  var cats = [`freeze`,`flip`,`storm`,`tangle`,`wait`,`stranger`,`spark`,`root`];
  var mirrorPool = ENCOUNTERS.filter(function(e) { return e.cat === `mirror`; });
  var mirror = pickUnseen(mirrorPool);
  var shuffledCats = shuffle(cats);
  var others = [];
  for (var i = 0; i < 5; i++) {
    var pool = ENCOUNTERS.filter(function(e) { return e.cat === shuffledCats[i]; });
    others.push(pickUnseen(pool));
  }
  runEncounters = shuffle([mirror].concat(others));
  runEncounters.forEach(function(e) { seenIds.add(e.text); });
  if (seenIds.size >= ENCOUNTERS.length) seenIds.clear();
  runIdx = 0;
  run_count++;
}

function pickUnseen(pool) {
  var unseen = pool.filter(function(e) { return !seenIds.has(e.text); });
  var src = unseen.length > 0 ? unseen : pool;
  return src[Math.floor(Math.random() * src.length)];
}

// ═══════════════════════════════════════════════════════════════
// EXPLORE
// ═══════════════════════════════════════════════════════════════
function startExplore() {
  buildRun();
  buildProgress();
  show(`s-explore`);
  renderEncounter();
}

function buildProgress() {
  var row = document.getElementById(`prog-row`);
  row.innerHTML = ``;
  for (var i = 0; i < RUN_LEN; i++) {
    var d = document.createElement(`div`);
    d.className = `pdot`; d.id = `pd` + i;
    row.appendChild(d);
  }
}

function updateAxes() {
  var keys = [`flame`,`thread`,`stone`,`spark`,`root`];
  keys.forEach(function(k) {
    var el = document.getElementById(`ax-` + k);
    if (el) el.style.width = axes[k] + `%`;
  });
}

function updateProgress() {
  for (var i = 0; i < RUN_LEN; i++) {
    var d = document.getElementById(`pd` + i);
    if (!d) continue;
    if (i < runIdx) d.className = `pdot done`;
    else if (i === runIdx) d.className = `pdot cur`;
    else d.className = `pdot`;
  }
}

var LOC_KEYS = Object.keys(LOCATIONS);

function renderEncounter() {
  var enc = runEncounters[runIdx];
  if (!enc) return;
  var locKey = enc.loc || LOC_KEYS[runIdx % LOC_KEYS.length];
  var loc = LOCATIONS[locKey] || LOCATIONS.beach;
  document.getElementById(`loc-label`).textContent = loc.label;
  document.getElementById(`explore-bg`).style.background = loc.bg;
  document.getElementById(`loc-art`).innerHTML = loc.art;
  document.getElementById(`enc-text`).innerHTML = linkifyText(enc.text);
  // Track location visit
  if (locKey && locationVisits[locKey] !== undefined) locationVisits[locKey]++;
  document.getElementById(`enc-q`).textContent = enc.q;
  var cc = document.getElementById(`choices`);
  cc.innerHTML = ``;
  for (var i = 0; i < enc.choices.length; i++) {
    (function(idx) {
      var btn = document.createElement(`button`);
      btn.className = `choice`;
      btn.textContent = enc.choices[idx].t;
      btn.onclick = function() { makeChoice(idx); };
      cc.appendChild(btn);
    })(i);
  }
  document.getElementById(`feedback`).classList.remove(`show`);
  document.getElementById(`choices`).style.cssText = ``;
  updateProgress();
  updateAxes();
  var er = document.querySelector(`.explore-right`);
  if (er) er.scrollTop = 0;
}

function makeChoice(idx) {
  var enc = runEncounters[runIdx];
  var c = enc.choices[idx];
  // Track resident encounters
  countResidentMentions(enc.text + ' ' + c.s);

  // Update axes
  axes[c.ax] = Math.min(100, Math.max(10, axes[c.ax] + c.d));
  var others = [`flame`,`thread`,`stone`,`spark`,`root`].filter(function(a) { return a !== c.ax; });
  others.forEach(function(a) { axes[a] = Math.min(100, Math.max(10, axes[a] + 2)); });
  updateAxes();

  // Check for item grant
  var itemGrant = null;
  ITEM_TRIGGERS.forEach(function(trig) {
    if (trig.cat === enc.cat && trig.choice_idx === idx &&
        (!trig.loc_kw || (enc.loc && enc.loc.indexOf(trig.loc_kw) >= 0)) &&
        !inventory[trig.item]) {
      itemGrant = trig.item;
    }
  });

  // Disable choices
  document.getElementById(`choices`).style.opacity = `0.3`;
  document.getElementById(`choices`).style.pointerEvents = `none`;

  // Feedback
  document.getElementById(`fb-story`).innerHTML = linkifyText(c.s);
  var pool = AX_POOLS[c.ax];
  var note = pool[Math.floor(Math.random() * pool.length)];
  var icons = {flame:`🔥`,thread:`🧵`,stone:`🪨`,spark:`⚡`,root:`🌿`};
  document.getElementById(`fb-note-wrap`).innerHTML =
    `<div class="fb-note ${c.ax}">${icons[c.ax]} ${note}</div>`;

  // Item grant
  if (itemGrant) {
    inventory[itemGrant] = true;
    saveState();
    var itm = ITEMS[itemGrant];
    document.getElementById(`fb-item-wrap`).innerHTML =
      `<div class="fb-item">${itm.icon} <span>You found: <strong>${itm.name}</strong></span></div>`;
  } else {
    document.getElementById(`fb-item-wrap`).innerHTML = ``;
  }

  var isLast = runIdx >= RUN_LEN - 1;
  document.getElementById(`btn-next`).innerHTML = isLast ? `End Journey ✨` : `Keep exploring →`;
  document.getElementById(`feedback`).classList.add(`show`);

  setTimeout(function() {
    var fb = document.getElementById(`feedback`);
    if (fb) fb.scrollIntoView({behavior:`smooth`,block:`nearest`});
  }, 80);
}

function nextEncounter() {
  runIdx++;
  document.getElementById(`choices`).style.cssText = ``;
  document.getElementById(`feedback`).classList.remove(`show`);
  if (runIdx >= RUN_LEN) { endRun(); return; }
  renderEncounter();
}

// ═══════════════════════════════════════════════════════════════
// END RUN — ONE creature max, item-gating, rarity priority
// ═══════════════════════════════════════════════════════════════
function endRun() {
  saveState();

  // Award friendship points for already-collected creatures that qualify
  pendingFriendship = [];
  CREATURES.forEach(function(c) {
    if (!collection[c.id] || !collection[c.id].found) return;
    var req = c.threshold;
    var axesOk = Object.keys(req).every(function(k) { return axes[k] >= req[k]; });
    if (!axesOk) return;
    if (c.item && !inventory[c.item]) return;
    if (c.item2 && !inventory[c.item2]) return;
    var col = collection[c.id];
    if (!col.friendship) col.friendship = 0;
    if (col.friendship < 3) {
      col.friendship++;
      if (col.friendship === 3) pendingFriendship.push(c);
    }
  });

  // Find unlockable creatures — up to 3 per run, highest rarity first
  var unlockable = CREATURES.filter(function(c) {
    if (collection[c.id].found) return false;
    var req = c.threshold;
    var axesOk = Object.keys(req).every(function(k) { return axes[k] >= req[k]; });
    if (!axesOk) return false;
    // Check item requirements
    if (c.item && !inventory[c.item]) return false;
    if (c.item2 && !inventory[c.item2]) return false;
    return true;
  });

  // Sort: ultra-rares (2 items) first, then rares, then others
  unlockable.sort(function(a, b) {
    var aScore = (a.item2 ? 2 : 0) + (a.rare ? 1 : 0);
    var bScore = (b.item2 ? 2 : 0) + (b.rare ? 1 : 0);
    return bScore - aScore;
  });

  saveState();
  if (unlockable.length > 0) {
    var toReveal = unlockable.slice(0, 3);
    pendingDisc = toReveal.slice(1);
    showDiscovery(toReveal[0]);
  } else if (pendingFriendship.length > 0) {
    showFriendship(pendingFriendship.shift());
  } else {
    showRunEnd(false);
  }
}

}

function nextAfterFriendship() {
  if (pendingFriendship && pendingFriendship.length > 0) {
    showFriendship(pendingFriendship.shift());
  } else {
    showRunEnd(false);
  }
}
function showDiscovery(creature) {
  var typeColors = {flame:`#ff6b35`,thread:`#5ec4b0`,stone:`#8ba7c0`,spark:`#f0c040`,root:`#68b828`,rare:`#d4a0ff`};
  var col = typeColors[creature.type] || `#f0c040`;
  var silSvg = creature.svg
    .replace(/fill="[^"]*"/g, `fill="${col}"`)
    .replace(/stroke="[^"]*"/g, `stroke="${col}"`)
    .replace(/style="[^"]*"/g, ``);

  // Pre-populate screen with final content (hidden)
  document.getElementById(`disc-art`).style.cssText = `opacity:0;transform:scale(0.4);`;
  document.getElementById(`disc-art`).innerHTML = creature.svg;
  document.getElementById(`disc-name`).style.cssText = `opacity:0;transform:translateY(12px);`;
  document.getElementById(`disc-name`).textContent = creature.name;
  var tl = {flame:`🔥 Flame Type`,thread:`🧵 Thread Type`,stone:`🪨 Stone Type`,spark:`⚡ Spark Type`,root:`🌿 Root Type`,rare:`✨ Rare Creature`};
  document.getElementById(`disc-type`).innerHTML = tl[creature.type] || creature.type;
  document.getElementById(`disc-type`).className = `disc-type ` + creature.type;
  document.getElementById(`disc-personality`).style.cssText = `opacity:0;`;
  document.getElementById(`disc-personality`).textContent = creature.personality;
  document.getElementById(`disc-input`).value = ``;
  document.getElementById(`disc-input`).dataset.id = creature.id;
  document.getElementById(`disc-new-label`).textContent = creature.rare ? `✨ RARE CREATURE FOUND` : `✨ NEW CREATURE FOUND`;
  // Also store id on the save button as a fallback
  var saveBtn = document.getElementById(`btn-save-disc`);
  if (saveBtn) saveBtn.dataset.creatureId = creature.id;

  show(`s-discovery`);

  // Phase 1 (0ms): silhouette overlay
  var sil = document.createElement(`div`);
  sil.id = `disc-sil-overlay`;
  sil.style.cssText = `position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(6,8,16,0.94);`;
  sil.innerHTML = `<div style="width:220px;height:220px;animation:sil-pulse 1.2s ease-in-out infinite;">${silSvg}</div>`;
  document.body.appendChild(sil);

  // Phase 2 (950ms): flash + reveal
  setTimeout(function() {
    var flash = document.createElement(`div`);
    flash.className = `ceremony-flash`;
    document.body.appendChild(flash);
    setTimeout(function() { if (flash.parentNode) flash.parentNode.removeChild(flash); }, 320);
    if (sil.parentNode) sil.parentNode.removeChild(sil);

    document.getElementById(`disc-art`).style.cssText =
      `opacity:1;transform:scale(1);transition:opacity 0.5s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1);`;
    spawnBurst(col, creature.type);

    // Phase 3 (1350ms): name
    setTimeout(function() {
      document.getElementById(`disc-name`).style.cssText =
        `opacity:1;transform:translateY(0);transition:opacity 0.4s ease, transform 0.4s ease;`;
      var tlDiv = document.getElementById(`disc-type`);
      tlDiv.style.cssText = `opacity:1;transition:opacity 0.3s ease;`;

      // Phase 4 (1750ms): personality + input
      setTimeout(function() {
        document.getElementById(`disc-personality`).style.cssText =
          `opacity:1;transition:opacity 0.5s ease;`;
      }, 400);
    }, 400);
  }, 950);
}

function spawnBurst(color, type) {
  var discEl = document.getElementById(`disc-art`);
  if (!discEl) return;
  var rect = discEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var typeColors = {flame:`#ff6b35`,thread:`#5ec4b0`,stone:`#8ba7c0`,spark:`#f0c040`,root:`#68b828`,rare:`#d4a0ff`};
  var altCol = typeColors[type] || color;
  for (var i = 0; i < 18; i++) {
    var angle = (i / 18) * 360;
    var dist = 55 + Math.random() * 55;
    var size = 4 + Math.random() * 6;
    var dx = Math.cos(angle * Math.PI / 180) * dist;
    var dy = Math.sin(angle * Math.PI / 180) * dist;
    var dot = document.createElement(`div`);
    var c = i % 3 === 0 ? `white` : (i % 3 === 1 ? color : altCol);
    dot.style.cssText = `position:fixed;width:${size}px;height:${size}px;border-radius:50%;background:${c};z-index:300;pointer-events:none;left:${cx - size/2}px;top:${cy - size/2}px;transition:transform 0.65s ease-out, opacity 0.65s ease-out;`;
    document.body.appendChild(dot);
    (function(el, ddx, ddy) {
      setTimeout(function() {
        el.style.transform = `translate(${ddx}px,${ddy}px) scale(0)`;
        el.style.opacity = `0`;
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
      }, 20);
    })(dot, dx, dy);
  }
}


function skipDiscovery() {
  if (pendingDisc && pendingDisc.length > 0) {
    showDiscovery(pendingDisc.shift());
  } else if (pendingFriendship && pendingFriendship.length > 0) {
    showFriendship(pendingFriendship.shift());
  } else {
    showRunEnd(false);
  }
}
function saveDiscovery() {
  try {
    var input = document.getElementById(`disc-input`);
    var id = input ? input.dataset.id : ``;
    // Fallback: try the save button's data attr
    if (!id) {
      var btn = document.getElementById(`btn-save-disc`);
      if (btn) id = btn.dataset.creatureId || ``;
    }
    if (!id) { showRunEnd(false); return; }
    // Ensure collection entry exists
    if (!collection[id]) collection[id] = {found:false, nick:``, friendship:0};
    collection[id].found = true;
    collection[id].nick = input.value ? input.value.trim() : ``;
    var creature = null;
    for (var i = 0; i < CREATURES.length; i++) {
      if (CREATURES[i].id === id) { creature = CREATURES[i]; break; }
    }
    if (creature && creature.rare) lucky_sparks++;
    saveState();
    if (pendingDisc && pendingDisc.length > 0) {
      showDiscovery(pendingDisc.shift());
    } else if (pendingFriendship && pendingFriendship.length > 0) {
      showFriendship(pendingFriendship.shift());
    } else {
      showRunEnd(true, creature ? creature.name : ``);
    }
  } catch(e) {
    console.error('saveDiscovery error:', e);
    showRunEnd(false);
  }
}

// ═══════════════════════════════════════════════════════════════

function showRunEnd(found, cname) {

  document.getElementById(`runend-icon`).textContent = found ? `✨` : `🌊`;
  document.getElementById(`runend-title`).textContent = found ? `New Creature Found!` : `Journey Complete`;

  // Show final axis values
  var axDiv = document.getElementById(`runend-axes`);
  axDiv.innerHTML = ``;
  var keys = [`flame`,`thread`,`stone`,`spark`,`root`];
  var icons = {flame:`🔥`,thread:`🧵`,stone:`🪨`,spark:`⚡`,root:`🌿`};
  keys.forEach(function(k) {
    var d = document.createElement(`div`);
    d.className = `runend-ax ` + k;
    d.innerHTML = `<div class="runend-ax-label">${icons[k]} ${k}</div><div class="runend-ax-val">${Math.round(axes[k])}</div>`;
    axDiv.appendChild(d);
  });

  if (found) {
    var total = CREATURES.filter(function(c){return collection[c.id].found;}).length;
    document.getElementById(`runend-msg`).textContent =
      total + ` of 32 creatures in your collection. The island carries your choices forward.`;
  } else {
    document.getElementById(`runend-msg`).textContent =
      `${count} of 32 creatures in your collection. Your axes carry forward — the island remembers.`;
  }

  var stirs = [
    `Something stirred in the deep forest... but wasn't ready yet.`,
    `A shadow passed the Lighthouse window. It'll come closer.`,
    `The Bridge creaked. Something is watching from the fog.`,
    `The island noticed. Keep exploring.`,
    `Something on the beach left marks that weren't there before.`,
  ];
  document.getElementById(`runend-stir`).textContent =
    found ? `` : stirs[Math.floor(Math.random() * stirs.length)];

  show(`s-runend`);
}

// ═══════════════════════════════════════════════════════════════
// COMPENDIUM
// ═══════════════════════════════════════════════════════════════
function showCompendium() {
  renderCompendium(currentFam);
  show(`s-compendium`);
}

function renderCompendium(fam) {
  currentFam = fam;

  // Update tab states
  var tabs = document.querySelectorAll(`.comp-tab`);
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle(`active`, tabs[i].dataset.fam === fam);
  }

  var found = CREATURES.filter(function(c) { return collection[c.id].found; }).length;
  document.getElementById(`comp-count`).textContent = `${found} / 32 found`;

  // Filter creatures
  var toShow = CREATURES;
  if (fam !== `all`) {
    if (fam === `rare`) {
      toShow = CREATURES.filter(function(c) { return c.rare; });
    } else {
      toShow = CREATURES.filter(function(c) { return c.type === fam && !c.rare; });
    }
  }

  var grid = document.getElementById(`comp-grid`);
  grid.innerHTML = ``;
  toShow.forEach(function(c) {
    var col = collection[c.id];
    var isFound = col.found;
    var nick = col.nick;
    var friendLvl = col.friendship || 0;
    var card = document.createElement(`div`);
    var bfClass = (isFound && friendLvl >= 3) ? ` bestfriend` : ``;
    card.className = `comp-card` + (isFound ? ` found` : ``) + (c.rare ? ` rare` : ``) + bfClass;

    if (isFound) {
      var heartHtml = ``;
      if (friendLvl >= 3) {
        heartHtml = `<div class="friend-hearts"><span class="fheart">&#x1F49B;</span><span class="fheart">&#x1F49B;</span><span class="fheart">&#x1F49B;</span></div>`;
      } else if (friendLvl === 2) {
        heartHtml = `<div class="friend-hearts"><span class="fheart">&#x1F90D;</span><span class="fheart">&#x1F90D;</span></div>`;
      } else if (friendLvl === 1) {
        heartHtml = `<div class="friend-hearts"><span class="fheart">&#x1F90D;</span></div>`;
      }
      card.innerHTML = `<div class="comp-creature">${c.svg}</div>` +
        `<div class="comp-cname">${c.name}</div>` +
        `<div class="type-dot ${c.rare ? `rare` : c.type}"></div>` +
        (nick ? `<div class="comp-nick">"${nick}"</div>` : ``) +
        heartHtml;
      (function(id) { card.onclick = function() { showDetail(id); }; })(c.id);
    } else {
      // Silhouette with breathing
      var sil = c.svg
        .replace(/fill="[^"]*"/g, `fill="#1a1e28"`)
        .replace(/stroke="[^"]*"/g, `stroke="#1a1e28"`)
        .replace(/style="[^"]*"/g, ``);
      // Item clue for rares
      var clueHtml = ``;
      if (c.item) {
        var itm = ITEMS[c.item];
        var itmLabel = itm ? itm.icon + ` ` + itm.name : ``;
        var itmLabel2 = c.item2 && ITEMS[c.item2] ? ` + ` + ITEMS[c.item2].icon + ` ` + ITEMS[c.item2].name : ``;
        clueHtml = `<div class="comp-lock">${itmLabel}${itmLabel2}</div>`;
      }
      card.innerHTML = `<div class="comp-creature sil-wrap">${sil}</div>` +
        `<div class="comp-cname unk">???</div>` +
        `<div class="type-dot unk"></div>` + clueHtml;
    }
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════════════════════════
function showDetail(id) {
  var c = null;
  for (var i = 0; i < CREATURES.length; i++) { if (CREATURES[i].id === id) { c = CREATURES[i]; break; } }
  if (!c) return;
  detailId = id;
  document.getElementById(`detail-art`).innerHTML = c.svg;
  document.getElementById(`detail-name`).textContent = c.name;
  if (!collection[id]) collection[id] = {found:false, nick:'', friendship:0};
  var nick = collection[id].nick || '';
  document.getElementById(`detail-nick-disp`).textContent = nick ? `"${nick}"` : ``;
  var tl = {flame:`🔥 Flame Type`,thread:`🧵 Thread Type`,stone:`🪨 Stone Type`,spark:`⚡ Spark Type`,root:`🌿 Root Type`,rare:`✨ Rare Creature`};
  document.getElementById(`detail-type`).innerHTML = tl[c.type] || c.type;
  document.getElementById(`detail-type`).className = `detail-type ` + c.type;
  document.getElementById(`detail-pers`).textContent = c.personality;
  var dfl = collection[id].friendship || 0;
  var dHearts = dfl >= 3 ? `&#x1F49B;&#x1F49B;&#x1F49B; Best Friend` : dfl === 2 ? `&#x1F90D;&#x1F90D; Good Friends` : dfl === 1 ? `&#x1F90D; Becoming Friends` : ``;
  document.getElementById(`detail-lore`).innerHTML =
    (dfl > 0 ? `<div class="detail-lore-item" style="color:#f0c040;font-weight:800;">${dHearts}</div>` : ``) +
    `<div class="detail-lore-item"><strong>Loves:</strong> ${c.hobby}</div>` +
    `<div class="detail-lore-item"><strong>Eats:</strong> ${c.food}</div>` +
    `<div class="detail-lore-item"><strong>Secret:</strong> ${c.quirk}</div>`;
  document.getElementById(`nick-input`).value = nick || ``;
  show(`s-detail`);
}

function saveNick() {
  if (!detailId) return;
  var nick = document.getElementById(`nick-input`).value.trim();
  collection[detailId].nick = nick;
  saveState();
  document.getElementById(`detail-nick-disp`).textContent = nick ? `"${nick}"` : ``;
}

// ═══════════════════════════════════════════════════════════════
// INVENTORY
// ═══════════════════════════════════════════════════════════════
function showInventory() {
  renderInventory();
  show(`s-inventory`);
}

function renderInventory() {
  var grid = document.getElementById(`inv-grid`);
  grid.innerHTML = ``;
  var itemOrder = [`lantern`,`silver_thread`,`still_water_stone`,`blueprint`,`ancient_seed`,
                   `torn_map`,`wellows_honey`,`handmade_feather`,`thankyou_stone`,`lucky_spark`];

  itemOrder.forEach(function(id) {
    if (id === `lucky_spark`) return; // handled separately
    var itm = ITEMS[id];
    var owned = !!inventory[id];
    var slot = document.createElement(`div`);
    slot.className = `inv-slot` + (owned ? ` owned` : ``);
    slot.innerHTML = `<div class="inv-icon">${owned ? itm.icon : `❓`}</div>` +
      `<div class="inv-name${owned ? `` : ` empty`}">${owned ? itm.name : `???`}</div>` +
      (owned ? `<div class="inv-owned-label">IN COLLECTION</div><div class="inv-desc">${itm.desc}</div>` :
        `<div class="inv-clue">${itm.clue}</div>`);
    grid.appendChild(slot);
  });

  // Lucky sparks slot
  var sparkSlot = document.createElement(`div`);
  sparkSlot.className = `inv-slot` + (lucky_sparks > 0 ? ` trophy` : ``);
  var sparkDots = ``;
  for (var i = 0; i < lucky_sparks; i++) sparkDots += `<div class="inv-spark-dot"></div>`;
  sparkSlot.innerHTML = `<div class="inv-icon">${lucky_sparks > 0 ? `⭐` : `❓`}</div>` +
    `<div class="inv-name${lucky_sparks > 0 ? `` : ` empty`}">${lucky_sparks > 0 ? `Lucky Sparks` : `???`}</div>` +
    (lucky_sparks > 0 ?
      `<div class="inv-sparks">${sparkDots}</div><div class="inv-desc">${lucky_sparks} of 5 rare creatures found.</div>` :
      `<div class="inv-clue">Awarded each time you find a rare creature.</div>`);
  grid.appendChild(sparkSlot);
}

// ═══════════════════════════════════════════════════════════════
// WIRE BUTTONS
// ═══════════════════════════════════════════════════════════════
window.onload = function() {
  try { loadState(); } catch(e) { console.error('loadState:', e); }
  try { spawnTitleStars(); } catch(e) { console.error('spawnTitleStars:', e); }
  try { initResidents(); } catch(e) { console.error('initResidents:', e); }
  function wire(id, fn) {
    var el = document.getElementById(id);
    if (el) el.onclick = fn;
  }
  wire('btn-explore', startExplore);
  wire('btn-collection', showCompendium);
  wire('btn-inventory', showInventory);
  wire('btn-residents', showResidents);
  wire('btn-locations', showLocations);
  wire('btn-locs-back', function(){ show('s-title'); });
  wire('btn-res-back', function(){ show('s-title'); });
  wire('btn-rdet-back', showResidents);
  wire('btn-nav-coll', showCompendium);
  wire('btn-nav-inv', showInventory);
  wire('btn-nav-home', function(){ show('s-title'); });
  wire('btn-nav-locs', function(){ glossaryReturn='s-explore'; showLocations(); });
  wire('btn-next', nextEncounter);
  wire('btn-save-disc', saveDiscovery);
  wire('btn-disc-skip', skipDiscovery);
  wire('btn-comp-back', function(){ show('s-title'); });
  wire('btn-nick-save', saveNick);
  wire('btn-detail-back', showCompendium);
  wire('btn-inv-back', function(){ show('s-title'); });
  wire('btn-friend-ok', nextAfterFriendship);
  wire('btn-again', startExplore);
  wire('btn-runend-coll', showCompendium);

  // Tap-link delegation — handles creature/location/resident links in encounter text
  document.addEventListener('click', function(e) {
    var el = e.target;
    if (el.classList && el.classList.contains('tap-link')) {
      var type = el.getAttribute('data-gl-type');
      var id = el.getAttribute('data-gl-id');
      if (type && id) openGlossaryEntry(type, id);
    }
  });

  // Compendium family tabs
  try {
    var tabs = document.querySelectorAll('.comp-tab');
    for (var i = 0; i < tabs.length; i++) {
      (function(tab) {
        tab.onclick = function() { renderCompendium(tab.dataset.fam); };
      })(tabs[i]);
    }
  } catch(e) { console.error('tabs:', e); }
};
</script>
