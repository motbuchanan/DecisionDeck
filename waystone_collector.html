<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Waystone: Creature Collector</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1a;color:#e8e4d8;font-family:'Nunito',sans-serif;}
.screen{display:none;width:100%;height:100%;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
#s-title{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 60%,rgba(240,192,64,.1) 0%,transparent 60%);}
.title-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px;text-align:center;}
.title-art{font-size:60px;}
.title-logo{font-family:'Fredoka One',cursive;font-size:52px;color:#f0c040;text-shadow:0 0 30px rgba(240,192,64,.4);}
.title-sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#6a7890;}
.btn-gold{background:linear-gradient(135deg,#f0c040,#c89820);color:#1a1000;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;padding:14px 32px;cursor:pointer;margin:4px;}
.btn-outline{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.2);border-radius:50px;color:#e8e4d8;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;padding:14px 32px;cursor:pointer;margin:4px;}
#s-explore{flex-direction:row;}
@media (orientation:portrait),(max-width:700px){
  #s-explore{flex-direction:column;}
  .explore-left{width:100%!important;height:190px!important;flex-direction:row!important;align-items:center!important;justify-content:center!important;padding-bottom:0!important;}
  .loc-art{width:150px!important;height:150px!important;}
  .explore-right{flex:1!important;width:100%!important;}
}
.explore-left{width:40%;height:100%;flex-shrink:0;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:14px;}
.explore-bg{position:absolute;top:0;left:0;right:0;bottom:0;}
.loc-art{width:210px;height:210px;position:relative;z-index:1;}
.loc-art svg{width:100%;height:100%;}
.loc-label{position:relative;z-index:1;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;}
.explore-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;padding:50px 18px 18px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.explore-nav{position:absolute;top:10px;right:14px;z-index:10;display:flex;gap:8px;}
.nav-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:50px;color:#e8e4d8;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;padding:6px 13px;cursor:pointer;}
.axes-row{display:flex;gap:7px;}
.ax{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:7px 9px;}
.ax-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.ax-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.ax-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.ax.flame .ax-label{color:#ff6b35;}.ax.flame .ax-fill{background:#ff6b35;}
.ax.thread .ax-label{color:#5ec4b0;}.ax.thread .ax-fill{background:#5ec4b0;}
.ax.stone .ax-label{color:#8ba7c0;}.ax.stone .ax-fill{background:#8ba7c0;}
.progress-row{display:flex;gap:5px;}
.pdot{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.07);transition:background .3s;}
.pdot.done{background:#f0c040;}.pdot.cur{background:rgba(240,192,64,.4);}
.enc-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;font-family:'Lora',serif;font-size:14px;line-height:1.85;color:#e8e4d8;}
.enc-box em{color:#f5edd8;font-style:italic;}
.enc-box .cn{color:#f0c040;font-weight:600;font-style:normal;}
.enc-q{font-family:'Fredoka One',cursive;font-size:17px;color:#e8e4d8;text-align:center;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);border-radius:13px;color:#e8e4d8;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;line-height:1.5;padding:12px 15px;text-align:left;cursor:pointer;width:100%;}
.choice:active{background:rgba(255,255,255,.14);}
.feedback{display:none;flex-direction:column;gap:10px;}
.feedback.show{display:flex;}
.fb-story{font-family:'Lora',serif;font-size:13.5px;line-height:1.85;color:#e8e4d8;}
.fb-story em{color:#f5edd8;font-style:italic;}
.fb-note-el{font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;display:inline-flex;align-items:center;gap:5px;}
.fb-note-el.flame{background:rgba(255,107,53,.15);color:#ff6b35;}
.fb-note-el.thread{background:rgba(94,196,176,.15);color:#5ec4b0;}
.fb-note-el.stone{background:rgba(139,167,192,.15);color:#8ba7c0;}
.btn-next{background:rgba(240,192,64,.12);border:1.5px solid rgba(240,192,64,.3);border-radius:50px;color:#f0c040;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;padding:12px 28px;cursor:pointer;align-self:center;}
#s-discovery{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 50%,rgba(240,192,64,.1) 0%,transparent 60%);}
.disc-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px;text-align:center;max-width:460px;width:100%;}
@media (orientation:landscape) and (min-width:700px){.disc-wrap{flex-direction:row;text-align:left;max-width:740px;gap:40px;}.disc-info{flex:1;}}
.disc-art{width:190px;height:190px;flex-shrink:0;}.disc-art svg{width:100%;height:100%;}
.disc-new{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#f0c040;}
.disc-name{font-family:'Fredoka One',cursive;font-size:42px;color:white;line-height:1.1;}
.disc-type{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.disc-type.flame{color:#ff6b35;}.disc-type.thread{color:#5ec4b0;}.disc-type.stone{color:#8ba7c0;}.disc-type.rare{color:#d4a0ff;}
.disc-personality{font-family:'Lora',serif;font-size:14px;font-style:italic;color:rgba(232,228,216,.8);line-height:1.7;}
.disc-input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:50px;color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;padding:11px 20px;outline:none;width:100%;}
.disc-input::placeholder{color:rgba(255,255,255,.25);}
#s-compendium{flex-direction:column;}
.comp-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.comp-title{font-family:'Fredoka One',cursive;font-size:24px;color:#f0c040;}
.comp-count{font-size:12px;font-weight:700;color:#6a7890;}
.comp-grid{flex:1;overflow-y:auto;padding:14px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:11px;}
@media (orientation:portrait),(max-width:700px){.comp-grid{grid-template-columns:repeat(3,1fr);}}
.comp-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 7px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.comp-card.found{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.06);}
.comp-card.rare.found{border-color:rgba(212,160,255,.3);}
.comp-creature{width:65px;height:65px;}.comp-creature svg{width:100%;height:100%;}
.comp-cname{font-family:'Fredoka One',cursive;font-size:11px;color:#e8e4d8;text-align:center;}
.comp-cname.unk{color:#404858;}
.type-dot{width:7px;height:7px;border-radius:50%;}
.type-dot.flame{background:#ff6b35;}.type-dot.thread{background:#5ec4b0;}.type-dot.stone{background:#8ba7c0;}.type-dot.rare{background:#d4a0ff;}.type-dot.unk{background:#2a2e38;}
.comp-nick{font-size:9px;color:#6a7890;font-style:italic;text-align:center;}
#s-detail{flex-direction:column;align-items:center;justify-content:flex-start;gap:18px;padding:20px;overflow-y:auto;}
@media (orientation:landscape) and (min-width:700px){#s-detail{flex-direction:row;justify-content:center;gap:48px;}}
.detail-art{width:210px;height:210px;flex-shrink:0;}.detail-art svg{width:100%;height:100%;}
.detail-info{display:flex;flex-direction:column;gap:13px;max-width:360px;width:100%;}
.detail-name{font-family:'Fredoka One',cursive;font-size:40px;color:white;}
.detail-nick-disp{font-size:13px;color:#6a7890;font-style:italic;margin-top:-8px;}
.detail-type{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.detail-type.flame{color:#ff6b35;}.detail-type.thread{color:#5ec4b0;}.detail-type.stone{color:#8ba7c0;}.detail-type.rare{color:#d4a0ff;}
.detail-pers{font-family:'Lora',serif;font-size:15px;font-style:italic;color:rgba(232,228,216,.8);line-height:1.7;}
.nick-row{display:flex;gap:8px;}
.nick-input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:50px;color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:9px 16px;outline:none;flex:1;}
.btn-save{background:rgba(240,192,64,.15);border:1.5px solid rgba(240,192,64,.3);border-radius:50px;color:#f0c040;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:9px 18px;cursor:pointer;}
#s-runend{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 50%,rgba(94,196,176,.06) 0%,transparent 60%);}
.runend-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:28px;max-width:420px;}
.runend-icon{font-size:50px;}
.runend-title{font-family:'Fredoka One',cursive;font-size:32px;color:#f0c040;}
.runend-msg{font-family:'Lora',serif;font-size:15px;font-style:italic;color:rgba(232,228,216,.8);line-height:1.7;}
.runend-stir{font-size:12px;color:#6a7890;font-family:'Lora',serif;font-style:italic;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes flicker{0%,100%{opacity:1;}50%{opacity:.65;}75%{opacity:.9;}}
@keyframes wobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
@keyframes spin-slow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes rumble{0%,100%{transform:translateX(0);}25%{transform:translateX(-2px);}75%{transform:translateX(2px);}}
@keyframes peek{0%,40%,100%{transform:translateY(0);}20%{transform:translateY(-10px);}}
@keyframes streak{0%{transform:translateX(-15px);opacity:0;}50%{opacity:1;}100%{transform:translateX(15px);opacity:0;}}
@keyframes pulse-glow{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes fade-in-out{0%,100%{opacity:.15;}50%{opacity:.85;}}
@keyframes orbit{from{transform:rotate(0deg) translateX(28px) rotate(0deg);}to{transform:rotate(360deg) translateX(28px) rotate(-360deg);}}

.sil-wrap{position:relative;animation:sil-pulse 3s ease-in-out infinite;}
.sil-wrap::after{content:'';position:absolute;inset:-4px;border-radius:50%;
  background:radial-gradient(circle,rgba(100,120,180,.18) 0%,transparent 70%);
  animation:sil-pulse 3s ease-in-out infinite;}
@keyframes sil-pulse{0%,100%{opacity:.35;filter:blur(0px);}50%{opacity:.55;filter:blur(0.5px);}}
@keyframes wave1{0%,100%{transform:translateX(0);}50%{transform:translateX(12px);}}
@keyframes wave2{0%,100%{transform:translateX(0);}50%{transform:translateX(-15px);}}
@keyframes spark{0%{transform:scale(0);opacity:1;}100%{transform:scale(1.5);opacity:0;}}

/* Discovery ceremony */
#s-discovery{align-items:center;justify-content:center;overflow:hidden;}
.disc-overlay{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;z-index:20;pointer-events:none;}
.disc-silhouette{width:220px;height:220px;position:relative;}
.disc-silhouette svg{width:100%;height:100%;}
.disc-burst{position:absolute;inset:-40px;z-index:0;pointer-events:none;}
.disc-burst circle{transform-origin:center;}
@keyframes burst-out{0%{transform:scale(0) rotate(0deg);opacity:1;}100%{transform:scale(2.5) rotate(180deg);opacity:0;}}
@keyframes reveal-creature{0%{opacity:0;transform:scale(0.4);}60%{opacity:1;transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes name-fadein{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}
@keyframes flash-white{0%,100%{opacity:0;}50%{opacity:1;}}
.ceremony-flash{position:fixed;inset:0;background:white;z-index:100;
  pointer-events:none;animation:flash-white .25s ease-out forwards;}
.disc-wrap{position:relative;z-index:2;}
</style>
</head>
<body>

<div class="screen active" id="s-title">
  <div class="title-wrap">
    <div class="title-art">&#x1F5FC;</div>
    <div class="title-logo">WAYSTONE</div>
    <div class="title-sub">Creature Collector</div>
    <div style="margin-top:8px;">
      <button class="btn-gold" id="btn-explore">Explore the Island &#x1F5FA;</button>
      <button class="btn-outline" id="btn-collection">My Collection &#x1F4D6;</button>
    </div>
  </div>
</div>

<div class="screen" id="s-explore">
  <div class="explore-nav">
    <button class="nav-btn" id="btn-nav-coll">&#x1F4D6; Collection</button>
    <button class="nav-btn" id="btn-nav-home">&#x1F3E0; Home</button>
  </div>
  <div class="explore-left">
    <div class="explore-bg" id="explore-bg"></div>
    <div class="loc-art" id="loc-art"></div>
    <div class="loc-label" id="loc-label">The Island</div>
  </div>
  <div class="explore-right">
    <div class="axes-row">
      <div class="ax flame"><div class="ax-label">&#x1F525; Flame</div><div class="ax-bar"><div class="ax-fill" id="ax-flame" style="width:50%"></div></div></div>
      <div class="ax thread"><div class="ax-label">&#x1F9F5; Thread</div><div class="ax-bar"><div class="ax-fill" id="ax-thread" style="width:50%"></div></div></div>
      <div class="ax stone"><div class="ax-label">&#x1FAA8; Stone</div><div class="ax-bar"><div class="ax-fill" id="ax-stone" style="width:50%"></div></div></div>
    </div>
    <div class="progress-row" id="progress-row"></div>
    <div class="enc-box" id="enc-text">Loading encounter...</div>
    <div class="enc-q" id="enc-q"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <div class="fb-story" id="fb-story"></div>
      <div id="fb-note"></div>
      <button class="btn-next" id="btn-next">Keep exploring &#x2192;</button>
    </div>
  </div>
</div>

<div class="screen" id="s-discovery">
  <div class="disc-wrap">
    <div class="disc-art" id="disc-art"></div>
    <div class="disc-info">
      <div class="disc-new">&#x2728; NEW CREATURE FOUND</div>
      <div class="disc-name" id="disc-name"></div>
      <div class="disc-type" id="disc-type"></div>
      <div class="disc-personality" id="disc-personality"></div>
      <div style="font-size:12px;color:#6a7890;margin-bottom:4px;">Give it a nickname? (optional)</div>
      <input class="disc-input" id="disc-input" type="text" maxlength="20" placeholder="Optional nickname..." autocomplete="off">
      <div style="margin-top:8px;">
        <button class="btn-gold" id="btn-save-disc">Add to Collection!</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="s-compendium">
  <div class="comp-hdr">
    <div class="comp-title">&#x1F4D6; Creature Collection</div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="comp-count" id="comp-count">0 / 15 found</div>
      <button class="btn-outline" style="padding:7px 15px;font-size:12px;" id="btn-comp-back">&#x2190; Back</button>
    </div>
  </div>
  <div class="comp-grid" id="comp-grid"></div>
</div>

<div class="screen" id="s-detail">
  <div class="detail-art" id="detail-art"></div>
  <div class="detail-info">
    <div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-nick-disp" id="detail-nick-disp"></div>
    </div>
    <div class="detail-type" id="detail-type"></div>
    <div class="detail-pers" id="detail-pers"></div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#6a7890;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Nickname</div>
      <div class="nick-row">
        <input class="nick-input" id="nick-input" type="text" maxlength="20" placeholder="Give it a nickname...">
        <button class="btn-save" id="btn-nick-save">Save</button>
      </div>
    </div>
    <button class="btn-outline" style="align-self:flex-start;padding:8px 16px;font-size:12px;" id="btn-detail-back">&#x2190; Back</button>
  </div>
</div>

<div class="screen" id="s-runend">
  <div class="runend-wrap">
    <div class="runend-icon" id="runend-icon">&#x1F30A;</div>
    <div class="runend-title" id="runend-title">Journey Complete</div>
    <div class="runend-msg" id="runend-msg"></div>
    <div class="runend-stir" id="runend-stir"></div>
    <div class="btn-row">
      <button class="btn-gold" id="btn-again">Explore Again &#x1F5FA;</button>
      <button class="btn-outline" id="btn-runend-coll">My Collection &#x1F4D6;</button>
    </div>
  </div>
</div>

<script>
const CREATURES = [
  // FLAME CREATURES ------------------------------------------------------

  {
    id:`cinder`, name:`Cinder`, type:`flame`,
    personality:`Small. Always slightly on fire but completely unbothered. The most confident creature on the island.`,
    threshold:{flame:65}, rare:false,
    svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="cinder-glow" cx="50%" cy="60%" r="50%">
          <stop offset="0%" stop-color="#ff8040" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#ff4000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cinder-body" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#ff8050"/>
          <stop offset="60%" stop-color="#e84020"/>
          <stop offset="100%" stop-color="#c02010"/>
        </radialGradient>
      </defs>
      <!-- Ground glow -->
      <ellipse cx="100" cy="168" rx="38" ry="8" fill="url(#cinder-glow)"/>
      <!-- Shadow -->
      <ellipse cx="100" cy="167" rx="30" ry="6" fill="#ff3000" opacity="0.15"/>
      <!-- Main body with breathing -->
      <g style="animation:breathe 2s ease-in-out infinite;transform-origin:100px 125px;">
        <ellipse cx="100" cy="128" rx="38" ry="40" fill="url(#cinder-body)"/>
        <!-- Belly highlight -->
        <ellipse cx="93" cy="118" rx="16" ry="14" fill="rgba(255,180,100,0.25)"/>
        <!-- Confident smirk -->
        <path d="M87 135 Q100 144 115 135" stroke="#a01800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Stubby arms raised confidently -->
        <ellipse cx="62" cy="120" rx="14" ry="9" fill="#e84020" transform="rotate(-30,62,120)"/>
        <ellipse cx="138" cy="120" rx="14" ry="9" fill="#e84020" transform="rotate(30,138,120)"/>
        <!-- Tiny fists -->
        <circle cx="55" cy="113" r="6" fill="#ff6030"/>
        <circle cx="145" cy="113" r="6" fill="#ff6030"/>
        <!-- Stubby legs -->
        <ellipse cx="86" cy="162" rx="12" ry="7" fill="#c02010"/>
        <ellipse cx="114" cy="162" rx="12" ry="7" fill="#c02010"/>
      </g>
      <!-- Eyes - blink occasionally -->
      <g style="animation:breathe 2s ease-in-out infinite;transform-origin:100px 125px;">
        <circle cx="88" cy="116" r="10" fill="white"/>
        <circle cx="112" cy="116" r="10" fill="white"/>
        <circle cx="90" cy="118" r="5.5" fill="#1a0800"/>
        <circle cx="114" cy="118" r="5.5" fill="#1a0800"/>
        <circle cx="91" cy="117" r="2" fill="white"/>
        <circle cx="115" cy="117" r="2" fill="white"/>
        <!-- Cocky raised eyebrow -->
        <path d="M82 107 Q88 103 95 107" stroke="#901800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M106 106 Q113 104 119 107" stroke="#901800" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Flame crown - multi-layer flicker -->
      <g style="animation:flicker 0.8s ease-in-out infinite;transform-origin:100px 88px;">
        <path d="M78 92 Q72 68 90 52 Q100 44 110 52 Q128 68 122 92" fill="#ff9020" opacity="0.9"/>
      </g>
      <g style="animation:flicker 1.1s ease-in-out infinite 0.2s;transform-origin:100px 82px;">
        <path d="M84 90 Q80 70 95 58 Q100 53 105 58 Q120 70 116 90" fill="#ffcc30" opacity="0.85"/>

   text:`<span class="cn">Brin</span> stands at her blank paper, ears flat. <em>"My brain knows what it wants but my hand won't move."</em> She pushes the paper toward you.`,
   q:`What do you do?`,
   choices:[
     {t:`Pick up the brush and make one small mark — just a dot.`, s:`The dot sits there. Brin stares at it. <em>"Oh,"</em> she says. <em>"That's the nose."</em> Her hand starts moving.`, ax:`stone`,d:8},
     {t:`Ask Brin to describe what she sees and you draw the first line.`, s:`Brin describes a creature with seven legs. You draw the first wobbly line. She laughs and picks up her own brush to fix it.`, ax:`thread`,d:8},
     {t:`Sit next to her and say nothing. Just stay.`, s:`A whole minute passes. Then Brin picks up the brush herself. <em>"I just needed someone to not leave,"</em> she says.`, ax:`flame`,d:8},

  {cat:`freeze`,loc:`lighthouse`,
   text:`<span class="cn">Wellow</span> sets a ball of dough in front of you. <em>"Your turn to knead. Just push and fold."</em> You stare at it. You know how. But somehow your hands feel stuck.`,
   q:`What do you do?`,

  // FLIP
  {cat:`flip`,loc:`beach`,
   text:`<span class="cn">Coss</span> talked about the Tide Festival for three days. This morning you find him behind the lighthouse. Not drumming. Just sitting. <em>"I don't want to go,"</em> he says. <em>"I know I said I did. But now it's real and it's too much."</em>`,

   choices:[

     {t:`"What if we just walk to the edge and look? We don't have to go in."`, s:`You walk to the edge together. Coss stands very still, listening. Then takes one step forward. Then another.`, ax:`stone`,d:9},
     {t:`Suggest making your own festival right here — just the two of you.`, s:`Coss picks up his drum. You bang sticks on a rock. It sounds terrible. Coss starts laughing.`, ax:`thread`,d:10},

  {cat:`flip`,loc:`beach`,
   text:`You've looked forward to the night swim all week. You packed your things. You ran to the beach. And now you're standing at the edge and it's darker than you thought and your feet will not move.`,
   q:`What do you do?`,
   choices:[

  // STORM
  {cat:`storm`,loc:`beach`,
   text:`<span class="cn">Coss</span> ran past and knocked over your tower — driftwood and shells and one perfect blue stone. He didn't even notice. You feel it starting in your chest. Hot. Fast. Too big.`,
   q:`What do you do?`,

     {t:`Find the Lumen and tell it exactly how angry you are.`, s:`The Lumen floats close. Its light pulses slowly, like breathing. You start breathing with it without meaning to.`, ax:`flame`,d:8},
     {t:`Call out to Coss and tell him what happened.`, s:`Coss sees your face and the pile of driftwood. <em>"I didn't see it. I'm so sorry."</em> He helps you find the blue stone.`, ax:`thread`,d:9},

  {cat:`storm`,loc:`bridge`,
   text:`You were almost done. The best drawing you've ever made. Then you made one wrong line — right through the best part. The urge to crumple the whole thing up is very strong.`,
   q:`What do you do?`,
   choices:[
     {t:`Put it face down and walk away for a little while.`, s:`When you come back fifteen minutes later, the wrong line is still there. But somehow the rest of the drawing looks better than you remembered.`, ax:`stone`,d:9},
     {t:`Show Brin and tell her exactly what went wrong.`, s:`<span class="cn">Brin</span> points at the wrong line. <em>"What if it's a crack in the creature's shell? Like it's hatching?"</em>`, ax:`thread`,d:10},
     {t:`Make the wrong line part of the drawing on purpose. Turn it into something.`, s:`A scar. A river. A stripe on a wing. You choose the wing. When you're done the drawing is more alive.`, ax:`flame`,d:10},
   ]},
  // TANGLE
  {cat:`tangle`,loc:`bridge`,
   text:`You said something sharp to <span class="cn">Pip</span> — not meaning it at Pip, but it landed wrong. Now Pip is sitting on the far side of the bridge. Not whistling. Pip always whistles. The silence is loud.`,

  {cat:`tangle`,loc:`forest`,
   text:`<span class="cn">Wellow</span> asked you to stir the pot and you got distracted and it burned a little on the bottom. Wellow noticed. Didn't yell. But you can tell. Now Wellow cleans up without saying anything.`,
   q:`What do you do?`,
   choices:[

   ]},
  // WAIT
  {cat:`wait`,loc:`forest`,

   q:`What do you do?`,
   choices:[
     {t:`Put the brush down and go. You can come back.`, s:`You put the brush down. It takes everything. When you come back the drawing is still there, waiting.`, ax:`stone`,d:10},

     {t:`Write three words on the corner so you remember where you were.`, s:`You write <em>ribbon tail — eyes.</em> When you return, the words are waiting. You pick up exactly where you left off.`, ax:`thread`,d:8},
   ]},
  {cat:`wait`,loc:`market`,
   text:`One honey roll left. Two of you want it. You got here first. But the traveler next to you has been staring at it with such longing. The market vendor is watching you both.`,
   q:`What do you do?`,
   choices:[
     {t:`"You take it."`, s:`The traveler stares. <em>"Are you sure?"</em> They take it. Then break it in half and hand you a piece. <em>"Thank you."</em>`, ax:`thread`,d:11},
     {t:`Suggest flipping a coin or playing rock-paper-sticks.`, s:`The traveler laughs, surprised. You play three rounds. They win. They buy you a different pastry with their spare change.`, ax:`flame`,d:9},
     {t:`Claim it — you were here first.`, s:`You take it. It tastes fine. But you think about the traveler's face the whole time. <em>Next time,</em> you think.`, ax:`stone`,d:5},
   ]},
  // MIRROR
  {cat:`mirror`,loc:`beach`,
   text:`The storm came and went. You're sitting on the beach. <em>"I always do that,"</em> you say to the air. <em>"Make it worse. I always make it worse."</em> The Lumen is quiet for a moment. <em>"Always?"</em> it says.`,
   q:`What do you say?`,
   choices:[
     {t:`"Most of the time."`, s:`<em>"Most of the time,"</em> the Lumen repeats. <em>"That's different from always."</em> Something shifts — like a door that was stuck moved one inch.`, ax:`stone`,d:8},
     {t:`"I don't know. It feels like always."`, s:`<em>"Feelings say always and never because they're loud,"</em> the Lumen says. <em>"They're not always right about the facts."</em>`, ax:`flame`,d:9},
     {t:`Say nothing and throw a stone into the water.`, s:`You throw four stones. After the fourth, something in your chest gets a little looser. <em>"Ready to talk?"</em> the Lumen asks. <em>"Maybe,"</em> you say.`, ax:`stone`,d:9},
   ]},
  {cat:`mirror`,loc:`lighthouse`,
   text:`The rolls didn't come out right. Not terrible — just not as good as last time. You tried hard. You followed every step. But <em>I can't do anything right</em> keeps playing in your head.`,
   q:`What do you do with that thought?`,
   choices:[
     {t:`Say back to it: "That's not actually true."`, s:`The thought doesn't disappear. But it gets a little smaller. Like you reminded it that you know better.`, ax:`flame`,d:10},
     {t:`Tell Wellow what's going on inside your head.`, s:`<em>"I keep thinking I can't do anything right."</em> Wellow says: <em>"You made bread today. With your hands. That is something right."</em>`, ax:`thread`,d:10},
     {t:`Ask if you can try the recipe again tomorrow.`, s:`<em>"Yes,"</em> Wellow says immediately. There's something else now: tomorrow, and another try.`, ax:`stone`,d:9},
   ]},
  // STRANGER
  {cat:`stranger`,loc:`market`,
   text:`Someone new is on the island — sitting alone at the market with a small notebook, drawing something very carefully. They glance up and see you looking. They don't wave. They don't look away either.`,
   q:`What do you do?`,
   choices:[
     {t:`Walk over and look at what they're drawing.`, s:`Wings made of leaves and eyes like buttons. <em>"That's incredible,"</em> you say. And you mean it. They don't close the notebook.`, ax:`thread`,d:10},
     {t:`Find something to do nearby — not talking, just existing close.`, s:`You sit nearby and do your own thing. At some point the distance between you is smaller than it was. Neither of you said anything.`, ax:`stone`,d:9},
     {t:`Ask Pip to come over with you.`, s:`<span class="cn">Pip</span> immediately starts whistling. The stranger almost smiles. <em>"What's that tune?"</em> You all end up sitting together.`, ax:`flame`,d:9},
   ]},
  {cat:`stranger`,loc:`forest`,
   text:`There's a traveler on the path who looks completely lost. They keep turning their map around and around. You know exactly where they're trying to go — you can see it on the map.`,
   q:`What do you do?`,
   choices:[
     {t:`"I know where that is. I'll walk you there."`, s:`They say thank you four times on the way. At the end of the path they ask your name.`, ax:`thread`,d:10},
     {t:`Point in the right direction from where you are.`, s:`<em>"That way. Past the big stone, then left."</em> They beam. You watch them find the right path.`, ax:`stone`,d:9},
     {t:`Draw them a little map in the dirt with a stick.`, s:`They copy it into their notebook. <em>"You should have a map-making stall,"</em> they say. You think: maybe I should.`, ax:`flame`,d:9},
   ]},
];



const AX_NOTE_POOLS = {
  flame:[
    "Because you acted when it was easier not to, the Flame burns brighter.",
    "That choice took courage. The Flame steadies — not blazing, but sure.",
    "You went toward the hard thing. The Flame holds because of that.",
    "Something brave just happened. The Flame felt it.",
    "Because you kept going, the Flame breathes in and holds steady.",
    "Your choice lit something. The Flame warms from that.",
    "You didn't have to do that. You did anyway. The Flame knows.",
  ],
  thread:[
    "Because you thought about someone else, the Thread glows.",
    "You listened before you acted. That's why the Thread tightens — in a good way.",
    "Your kindness just wove one more strand in.",
    "You reached toward someone. The Thread warms at your wrist because of that.",
    "Because you showed up, the Thread holds. It always holds when you let it.",
    "You made space for someone. The Thread expanded where you made it.",
    "Connection happened because you made it happen. The Thread knows.",
  ],
  stone:[
    "Because you held on when things got big, the Stone feels warmer.",
    "You found your footing. The Stone grows heavier — in the good way.",
    "You didn't rush. You didn't run. The Stone settles because of that.",
    "You held your ground. The Stone steadied with you.",
    "The wave came and you held. The Stone doesn't shake. Neither did you.",
    "Because you stayed instead of leaving, the Stone clicks into place.",
    "Still. After everything — still. Because you chose still.",
  ]

var axes={flame:50,thread:50,stone:50};
var collection={};
var runEncounters=[];
var runIdx=0;
var TOTAL=6;
var seenIds=new Set();
var pendingDiscovery=null;
var detailId=null;

function loadCollection(){
  try{
    var s=localStorage.getItem('waystone_v2');
    if(s) collection=JSON.parse(s);
  }catch(e){}
  CREATURES.forEach(function(c){
    if(!collection[c.id]) collection[c.id]={found:false,nick:''};
  });
}

function saveCollection(){
  try{ localStorage.setItem('waystone_v2',JSON.stringify(collection)); }catch(e){}
}

function show(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function pickUnseen(pool){
  var unseen=pool.filter(function(e){return !seenIds.has(e.text);});
  var src=unseen.length>0?unseen:pool;
  return src[Math.floor(Math.random()*src.length)];
}

function buildRun(){
  axes={flame:50,thread:50,stone:50};
  var cats=['freeze','flip','storm','tangle','wait','stranger'];
  var mirrors=ENCOUNTERS.filter(function(e){return e.cat==='mirror';});
  var mirror=pickUnseen(mirrors);
  var otherCats=shuffle(cats);
  var others=[];
  for(var i=0;i<5;i++){
    var pool=ENCOUNTERS.filter(function(e){return e.cat===otherCats[i];});
    others.push(pickUnseen(pool));
  }
  runEncounters=shuffle([mirror].concat(others));
  runEncounters.forEach(function(e){seenIds.add(e.text);});
  if(seenIds.size>=ENCOUNTERS.length) seenIds.clear();
  runIdx=0;
}

function buildProgress(){
  var row=document.getElementById('progress-row');
  row.innerHTML='';
  for(var i=0;i<TOTAL;i++){
    var d=document.createElement('div');
    d.className='pdot';d.id='pd'+i;
    row.appendChild(d);
  }
}

function updateAxes(){
  document.getElementById('ax-flame').style.width=axes.flame+'%';
  document.getElementById('ax-thread').style.width=axes.thread+'%';
  document.getElementById('ax-stone').style.width=axes.stone+'%';
}

function updateProgress(){
  for(var i=0;i<TOTAL;i++){
    var d=document.getElementById('pd'+i);
    if(!d) continue;
    if(i<runIdx) d.className='pdot done';
    else if(i===runIdx) d.className='pdot cur';
    else d.className='pdot';
  }
}

var LOC_KEYS=Object.keys(LOCATIONS);

function renderEncounter(){
  var enc=runEncounters[runIdx];
  if(!enc) return;
  var locKey=enc.loc||LOC_KEYS[runIdx%LOC_KEYS.length];
  var loc=LOCATIONS[locKey]||LOCATIONS.beach;
  document.getElementById('loc-label').textContent=loc.label;
  document.getElementById('explore-bg').style.background=loc.bg;
  document.getElementById('loc-art').innerHTML=loc.art;
  document.getElementById('enc-text').innerHTML=enc.text;
  document.getElementById('enc-q').textContent=enc.q;
  var cc=document.getElementById('choices');
  cc.innerHTML='';
  for(var i=0;i<enc.choices.length;i++){
    (function(idx){
      var btn=document.createElement('button');
      btn.className='choice';
      btn.textContent=enc.choices[idx].t;
      btn.onclick=function(){makeChoice(idx);};
      cc.appendChild(btn);
    })(i);
  }
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('choices').style.cssText='';
  updateProgress();
  updateAxes();
}

function makeChoice(idx){
  var enc=runEncounters[runIdx];
  var c=enc.choices[idx];
  axes[c.ax]=Math.min(100,Math.max(10,axes[c.ax]+c.d));
  var others=['flame','thread','stone'].filter(function(a){return a!==c.ax;});
  others.forEach(function(a){axes[a]=Math.min(100,Math.max(10,axes[a]+2));});
  updateAxes();
  document.getElementById('choices').style.opacity='0.3';
  document.getElementById('choices').style.pointerEvents='none';
  document.getElementById('fb-story').innerHTML=c.s;
  var pool=AX_NOTE_POOLS[c.ax];
  var note=pool[Math.floor(Math.random()*pool.length)];
  var icons={flame:'&#x1F525;',thread:'&#x1F9F5;',stone:'&#x1FAA8;'};
  document.getElementById('fb-note').innerHTML=
    '<div class="fb-note-el '+c.ax+'">'+icons[c.ax]+' '+note+'</div>';
  var isLast=runIdx>=TOTAL-1;
  document.getElementById('btn-next').innerHTML=isLast?'End Journey &#x2728;':'Keep exploring &#x2192;';
  document.getElementById('feedback').classList.add('show');
}

function nextEncounter(){
  runIdx++;
  document.getElementById('choices').style.cssText='';
  document.getElementById('feedback').classList.remove('show');
  if(runIdx>=TOTAL){endRun();return;}
  renderEncounter();
}

function endRun(){
  var discovered=CREATURES.filter(function(c){
    if(collection[c.id].found) return false;
    var req=c.threshold;
    return Object.keys(req).every(function(k){return axes[k]>=req[k];});
  });
  if(discovered.length>0){
    pendingDiscovery=discovered.slice(1);
    showDiscovery(discovered[0]);
  } else {
    showRunEnd(false);
  }
}

function showDiscovery(creature){
  var typeColors={flame:'#ff6b35',thread:'#5ec4b0',stone:'#8ba7c0',rare:'#d4a0ff'};
  var col=typeColors[creature.type]||'#f0c040';

  // Build silhouette SVG
  var silSvg=creature.svg
    .replace(/fill="[^"]*"/g,'fill="'+col+'"')
    .replace(/stroke="[^"]*"/g,'stroke="'+col+'"')
    .replace(/style="[^"]*"/g,'');

  // Set discovery screen content but hide creature + info initially
  document.getElementById('disc-art').style.cssText='opacity:0;transform:scale(0.4);transition:none;';
  document.getElementById('disc-art').innerHTML=creature.svg;
  document.getElementById('disc-name').style.cssText='opacity:0;transform:translateY(12px);transition:none;';
  document.getElementById('disc-name').textContent=creature.name;
  document.getElementById('disc-type').innerHTML='';
  document.getElementById('disc-personality').style.cssText='opacity:0;transition:none;';
  document.getElementById('disc-personality').textContent=creature.personality;
  document.getElementById('disc-input').value='';
  document.getElementById('disc-input').dataset.id=creature.id;

  show('s-discovery');

  // Phase 1 (0ms): Show silhouette breathing on screen
  var sil=document.createElement('div');
  sil.id='disc-sil-overlay';
  sil.style.cssText='position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,12,22,0.92);';
  sil.innerHTML='<div style="width:220px;height:220px;animation:sil-pulse 1.2s ease-in-out infinite;">'+silSvg+'</div>';
  document.body.appendChild(sil);

  // Phase 2 (800ms): Flash white + remove silhouette + reveal creature
  setTimeout(function(){
    var flash=document.createElement('div');
    flash.className='ceremony-flash';
    document.body.appendChild(flash);
    setTimeout(function(){
      if(flash.parentNode) flash.parentNode.removeChild(flash);
    },300);

    if(sil.parentNode) sil.parentNode.removeChild(sil);

    // Animate creature in
    document.getElementById('disc-art').style.cssText=
      'opacity:1;transform:scale(1);transition:opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);';

    // Burst particles
    spawnBurst(col);

    // Phase 3 (1200ms): Animate name + type
    setTimeout(function(){
      var tl={flame:'&#x1F525; Flame Type',thread:'&#x1F9F5; Thread Type',stone:'&#x1FAA8; Stone Type',rare:'&#x2728; Rare Creature'};
      document.getElementById('disc-type').innerHTML=tl[creature.type]||creature.type;
      document.getElementById('disc-type').className='disc-type '+creature.type;
      document.getElementById('disc-name').style.cssText=
        'opacity:1;transform:translateY(0);transition:opacity 0.4s ease, transform 0.4s ease;';

      // Phase 4 (1600ms): personality + input appear
      setTimeout(function(){
        document.getElementById('disc-personality').style.cssText=
          'opacity:1;transition:opacity 0.5s ease;';
      },400);
    },400);
  },900);
}

function spawnBurst(color){
  var disc=document.getElementById('disc-art');
  if(!disc) return;
  var rect=disc.getBoundingClientRect();
  var cx=rect.left+rect.width/2;
  var cy=rect.top+rect.height/2;
  for(var i=0;i<16;i++){
    var dot=document.createElement('div');
    var angle=(i/16)*360;
    var dist=60+Math.random()*60;
    var size=4+Math.random()*6;
    var dx=Math.cos(angle*Math.PI/180)*dist;
    var dy=Math.sin(angle*Math.PI/180)*dist;
    dot.style.cssText='position:fixed;width:'+size+'px;height:'+size+'px;'+
      'border-radius:50%;background:'+color+';z-index:200;pointer-events:none;'+
      'left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px;'+
      'transition:transform 0.6s ease-out, opacity 0.6s ease-out;';
    document.body.appendChild(dot);
    (function(el,ddx,ddy){
      setTimeout(function(){
        el.style.transform='translate('+ddx+'px,'+ddy+'px) scale(0)';
        el.style.opacity='0';
        setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},700);
      },20);
    })(dot,dx,dy);
  }
}

function saveDiscovery(){
  var input=document.getElementById('disc-input');
  var id=input.dataset.id;
  collection[id].found=true;
  collection[id].nick=input.value.trim();
  saveCollection();
  if(pendingDiscovery&&pendingDiscovery.length>0){
    showDiscovery(pendingDiscovery.shift());
  } else {
    showRunEnd(true);
  }
}

function showRunEnd(found){
  var count=CREATURES.filter(function(c){return collection[c.id].found;}).length;
  document.getElementById('runend-icon').innerHTML=found?'&#x2728;':'&#x1F30A;';
  document.getElementById('runend-title').textContent=found?'New Creature Found!':'Journey Complete';
  document.getElementById('runend-msg').textContent=count+' of 15 creatures in your collection.';
  var stirs=['Something stirred in the deep forest...','A shadow crossed the Lighthouse window.','The Bridge creaked. Something is watching.','The island noticed. Keep exploring.'];
  document.getElementById('runend-stir').textContent=found?'':stirs[Math.floor(Math.random()*stirs.length)];
  show('s-runend');
}

function showCompendium(){
  var found=CREATURES.filter(function(c){return collection[c.id].found;}).length;
  document.getElementById('comp-count').textContent=found+' / 15 found';
  var grid=document.getElementById('comp-grid');
  grid.innerHTML='';
  CREATURES.forEach(function(c){
    var isFound=collection[c.id].found;
    var nick=collection[c.id].nick;
    var card=document.createElement('div');
    card.className='comp-card'+(isFound?' found':'')+(c.rare?' rare':'');
    if(isFound){
      card.innerHTML='<div class="comp-creature">'+c.svg+'</div>'+
        '<div class="comp-cname">'+c.name+'</div>'+
        '<div class="type-dot '+c.type+'"></div>'+
        (nick?'<div class="comp-nick">"'+nick+'"</div>':'');
      (function(id){card.onclick=function(){showDetail(id);};})(c.id);
    } else {
      var sil=c.svg.replace(/fill="[^"]*"/g,'fill="#1e2230"').replace(/stroke="[^"]*"/g,'stroke="#1e2230"').replace(/style="[^"]*"/g,'style="animation:breathe 3s ease-in-out infinite;"');
      card.innerHTML='<div class="comp-creature sil-wrap">'+sil+'</div>'+
        '<div class="comp-cname unk">???</div>'+
        '<div class="type-dot unk"></div>';
    }
    grid.appendChild(card);
  });
  show('s-compendium');
}

function showDetail(id){
  var c=null;
  for(var i=0;i<CREATURES.length;i++){if(CREATURES[i].id===id){c=CREATURES[i];break;}}
  if(!c) return;
  detailId=id;
  document.getElementById('detail-art').innerHTML=c.svg;
  document.getElementById('detail-name').textContent=c.name;
  var nick=collection[id].nick;
  document.getElementById('detail-nick-disp').textContent=nick?'"'+nick+'"':'';
  var tl={flame:'&#x1F525; Flame Type',thread:'&#x1F9F5; Thread Type',stone:'&#x1FAA8; Stone Type',rare:'&#x2728; Rare Creature'};
  document.getElementById('detail-type').innerHTML=tl[c.type]||c.type;
  document.getElementById('detail-type').className='detail-type '+c.type;
  document.getElementById('detail-pers').textContent=c.personality;
  document.getElementById('nick-input').value=nick||'';
  show('s-detail');
}

function saveNick(){
  if(!detailId) return;
  var nick=document.getElementById('nick-input').value.trim();
  collection[detailId].nick=nick;
  saveCollection();
  document.getElementById('detail-nick-disp').textContent=nick?'"'+nick+'"':'';
}

function startExplore(){
  buildRun();
  buildProgress();
  show('s-explore');
  renderEncounter();
}

// WIRE BUTTONS
window.onload=function(){
  loadCollection();
  document.getElementById('btn-explore').onclick=startExplore;
  document.getElementById('btn-collection').onclick=showCompendium;
  document.getElementById('btn-nav-coll').onclick=showCompendium;
  document.getElementById('btn-nav-home').onclick=function(){show('s-title');};
  document.getElementById('btn-next').onclick=nextEncounter;
  document.getElementById('btn-save-disc').onclick=saveDiscovery;
  document.getElementById('btn-comp-back').onclick=function(){show('s-title');};
  document.getElementById('btn-nick-save').onclick=saveNick;
  document.getElementById('btn-detail-back').onclick=showCompendium;
  document.getElementById('btn-again').onclick=startExplore;
  document.getElementById('btn-runend-coll').onclick=showCompendium;
};
</script>
</body>
</html>
