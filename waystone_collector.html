<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Waystone: Creature Collector</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#080d18;color:#e8e4d8;font-family:'Nunito',sans-serif;position:relative;}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100%;flex-direction:column;overflow:hidden;position:absolute;top:0;left:0;}
.screen.active{display:flex;}


/* ── TITLE SCREEN REBUILD ── */
#s-title{overflow:hidden;position:relative;}

/* Layered gradient sky */
.title-sky{position:absolute;inset:0;
  background:linear-gradient(180deg,#0d2848 0%,#1a4a6a 45%,#0a2038 100%);}

/* Star field layer */
.title-stars{position:absolute;inset:0;overflow:hidden;}
.tstar{position:absolute;border-radius:50%;background:white;}
.tstar.pulse{animation:flicker var(--dur,3s) ease-in-out infinite var(--del,0s);}

/* Parallax island layers - horizon glow */
.title-horizon{position:absolute;bottom:0;left:0;right:0;height:55%;
  background:radial-gradient(ellipse at 50% 85%,rgba(255,200,60,.22) 0%,rgba(255,140,20,.1) 35%,transparent 65%);}

/* Aurora ribbons */
.aurora{position:absolute;top:0;left:-20%;right:-20%;height:45%;pointer-events:none;}
.aurora-band{position:absolute;border-radius:100%;opacity:0;
  animation:aurora-drift var(--dur,12s) ease-in-out infinite var(--del,0s);}
@keyframes aurora-drift{
  0%,100%{opacity:0;transform:translateY(30px) skewX(-5deg);}
  30%{opacity:.28;}50%{opacity:.12;}70%{opacity:.22;}
}

/* Animated island art */
.title-island-wrap{position:absolute;bottom:0;left:0;right:0;height:55%;display:flex;align-items:flex-end;justify-content:center;}
.title-island-svg{width:100%;height:100%;max-width:600px;}

/* Center content */
.title-content{position:relative;z-index:10;display:flex;flex-direction:column;
  align-items:center;gap:10px;padding:24px;text-align:center;margin-top:14vh;}

/* WAYSTONE logo treatment */
.title-logo-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;}
.title-eyebrow{font-size:10px;font-weight:800;letter-spacing:5px;text-transform:uppercase;
  color:rgba(240,192,64,.55);margin-bottom:4px;}
.title-logo{font-family:'Fredoka One',cursive;font-size:clamp(48px,12vw,72px);color:white;
  letter-spacing:-1px;line-height:1;
  text-shadow:0 0 60px rgba(240,192,64,.35),0 0 20px rgba(240,192,64,.2),0 4px 0 rgba(0,0,0,.4);}
.title-logo span{color:#f0c040;}
/* Friendship edition badge */
.title-edition{display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(240,192,64,.18),rgba(212,160,255,.12));
  border:1px solid rgba(240,192,64,.3);border-radius:20px;
  padding:4px 14px;font-size:11px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:#f0c040;margin-top:6px;}
.title-subtitle{font-size:12px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:rgba(168,186,210,.55);margin-top:2px;}

/* Creature peeks - creatures at bottom of screen */
.title-peek{position:absolute;bottom:0;animation:title-peek-bob var(--dur,4s) ease-in-out infinite var(--del,0s);}
@keyframes title-peek-bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* Buttons */
.title-btns-new{display:flex;flex-direction:column;gap:8px;align-items:center;margin-top:10px;width:100%;max-width:320px;}
.title-btn-row{display:flex;gap:8px;width:100%;}
.btn-title-main{background:linear-gradient(135deg,#f0c040,#c89820);color:#1a1000;
  border:none;border-radius:50px;font-family:'Nunito',sans-serif;
  font-size:17px;font-weight:900;padding:15px 0;cursor:pointer;
  box-shadow:0 6px 28px rgba(240,192,64,.35),0 2px 0 rgba(0,0,0,.2);
  width:100%;letter-spacing:.3px;transition:transform .15s,box-shadow .15s;}
.btn-title-main:active{transform:scale(.97);box-shadow:0 3px 14px rgba(240,192,64,.3);}
.btn-title-sec{flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.14);
  border-radius:50px;color:#e8e4d8;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;padding:12px 0;cursor:pointer;transition:background .15s;}
.btn-title-sec:active{background:rgba(255,255,255,.15);}
.btn-residents{background:linear-gradient(135deg,rgba(94,196,176,.2),rgba(94,196,176,.08));
  border:1.5px solid rgba(94,196,176,.3);border-radius:50px;color:#5ec4b0;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  padding:12px 0;cursor:pointer;width:100%;transition:background .15s;}
.btn-residents:active{background:rgba(94,196,176,.15);}

/* RESIDENTS SCREENS */
.res-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);
  border-radius:16px;padding:14px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:background .15s;}
.res-card:active{background:rgba(255,255,255,.1);}
.res-portrait{width:80px;height:94px;flex-shrink:0;border-radius:12px;overflow:hidden;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);}
.res-portrait svg{width:100%;height:100%;}
.res-info{flex:1;min-width:0;}
.res-name{font-family:'Fredoka One',cursive;font-size:20px;color:white;line-height:1.2;}
.res-role{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.res-preview{font-family:'Lora',serif;font-size:13px;font-style:italic;
  color:rgba(232,228,216,.65);line-height:1.6;}
.res-tier-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.07);color:rgba(232,228,216,.55);display:inline-flex;
  align-items:center;gap:4px;margin-top:5px;}
.res-tier-badge.maxed{background:rgba(240,192,64,.15);color:#f0c040;}
/* Detail page */
.rdet-portrait-big{width:140px;height:164px;flex-shrink:0;border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);}
.rdet-portrait-big svg{width:100%;height:100%;}
.rdet-top{display:flex;gap:18px;align-items:flex-start;}
.rdet-role{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.rdet-tier-label{font-size:12px;font-weight:700;color:#f0c040;margin-bottom:8px;}
.fact-group{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:12px 14px;}
.fact-group-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:8px;}
.fact-item{font-family:'Lora',serif;font-size:14px;line-height:1.75;
  color:rgba(232,228,216,.82);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.fact-item:last-child{border-bottom:none;}
.fact-locked{font-family:'Lora',serif;font-size:13px;font-style:italic;
  color:rgba(255,255,255,.2);padding:8px 0;text-align:center;}
.rdet-next-hint{font-size:11px;color:rgba(255,255,255,.3);text-align:center;
  font-style:italic;font-family:'Lora',serif;padding-top:4px;}
@media (orientation:portrait),(max-width:600px){
  .rdet-top{flex-direction:column;align-items:center;text-align:center;}
  .rdet-portrait-big{width:120px;height:140px;}
}


/* ── BUTTONS ── */
.btn-gold{background:linear-gradient(135deg,#f0c040,#c89820);color:#1a1000;
  border:none;border-radius:50px;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:900;padding:13px 28px;cursor:pointer;
  box-shadow:0 4px 16px rgba(240,192,64,.3);}
.btn-gold:active{transform:scale(.97);}
.btn-outline{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);
  border-radius:50px;color:#e8e4d8;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:700;padding:13px 28px;cursor:pointer;}
.btn-outline:active{background:rgba(255,255,255,.14);}
.btn-next{background:rgba(240,192,64,.12);border:1.5px solid rgba(240,192,64,.3);
  border-radius:50px;color:#f0c040;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:900;padding:12px 28px;cursor:pointer;align-self:center;margin-top:4px;}
.btn-save{background:rgba(240,192,64,.15);border:1.5px solid rgba(240,192,64,.3);
  border-radius:50px;color:#f0c040;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;padding:9px 20px;cursor:pointer;}

/* ── EXPLORE ── */
#s-explore{flex-direction:row;}
@media (orientation:portrait),(max-width:700px){
  #s-explore{flex-direction:column;}
  .explore-left{width:100%!important;height:190px!important;flex-direction:row!important;
    align-items:center!important;justify-content:center!important;padding-bottom:0!important;}
  .loc-art{width:150px!important;height:150px!important;}
  .explore-right{flex:1!important;width:100%!important;height:auto!important;}
  .disc-wrap{flex-direction:column!important;text-align:center!important;gap:16px!important;padding:20px!important;}
  .disc-art{width:160px!important;height:160px!important;}
  .disc-name{font-size:36px!important;}
  #s-detail{flex-direction:column!important;align-items:center!important;gap:16px!important;
    padding:16px!important;justify-content:flex-start!important;}
  .detail-art{width:180px!important;height:180px!important;}
  .detail-info{max-width:100%!important;}
  .comp-grid{grid-template-columns:repeat(3,1fr)!important;padding:12px!important;}
  .inv-grid{grid-template-columns:repeat(2,1fr)!important;padding:12px!important;}
}
.explore-left{width:40%;height:100%;flex-shrink:0;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:14px;}
.explore-bg{position:absolute;top:0;left:0;right:0;bottom:0;}
.loc-art{width:210px;height:210px;position:relative;z-index:1;}
.loc-art svg{width:100%;height:100%;}
.loc-label{position:relative;z-index:1;font-size:10px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;}
.explore-right{flex:1;min-width:0;display:flex;flex-direction:column;
  gap:12px;padding:52px 20px 20px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.explore-nav{position:absolute;top:10px;right:14px;z-index:10;display:flex;gap:6px;}
.nav-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:50px;color:#e8e4d8;font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:800;padding:5px 12px;cursor:pointer;}

/* ── AXES ── */
.axes-row{display:flex;gap:6px;}
.ax{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:6px 8px;}
.ax-label{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.ax-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:3px;}
.ax-fill{height:100%;border-radius:2px;transition:width .7s ease;}
.ax.flame .ax-label{color:#ff6b35;}.ax.flame .ax-fill{background:#ff6b35;}
.ax.thread .ax-label{color:#5ec4b0;}.ax.thread .ax-fill{background:#5ec4b0;}
.ax.stone .ax-label{color:#8ba7c0;}.ax.stone .ax-fill{background:#8ba7c0;}
.ax.spark .ax-label{color:#f0c040;}.ax.spark .ax-fill{background:#f0c040;}
.ax.root .ax-label{color:#68b828;}.ax.root .ax-fill{background:#68b828;}

/* ── PROGRESS ── */
.prog-row{display:flex;gap:4px;}
.pdot{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.07);transition:background .3s;}
.pdot.done{background:#f0c040;}.pdot.cur{background:rgba(240,192,64,.4);}

/* ── ENCOUNTER ── */
.enc-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:14px 16px;font-family:'Lora',serif;font-size:16px;line-height:1.9;}
.enc-box em{color:#f5edd8;font-style:italic;}
.enc-box .cn{color:#f0c040;font-weight:600;font-style:normal;}
.enc-q{font-family:'Fredoka One',cursive;font-size:18px;color:#e8e4d8;text-align:center;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;color:#e8e4d8;font-family:'Nunito',sans-serif;
  font-size:15px;font-weight:700;line-height:1.6;padding:13px 16px;text-align:left;cursor:pointer;width:100%;}
.choice:active{background:rgba(255,255,255,.14);}
.feedback{display:none;flex-direction:column;gap:9px;}
.feedback.show{display:flex;}
.fb-story{font-family:'Lora',serif;font-size:15px;line-height:1.9;color:#e8e4d8;}
.fb-story em{color:#f5edd8;font-style:italic;}
.fb-note{font-size:11px;font-weight:700;padding:5px 13px;border-radius:50px;
  display:inline-flex;align-items:center;gap:5px;}
.fb-note.flame{background:rgba(255,107,53,.15);color:#ff6b35;}
.fb-note.thread{background:rgba(94,196,176,.15);color:#5ec4b0;}
.fb-note.stone{background:rgba(139,167,192,.15);color:#8ba7c0;}
.fb-note.spark{background:rgba(240,192,64,.15);color:#f0c040;}
.fb-note.root{background:rgba(104,184,40,.15);color:#68b828;}
.fb-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#f0c040;
  display:flex;align-items:center;gap:8px;}

/* ── DISCOVERY ── */
#s-discovery{align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(ellipse at 50% 50%,rgba(240,192,64,.1) 0%,transparent 60%);}
.disc-wrap{display:flex;flex-direction:row;align-items:center;
  gap:40px;padding:28px;max-width:760px;width:100%;}
.disc-art{width:200px;height:200px;flex-shrink:0;position:relative;}
.disc-art svg{width:100%;height:100%;}
.disc-info{display:flex;flex-direction:column;gap:12px;flex:1;}
.disc-new{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#f0c040;}
.disc-name{font-family:'Fredoka One',cursive;font-size:44px;color:white;line-height:1.1;}
.disc-type{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.disc-type.flame{color:#ff6b35;}.disc-type.thread{color:#5ec4b0;}.disc-type.stone{color:#8ba7c0;}
.disc-type.spark{color:#f0c040;}.disc-type.root{color:#68b828;}.disc-type.rare{color:#d4a0ff;}
.disc-personality{font-family:'Lora',serif;font-size:15px;font-style:italic;
  color:rgba(232,228,216,.8);line-height:1.75;}
.disc-input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
  border-radius:50px;color:white;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;padding:10px 18px;outline:none;width:100%;}
.disc-input::placeholder{color:rgba(255,255,255,.25);}

/* ── COMPENDIUM ── */
#s-compendium{flex-direction:column;}
.comp-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.comp-title{font-family:'Fredoka One',cursive;font-size:24px;color:#f0c040;}
.comp-tabs{display:flex;gap:6px;padding:0 18px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);}
.comp-tab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;color:#6a7890;font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:800;padding:5px 12px;cursor:pointer;transition:all .2s;}
.comp-tab.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#e8e4d8;}
.comp-grid{flex:1;overflow-y:auto;padding:14px 18px;
  display:grid;grid-template-columns:repeat(5,1fr);gap:11px;}
.comp-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);
  border-radius:13px;padding:11px 7px;display:flex;flex-direction:column;
  align-items:center;gap:5px;cursor:pointer;transition:all .15s;}
.comp-card.found{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.07);}
.comp-card.found:active{transform:scale(.97);}
.comp-card.rare.found{border-color:rgba(212,160,255,.3);box-shadow:0 0 16px rgba(212,160,255,.08);}
.comp-creature{width:66px;height:66px;}
.comp-creature svg{width:100%;height:100%;}
.comp-cname{font-family:'Fredoka One',cursive;font-size:11px;color:#e8e4d8;text-align:center;line-height:1.2;}
.comp-cname.unk{color:#383e4a;}
.type-dot{width:7px;height:7px;border-radius:50%;}
.type-dot.flame{background:#ff6b35;}.type-dot.thread{background:#5ec4b0;}
.type-dot.stone{background:#8ba7c0;}.type-dot.spark{background:#f0c040;}
.type-dot.root{background:#68b828;}.type-dot.rare{background:#d4a0ff;}.type-dot.unk{background:#282e38;}
.comp-nick{font-size:9px;color:#6a7890;font-style:italic;text-align:center;}
.comp-lock{font-size:9px;color:#4a5060;text-align:center;line-height:1.3;margin-top:2px;font-family:'Lora',serif;font-style:italic;}

/* ── DETAIL ── */
#s-detail{flex-direction:row;align-items:center;justify-content:center;gap:44px;padding:28px;overflow-y:auto;}
.detail-art{width:220px;height:220px;flex-shrink:0;}
.detail-art svg{width:100%;height:100%;}
.detail-info{display:flex;flex-direction:column;gap:13px;max-width:380px;width:100%;}
.detail-name{font-family:'Fredoka One',cursive;font-size:42px;color:white;}
.detail-nick-disp{font-size:13px;color:#6a7890;font-style:italic;margin-top:-8px;}
.detail-type{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.detail-type.flame{color:#ff6b35;}.detail-type.thread{color:#5ec4b0;}.detail-type.stone{color:#8ba7c0;}
.detail-type.spark{color:#f0c040;}.detail-type.root{color:#68b828;}.detail-type.rare{color:#d4a0ff;}
.detail-pers{font-family:'Lora',serif;font-size:16px;font-style:italic;
  color:rgba(232,228,216,.8);line-height:1.7;}
.detail-lore-row{display:flex;flex-direction:column;gap:6px;}
.detail-lore-item{font-size:12px;color:#8898a8;font-family:'Lora',serif;}
.detail-lore-item strong{color:#b8c8d8;font-style:normal;}
.nick-row{display:flex;gap:8px;}
.nick-input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
  border-radius:50px;color:white;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;padding:9px 16px;outline:none;flex:1;}

/* ── INVENTORY ── */
#s-inventory{flex-direction:column;}
.inv-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.inv-title{font-family:'Fredoka One',cursive;font-size:24px;color:#f0c040;}
.inv-grid{flex:1;overflow-y:auto;padding:14px 18px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.inv-slot{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);
  border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;
  align-items:center;gap:7px;}
.inv-slot.owned{border-color:rgba(240,192,64,.25);background:rgba(240,192,64,.06);}
.inv-slot.trophy{border-color:rgba(212,160,255,.25);background:rgba(212,160,255,.06);}
.inv-icon{font-size:32px;line-height:1;}
.inv-name{font-family:'Fredoka One',cursive;font-size:13px;color:#e8e4d8;text-align:center;line-height:1.2;}
.inv-name.empty{color:#383e4a;}
.inv-desc{font-size:10px;color:#6a7890;text-align:center;line-height:1.5;font-family:'Lora',serif;font-style:italic;}
.inv-clue{font-size:10px;color:#8898a8;text-align:center;line-height:1.5;font-family:'Lora',serif;font-style:italic;
  border-top:1px solid rgba(255,255,255,.06);padding-top:6px;margin-top:2px;}
.inv-owned-label{font-size:9px;font-weight:800;color:#f0c040;letter-spacing:1px;text-transform:uppercase;}
.inv-sparks{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
.inv-spark-dot{width:10px;height:10px;border-radius:50%;background:#f0c040;
  box-shadow:0 0 6px rgba(240,192,64,.6);}

/* ── RUN END ── */
#s-runend{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,rgba(94,196,176,.07) 0%,transparent 60%);}
.runend-wrap{display:flex;flex-direction:column;align-items:center;
  gap:16px;text-align:center;padding:28px;max-width:440px;}
.runend-icon{font-size:52px;}
.runend-title{font-family:'Fredoka One',cursive;font-size:32px;color:#f0c040;}
.runend-msg{font-family:'Lora',serif;font-size:16px;font-style:italic;
  color:rgba(232,228,216,.8);line-height:1.7;}
.runend-stir{font-size:12px;color:#6a7890;font-family:'Lora',serif;font-style:italic;}
.runend-axes{display:flex;gap:8px;margin-top:4px;}
.runend-ax{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:8px 14px;text-align:center;}
.runend-ax-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.runend-ax-val{font-family:'Fredoka One',cursive;font-size:20px;}
.runend-ax.flame .runend-ax-label,.runend-ax.flame .runend-ax-val{color:#ff6b35;}
.runend-ax.thread .runend-ax-label,.runend-ax.thread .runend-ax-val{color:#5ec4b0;}
.runend-ax.stone .runend-ax-label,.runend-ax.stone .runend-ax-val{color:#8ba7c0;}
.runend-ax.spark .runend-ax-label,.runend-ax.spark .runend-ax-val{color:#f0c040;}
.runend-ax.root .runend-ax-label,.runend-ax.root .runend-ax-val{color:#68b828;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

/* ── ANIMATIONS ── */
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes flicker{0%,100%{opacity:1;}50%{opacity:.65;}75%{opacity:.9;}}
@keyframes wobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
@keyframes spin-slow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes rumble{0%,100%{transform:translateX(0);}25%{transform:translateX(-2px);}75%{transform:translateX(2px);}}
@keyframes peek{0%,40%,100%{transform:translateY(0);}20%{transform:translateY(-10px);}}
@keyframes streak{0%{transform:translateX(-15px);opacity:0;}50%{opacity:1;}100%{transform:translateX(15px);opacity:0;}}
@keyframes pulse-glow{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes fade-in-out{0%,100%{opacity:.15;}50%{opacity:.85;}}
@keyframes orbit{from{transform:rotate(0deg) translateX(28px) rotate(0deg);}to{transform:rotate(360deg) translateX(28px) rotate(-360deg);}}
@keyframes spark-burst{0%{transform:scale(0);opacity:1;}100%{transform:scale(2.2);opacity:0;}}
@keyframes reveal-in{0%{opacity:0;transform:scale(0.4);}65%{opacity:1;transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes name-up{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}
@keyframes flash-white{0%,100%{opacity:0;}40%{opacity:1;}}
@keyframes wave-drift{0%,100%{transform:translateX(0);}50%{transform:translateX(14px);}}
@keyframes wave-drift2{0%,100%{transform:translateX(0);}50%{transform:translateX(-16px);}}
@keyframes sil-pulse{0%,100%{opacity:.38;filter:blur(0px);}50%{opacity:.58;filter:blur(.6px);}}

/* Silhouette glow wrapper */
.sil-wrap{position:relative;animation:sil-pulse 3s ease-in-out infinite;}
.sil-wrap::after{content:'';position:absolute;inset:-5px;border-radius:50%;
  background:radial-gradient(circle,rgba(100,120,180,.16) 0%,transparent 70%);
  animation:sil-pulse 3s ease-in-out infinite;}

/* Ceremony flash overlay */
.ceremony-flash{position:fixed;inset:0;background:white;z-index:200;
  pointer-events:none;animation:flash-white .28s ease-out forwards;}

.friend-hearts{display:flex;gap:2px;justify-content:center;margin-top:2px;}
.fheart{font-size:11px;line-height:1;}
.comp-card.bestfriend.found{border-color:rgba(240,192,64,.5)!important;box-shadow:0 0 20px rgba(240,192,64,.15)!important;}

{cat:`freeze`,loc:`forest`,
text:`<span class="cn">Brin</span> is standing at a blank piece of paper with her ears flat. <em>"I know what I want to draw. But my hand won't start."</em> She slides the paper over to you.`,
q:`What do you do?`,
choices:[
{t:`Pick up the brush and make one tiny mark — just a dot — to show her that starting is possible.`,s:`The dot sits there. Brin stares at it. <em>"Oh,"</em> she says. <em>"That's the nose."</em> Her hand picks up the brush and starts moving.`,ax:`stone`,d:9},
{t:`Ask Brin to tell you what she's picturing, and then you draw the very first line for her.`,s:`Brin describes a creature with seven legs and a crown of leaves. You draw the first wobbly line. She laughs and grabs the brush to fix it.`,ax:`thread`,d:9},
{t:`Sit down next to her without saying anything. Just stay there with her.`,s:`A whole minute goes by. Then Brin picks up the brush herself. <em>"I just needed someone to not leave,"</em> she says.`,ax:`flame`,d:8},
]},

{cat:`freeze`,loc:`lighthouse`,
text:`<span class="cn">Wellow</span> puts a ball of dough in front of you. <em>"Your turn. Just push it and fold it."</em> You know how to do this. But your hands won't start.`,
q:`What do you do?`,
choices:[
{t:`Put your hands in and push. Don't wait until you feel ready.`,s:`The dough is warmer than you thought. Your hands start figuring it out on their own. Push and fold. Push and fold. You're doing it.`,ax:`flame`,d:9},
{t:`Ask Wellow to put their hands over yours, just for the first push.`,s:`Wellow helps you start. <em>"There. You already knew how."</em> Wellow steps back and you keep going by yourself.`,ax:`thread`,d:8},
{t:`Tell Wellow your hands feel frozen and you don't know why.`,s:`Wellow nods like this makes complete sense. <em>"Starting is the hardest part. That doesn't mean you can't do it."</em> You believe them.`,ax:`stone`,d:9},
]},

{cat:`freeze`,loc:`market`,
text:`There's a drawing competition at the market. You made something this morning that you really liked. But now you're standing here looking at the board and your drawing feels too small and too wrong.`,
q:`What do you do?`,
choices:[
{t:`Put it up before you can talk yourself out of it.`,s:`You hang it up and look away. An hour later there are three colored stones on the ground below it. That's how the market says something was good.`,ax:`flame`,d:10},
{t:`Ask Brin to stand right next to you while you hang it up.`,s:`<span class="cn">Brin</span> holds your hand the whole time. <em>"It's up,"</em> she says. The drawing looks right on the board.`,ax:`thread`,d:8},
{t:`Keep it in your pocket and tell yourself you'll put it up next time.`,s:`You keep it. On the walk home you look at it again. It's actually really good. <em>Next time,</em> you think. And you mean it.`,ax:`stone`,d:7},
]},

{cat:`freeze`,loc:`bridge`,
text:`You need to cross the bridge. You've done it a hundred times. But tonight there's thick fog and the bridge looks different in the dark. You've been standing at the edge for a while now.`,
q:`What do you do?`,
choices:[
{t:`Take one step forward. Just one. Onto the first plank.`,s:`The wood is cold and solid under your foot. Real. The second step is easier. The third is easier than that. You make it across.`,ax:`flame`,d:10},
{t:`Count the planks you can see, out loud. Then walk to those planks and count the next ones.`,s:`Twelve planks. You walk those. Then twelve more. Then the other side appears before you expected it.`,ax:`stone`,d:9},
{t:`Hum or whistle something while you walk across.`,s:`Your voice bounces back from the fog. Hearing yourself helps. The bridge feels smaller and easier to cross.`,ax:`spark`,d:8},
]},

{cat:`freeze`,loc:`forest`,
text:`<span class="cn">Scribb</span> left you a beautiful blank piece of paper with a note: <em>"Make something. Anything at all. I believe in you!"</em> The paper is completely blank and Scribb's excitement somehow makes it harder.`,
q:`What do you do?`,
choices:[
{t:`Write the word "start" in the corner and see what comes next.`,s:`You write it. Then you draw a small dot next to it. Then you draw what the dot is looking at. Three minutes later you have something real.`,ax:`spark`,d:10},
{t:`Fold the paper into a shape first — a boat, a bird, anything.`,s:`You fold it into a wonky bird. Then you unfold it and draw along the fold lines. The creases turn into a map of somewhere.`,ax:`spark`,d:9},
{t:`Put the paper down, do something else for a bit, then come back to it.`,s:`You come back twenty minutes later. The blank paper looks smaller and less scary. You sit down and begin.`,ax:`stone`,d:8},
]},

{cat:`freeze`,loc:`beach`,
text:`You told <span class="cn">Pip</span> you would try swimming today. You practiced the kick. You know what to do. But you're at the water's edge and your feet will not go in.`,
q:`What do you do?`,
choices:[
{t:`Wait for a wave to come to you. Let it wash over your feet without moving.`,s:`Cold. Then you let another wave come. Then you take one step forward. Your feet got there without you having to decide all at once.`,ax:`stone`,d:9},
{t:`Tell Pip out loud: "I'm nervous, and I'm going to do it anyway."`,s:`Pip nods. <em>"That's the best kind of brave,"</em> Pip says. Saying it out loud made it a little smaller. You walk in.`,ax:`flame`,d:10},
{t:`Ask Pip to walk in with you, one step at a time, together.`,s:`Pip matches every step. You reach the right depth at the same time. <em>"See?"</em> Pip says. <em>"Still here."</em>`,ax:`thread`,d:9},
]},

{cat:`freeze`,loc:`market`,
text:`Someone at the market asks if you can help them carry something. It's not heavy. It's not far. But the words to say yes have gotten stuck somewhere between your brain and your mouth.`,
q:`What do you do?`,
choices:[
{t:`Nod and just pick up one end of the thing. Let the action be your answer.`,s:`They look surprised in a good way. You carry it together to the next stall. No words needed. The job got done.`,ax:`flame`,d:8},
{t:`Hold up one finger to say wait, take a breath, then say yes.`,s:`<em>"Take your time,"</em> they say, and they mean it. The breath was enough. The word came.`,ax:`stone`,d:9},
{t:`Point to yourself and then to the thing and raise your eyebrows to ask if that's what they mean.`,s:`They understand. You both smile. Sometimes you don't need words at all.`,ax:`spark`,d:8},
]},

{cat:`freeze`,loc:`lighthouse`,
text:`It's the first day of a new season and <span class="cn">Wellow</span> wants you to try a recipe you've never made before. The ingredients are all on the table. You don't know where to start.`,
q:`What do you do?`,
choices:[
{t:`Read the whole recipe once. Then read it again. Then pick up the first ingredient.`,s:`The second time through it feels smaller. You pick up the first ingredient. Everything else comes after that.`,ax:`stone`,d:9},
{t:`Ask Wellow to tell you only the very first step — nothing else yet.`,s:`<em>"Warm the pan,"</em> Wellow says. That's it. You warm the pan. <em>"Good. Now:"</em> Wellow tells you the next one.`,ax:`thread`,d:8},
{t:`Pick whichever ingredient looks most interesting and start there.`,s:`You pick the one you've never seen before. You hold it. You smell it. Curiosity got you started before worry could stop you.`,ax:`spark`,d:9},
]},
