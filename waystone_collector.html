// FLIP
// ════════════════════════════════════════════════════════════════

{cat:`flip`,loc:`beach`,
text:`<span class="cn">Coss</span> talked about the Tide Festival for three whole days. But this morning you find him behind the lighthouse, sitting alone, not drumming. <em>"I don't want to go anymore. I know I said I did. But now it feels like too much."</em>`,
q:`What do you do?`,
choices:[
{t:`Say: "You don't have to explain it."`,s:`Coss lets out a long breath. <em>"Everyone thinks I'm weird."</em> <em>"I don't,"</em> you say. The silence after that feels softer than before.`,ax:`thread`,d:9},
{t:`Say: "What if we just walked close enough to hear it? We don't have to go inside."`,s:`You walk to the edge together. Coss listens to the drums from far away. Then he takes one step closer. Then another.`,ax:`stone`,d:10},
{t:`Make your own tiny festival right here — just the two of you.`,s:`Coss picks up his drum. You bang two sticks on a rock. It sounds terrible. Coss starts laughing. This is better anyway.`,ax:`flame`,d:10},
]},

{cat:`flip`,loc:`forest`,
text:`You were going to spend the afternoon drawing. You had a plan and the right paper. But something shifted and now the paper feels wrong and the whole plan feels wrong. You're not sure what you want anymore.`,
q:`What do you do?`,
choices:[
{t:`Go outside instead. Walk around and see what happens.`,s:`Twenty minutes later you find a stone that looks like nothing and everything at the same time. You carry it back and draw it. The plan changed and that turned out fine.`,ax:`root`,d:9},
{t:`Put the paper away and try something completely different.`,s:`You make something out of whatever is nearby — a leaf, a stick, a bit of string. It isn't drawing. It's better right now.`,ax:`spark`,d:9},
{t:`Sit with the weird feeling for a little while without trying to fix it.`,s:`You sit. The feeling moves around. After a while it gets smaller. Then you pick up the paper.`,ax:`stone`,d:10},
]},

{cat:`flip`,loc:`beach`,
text:`You were excited to swim. You packed everything, ran to the beach, got to the water — and now you're standing at the edge and it's darker than you expected. Your feet will not go in and you don't understand yourself right now.`,
q:`What do you do?`,
choices:[
{t:`Step in. One step. Cold is just information, not danger.`,s:`Cold. Real. Your feet know what cold water is and what to do about it. You take another step. Your body figured it out before your brain agreed.`,ax:`flame`,d:10},
{t:`Sit at the edge and put just your toes in first.`,s:`Just toes. Cold. Then your ankles go in without you fully deciding. Your body got there without waiting.`,ax:`stone`,d:9},
{t:`Tell someone what's happening inside you right now.`,s:`<em>"I really wanted this and now I can't and I don't know why."</em> <span class="cn">Pip</span> says: <em>"That happens. You came this far. That counts."</em>`,ax:`thread`,d:9},
]},

{cat:`flip`,loc:`market`,
text:`<span class="cn">Pip</span> was supposed to meet you at the honey stall. Pip said definitely yes. You've been waiting a long time. Pip isn't here. You don't know what happened.`,
q:`What do you do?`,
choices:[
{t:`Wait a little longer. Something probably came up.`,s:`Twenty more minutes pass. Then Pip arrives out of breath, apologizing. Something had come up. The waiting was worth it.`,ax:`root`,d:9},
{t:`Walk around the market once to check if Pip ended up somewhere else.`,s:`You find Pip at the spice stall on the other side, turned around by a cart. You both feel relieved, then laugh about it.`,ax:`flame`,d:8},
{t:`Leave Pip a note with the honey seller and explore the rest of the market on your own.`,s:`The honey seller knows Pip well. You explore the whole market end to end. It turns out to be good, even alone.`,ax:`stone`,d:8},
]},

{cat:`flip`,loc:`lighthouse`,
text:`You've been certain you wanted fish stew for dinner all day. It's been decided since morning. Now it's time to eat and the certainty is completely gone. You don't know what happened to it.`,
q:`What do you do?`,
choices:[
{t:`Trust yourself from this morning. Morning-you wanted the stew. Eat the stew.`,s:`It's good. Really good. You knew something earlier that you forgot for a moment. You were right.`,ax:`stone`,d:8},
{t:`Tell Wellow what happened and ask what they would do.`,s:`<em>"I'd eat the stew,"</em> says <span class="cn">Wellow</span>, <em>"and pay attention to whether the wanting comes back once you start."</em> It does.`,ax:`thread`,d:9},
{t:`Combine a few things that are available and call it an experiment.`,s:`You put three things together that probably go together. It works. Accidentally. Tonight you invented dinner.`,ax:`spark`,d:9},
]},

{cat:`flip`,loc:`bridge`,
text:`You planned to cross the bridge, walk the long road, and reach the waterfall by afternoon. But halfway across the bridge, the plan feels huge and far away. You're not sure you wanted this after all.`,
q:`What do you do?`,
choices:[
{t:`Keep walking. You made this plan for a reason. Trust it.`,s:`You keep going. The road is long. The waterfall is exactly worth it. You were right when you planned it.`,ax:`flame`,d:10},
{t:`Sit on the bridge for a minute and decide again from scratch.`,s:`You sit. You decide to go halfway and turn back. That's a real choice, not giving up. You feel good about it.`,ax:`stone`,d:9},
{t:`Change the plan — find something interesting closer to where you already are.`,s:`There are rocks near the bridge you've always walked past. You stop and spend an hour there. Plans are just suggestions sometimes.`,ax:`spark`,d:9},
]},

{cat:`flip`,loc:`forest`,
text:`<span class="cn">Brin</span> invited you to help build something big in the forest. Now you're here and Brin's plan has changed three times and you're not sure what you're building anymore.`,
q:`What do you do?`,
choices:[
{t:`Pick one part of the project and start building that, even if the rest is still unclear.`,s:`You start laying stones for a corner. The shape starts to appear. Brin sees it and suddenly knows what the rest should be.`,ax:`flame`,d:9},
{t:`Ask Brin to draw the plan before either of you touches anything else.`,s:`<span class="cn">Brin</span> draws slowly. A real shape appears. <em>"Oh,"</em> Brin says. <em>"Now I know what I actually want."</em>`,ax:`spark`,d:10},
{t:`Ask Brin what all three of her different plans had in common.`,s:`Brin thinks for a long time. <em>"Shelter,"</em> she finally says. <em>"All of them were some kind of shelter."</em> Now you know what to build.`,ax:`thread`,d:10},
]},

{cat:`flip`,loc:`beach`,
text:`You spent all morning carefully collecting shells — very specific ones in a very specific order. Now you look at your collection and you don't want any of them. The whole morning feels wrong.`,
q:`What do you do?`,
choices:[
{t:`Give them away to anyone who wants them.`,s:`A small child with a bucket takes all of them very seriously. Your shells found someone who actually wanted them. That's something good.`,ax:`thread`,d:9},
{t:`Throw them back into the water one at a time, as far as you can.`,s:`Each throw feels good. Each splash feels good. Your empty hands feel right. You start looking again, without any rules this time.`,ax:`flame`,d:8},
{t:`Look through the pile carefully and find the one shell that's actually great.`,s:`There is one, at the very bottom. White and perfectly spiral. You keep just that one. One good thing is enough.`,ax:`stone`,d:9},
]},

// ════════════════════════════════════════════════════════════════
// STORM
// ════════════════════════════════════════════════════════════════

{cat:`storm`,loc:`beach`,
text:`<span class="cn">Coss</span> ran past and knocked over the tower you built out of driftwood and shells — with the perfect blue stone on top. He didn't even notice. You feel something big and hot starting in your chest.`,
q:`What do you do?`,
choices:[
{t:`Sit down right where you are and stay still until the big feeling gets smaller.`,s:`You sit. The feeling pushes hard. You let it push without pushing back. After a while it gets smaller. Not gone, but smaller.`,ax:`stone`,d:10},
{t:`Find the Lumen and tell it exactly how angry you are.`,s:`The Lumen floats close. Its light pulses slowly, like it's breathing. You start breathing along with it without meaning to. Talking helps.`,ax:`thread`,d:9},
{t:`Find Coss and tell him what he did before you get too upset to talk.`,s:`Coss sees your face and then sees the pile of driftwood and stops. <em>"I didn't see it. I'm really sorry."</em> He helps you find the blue stone.`,ax:`flame`,d:9},
]},

{cat:`storm`,loc:`bridge`,
text:`You were almost finished with the best drawing you've ever made. Then you made one wrong line right through the middle of the best part. You really want to crumple the whole thing up right now.`,
q:`What do you do?`,
choices:[
{t:`Put the drawing face down and walk away for fifteen minutes.`,s:`When you come back, the wrong line is still there. But the rest of the drawing looks better than you remembered. You pick the brush back up.`,ax:`stone`,d:10},
{t:`Show Brin and tell her exactly what went wrong.`,s:`<span class="cn">Brin</span> points at the wrong line. <em>"What if that's a crack in the creature's shell? Like it's hatching from inside?"</em> You stare at it. She's right.`,ax:`thread`,d:10},
{t:`Make the wrong line belong on purpose — turn it into something that was always supposed to be there.`,s:`A scar. A river. A stripe on a wing. You choose the wing. When you finish, the drawing looks more alive than before the mistake.`,ax:`spark`,d:11},
]},

{cat:`storm`,loc:`lighthouse`,
text:`Something small happened — a dropped bowl, a forgotten thing — and now you're crying and you're not sure exactly why and you can't stop. It feels embarrassing even though no one is watching.`,
q:`What do you do?`,
choices:[
{t:`Let it happen. Don't try to explain it or make it stop. Just let the crying finish.`,s:`The crying stops by itself when you let it. It doesn't last as long when you don't fight it.`,ax:`stone`,d:9},
{t:`Go somewhere private and stay there until it's done.`,s:`You sit on the lighthouse stairs. Nobody needs to see this. When you come back down you feel emptied out in a way that's actually okay.`,ax:`flame`,d:8},
{t:`Find Wellow and say something happened, without explaining the whole thing.`,s:`<span class="cn">Wellow</span> puts something warm in your hands. Doesn't ask anything. Just stays nearby. That's enough.`,ax:`thread`,d:9},
]},

{cat:`storm`,loc:`forest`,
text:`You've been waiting for something that was promised to you. It still hasn't happened and today the waiting finally turned into something much bigger and heavier.`,
q:`What do you do?`,
choices:[
{t:`Move your body — walk fast, stomp through leaves, climb something.`,s:`You walk until the fast walking uses up some of what's in your chest. The forest is good for this. It doesn't ask you to explain anything.`,ax:`root`,d:9},
{t:`Say out loud what you're actually feeling, even if you're only talking to yourself.`,s:`<em>"I'm angry and I'm sad and it isn't fair."</em> Saying the true thing makes it real. Real things are easier to deal with than things that just float around inside.`,ax:`flame`,d:10},
{t:`Find one small good thing happening right now and put your attention on that.`,s:`A beetle crossing the path. Tiny. Completely focused. Not bothered by anything you're dealing with. You watch it all the way across.`,ax:`stone`,d:9},
]},

{cat:`storm`,loc:`market`,
text:`The market felt wrong from the moment you arrived — too loud, too many people, too much happening everywhere at once. Now the too-much feeling is right at the surface and about to come out.`,
q:`What do you do?`,
choices:[
{t:`Find the edge of the market where it's quieter and stand there for a while.`,s:`There's a stone wall at the edge. You sit on it. The market keeps going. You can see it from here without being in the middle of it. That's enough.`,ax:`stone`,d:10},
{t:`Find Pip or someone you know and stay right next to them.`,s:`<span class="cn">Pip</span> is at the spice stall. You find Pip and stand next to Pip and don't say anything. The market becomes manageable.`,ax:`thread`,d:10},
{t:`Leave. The market will be there another day.`,s:`You leave. This is not giving up. You know what you need. The market will be there next week.`,ax:`root`,d:9},
]},

{cat:`storm`,loc:`beach`,
text:`<span class="cn">Pip</span> said something that landed wrong on you. Pip probably didn't mean it the way it sounded. But it landed wrong, and now something big is aimed at Pip who doesn't even know.`,
q:`What do you do?`,
choices:[
{t:`Take a breath and say: "What you said landed wrong on me. I don't think you meant it that way."`,s:`Pip blinks. <em>"I didn't mean it that way at all. I'm sorry."</em> Now the big thing has somewhere to go. It goes.`,ax:`flame`,d:10},
{t:`Walk away to let it get smaller, then come back when you can talk.`,s:`You walk the beach once. Twice. It gets smaller. You come back. <em>"I needed a minute,"</em> you say. Pip nods.`,ax:`stone`,d:9},
{t:`Find something to do with your hands while you figure out what you actually feel.`,s:`You skip stones. By the sixth stone you can tell which part was really about Pip and which part was already there from earlier in the day.`,ax:`root`,d:9},
]},

{cat:`storm`,loc:`bridge`,
text:`You've been holding yourself together all day — keeping everything calm, acting fine. Now you're on the bridge by yourself and the holding is done. There's a lot underneath it.`,
q:`What do you do?`,
choices:[
{t:`Stand at the railing and let it out over the water. No one is here. This is a safe place for it.`,s:`The water takes the sound and the silence takes the rest. When you're done the bridge is just a bridge again.`,ax:`flame`,d:10},
{t:`Sit down on the planks and breathe slowly until it becomes something you can carry again.`,s:`Slow breath in. Slower breath out. The bridge is solid under you. You remember that you're solid too. You keep breathing.`,ax:`stone`,d:10},
{t:`Think about who you could tell about this, and make a plan to tell them later.`,s:`You think of one person. You don't tell them right now — but having the plan already helps. You aren't carrying it completely alone.`,ax:`thread`,d:9},
]},

{cat:`storm`,loc:`forest`,
text:`You worked really hard on something and showed it to someone. They barely looked at it before saying something dismissive. It wasn't angry — just quick and careless. That almost makes it worse.`,
q:`What do you do?`,
choices:[
{t:`Feel the sting fully, then decide whether what they said was actually true.`,s:`You sit with it. Then you look at your work again. What they said told you about them, not about what you made. The work is still what it is.`,ax:`stone`,d:10},
{t:`Show it to someone who will actually look at it properly.`,s:`You find <span class="cn">Scribb</span>, who looks very closely and asks three questions about specific parts. The questions undo the dismissal completely.`,ax:`thread`,d:10},
{t:`Go back and make another one. The best answer to that is more work.`,s:`You make another one. Then another. By the third one, the dismissal is just something that happened on the way here.`,ax:`flame`,d:10},
]},

// ════════════════════════════════════════════════════════════════
// TANGLE
// ════════════════════════════════════════════════════════════════

{cat:`tangle`,loc:`bridge`,
text:`You said something sharp to <span class="cn">Pip</span>. You didn't mean it toward Pip — it came out wrong. Now Pip is on the far side of the bridge and not whistling. Pip always whistles. The quiet feels loud.`,
q:`What do you do?`,
choices:[
{t:`Go sit next to Pip without saying anything first. Just be close.`,s:`After a while Pip's tail starts tapping a small rhythm on the plank. Then one quiet whistle. Then another. You don't have to say anything yet.`,ax:`thread`,d:10},
{t:`Say the true thing: "I said something wrong. I didn't mean it at you."`,s:`<em>"I know,"</em> Pip says. <em>"I could tell it wasn't really about me."</em> <em>"It wasn't,"</em> you say. <em>"I'm sorry."</em> That's all that needed to happen.`,ax:`flame`,d:11},
{t:`Ask Wellow for advice before you go back to Pip.`,s:`<em>"Pip doesn't need the perfect words,"</em> Wellow says. <em>"Pip just needs to know you came back."</em> You go back.`,ax:`stone`,d:9},
]},

{cat:`tangle`,loc:`forest`,
text:`<span class="cn">Wellow</span> asked you to stir the pot and you got distracted and the bottom burned a little. Wellow noticed. Didn't yell. But is now quietly cleaning up without saying a word to you.`,
q:`What do you do?`,
choices:[
{t:`Go over and help clean up without waiting to be asked.`,s:`<span class="cn">Wellow</span> glances over. After a moment: <em>"These things happen. You know that."</em> The heavy feeling in the kitchen goes away.`,ax:`thread`,d:9},
{t:`Say it directly: "I got distracted and I should have stayed with it. I'm sorry."`,s:`Wellow stops. <em>"I know. And now you know too. That's enough."</em> Saying it directly made everything shorter and lighter.`,ax:`flame`,d:10},
{t:`Ask if you can start a new pot and stay with it the whole time this time.`,s:`<em>"Yes,"</em> Wellow says simply. You stir the whole time. Every minute. The new pot is perfect.`,ax:`stone`,d:9},
]},

{cat:`tangle`,loc:`market`,
text:`You and <span class="cn">Coss</span> both wanted the last of something at the same stall at the exact same time. You got there first. Coss knows you got there first. You're both just standing there waiting.`,
q:`What do you do?`,
choices:[
{t:`Say: "Take it."`,s:`Coss blinks. <em>"Are you sure?"</em> You nod. Coss takes it. Then breaks it in half and gives you a piece. <em>"Together is better,"</em> Coss says.`,ax:`thread`,d:11},
{t:`Suggest flipping a coin or doing rock-paper-sticks to decide fairly.`,s:`The stall vendor starts laughing. You play three rounds. Coss wins and immediately offers to share. Making it fair made it easy.`,ax:`flame`,d:9},
{t:`Decide you didn't really want it that much and go find something else.`,s:`You go to the next stall and find something you didn't even know you wanted until right now. Better, actually.`,ax:`stone`,d:8},
]},

{cat:`tangle`,loc:`beach`,
text:`<span class="cn">Brin</span> made something and asked for your honest opinion. You gave it. Now Brin is quiet in a way that might mean she's hurt. You're not sure if being honest was wrong or just hard.`,
q:`What do you do?`,
choices:[
{t:`Wait. Sometimes honest things need time to land before the other person can hear them.`,s:`Brin comes back an hour later. <em>"You were right,"</em> she says. <em>"I didn't want to hear it, but you were right."</em>`,ax:`stone`,d:9},
{t:`Check in: "Was that too much? I can explain what I meant differently."`,s:`<span class="cn">Brin</span> shakes her head. <em>"No. It's good. I'm just thinking about it."</em> Sometimes quiet isn't hurt. Sometimes it's thinking.`,ax:`thread`,d:10},
{t:`Find the one thing you genuinely liked and tell her that clearly too.`,s:`You find it — there's always something. You say it plainly. Brin's face changes. Both things were true. Both needed to be said.`,ax:`flame`,d:9},
]},

{cat:`tangle`,loc:`lighthouse`,
text:`<span class="cn">Wellow</span> made a decision about dinner that you really disagree with. It's not a tiny disagreement — it's a real one. Wellow has decided and it's final. You still disagree.`,
q:`What do you do?`,
choices:[
{t:`Say your piece once, clearly and calmly, and then let it be done.`,s:`<em>"I still disagree."</em> <em>"I know,"</em> says Wellow. You said it. It's been said. That was the whole job.`,ax:`flame`,d:9},
{t:`Disagree on the inside and eat the dinner without making it about the dinner.`,s:`The dinner is actually fine. The disagreement was real. But dinner is just dinner. Both things can be true at once.`,ax:`stone`,d:9},
{t:`Ask Wellow to explain the reason, because you actually want to understand.`,s:`<span class="cn">Wellow</span> explains. You still don't fully agree. But understanding is different from agreeing. You didn't have the understanding before.`,ax:`thread`,d:10},
]},

{cat:`tangle`,loc:`forest`,
text:`You told <span class="cn">Scribb</span> something private. Scribb told one other creature and that creature told two more and now it's come back to you with extra details that aren't even true. Scribb didn't mean to cause harm. But it happened.`,
q:`What do you do?`,
choices:[
{t:`Tell Scribb what happened and that it hurt.`,s:`Scribb goes completely still — more still than you've ever seen Scribb. Then: <em>"I didn't understand it was private. I'm really sorry."</em> You could tell it was true.`,ax:`flame`,d:10},
{t:`Decide quietly how much you'll share with Scribb going forward. Adjust without making a big deal of it.`,s:`You don't need to punish Scribb. You also don't have to share everything anymore. Adjusting what you share is not mean. It's smart.`,ax:`stone`,d:9},
{t:`Fix the wrong part by telling the true version to the creatures who heard the wrong one.`,s:`You find them and correct it simply. <em>"Actually, what happened was this."</em> The wrong story stops spreading when someone tells the right one.`,ax:`thread`,d:9},
]},

{cat:`tangle`,loc:`market`,
text:`A traveler at the market got angry at you for something that wasn't your fault. They had the wrong idea about something. The anger landed on you before you could understand what was happening.`,
q:`What do you do?`,
choices:[
{t:`Say calmly: "I think there's a misunderstanding."`,s:`The traveler stops. Realizes. The anger becomes embarrassment. <em>"I'm sorry. I thought you were — I was wrong."</em> It ends cleanly.`,ax:`flame`,d:9},
{t:`Let them finish talking, then walk away. You don't have to keep absorbing it.`,s:`You let the words be words and then you leave. None of it was yours. You put it down on the way out, like something that didn't belong to you.`,ax:`stone`,d:10},
{t:`Find Pip or Coss afterward and tell them what happened.`,s:`Saying it out loud makes it smaller. <span class="cn">Pip</span> says: <em>"That wasn't about you. They were having a bad day."</em> Pip is right.`,ax:`thread`,d:9},
]},

{cat:`tangle`,loc:`bridge`,
text:`Two creatures you care about are arguing with each other. Both of them came to you separately and both of them want you to say they're right. You've heard both sides. Both have a point.`,
q:`What do you do?`,
choices:[
{t:`Tell both of them honestly that they both have a point and you're not picking a side.`,s:`Neither loves this answer. But it forces them to deal with each other instead of using you as the judge.`,ax:`stone`,d:10},
{t:`Ask each of them whether they've actually heard the other one's reason — not their version of it, but the real one.`,s:`Neither had. You didn't fix it for them. You just asked the question. Sometimes the question does the whole job.`,ax:`thread`,d:11},
{t:`Tell them both you love them and this one isn't yours to solve.`,s:`<em>"I love you both and I'm staying out of this one."</em> They look at each other. That's a kind of help too.`,ax:`flame`,d:9},
]},

// ════════════════════════════════════════════════════════════════
// WAIT
// ════════════════════════════════════════════════════════════════

{cat:`wait`,loc:`forest`,
text:`You're in the middle of the best drawing you've ever made. The creature has seventeen legs and you finally figured out the eyes. <span class="cn">Wellow</span> appears. <em>"It's time to go."</em>`,
q:`What do you do?`,
choices:[
{t:`Put the brush down and go. The drawing will still be there when you get back.`,s:`You put the brush down. It's hard. But when you come back, the drawing is still there, waiting exactly where you left it.`,ax:`stone`,d:10},
{t:`Ask for three more minutes — just enough to finish the eyes.`,s:`<em>"Three minutes,"</em> Wellow says. You finish the eyes. They look right. You put the brush down with time to spare.`,ax:`flame`,d:9},
{t:`Write three words in the corner so you remember exactly where you were.`,s:`You write: <em>ribbon, tail, eyes.</em> When you come back, the three words bring everything back. Small plans are good plans.`,ax:`spark`,d:9},
]},

{cat:`wait`,loc:`market`,
text:`There's one honey roll left at the stall. You and a traveler standing next to you both want it. The traveler has been looking at it with a really hungry look. You got there first.`,
q:`What do you do?`,
choices:[
{t:`Say: "You take it."`,s:`The traveler stares. <em>"Are you sure?"</em> They take it. Then they break it in half and hand you a piece back. <em>"Thank you."</em>`,ax:`thread`,d:11},
{t:`Suggest splitting it fairly so you both get some.`,s:`The traveler looks relieved. You split it. Sharing it makes it taste like something more than just a roll.`,ax:`flame`,d:9},
{t:`Take it. You were there first and that's fair.`,s:`You take it. It tastes fine. But you keep thinking about the traveler's face the whole time. <em>Next time,</em> you think, and you'll mean it.`,ax:`root`,d:6},
]},

{cat:`wait`,loc:`lighthouse`,
text:`Something good was promised to you today. You've been waiting for it all day and it still hasn't happened yet. Waiting for good things is almost harder than waiting for hard things to be over.`,
q:`What do you do?`,
choices:[
{t:`Find something completely different to do that absorbs you while you wait.`,s:`You get so into it that you lose track of time. Then the thing happens. You were ready.`,ax:`root`,d:10},
{t:`Make a physical countdown — fold a piece of paper each time you check, and watch the pile grow.`,s:`Each fold is a piece of waiting made visible. The pile grows. The waiting gets smaller.`,ax:`spark`,d:9},
{t:`Remind yourself: "I've already waited this long. I can wait a little more."`,s:`You say it plainly. You've already done most of it. A little more is a real amount. Real amounts can be finished.`,ax:`stone`,d:10},
]},

{cat:`wait`,loc:`beach`,
text:`You really want to tell <span class="cn">Pip</span> something important. But Pip is in the middle of something that needs to finish first. You have to wait and the thing you want to say keeps pushing.`,
q:`What do you do?`,
choices:[
{t:`Write it down so it's safe somewhere while you wait.`,s:`You write it on a small piece of paper. It's held now. It'll keep. When Pip is ready, you'll have exactly the right words because you had time to find them.`,ax:`spark`,d:10},
{t:`Wait in the same space as Pip without interrupting. Just be there.`,s:`Pip finishes. Looks up. Sees you. <em>"You waited?"</em> <em>"I waited."</em> The thing you needed to say comes out right.`,ax:`thread`,d:10},
{t:`Do something nearby to use up the waiting energy so it isn't all just standing there.`,s:`You collect flat stones and stack them. By the time Pip is done, you have a small tower and the impatience has burned off.`,ax:`root`,d:9},
]},

{cat:`wait`,loc:`forest`,
text:`You've been watching <span class="cn">Deeproot's</span> tiny sprout for three months. It's the exact same size as when you started watching. Nothing is visibly changing and you're wondering if it's ever going to.`,
q:`What do you do?`,
choices:[
{t:`Look really closely for any sign of something — anything — that changed.`,s:`A tiny unfurling at the tip of one leaf. So small you almost missed it. Growth is happening at a speed that doesn't match your sense of time.`,ax:`root`,d:10},
{t:`Trust that it knows what it's doing. Come back and check again next week.`,s:`Next week it's visibly bigger. Not by a lot. But by enough. Some things grow on their own schedule and that schedule isn't wrong.`,ax:`stone`,d:10},
{t:`Put your hand on the ground near the roots and ask if it's okay.`,s:`A slow vibration comes up through the ground. Not words exactly. More like a feeling that means: <em>yes. still here. still going.</em>`,ax:`thread`,d:9},
]},

{cat:`wait`,loc:`bridge`,
text:`An elderly creature is crossing the bridge very slowly and taking up the whole width. You're in a hurry and need to get to the other side. The creature cannot go faster.`,
q:`What do you do?`,
choices:[
{t:`Slow all the way down and match their pace.`,s:`Moving slowly shows you things you've never noticed about the bridge. A carved marking. A knot in the wood. The hurry was making you miss things.`,ax:`root`,d:10},
{t:`Ask if they'd like someone to walk with them.`,s:`They would. You walk together. They tell you where they're going and why it matters very much to them. Your hurry becomes less important than what they shared.`,ax:`thread`,d:10},
{t:`Wait at this end of the bridge until there's room to pass.`,s:`You wait. It's not long. You weren't as late as you thought. The urgency was bigger than the actual problem.`,ax:`stone`,d:9},
]},

{cat:`wait`,loc:`market`,
text:`The specific thing you came to the market for today isn't there. It won't be available until next week. You came just for this. Now you have to leave without it.`,
q:`What do you do?`,
choices:[
{t:`Look around without a plan and see if something else catches your eye.`,s:`You wander. You find something. It's not the thing you came for. But it's genuinely good. Coming back next week is fine.`,ax:`spark`,d:9},
{t:`Leave now and come back next week. Some things are worth the wait.`,s:`You come back next week. It's there. It was worth it. Some things are only better for having waited.`,ax:`root`,d:10},
{t:`Ask the stall keeper to save one for you with your name on it.`,s:`They write your name on a tag. Now it's yours even before you have it. That's a kind of having.`,ax:`thread`,d:9},
]},

{cat:`wait`,loc:`lighthouse`,
text:`<span class="cn">Wellow</span> is making something that will take all day and you can't have any until it's done. The smell coming from the kitchen is extraordinary. The waiting is very real and very specific.`,
q:`What do you do?`,
choices:[
{t:`Stay far from the kitchen on purpose so you're not constantly reminded.`,s:`You stay away. You come back at the right time. The smell is even more incredible than all day. It was worth everything.`,ax:`root`,d:9},
{t:`Ask Wellow for just a tiny taste of something mid-process — just enough to hold you.`,s:`<span class="cn">Wellow</span> gives you a spoonful of something. It's not the finished thing. But it's a piece of it. You can wait for the rest now.`,ax:`flame`,d:8},
{t:`Help Wellow with any part of it — so that your waiting does something.`,s:`You help with the part that just needs attention, not skill. The helping makes the waiting feel useful. Time moves differently when you're part of something.`,ax:`thread`,d:10},
]},

// ════════════════════════════════════════════════════════════════
// MIRROR
// ════════════════════════════════════════════════════════════════

{cat:`mirror`,loc:`beach`,
text:`After something goes wrong, you say out loud: <em>"I always do that. I always make it worse."</em> The Lumen is there. <em>"Always?"</em> it says.`,
q:`What do you say?`,
choices:[
{t:`"Most of the time."`,s:`<em>"Most of the time,"</em> the Lumen repeats. <em>"That's different from always."</em> Something small shifts. Like a door that was stuck opened one inch.`,ax:`stone`,d:9},
{t:`"I don't know. It just feels like always right now."`,s:`<em>"Feelings say always and never because they're loud,"</em> the Lumen says. <em>"But feelings aren't always right about the facts."</em>`,ax:`flame`,d:9},
{t:`Nothing. Just throw a stone into the water.`,s:`You throw four stones. After the fourth one, something in your chest gets a little looser. <em>"Ready to talk?"</em> the Lumen asks. <em>"Maybe,"</em> you say.`,ax:`root`,d:9},
]},

{cat:`mirror`,loc:`lighthouse`,
text:`The rolls didn't come out quite right today. Not bad — just not as good as last time. You tried hard and followed every step. But the thought <em>I can't do anything right</em> keeps going through your head.`,
q:`What do you do with that thought?`,
choices:[
{t:`Say back to it: "That's not actually true."`,s:`The thought doesn't disappear. But it gets smaller when you push back on it directly. You reminded yourself that you know better.`,ax:`flame`,d:10},
{t:`Tell Wellow what you've been thinking.`,s:`<em>"I keep thinking I can't do anything right."</em> Wellow looks at the rolls. <em>"You made bread today with your hands. That is something right. It's right there."</em>`,ax:`thread`,d:11},
{t:`Ask if you can try the same recipe again tomorrow.`,s:`<em>"Yes,"</em> Wellow says without hesitating. Now there's a tomorrow and another try in it. The loop in your head loses some of its power.`,ax:`stone`,d:9},
]},

{cat:`mirror`,loc:`forest`,
text:`You notice you've been avoiding someone — not because of anything they did, but because being near them makes you feel like you're not good enough somehow. You don't fully know why. You've just been avoiding them.`,
q:`What do you do?`,
choices:[
{t:`Spend some time figuring out what exactly makes you feel that way around them.`,s:`You think carefully. It's something specific you notice when you're near them — and when you look at it closely, it's about you, not about them. That's useful.`,ax:`spark`,d:10},
{t:`Stop avoiding them and just go be around them and see what actually happens.`,s:`Being near them is fine. The feeling you were dreading was worse than the real thing. The story you told yourself wasn't true.`,ax:`flame`,d:9},
{t:`Tell someone you trust about the pattern you noticed in yourself.`,s:`Saying it out loud makes it feel like something you noticed — not a secret flaw. A thing you noticed can be worked with.`,ax:`thread`,d:10},
]},

{cat:`mirror`,loc:`bridge`,
text:`You were doing something hard for someone else. Then you realized that part of the reason you're doing it is so they'll see you doing it — not only to actually help. Both things are true. You notice both.`,
q:`What do you do with that noticing?`,
choices:[
{t:`Keep doing the hard thing. The mixed reason doesn't make the help less real.`,s:`The help happens. The person is helped. The mixed reason doesn't undo any of it. You can be honest with yourself and still have done something good.`,ax:`stone`,d:9},
{t:`Make a note of it — not to feel bad, just to know yourself better.`,s:`You file it away: <em>sometimes I help for mixed reasons.</em> That's not a flaw. It's being human. Knowing it means you can watch for it.`,ax:`spark`,d:10},
{t:`Finish the thing and then do one small extra part quietly — with no audience at all.`,s:`The quiet part feels different. Cleaner. You like how it feels. You remember that feeling.`,ax:`thread`,d:10},
]},

{cat:`mirror`,loc:`beach`,
text:`You won an argument today. You were definitely right. And now, sitting here later, something feels off. Like being right wasn't quite the goal you actually wanted.`,
q:`What do you do?`,
choices:[
{t:`Think about what you actually wanted from that conversation — separate from winning.`,s:`You wanted to be understood. Being right is different from being understood. You were right. You weren't understood. Both are true at once.`,ax:`spark`,d:10},
{t:`Go back through the argument in your head and look for any part where the other person had a point.`,s:`There is a point. Small, but real. You could have been right and seen their point at the same time. Next time you can do both.`,ax:`stone`,d:9},
{t:`Go back to the person and find something — anything — to honestly agree with them about.`,s:`Not taking back the right part. Just giving them the small thing that was real. They look surprised. It costs you nothing and gives them something.`,ax:`thread`,d:10},
]},

{cat:`mirror`,loc:`market`,
text:`You've been comparing yourself to <span class="cn">Brin</span> all day — her drawings, how easy she makes it look, how her things always come out right. And the comparing has made everything you made feel wrong.`,
q:`What do you do?`,
choices:[
{t:`Notice that you're comparing and say it out loud to yourself.`,s:`<em>"I'm comparing and it isn't helping."</em> Naming it puts a small gap between you and the thought. You can see it as a thing you're doing, not a truth about you.`,ax:`spark`,d:10},
{t:`Look at something you made today and find one specific thing that's good about it.`,s:`There is one thing. You look at it until you believe it. Then another. The comparing gets quieter when you look at actual evidence.`,ax:`flame`,d:10},
{t:`Tell Brin you've been comparing yourself to her and see what she says.`,s:`<span class="cn">Brin</span> says: <em>"I do that with you too. Did you know that?"</em> You did not know that. You both do it. Neither of you needs to.`,ax:`thread`,d:11},
]},

{cat:`mirror`,loc:`forest`,
text:`You notice you've been saying "I'm fine" when you're not. Not lying exactly — it just comes out before you've checked. It happens automatically. You just noticed this.`,
q:`What do you do with the noticing?`,
choices:[
{t:`Practice checking before answering. Try it once right now.`,s:`Someone nearby asks "How are you?" and you pause and actually check. <em>"Not great, honestly."</em> They look at you like you're real. The honest answer made space.`,ax:`flame`,d:10},
{t:`Think about what "I'm fine" is protecting.`,s:`It protects the conversation from getting complicated. That's not always wrong — but now that you know, you can choose when to use it.`,ax:`spark`,d:10},
{t:`Tell one person the true answer the next time they ask.`,s:`The true answer comes out smaller than the feeling inside it. Saying it made it smaller. The person you told was glad you did.`,ax:`thread`,d:10},
]},

{cat:`mirror`,loc:`lighthouse`,
text:`You got really good at something. Then someone gave you feedback that you could be even better. The feedback felt like an attack — even though you know it wasn't one. You know. It still felt that way.`,
q:`What do you do?`,
choices:[
{t:`Wait for the sting to pass before you decide what the feedback actually means.`,s:`The sting lasts a day. When it's gone, the feedback makes sense. It was good feedback. The sting was in the way of seeing that.`,ax:`stone`,d:9},
{t:`Separate the feeling from the information and deal with each one separately.`,s:`The feeling: hurt. Real. Allowed. The information: useful. Accurate. Also real. You can hold both without either one eating the other.`,ax:`spark`,d:10},
{t:`Thank the person who gave the feedback, even if you're not ready to use it yet.`,s:`You thank them. They hadn't been sure they should say it. Now they know you can hear honest things. You'll get more of them in the future.`,ax:`thread`,d:10},
]},

// ════════════════════════════════════════════════════════════════
// STRANGER
// ════════════════════════════════════════════════════════════════

{cat:`stranger`,loc:`market`,
text:`Someone new is sitting alone at the market with a small notebook, drawing something very carefully. They look up and see you looking at them. They don't wave. But they don't look away either.`,
q:`What do you do?`,
choices:[
{t:`Walk over and look at what they're drawing.`,s:`Wings made of leaves and eyes like river stones. <em>"That's incredible,"</em> you say, and you mean every word. They don't close the notebook.`,ax:`thread`,d:10},
{t:`Find something to do nearby — not talking to them, just existing in the same space.`,s:`You do your own thing. After a while the space between you is smaller than it was and neither of you did it on purpose.`,ax:`stone`,d:9},
{t:`Ask Pip to come over with you.`,s:`<span class="cn">Pip</span> immediately starts whistling a gentle tune. The stranger almost smiles. <em>"What's that song?"</em> You all end up sitting together.`,ax:`flame`,d:9},
]},

{cat:`stranger`,loc:`forest`,
text:`A traveler is standing on the path turning their map around and around. They're lost. You can tell from here exactly where they're trying to go — you can read it right on the map.`,
q:`What do you do?`,
choices:[
{t:`Say: "I know where that is. I'll walk you there."`,s:`They say thank you four times on the way. When you get there they ask your name. You give it. They remember it.`,ax:`thread`,d:10},
{t:`Point in the right direction clearly and simply.`,s:`<em>"That way. Past the big stone, then left at the fork."</em> They beam. You watch them find the right path.`,ax:`stone`,d:9},
{t:`Draw them a quick map in the dirt with a stick.`,s:`They copy it carefully into their notebook. <em>"You should have a map-making stall,"</em> they say. You think about that for a while.`,ax:`spark`,d:10},
]},

{cat:`stranger`,loc:`beach`,
text:`There's a creature you've never seen before sitting at the very edge of the water. They're not from the island. They're watching the waves with an expression you can't read.`,
q:`What do you do?`,
choices:[
{t:`Sit nearby and watch the waves too, without making a big deal of it.`,s:`You sit. You both watch. After a long time, they say: <em>"The water here moves differently than where I come from."</em> That's the beginning of a real conversation.`,ax:`root`,d:10},
{t:`Ask a simple question that doesn't require a big answer.`,s:`<em>"Is this your first time here?"</em> They say yes. <em>"It's a good place,"</em> you say. They nod slowly, like they're deciding whether to believe you. They decide yes.`,ax:`thread`,d:10},
{t:`Bring them something — a shell, something from the market — as a quiet welcome.`,s:`You leave a smooth stone beside them and keep walking without making it a moment. When you look back, they're holding it.`,ax:`thread`,d:9},
]},

{cat:`stranger`,loc:`lighthouse`,
text:`<span class="cn">Wellow</span> has a visitor you've never met. They seem important to Wellow. When they think you're not looking, they study you carefully.`,
q:`What do you do?`,
choices:[
{t:`Introduce yourself directly when you catch them looking.`,s:`<em>"I'm me. You can just look directly, I don't mind."</em> They laugh, surprised. The studying stops and a real conversation starts.`,ax:`flame`,d:9},
{t:`Let them study you and study them right back. Fair is fair.`,s:`You observe them observing you. By the end of the meal you both know quite a bit about each other.`,ax:`stone`,d:9},
{t:`Ask Wellow later who they are and what they do.`,s:`Wellow tells you. It turns out they've done something remarkable. You wish you'd talked to them more. You file this away for next time.`,ax:`thread`,d:9},
]},

{cat:`stranger`,loc:`bridge`,
text:`Someone is sitting in the middle of the bridge, crying quietly. They're not blocking anything. They're just there. You don't know them at all.`,
q:`What do you do?`,
choices:[
{t:`Sit at the other railing — close, but not in their space. Just be there.`,s:`They look up. They see you're not going to demand anything. They look back at the water. After a while: <em>"Thank you for just staying."</em>`,ax:`thread`,d:11},
{t:`Ask if they'd like company or if they'd prefer to be alone.`,s:`<em>"Company,"</em> they say quietly. You sit. You talk about other things — not about whatever it is. That's exactly what they needed.`,ax:`thread`,d:10},
{t:`Cross at the far edge to give them the space they came here for.`,s:`You give them the space. Sometimes the most caring thing costs you nothing and asks nothing.`,ax:`stone`,d:9},
]},

{cat:`stranger`,loc:`forest`,
text:`You find a creature in the forest building something complicated out of sticks and stones. It's clearly very important to them. They haven't noticed you.`,
q:`What do you do?`,
choices:[
{t:`Watch for a while. Good making is worth watching.`,s:`They're very good. They don't notice you for a long time. When they do, they seem pleased someone was there to see it.`,ax:`root`,d:9},
{t:`Ask if there's any material you could find or bring for them.`,s:`They think. <em>"A long straight stick."</em> You find one. It fits into the structure perfectly. You can see exactly what it completed.`,ax:`thread`,d:10},
{t:`Ask if you can help with one part — and make it clear they can say no.`,s:`<em>"Could I help with just the corner?"</em> They think about it. <em>"Yes."</em> You help with the corner. The rest stays theirs. That's the right amount.`,ax:`flame`,d:9},
]},

{cat:`stranger`,loc:`market`,
text:`An older creature at the market keeps giving you advice you didn't ask for. The advice isn't wrong. But you didn't ask. And they haven't stopped.`,
q:`What do you do?`,
choices:[
{t:`Thank them for one specific thing they said that was actually useful.`,s:`<em>"That part about the timing — I hadn't thought about that."</em> The specific thanks satisfies something. The advice slows down.`,ax:`thread`,d:9},
{t:`Listen all the way through, then make your own decision anyway.`,s:`You hear all of it. You keep the useful parts. You don't have to do any of it. But listening cost you nothing.`,ax:`stone`,d:9},
{t:`Say politely: "I think I've got it from here. Thank you."`,s:`<em>"Of course. You looked like you were figuring it out fine."</em> They go. Redirecting clearly and kindly is a real skill.`,ax:`flame`,d:9},
]},

{cat:`stranger`,loc:`beach`,
text:`Two travelers are arguing on the beach. One of them grabs your arm and says: <em>"Tell them — you heard the whole thing — tell them I'm right."</em>`,
q:`What do you do?`,
choices:[
{t:`Say clearly: "I'm not going to be the judge of this one."`,s:`Both of them look at you. Then at each other. Without you as the judge, they have to work it out between themselves.`,ax:`flame`,d:9},
{t:`Say only what you actually heard — nothing more, no opinion.`,s:`<em>"I heard this part."</em> Just that. No verdict. They have to do the rest themselves.`,ax:`stone`,d:10},
{t:`Ask each of them what they actually want from the other person.`,s:`Both of them stop. One says something true. The other responds to the true thing instead of the argument. The argument ends.`,ax:`thread`,d:11},
]},

// ════════════════════════════════════════════════════════════════
// SPARK
// ════════════════════════════════════════════════════════════════

{cat:`spark`,loc:`forest`,
text:`<span class="cn">Scribb</span> is working on something that doesn't have a name yet. Not a drawing, not a map, not a story — maybe all three. <em>"I don't know what it is,"</em> Scribb says. <em>"Help?"</em>`,
q:`What do you do?`,
choices:[
{t:`Ask: "What does it feel like from inside you — not what does it look like?"`,s:`Scribb thinks for a long time. <em>"It feels like something that knows where it's going even when I don't."</em> That tells both of you something important.`,ax:`spark`,d:10},
{t:`Make something small of your own right next to Scribb — not the same thing, just something nearby.`,s:`Making something yourself, while Scribb is making, fills the space in a way talking doesn't. Scribb's thing finds its shape while you're working.`,ax:`spark`,d:10},
{t:`Ask one question every few minutes and otherwise stay out of the way.`,s:`Your two questions are: <em>"What's the most interesting part?"</em> and <em>"What wants to come next?"</em> Scribb doesn't answer with words. Scribb answers with marks on the page.`,ax:`stone`,d:9},
]},

{cat:`spark`,loc:`market`,
text:`Someone at the market has a small broken mechanism — a latch, a clasp, a tiny hinge — and they can't figure out why it stopped working. They've tried everything obvious.`,
q:`What do you do?`,
choices:[
{t:`Look at it carefully from the outside before touching anything.`,s:`Looking without touching first lets you see what they've been too close to notice. You spot the problem right away. <em>"There."</em>`,ax:`spark`,d:10},
{t:`Ask them to explain out loud every single step of how it's supposed to work.`,s:`Partway through explaining, they stop. <em>"Oh."</em> They found it themselves while explaining it to you. Sometimes you just need someone to explain it to.`,ax:`thread`,d:11},
{t:`Try the most unexpected thing first — the thing that looks least like it would work.`,s:`<span class="cn">Buzzwing</span> once told you that things usually break in the part you'd least expect. The unexpected thing works.`,ax:`spark`,d:10},
]},

{cat:`spark`,loc:`lighthouse`,
text:`<span class="cn">Buzzwing</span> took apart something that really shouldn't have been taken apart. Now the pieces are everywhere and Buzzwing can't remember the order to put them back. <span class="cn">Wellow</span> doesn't know yet.`,
q:`What do you do?`,
choices:[
{t:`Help Buzzwing figure out the logic — what would have to go first, then what next?`,s:`You work through it together. The order becomes clear. The thing goes back together. Wellow never needs to know.`,ax:`spark`,d:10},
{t:`Draw what it looked like before — from memory — and use the drawing as a guide.`,s:`You sketch it fast from memory. Buzzwing follows the sketch. It's slightly wrong but close enough. The thing goes back together.`,ax:`spark`,d:10},
{t:`Tell Wellow what happened before Wellow finds out on their own.`,s:`<span class="cn">Wellow</span> is not delighted. But Wellow helps fix it. <em>"Telling first always costs less than being found out,"</em> Wellow says.`,ax:`flame`,d:9},
]},

{cat:`spark`,loc:`bridge`,
text:`There's a problem nobody has solved yet. Something that needs to be invented, not just decided. <span class="cn">Scribb</span> and <span class="cn">Buzzwing</span> are both here. Nobody knows the answer.`,
q:`What do you do?`,
choices:[
{t:`Explain the problem and then let the conversation go wherever it wants to go.`,s:`The conversation goes somewhere unexpected. The answer shows up from a direction nobody was looking. That's how inventing usually works.`,ax:`spark`,d:11},
{t:`Draw the problem out first, and then talk about the drawing.`,s:`The drawing shows something about the problem that words weren't showing. Scribb sees it. Buzzwing starts fixing the drawing with corrections.`,ax:`spark`,d:11},
{t:`Build a rough version of the solution first and see what's wrong with it.`,s:`The rough version is wrong in five very specific ways. Now you know exactly what to fix. The rough version taught you more than a conversation would have.`,ax:`flame`,d:10},
]},

{cat:`spark`,loc:`forest`,
text:`You found something in the forest you can't identify. It's not in any record. Nobody has told you about it. It exists and it has no name yet.`,
q:`What do you do?`,
choices:[
{t:`Give it a name. You found it — that earns the right.`,s:`You give it a name that makes sense to you. You write the name and a description. Now it exists in two places: the forest and your notebook.`,ax:`spark`,d:10},
{t:`Study it carefully from every angle before touching it.`,s:`The careful looking tells you things. It has a structure. The structure tells you something about what it is or does. Looking is its own kind of answer.`,ax:`stone`,d:9},
{t:`Bring Scribb back to look at it with you.`,s:`Scribb has already started drawing before you can finish explaining. The drawing notices things you didn't. Two sets of eyes found twice as much.`,ax:`spark`,d:10},
]},

{cat:`spark`,loc:`market`,
text:`The market has a problem nobody has fixed: too many creatures arrive from the same direction at the same time, they get jammed up, and everyone gets frustrated. You think you can see a solution.`,
q:`What do you do?`,
choices:[
{t:`Try your solution yourself, on a small scale, right now.`,s:`It works. Three creatures get through who would have been stuck. The stall keeper notices. <em>"Did you just — ?"</em>`,ax:`flame`,d:10},
{t:`Draw out the solution and show it to whoever runs the market.`,s:`They look at the drawing. Look at the problem. Look at the drawing again. <em>"How did you see that?"</em> You shrug. You just looked long enough.`,ax:`spark`,d:10},
{t:`Watch it happen a few more times to make sure you're right before saying anything.`,s:`Three more times of watching confirms it. Now you know you're right and you have proof. You bring both.`,ax:`stone`,d:9},
]},

{cat:`spark`,loc:`beach`,
text:`<span class="cn">Glintmaw</span> is trying to explain what different kinds of light taste like, and you genuinely don't understand. But you want to.`,
q:`What do you do?`,
choices:[
{t:`Ask: "Can you describe what sunrise light tastes like using something I already know the feeling of?"`,s:`<span class="cn">Glintmaw</span> thinks for a long time. <em>"Like when you remember something good you'd completely forgotten."</em> Something clicks for you.`,ax:`spark`,d:10},
{t:`Pick a specific kind of light and ask what that one would taste like.`,s:`<em>"What about the light just before a storm?"</em> <span class="cn">Glintmaw's</span> belly dims a little. <em>"Sharp. Almost too much. Very quick."</em> You're beginning to understand.`,ax:`spark`,d:10},
{t:`Just listen without needing to fully understand. Let it be interesting.`,s:`You listen. The understanding doesn't come all the way. But something else does — a feeling that the world is stranger and bigger than you thought.`,ax:`root`,d:9},
]},

{cat:`spark`,loc:`lighthouse`,
text:`You have an idea for something that has never been made on the island. It might work. It might not. It would take real effort. Nobody asked for it. You thought of it yourself.`,
q:`What do you do?`,
choices:[
{t:`Make the simplest possible version first — the one-hour version, not the week-long one.`,s:`The simple version is wrong in useful ways. Now you can see exactly what the real version needs. Starting small was faster than starting big.`,ax:`spark`,d:11},
{t:`Write down exactly what you're imagining before you do anything else.`,s:`Writing it down makes it real. The written version is more complete than the idea floating in your head. Now you have something to work toward.`,ax:`spark`,d:10},
{t:`Tell Scribb about it. Scribb will ask questions that make the idea more solid.`,s:`<span class="cn">Scribb</span> asks seven questions very quickly. Three of them you don't have answers for yet. Those three are where the real work is. Now you know.`,ax:`thread`,d:10},
]},

// ════════════════════════════════════════════════════════════════
// ROOT
// ════════════════════════════════════════════════════════════════

{cat:`root`,loc:`forest`,
text:`<span class="cn">Mosse</span> hasn't moved from the same spot in three months and seems completely happy about it. You've been watching and you don't understand how anyone could want that.`,
q:`What do you do?`,
choices:[
{t:`Sit with Mosse for a full hour without going anywhere. See what you notice.`,s:`You notice: the light changing slowly. A beetle crossing. The sound of the forest at ten in the morning is different from eleven. Mosse has a very full world from right here.`,ax:`root`,d:10},
{t:`Ask Mosse what it's like to stay in one place for such a long time.`,s:`The answer takes a while to come. When it does: <em>"Everything comes to me eventually. I've learned to be the kind of place things come to."</em>`,ax:`root`,d:11},
{t:`Try staying exactly where you are, without doing anything, for ten minutes.`,s:`You make it eight minutes. But in those eight minutes you notice things you've never noticed before because you were always walking through too fast.`,ax:`stone`,d:9},
]},

{cat:`root`,loc:`forest`,
text:`Something is growing very slowly — something you started a long time ago — and today there is no visible sign of progress at all. You're starting to wonder if it's ever going to work.`,
q:`What do you do?`,
choices:[
{t:`Do the work of tending to it today even though you can't see any results.`,s:`You water it. Loosen the earth. Do the care without looking for the reward. Two weeks later, something appears. It was happening before you could see it.`,ax:`root`,d:10},
{t:`Check the roots instead of looking at what's above the ground.`,s:`The root system is much bigger than the surface suggests. All the work is underground right now. Underground is still growing.`,ax:`spark`,d:10},
{t:`Ask Deeproot what it knows about things that take a very long time to grow.`,s:`<span class="cn">Deeproot's</span> answer comes through the soles of your feet — a vibration that means something like: <em>slow is not the same as stopped.</em>`,ax:`root`,d:10},
]},

{cat:`root`,loc:`lighthouse`,
text:`You've been working on something for much longer than you expected. You're tired in a way that isn't about sleep. The tiredness is in the work itself.`,
q:`What do you do?`,
choices:[
{t:`Take a real break — not a small pause, but a full stop — and do something completely different.`,s:`You stop for a whole day. When you come back the work looks different. Not easier — but more interesting again. The break made space for that.`,ax:`root`,d:10},
{t:`Find the one part of it you still care about and only do that part today.`,s:`You work on the corner that still interests you. It's not much. But it keeps the thread going. Keeping the thread going is everything.`,ax:`flame`,d:9},
{t:`Tell someone how long you've been at it and let them acknowledge that.`,s:`<em>"I've been working on this for months."</em> The other creature says: <em>"That's a long time. That's real work."</em> Being seen in the hard part helps.`,ax:`thread`,d:10},
]},

{cat:`root`,loc:`beach`,
text:`The tide goes out every day. The tide comes back every day. It has done this without stopping for longer than anyone can count. <span class="cn">Veilstone</span> appears beside you, barely visible in the stillness.`,
q:`What happens?`,
choices:[
{t:`Sit completely still and watch the tide for a long time without saying anything.`,s:`<span class="cn">Veilstone</span> becomes a little more visible the longer you are still. At the quietest moment, it is almost fully there — watching the tide beside you.`,ax:`root`,d:11},
{t:`Ask Veilstone what it has noticed about the tide over all the time it's been watching.`,s:`The answer doesn't come in words. It comes as a feeling: <em>the tide always comes back. That's not nothing. You can count on what returns.</em>`,ax:`root`,d:10},
{t:`Breathe with the rhythm of the waves — in when they come, out when they go.`,s:`Your breathing matches the tide. <span class="cn">Veilstone</span> steadies beside you. For a while you're both part of the same rhythm.`,ax:`stone`,d:10},
]},

{cat:`root`,loc:`forest`,
text:`<span class="cn">Oldstone</span> is here in the forest. It has not moved in a very long time. You have a question you've been carrying for a while — one that's too big for someone who would answer quickly.`,
q:`What do you do?`,
choices:[
{t:`Ask the question out loud and wait as long as it takes for the answer.`,s:`The answer comes very slowly. But it comes — not in words exactly, more in a shift in how the question feels. The question gets smaller without disappearing.`,ax:`root`,d:11},
{t:`Sit in silence with Oldstone and see if the question changes on its own.`,s:`In the quiet, a different question appears underneath the first one — the one you actually needed to ask. That one is smaller and more answerable.`,ax:`stone`,d:10},
{t:`Ask the question and then go do something else and come back later.`,s:`When you come back, the answer is there — not because Oldstone said it, but because carrying the question differently while doing something else worked.`,ax:`spark`,d:9},
]},

{cat:`root`,loc:`bridge`,
text:`Every time you cross this bridge you get halfway and then rush the rest — like your calm only goes so far and then breaks down. This time you catch yourself doing it.`,
q:`What do you do?`,
choices:[
{t:`Stop completely right where you are, in the middle of the bridge.`,s:`You stop. The urge to rush gets stronger for a second — then levels out. You stand still on the bridge. The bridge holds you. You hold yourself.`,ax:`stone`,d:10},
{t:`Walk more slowly than feels right.`,s:`Deliberately slower. It feels wrong for the first ten steps. Then it settles. You reach the other side at the right speed for the first time.`,ax:`root`,d:10},
{t:`Name what's happening out loud as you go: "This is the part where I rush. I notice it."`,s:`Naming it puts a small gap between you and the urge. Not a wall — just enough room to choose differently.`,ax:`spark`,d:10},
]},

{cat:`root`,loc:`market`,
text:`Something you waited a long time for has arrived. It's not what you imagined. It's not bad — it's just different. The version in your head was not the version that showed up.`,
q:`What do you do?`,
choices:[
{t:`Let go of the imagined version and spend real time with the actual one.`,s:`The real version has things the imagined one didn't. Different things. Real things. You couldn't have imagined them because they're specific in a way imagination can't be.`,ax:`root`,d:10},
{t:`Sit with the disappointment and let it be there.`,s:`The disappointment is real. You let it be. It passes. When it's gone, the actual thing is still there — not better than imagined, just real. Real is enough.`,ax:`stone`,d:10},
{t:`Tell someone both things — what you imagined, and what you got — and let the telling help.`,s:`Saying both out loud shows you that both are real. The imagined one taught you what you wanted. The real one is teaching you something else.`,ax:`thread`,d:10},
]},

{cat:`root`,loc:`lighthouse`,
text:`<span class="cn">Wellow</span> is teaching you something that needs the same step done many times before it clicks. You've done it six times. It still isn't right. <em>"Again,"</em> Wellow says.`,
q:`What do you do?`,
choices:[
{t:`Do it again. Just that. Again.`,s:`The seventh time your hands know something they didn't know after six times. There was no shortcut to the seventh time.`,ax:`root`,d:10},
{t:`Ask Wellow to show you the one specific thing you're still getting wrong.`,s:`<span class="cn">Wellow</span> shows you exactly one thing. You do it again with only that one thing changed. It works. One specific fix is better than starting over.`,ax:`spark`,d:10},
{t:`Do it much more slowly than you have been.`,s:`Slower shows you what speed was hiding. The problem was in a part that going fast made invisible. You find it. You fix it. You do it right.`,ax:`stone`,d:10},
]},

];

    lore:[
      {
        tier:1, title:`You just met`,
        facts:[
          `Wellow keeps the lighthouse and cooks for anyone who comes by, whether they were expected or not.`,
          `The kitchen always smells good. This is not an accident.`,
          `Wellow says very little that isn't useful. When Wellow speaks, it's worth hearing.`
        ]
      },
      {
        tier:2, title:`Getting to know each other`,
        facts:[
          `Wellow has been the lighthouse keeper since the previous keeper left — which was a very long time ago. Wellow doesn't talk about the previous keeper.`,
          `Every recipe Wellow makes has a story. Wellow rarely tells the whole story unprompted.`,
          `The lighthouse has never gone dark. Not once. Not for a moment.`
        ]
      },
      {
        tier:3, title:`Good friends`,
        facts:[
          `Wellow came to the island from somewhere with long winters. The warmth of the kitchen isn't accidental — it's deliberate, maintained like the light.`,
          `Wellow taught Pip to fish, Brin to make bread, and Coss to drum by ear. Never in a formal way. Just by being nearby and showing.`,
          `Wellow keeps a small book of names of everyone who has ever eaten at the lighthouse table. It goes back many years.`
        ]
      },
      {
        tier:4, title:`Close friends`,
        facts:[
          `Wellow knows something bad is coming before it arrives. Not in a magical way — in the way that someone who has lived through many things can feel the shape of what's next.`,
          `The bowl Wellow always holds was made by a creature who has since left the island. Wellow has never replaced it.`,
          `Wellow is proud of everyone on this island and finds it hard to say so directly.`
        ]
      }
    ]
  },

    lore:[
      {
        tier:1, title:`You just met`,
        facts:[
          `Coss drums constantly — on drums, on rocks, on the bridge, on whatever is available.`,
          `Has a laugh you can hear from most of the island.`,
          `Enthusiastic about nearly everything. The exceptions are few and surprising.`
        ]
      },
      {
        tier:2, title:`Getting to know each other`,
        facts:[
          `Coss watches the tide to set the rhythm. Different tides produce different drumming. The island has learned to tell the time by it.`,
          `Has made instruments out of everything. The best one — a set of tuned stones — is hidden somewhere on the bridge for safekeeping.`,
          `Coss gets very quiet before big weather. The drumming stops and the quiet is its own kind of warning.`
        ]
      },
      {
        tier:3, title:`Good friends`,
        facts:[
          `Coss grew up in a loud family and uses noise to feel safe. The drumming is always present because silence used to mean something bad was happening.`,
          `Has perfect pitch and has never told anyone, because it would change how people listen to the drumming.`,
          `Coss taught Roarette the concept of dynamics — loud on purpose is different from just loud. Roarette is still working on it.`
        ]
      },
      {
        tier:4, title:`Close friends`,
        facts:[
          `Coss misses someone who used to drum with them. There's a second set of drum marks on the rock near the beach from when they played together. Coss keeps those marks clean.`,
          `The quiet before a storm isn't just watching weather — it's a private ritual that has something to do with the person who left.`,
          `Coss can hear when you're upset before you say anything. The drumming changes. It becomes something more like company.`
        ]
      }
    ]
  },

    lore:[
      {
        tier:1, title:`You just met`,
        facts:[
          `The Lumen floats. It has no fixed home on the island. It goes where it's needed.`,
          `It doesn't speak in words exactly — more in feelings and light.`,
          `Every creature on the island has met the Lumen at least once. It seems to find you.`
        ]
      },
      {
        tier:2, title:`Getting to know each other`,
        facts:[
          `The Lumen has been on the island longer than the lighthouse. Maybe longer than the island itself.`,
          `Its light changes color depending on what it's thinking. Blue is calm. Gold is pleased. Something between them means it's been listening.`,
          `The Lumen never asks questions. It just gets close and waits. Creatures find themselves answering questions they hadn't realized they were asking.`
        ]
      },
      {
        tier:3, title:`Good friends`,
        facts:[
          `The Lumen remembers everyone who has ever cried on this island. Not as something sad — as something it considers important to hold.`,
          `When new creatures arrive on the island, the Lumen finds them first. Always. Nobody knows how it knows.`,
          `The Lumen's light goes out entirely for a few seconds once a year, always at the same time. Nobody knows why. The Lumen doesn't explain.`
        ]
      },
      {
        tier:4, title:`Close friends`,
        facts:[
          `The Lumen chose the island. It was somewhere else first. It left to come here specifically. The reason is in the light if you know how to read it.`,
          `When the Lumen is near you and its light pulses — slow and steady — it means it has decided you are safe. This doesn't happen quickly.`,
          `The Lumen has been watching Garrett. The gold in its light is deliberate.`
        ]
      }
    ]
  },

    lore:[
      {
        tier:1, title:`You just met`,
        facts:[
          `Sable arrived on this island a while ago and decided to stay. They have maps spread across every flat surface they own.`,
          `Always carrying a journal, a walking staff, and a brass instrument for reading stars.`,
          `Sable asks questions about people with the same careful attention they give to coastlines and currents.`
        ]
      },
      {
        tier:2, title:`Getting to know each other`,
        facts:[
          `Sable has mapped eleven islands. This one, they say, is the hardest to get right — not because of the geography, but because it keeps changing.`,
          `They sleep outside when the sky is clear. Not from habit — from preference. The stars here are different than anywhere else they've been.`,
          `Sable's journal has two kinds of entries: places and people. The people section is longer.`
        ]
      },
      {
        tier:3, title:`Good friends`,
        facts:[
          `Sable believes that maps of people are more important than maps of land. They've been quietly mapping everyone on the island — their patterns, their rhythms, what draws them out.`,
          `They learned star navigation from someone they've never stopped trying to find. Every island they map is partly a search.`,
          `Sable has given copies of the island map to Wellow, Pip, and the creatures who asked. Each copy has small notes in the margins about what each area feels like, not just what it looks like.`
        ]
      },
      {
        tier:4, title:`Close friends`,
        facts:[
          `The brass instrument Sable carries was made for them by someone who said: wherever you go, you'll be able to find north. They've never been able to explain why north matters less than knowing where you are.`,
          `Sable has added Garrett to the people-map. The entry says: arrives with curiosity, stays with kindness, leaves things better.`,
          `There is one star Sable always finds first when the sky is clear. They haven't told anyone its name. It's the one they navigate by when they're not sure where they're going.`
        ]
      }
    ]

// Track resident encounter counts
var residentEncounters = {};
var locationVisits = {beach:0,forest:0,market:0,lighthouse:0,bridge:0};

function initResidents() {
  RESIDENTS.forEach(function(r) {
    if (!residentEncounters[r.id]) residentEncounters[r.id] = 0;
  });
}

function getResidentTier(id) {
  var enc = residentEncounters[id] || 0;
  // Tier 1: always. Tier 2: 3+ encounters. Tier 3: 8+ encounters. Tier 4: 15+ encounters
  if (enc >= 15) return 4;
  if (enc >= 8) return 3;
  if (enc >= 3) return 2;
  return 1;
}

function countResidentMentions(encText) {
  // Count how many residents appear in encounter text
  var map = {pip:'pip', brin:'brin', wellow:'wellow', coss:'coss', lumen:'lumen', traveler:'traveler'};
  Object.keys(map).forEach(function(name) {
    var re = new RegExp(name, 'gi');
    if (re.test(encText)) {
      if (!residentEncounters[map[name]]) residentEncounters[map[name]] = 0;
      residentEncounters[map[name]]++;
    }
  });
}

function showResidents() {
  var list = document.getElementById('residents-list');
  list.innerHTML = '';
  RESIDENTS.forEach(function(r) {
    var tier = getResidentTier(r.id);
    var enc = residentEncounters[r.id] || 0;
    var tierData = r.lore[tier - 1];
    var isMaxed = tier >= 4;
    var card = document.createElement('div');
    card.className = 'res-card';
    card.style.setProperty('border-color', 'rgba(' + hexToRgb(r.color) + ',.2)');
    card.innerHTML =
      '<div class="res-portrait">' + r.svg + '</div>' +
      '<div class="res-info">' +
        '<div class="res-name">' + r.name + '</div>' +
        '<div class="res-role" style="color:' + r.color + ';">' + r.role + '</div>' +
        '<div class="res-preview">' + tierData.facts[0] + '</div>' +
        '<div class="res-tier-badge' + (isMaxed ? ' maxed' : '') + '">' +
          (isMaxed ? '&#x1F49B; ' : '&#x1F90D; ') +
          tierData.title +
        '</div>' +
      '</div>';
    (function(rid) { card.onclick = function() { showResidentDetail(rid); }; })(r.id);
    list.appendChild(card);
  });
  show('s-residents');
}

function showResidentDetail(id) {
  var r = null;
  for (var i = 0; i < RESIDENTS.length; i++) if (RESIDENTS[i].id === id) { r = RESIDENTS[i]; break; }
  if (!r) return;
  var tier = getResidentTier(r.id);
  var enc = residentEncounters[r.id] || 0;

  document.getElementById('rdet-name').textContent = r.name;
  var body = document.getElementById('rdet-body');
  body.innerHTML = '';

  // Portrait + role + current tier
  var topDiv = document.createElement('div');
  topDiv.className = 'rdet-top';
  topDiv.innerHTML =
    '<div class="rdet-portrait-big">' + r.svg + '</div>' +
    '<div style="flex:1;">' +
      '<div class="rdet-role" style="color:' + r.color + ';">' + r.role + '</div>' +
      '<div class="rdet-tier-label">' + r.lore[tier-1].title + '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,.35);">Encountered ' + enc + ' time' + (enc === 1 ? '' : 's') + '</div>' +
    '</div>';
  body.appendChild(topDiv);

  // Show unlocked tiers
  for (var t = 0; t < tier; t++) {
    var td = r.lore[t];
    var group = document.createElement('div');
    group.className = 'fact-group';
    var factsHtml = '<div class="fact-group-title">' + td.title + '</div>';
    td.facts.forEach(function(fact) {
      factsHtml += '<div class="fact-item">' + fact + '</div>';
    });
    group.innerHTML = factsHtml;
    body.appendChild(group);
  }

  // Show locked tiers as hints
  var thresholds = [0,3,8,15];
  for (var t2 = tier; t2 < 4; t2++) {
    var needed = thresholds[t2];
    var locked = document.createElement('div');
    locked.className = 'fact-group';
    locked.style.opacity = '0.5';
    locked.innerHTML =
      '<div class="fact-group-title">&#x1F512; ' + r.lore[t2].title + '</div>' +
      '<div class="fact-locked">Spend more time with ' + r.name + ' to learn more.<br>' +
      (enc < needed ? (needed - enc) + ' more encounter' + (needed - enc === 1 ? '' : 's') + ' needed.' : '') + '</div>';
    body.appendChild(locked);
  }

  show('s-resident-detail');
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  var r = parseInt(hex.slice(0,2),16);
  var g = parseInt(hex.slice(2,4),16);
  var b = parseInt(hex.slice(4,6),16);
  return r + ',' + g + ',' + b;
}

function spawnTitleStars() {
  var container = document.getElementById('title-stars');
  if (!container) return;
  var count = 60;
  for (var i = 0; i < count; i++) {
    var s = document.createElement('div');
    s.className = 'tstar' + (Math.random() > 0.5 ? ' pulse' : '');
    var size = Math.random() < 0.7 ? 1.5 : (Math.random() < 0.85 ? 2.5 : 3.5);
    s.style.cssText = 'width:' + size + 'px;height:' + size + 'px;' +
      'top:' + (Math.random() * 65) + '%;' +
      'left:' + (Math.random() * 100) + '%;' +
      'opacity:' + (0.35 + Math.random() * 0.6) + ';' +
      '--dur:' + (2 + Math.random() * 4) + 's;' +
      '--del:' + (Math.random() * 5) + 's;';
    container.appendChild(s);
  }
}

// Where to return after glossary tap from encounter
var glossaryReturn = null;

function linkifyText(html) {
  var names = Object.keys(GLOSSARY_NAMES).sort(function(a,b){return b.length-a.length;});
  var parts = html.split(/(<[^>]+>)/);
  for (var p = 0; p < parts.length; p++) {
    if (parts[p].charAt(0) === '<') continue;
    var seg = parts[p];
    if (!seg) continue;
    names.forEach(function(name) {
      if (seg.indexOf(name) === -1) return;
      var entry = GLOSSARY_NAMES[name];
      var color = '#a0b8d0';
      try {
        if (entry.type === 'location' && LOCATION_GLOSSARY[entry.id]) {
          color = LOCATION_GLOSSARY[entry.id].color;
        } else if (entry.type === 'resident') {
          for (var ri = 0; ri < RESIDENTS.length; ri++) {
            if (RESIDENTS[ri].id === entry.id) { color = RESIDENTS[ri].color; break; }
          }
        }
        // Build boundary pattern that handles hyphens and spaces in names
        var esc = name.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
        // Use start/end of string or non-word chars as boundaries
        var boundary = '[^a-zA-Z0-9]';
        var re2 = new RegExp('(^|' + boundary + ')(' + esc + ')($|' + boundary + ')', 'g');
        seg = seg.replace(re2, function(m, pre, word, post) {
          return pre + '<span class="tap-link" style="color:' + color +
            ';border-bottom:1px dotted ' + color + ';" ' +
            'data-gl-type="' + entry.type + '" data-gl-id="' + entry.id + '">' +
            word + '</span>' + post;
        });
      } catch(ex) {}
    });
    parts[p] = seg;
  }
  return parts.join('');
}

function openGlossaryEntry(type, id) {
  var current = document.querySelector('.screen.active');
  glossaryReturn = current ? current.id : 's-explore';
  if (type === 'location') {
    showLocationDetail(id);
  } else if (type === 'creature') {
    openCreatureGlossary(id);
  } else {
    showResidentDetail(id);
    var backBtn = document.getElementById('btn-rdet-back');
    if (backBtn) {
      backBtn.onclick = function() {
        show(glossaryReturn);
        backBtn.onclick = showResidents;
      };
    }
  }
}

function showLocationDetail(locId) {
  var loc = LOCATION_GLOSSARY[locId];
  if (!loc) return;
  var tier = getLocationTier(locId);
  var tierData = loc.tiers[tier - 1];

  var nameEl = document.getElementById('locdet-name');
  var bodyEl = document.getElementById('locdet-body');
  if (nameEl) nameEl.innerHTML = loc.icon + ' ' + loc.name;
  if (bodyEl) {
    // Description
    var html = '<div style="font-family:Lora,serif;font-size:15px;font-style:italic;' +
      'color:rgba(232,228,216,.85);line-height:1.8;margin-bottom:14px;">' + tierData.desc + '</div>';
    // Unlocked details
    html += '<div class="fact-group" style="margin-bottom:10px;">';
    html += '<div class="fact-group-title" style="color:' + loc.color + ';">' + tierData.title + ' — Known Details</div>';
    tierData.details.forEach(function(d) {
      html += '<div class="fact-item">' + d + '</div>';
    });
    html += '</div>';
    // Locked tiers
    var visitThresholds = [0,5,12];
    for (var t = tier; t < 3; t++) {
      var needed = visitThresholds[t];
      var visits = locationVisits[locId] || 0;
      html += '<div class="fact-group" style="opacity:0.45;margin-bottom:8px;">';
      html += '<div class="fact-group-title">&#x1F512; ' + loc.tiers[t].title + ' — Hidden</div>';
      html += '<div class="fact-locked">Spend more time at ' + loc.name + ' to uncover more.<br>' +
        (visits < needed ? (needed - visits) + ' more visit' + (needed - visits === 1 ? '' : 's') + ' needed.' : '') + '</div>';
      html += '</div>';
    }
    bodyEl.innerHTML = html;
  }

  // Update back button
  var backBtn = document.getElementById('btn-locdet-back');
  if (backBtn) backBtn.onclick = function() {
    show(glossaryReturn || 's-title');
    glossaryReturn = null;
    document.getElementById('btn-rdet-back').onclick = showResidents;
  };

  show('s-location-detail');
}

function showLocations() {
  var list = document.getElementById('locations-list');
  list.innerHTML = '';
  var locKeys = ['beach','forest','market','lighthouse','bridge'];
  locKeys.forEach(function(key) {
    var loc = LOCATION_GLOSSARY[key];
    if (!loc) return;
    var tier = getLocationTier(key);
    var tierData = loc.tiers[tier-1];
    var visits = locationVisits[key] || 0;
    var locArtData = LOCATIONS[key];
    var card = document.createElement('div');
    card.className = 'loc-entry';
    card.style.borderColor = 'rgba(' + hexToRgb(loc.color) + ',.25)';
    card.innerHTML =
      '<div class="loc-entry-art">' + (locArtData ? locArtData.art : '') + '</div>' +
      '<div class="loc-entry-body">' +
        '<div class="loc-entry-tier" style="color:' + loc.color + ';">' + loc.icon + ' ' + loc.name +
          ' &nbsp;&middot;&nbsp; ' + visits + ' visit' + (visits===1?'':'s') + '</div>' +
        '<div class="loc-entry-desc">' + tierData.desc.slice(0, 120) + '…</div>' +
      '</div>';
    (function(k) { card.onclick = function() {
      glossaryReturn = 's-locations';
      showLocationDetail(k);
    }; })(key);
    list.appendChild(card);
  });
  show('s-locations');
}

// GAME STATE
