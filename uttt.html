<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Ultimate Tic-Tac-Toe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:system-ui,sans-serif;color:#e8f0e4;overflow:hidden;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 20%,#1f3327 0%,#0c1410 70%);}
  #bar{display:flex;align-items:center;gap:10px;padding:12px 14px;}
  #bar a{color:#cfe6d8;text-decoration:none;font-size:14px;border:1px solid #3a5a47;border-radius:999px;padding:6px 12px;}
  #title{font-weight:800;font-size:17px;}
  #turnWrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
  #dot{width:16px;height:16px;border-radius:50%;}
  #turnName{font-weight:700;font-size:15px;}
  #wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;}
  #macro{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#0a120d;padding:8px;border-radius:14px;
    box-shadow:0 14px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06);}
  .mini{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:4px;border-radius:8px;background:#13211a;
    position:relative;transition:box-shadow .25s,background .25s;}
  .mini.active{background:#1c3326;box-shadow:0 0 0 2.5px #b0d235,0 0 18px rgba(176,210,53,.35);}
  .mini.dead{opacity:.92;}
  .cell{border:none;border-radius:4px;background:#0e1813;color:#fff;font-family:inherit;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0;
    box-shadow:inset 0 1.5px 3px rgba(0,0,0,.5);}
  .cell:disabled{cursor:default;}
  .claim{position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5);}
  #msg{min-height:38px;text-align:center;font-size:14px;color:#d8e8dd;padding:0 16px;display:flex;align-items:center;justify-content:center;}
  #foot{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;padding:8px 14px 18px;}
  .act{font-family:inherit;font-size:15px;font-weight:bold;padding:10px 18px;border-radius:10px;border:none;
    color:#1c2b16;background:#b0d235;cursor:pointer;box-shadow:0 4px 0 #7e9a1f,0 5px 10px rgba(0,0,0,.4);}
  .act.ghost{background:#15241b;color:#cfe6d8;box-shadow:0 4px 0 #0b160f;border:1px solid #3a5a47;}
  #score{font-size:14px;color:#bcd6c7;}
  .ov{position:fixed;inset:0;background:rgba(7,12,9,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;text-align:center;padding:24px;}
  .ov.show{display:flex;}
  .ov h1{font-size:28px;}
  #confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .cf{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}
</style>
</head>
<body>
<div id="bar"><a href="index.html">&#8962; Shelf</a><div id="title">Ultimate Tic-Tac-Toe</div><div id="turnWrap"><div id="dot"></div><div id="turnName"></div></div></div>
<div id="wrap"><div id="macro"></div></div>
<div id="msg"></div>
<div id="foot">
  <button class="act ghost" id="newBtn">New game</button>
  <div id="score"></div>
</div>
<div class="ov" id="overlay"><div id="confetti"></div><div style="font-size:54px;">&#127942;</div><h1 id="ovTitle"></h1><p id="ovText"></p>
  <button class="act" id="ovBtn">Play again</button><a href="index.html" style="font-size:14px;padding:9px 16px;border-radius:10px;border:1px solid #3a5a47;background:#15241b;color:#cfe6d8;text-decoration:none;">Back to shelf</a></div>
<script src="gamenight.js?v=3"></script>
<script>
const KEY="uttt_games";
let P={X:{name:"Mot",main:"#d8312b",light:"#f06a60",dark:"#8d1d19"},O:{name:"Kathy",main:"#2f6fd0",light:"#6fa0ec",dark:"#194182"}};
function seatFrom(p){return{name:p.name,main:p.color,light:p.light,dark:p.dark};}
const LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let boards,macro,turn="X",active=-1,phase="over",GS=null,moves=0;
function winnerOf(cells){for(const[a,b,c]of LINES)if(cells[a]&&cells[a]===cells[b]&&cells[a]===cells[c])return cells[a];return null;}
function fullOf(cells){return cells.every(x=>x);}
function legalBoard(i){return !macro[i]&&!fullOf(boards[i]);}
function newGame(){phase="over";
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("confetti").innerHTML="";
  GN.matchStart(function(m){P={X:seatFrom(m.a),O:seatFrom(m.b)};
    boards=Array.from({length:9},()=>Array(9).fill(null));
    macro=Array(9).fill(null);active=-1;moves=0;
    turn=(m.first===m.a)?"X":"O";phase="play";
    GS={start:Date.now(),flipWinner:m.first.name,friendly:m.friendly,minis:{},moves:{}};
    for(const n of[m.a.name,m.b.name]){GS.minis[n]=0;GS.moves[n]=0;}
    setMessage(P[turn].name+" won the flip \u2014 play anywhere. Your square picks their board.");
    build();refresh();});}
function setMessage(t){document.getElementById("msg").textContent=t;}
function build(){const M=document.getElementById("macro");M.innerHTML="";
  const size=Math.min(window.innerWidth-32,window.innerHeight-230,440);
  const cellPx=Math.floor((size-16-6*8)/9);
  for(let b=0;b<9;b++){const mini=document.createElement("div");mini.className="mini";mini.id="mini"+b;
    for(let c=0;c<9;c++){const btn=document.createElement("button");btn.className="cell";
      btn.style.width=cellPx+"px";btn.style.height=cellPx+"px";btn.style.fontSize=Math.round(cellPx*0.62)+"px";
      btn.id="c"+b+"_"+c;
      btn.addEventListener("click",()=>play(b,c));
      mini.appendChild(btn);}
    M.appendChild(mini);}
  paint();}
function paint(){for(let b=0;b<9;b++){const mini=document.getElementById("mini"+b);
    const isActive=phase==="play"&&(active===-1?legalBoard(b):active===b);
    mini.classList.toggle("active",isActive);
    mini.classList.toggle("dead",!!macro[b]);
    const oldClaim=mini.querySelector(".claim");if(oldClaim)oldClaim.remove();
    for(let c=0;c<9;c++){const btn=document.getElementById("c"+b+"_"+c);
      const v=boards[b][c];
      btn.textContent=v?(v==="X"?"\u00d7":"\u25cb"):"";
      btn.style.color=v?P[v].main:"#fff";
      btn.disabled=!(phase==="play"&&isActive&&!v&&!macro[b]);}
    if(macro[b]){const cl=document.createElement("div");cl.className="claim";
      cl.style.background="radial-gradient(circle at 35% 30%,"+P[macro[b]].light+"cc,"+P[macro[b]].main+"e6 70%,"+P[macro[b]].dark+"f0)";
      cl.style.fontSize=Math.round(mini.offsetWidth*0.55)+"px";
      cl.textContent=macro[b]==="X"?"\u00d7":"\u25cb";
      mini.appendChild(cl);}}}
function refresh(){const pc=P[turn];
  document.getElementById("turnName").textContent=pc.name+" ("+(turn==="X"?"\u00d7":"\u25cb")+")";
  const d=document.getElementById("dot");
  d.style.background="radial-gradient(circle at 35% 30%,"+pc.light+","+pc.main+" 70%,"+pc.dark+")";
  d.style.boxShadow="0 0 0 3px rgba(255,255,255,.15),0 0 14px "+pc.main;
  const recs=GN.readGames(KEY);let a=0,b=0;
  for(const r of recs){if(r.winner===P.X.name)a++;else if(r.winner===P.O.name)b++;}
  document.getElementById("score").textContent=P.X.name+" "+a+" \u00b7 "+b+" "+P.O.name+((GS&&GS.friendly)?" \u00b7 friendly":"");}
function play(b,c){if(phase!=="play"||boards[b][c]||macro[b])return;
  if(active!==-1&&b!==active)return;
  if(active===-1&&!legalBoard(b))return;
  boards[b][c]=turn;moves++;GS.moves[P[turn].name]++;
  const w=winnerOf(boards[b]);
  if(w){macro[b]=w;GS.minis[P[w].name]++;}
  const mw=winnerOf(macro);
  if(mw){paint();finish(mw,"line");return;}
  if(macro.every((m,i)=>m||fullOf(boards[i]))){
    const x=macro.filter(m=>m==="X").length,o=macro.filter(m=>m==="O").length;
    paint();finish(x===o?null:(x>o?"X":"O"),"count");return;}
  active=legalBoard(c)?c:-1;
  turn=turn==="X"?"O":"X";
  setMessage(active===-1?(P[turn].name+" \u2014 that board is closed, play anywhere!"):(P[turn].name+" \u2014 board "+(c+1)+" awaits."));
  paint();refresh();}
function finish(w,how){phase="over";
  const rec={start:GS.start,end:Date.now(),durationMs:Date.now()-GS.start,
    winner:w?P[w].name:null,loser:w?P[w==="X"?"O":"X"].name:null,draw:!w,
    flipWinner:GS.flipWinner,how,minis:GS.minis,moves:GS.moves};
  GN.recordGame(KEY,rec);
  document.getElementById("ovTitle").textContent=w?P[w].name+" wins!":"Dead heat!";
  document.getElementById("ovText").textContent=w?(how==="line"?"Three boards in a row \u2014 "+GS.minis[P[w].name]+" boards captured.":"Most boards when the grid filled."):"Equal boards on a full grid.";
  if(w){const box=document.getElementById("confetti"),cols=[P[w].main,P[w].light,"#f4c542","#fff"];
    for(let i=0;i<60;i++){const d=document.createElement("div");d.className="cf";d.style.left=Math.random()*100+"%";
      d.style.background=cols[i%cols.length];d.style.animationDuration=(2.2+Math.random()*1.8)+"s";
      d.style.animationDelay=(Math.random()*0.8)+"s";box.appendChild(d);}}
  document.getElementById("overlay").classList.add("show");refresh();}
document.getElementById("newBtn").addEventListener("click",newGame);
document.getElementById("ovBtn").addEventListener("click",newGame);
window.addEventListener("resize",()=>{if(boards)build();});
GN.rulesButton(document.getElementById("foot"),{title:"Ultimate Tic-Tac-Toe",sections:[
 {h:"Goal",p:"Nine tic-tac-toe boards in one grid. Win three small boards in a row to win the whole thing."},
 {h:"The twist",p:"Wherever you play inside a small board, your opponent must play in the matching board of the big grid \u2014 top-right square sends them to the top-right board. Every move is also a command."},
 {h:"Freedom",p:"Sent to a board that\u2019s already won or full? You may play anywhere. Gifting your opponent a free move is usually a mistake."},
 {h:"Endings",p:"Three claimed boards in a row wins. If the grid fills first, most boards captured takes it."}]});
GN.statsButton(document.getElementById("foot"),{title:"Ultimate Tic-Tac-Toe",key:KEY,specials:[
 {label:"Mini boards won",of:(r,n)=>r.reduce((a,x)=>a+((x.minis&&x.minis[n])||0),0)},
 {label:"Fastest win (moves)",of:(r,n)=>{const w=r.filter(x=>x.winner===n&&x.moves&&x.moves[n]);return w.length?Math.min(...w.map(x=>x.moves[n])):0;}},
 {label:"Coin flips won",of:(r,n)=>r.filter(x=>x.flipWinner===n).length}]});
newGame();
</script>
</body>
</html>
